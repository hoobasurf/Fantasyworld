<!DOCTYPE html><html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Lilo & Stitch Island</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0830}
#cv{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
#loading{position:fixed;inset:0;background:linear-gradient(180deg,#1a0830,#3a1860);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#loading h1{font-family:Georgia,serif;font-size:22px;color:#ffb8d8;letter-spacing:5px}
#loading p{font-size:10px;color:rgba(255,184,216,.45);letter-spacing:3px}
.bw{width:220px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.bf{height:100%;background:linear-gradient(90deg,#ffb8d8,#ffd06a);border-radius:2px;transition:width .25s}
#stepTxt{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:2px}
#hud{position:fixed;top:12px;left:0;right:0;display:none;justify-content:space-between;padding:0 14px;pointer-events:none;z-index:20}
.pill{background:rgba(0,0,15,.75);border-radius:20px;padding:5px 13px;font-family:Georgia,serif;font-size:10px;color:#ffd06a;border:1.5px solid rgba(255,208,106,.3)}
#zone{position:fixed;bottom:82px;left:130px;pointer-events:none;z-index:20;display:none}
#joy{position:fixed;left:16px;bottom:82px;z-index:30;width:110px;height:110px;border-radius:50%;background:rgba(0,0,0,.25);border:3px solid rgba(255,208,106,.5);touch-action:none}
#jnub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:50%;background:radial-gradient(circle,rgba(255,220,80,.8),rgba(180,80,0,.9));border:3px solid #ffd06a}
#btns{position:fixed;right:14px;bottom:82px;z-index:30;display:flex;flex-direction:column;gap:8px}
.btn{width:56px;height:56px;border-radius:50%;background:rgba(0,0,20,.8);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:9px;cursor:pointer;touch-action:manipulation;border:3px solid rgba(255,255,255,.2)}
#toast{position:fixed;top:54px;left:50%;transform:translateX(-50%) scale(.9);opacity:0;z-index:80;background:rgba(0,0,20,.92);border:2px solid #ffd06a;border-radius:20px;padding:7px 18px;color:#ffd06a;font-size:11px;font-family:Georgia,serif;white-space:nowrap;pointer-events:none;transition:all .2s}
#toast.show{transform:translateX(-50%) scale(1);opacity:1}
</style>
</head>
<body>
<div id="loading">
  <h1>LILO &amp; STITCH ISLAND</h1>
  <p>HAWAII — ALOHA</p>
  <div class="bw"><div class="bf" id="bf" style="width:2%"></div></div>
  <div id="stepTxt">CHARGEMENT...</div>
</div>
<canvas id="cv"></canvas>
<div id="hud">
  <div class="pill">&#127796; HAWAII</div>
  <div class="pill">&#128100; STITCH</div>
  <div class="pill" id="dnBtn" onclick="toggleDN()" style="pointer-events:all;cursor:pointer">&#9790; NUIT</div>
</div>
<div id="zone"><div class="pill" id="zoneTxt">&#127944; PLAGE</div></div>
<div id="joy"><div id="jnub"></div></div>
<div id="btns">
  <div class="btn" style="border-color:#7de8ff;color:#7de8ff" ontouchstart="doJump(event)" onclick="doJump()">&#8679;<br>JUMP</div>
  <div class="btn" style="border-color:#ffd700;color:#ffd700" ontouchstart="setSprint(1,event)" ontouchend="setSprint(0)" onmousedown="setSprint(1)" onmouseup="setSprint(0)">&#9889;<br>RUN</div>
</div>
<div id="toast"></div>

<script>
(function(){
  var s=document.getElementById('stepTxt');
  var cdns=[
    {b:'https://cdn.babylonjs.com/babylon.js',l:'https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js'},
    {b:'https://unpkg.com/babylonjs@6.26.0/babylon.js',l:'https://unpkg.com/babylonjs-loaders@6.26.0/babylonjs.loaders.min.js'},
    {b:'https://cdnjs.cloudflare.com/ajax/libs/babylonjs/6.26.0/babylon.js',l:'https://cdnjs.cloudflare.com/ajax/libs/babylonjs-loaders/6.26.0/babylonjs.loaders.min.js'}
  ];
  var i=0;
  function next(){
    if(i>=cdns.length){s.textContent='ERREUR CDN';return;}
    var p=cdns[i++];s.textContent='CDN '+i+'/'+cdns.length+'...';
    ld(p.b,function(){ld(p.l,function(){window.startGame&&window.startGame();},next);},next);
  }
  function ld(url,ok,fail){var sc=document.createElement('script');sc.src=url;sc.onload=ok;sc.onerror=function(){document.head.removeChild(sc);fail();};document.head.appendChild(sc);}
  next();
})();
</script>

<script>
window.startGame=function(){
'use strict';
var B=BABYLON;
var BASE='https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/';

var bfEl=document.getElementById('bf');
function step(p,t){bfEl.style.width=p+'%';if(t)document.getElementById('stepTxt').textContent=t;}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.className='show';clearTimeout(toast._t);toast._t=setTimeout(function(){t.className='';},3000);}
function showGame(){document.getElementById('loading').style.display='none';document.getElementById('hud').style.display='flex';document.getElementById('zone').style.display='block';}

var P={x:0,y:0,z:0,vx:0,vy:0,vz:0,yaw:0,onGround:true,inWater:false};
var pRoot=null,pYOff=0,pAnims={},curAnim=null;
var jLX=0,jLY=0,KY={};
var CAM={yaw:Math.PI,pitch:.12,dist:6}; // caméra basse derrière Stitch
var night=false,sprint=false;
var waveT=0,lastT=performance.now();
var waveRings=[],colCircles=[];
var ISLAND_R=80; // grande île
var WATER_Y=-.3; // niveau eau

var cv=document.getElementById('cv');
var eng=new B.Engine(cv,true,{antialias:true,stencil:true,adaptToDeviceRatio:true},true);
var sc=new B.Scene(eng);
sc.clearColor=new B.Color4(.85,.58,.78,1);
// Brouillard linéaire — jungle cache la plage
sc.fogMode=B.Scene.FOGMODE_LINEAR;
sc.fogStart=55;sc.fogEnd=130;
sc.fogColor=new B.Color3(.7,.55,.72);

var cam=new B.FreeCamera('cam',new B.Vector3(0,8,12),sc);
cam.minZ=.1;cam.maxZ=600;cam.fov=1.0;
cam.inputs.clear();

step(6,'LUMIERES CARTOON...');

// Lumière principale — soleil chaud coucher
var sun=new B.DirectionalLight('sun',new B.Vector3(-.35,-1,.2),sc);
sun.position=new B.Vector3(-80,140,50);
sun.intensity=2.8;
sun.diffuse=new B.Color3(1.0,.80,.52);
sun.specular=new B.Color3(0,0,0); // pas de specular = style cartoon

var shadows=null;
try{
  shadows=new B.ShadowGenerator(2048,sun);
  // Ombres nettes style cartoon
  shadows.usePoissonSampling=true;
  shadows.darkness=.55; // ombre foncée cartoon
  shadows.transparencyShadow=true;
}catch(e){}

// Lumière ambiante rose/mauve ciel Lilo & Stitch
var sky=new B.HemisphericLight('sky',new B.Vector3(0,1,0),sc);
sky.intensity=.75;
sky.diffuse=new B.Color3(.90,.70,.85);
sky.groundColor=new B.Color3(.65,.48,.28);
sky.specular=new B.Color3(0,0,0);

var fill=new B.PointLight('fill',new B.Vector3(0,3,0),sc);
fill.intensity=.22;fill.range=9;
fill.diffuse=new B.Color3(1,.82,.5);

step(14,'CEL-SHADING...');

// ── CEL SHADER CARTOON ──
// Crée un material avec cel-shading via CustomMaterial ou ShaderMaterial
function celMat(name,diffCol,outlineCol,outlineW){
  outlineW=outlineW||.04;
  var mat=new B.StandardMaterial(name,sc);
  mat.diffuseColor=diffCol||new B.Color3(1,1,1);
  mat.specularColor=new B.Color3(0,0,0);
  mat.ambientColor=diffCol?diffCol.scale(.3):new B.Color3(.3,.3,.3);
  return mat;
}

// Contour noir cartoon via mesh dupliqué légèrement agrandi
function addOutline(mesh,w,col){
  w=w||.04;
  try{
    mesh.outlineColor=col||new B.Color3(0,0,0);
    mesh.outlineWidth=w;
    mesh.renderOutline=true;
  }catch(e){}
}

step(20,'CIEL LILO & STITCH...');

// Dôme ciel coucher de soleil
var skyDome=B.MeshBuilder.CreateSphere('skyD',{diameter:1000,segments:8},sc);
skyDome.flipFaces(true);
var skyMat=new B.StandardMaterial('skyMat',sc);
skyMat.backFaceCulling=false;skyMat.disableLighting=true;
var skyDyn=new B.DynamicTexture('sdt',{width:4,height:512},sc,false);
(function(){
  var ctx=skyDyn.getContext();
  var c=document.createElement('canvas');c.width=4;c.height=512;
  var cx=c.getContext('2d');
  var g=cx.createLinearGradient(0,0,0,512);
  g.addColorStop(0,'#3322aa');
  g.addColorStop(.2,'#7744cc');
  g.addColorStop(.45,'#dd7aaa');
  g.addColorStop(.65,'#f09040');
  g.addColorStop(.82,'#f8d060');
  g.addColorStop(1,'#ffe0c0');
  cx.fillStyle=g;cx.fillRect(0,0,4,512);
  ctx.drawImage(c,0,0);skyDyn.update(false);
})();
skyMat.emissiveTexture=skyDyn;skyMat.emissiveTexture.uScale=1;skyMat.emissiveTexture.vScale=1;
skyDome.material=skyMat;

// Nuages cartoon arrondis style Disney
function makeCloud(x,y,z,s){
  var cMat=new B.StandardMaterial('cM'+Math.random(),sc);
  cMat.diffuseColor=new B.Color3(1,.96,.98);
  cMat.emissiveColor=new B.Color3(.85,.78,.88);
  cMat.specularColor=new B.Color3(0,0,0);
  var parts=[[0,0,0,1],[.55,.18,0,.75],[-.55,.12,0,.7],[.28,.42,0,.62],[-.22,.38,0,.58],[.8,0,0,.58],[-.8,.04,0,.54],[.0,.5,0,.5]];
  parts.forEach(function(b){
    var cb=B.MeshBuilder.CreateSphere('cb',{diameter:s*b[3]*2,segments:6},sc);
    cb.material=cMat;cb.position.set(x+b[0]*s,y+b[1]*s,z+b[2]*s);
    addOutline(cb,.015,new B.Color3(.6,.5,.7));
  });
}
[[-50,38,-160,16],[15,42,-150,14],[90,35,-140,12],[-90,32,-130,13],
 [0,46,-170,18],[-40,30,-110,11],[55,33,-125,13],[130,28,-120,10],
 [40,50,-180,15],[-70,36,-145,12]
].forEach(function(c){makeCloud(c[0],c[1],c[2],c[3]);});

// Montagnes silhouettes bleues au loin
function makeMtn(x,z,h,w){
  var mt=B.MeshBuilder.CreateCylinder('mt',{height:h,diameterTop:1,diameterBottom:w,tessellation:5},sc);
  var mtMat=new B.StandardMaterial('mtM',sc);
  mtMat.diffuseColor=new B.Color3(.28,.36,.55);
  mtMat.emissiveColor=new B.Color3(.18,.24,.40);
  mtMat.specularColor=new B.Color3(0,0,0);
  mt.material=mtMat;mt.position.set(x,h*.35,z);
  addOutline(mt,.03,new B.Color3(.1,.15,.25));
}
[[-90,-170,30,22],[80,-160,26,18],[130,-145,22,16],[-110,-135,24,18],
 [45,-175,28,20],[65,-158,20,14],[-55,-155,25,18],[160,-130,18,14]
].forEach(function(m){makeMtn(m[0],m[1],m[2],m[3]);});

step(28,'GRANDE ILE...');

// Grande île — jungle dense au centre, plage loin autour
var TSIZE=200,TSUB=80;
var terrain=B.MeshBuilder.CreateGround('terrain',{width:TSIZE,height:TSIZE,subdivisions:TSUB,updatable:true},sc);

function noise2(x,z,f){
  var xi=Math.floor(x*f),zi=Math.floor(z*f),xf=x*f-xi,zf=z*f-zi;
  function h(a,b){return Math.sin(a*127.1+b*311.7)*.5+.5;}
  var a=h(xi,zi),b=h(xi+1,zi),c=h(xi,zi+1),d=h(xi+1,zi+1);
  var ux=xf*xf*(3-2*xf),uz=zf*zf*(3-2*zf);
  return (a*(1-ux)+b*ux)*(1-uz)+(c*(1-ux)+d*ux)*uz;
}
function getH(wx,wz){
  var dx=wx/TSIZE,dz=wz/TSIZE;
  var dist=Math.sqrt(dx*dx+dz*dz)*2.2;
  var island=Math.max(0,Math.pow(Math.max(0,1-dist),1.1));
  var h=island*(
    noise2(wx,wz,.018)*8+
    noise2(wx,wz,.05)*4+
    noise2(wx,wz,.12)*2+
    noise2(wx,wz,.28)*.8
  );
  // Colline/montagne jungle centre
  var mx=wx+8,mz=wz+10;
  h+=Math.max(0,(1-Math.sqrt(mx*mx+mz*mz)/30))*16;
  h=Math.max(0,h);
  // Plage large = zone basse à la lisière
  if(dist>0.72)h=Math.min(h,.18);
  return h;
}

var hCache={};
var vpos=terrain.getVerticesData(B.VertexBuffer.PositionKind);
for(var vi=0;vi<vpos.length;vi+=3){
  var hv=getH(vpos[vi],vpos[vi+2]);
  vpos[vi+1]=hv;
  hCache[Math.round(vpos[vi]*3)+'_'+Math.round(vpos[vi+2]*3)]=hv;
}
terrain.updateVerticesData(B.VertexBuffer.PositionKind,vpos);
terrain.bakeCurrentTransformIntoVertices();

function terrH(wx,wz){
  var k=Math.round(wx*3)+'_'+Math.round(wz*3);
  return hCache[k]!==undefined?hCache[k]:getH(wx,wz);
}

// Matériau herbe vert vif cartoon
var terrMat=new B.StandardMaterial('terrMat',sc);
terrMat.diffuseColor=new B.Color3(.25,.72,.22);
terrMat.ambientColor=new B.Color3(.1,.28,.08);
terrMat.specularColor=new B.Color3(0,0,0);
terrain.material=terrMat;terrain.receiveShadows=true;

// Sable — couleur orange chaud cartoon style Lilo & Stitch
var beach=B.MeshBuilder.CreateGround('beach',{width:400,height:400,subdivisions:2},sc);
var beachMat=new B.StandardMaterial('beachMat',sc);
beachMat.diffuseColor=new B.Color3(.96,.72,.32);
beachMat.ambientColor=new B.Color3(.4,.28,.1);
beachMat.specularColor=new B.Color3(0,0,0);
beach.material=beachMat;beach.position.y=-.04;beach.receiveShadows=true;

step(36,'EAU CARTOON...');

// Eau — aplat bleu turquoise cartoon
var ocean=B.MeshBuilder.CreateGround('ocean',{width:2000,height:2000,subdivisions:3},sc);
var oceanMat=new B.StandardMaterial('oceanMat',sc);
oceanMat.diffuseColor=new B.Color3(.22,.68,.88);
oceanMat.ambientColor=new B.Color3(.08,.28,.40);
oceanMat.emissiveColor=new B.Color3(.04,.14,.22);
oceanMat.specularColor=new B.Color3(.5,.6,.7);
oceanMat.specularPower=30;
oceanMat.alpha=.88;
ocean.material=oceanMat;ocean.position.y=WATER_Y;

// Lagon translucide près de la plage
var lagon=B.MeshBuilder.CreateCylinder('lagon',{height:.25,diameter:240,tessellation:64},sc);
var lagonMat=new B.StandardMaterial('lagonMat',sc);
lagonMat.diffuseColor=new B.Color3(.3,.82,.92);
lagonMat.emissiveColor=new B.Color3(.05,.22,.32);
lagonMat.specularColor=new B.Color3(0,0,0);
lagonMat.alpha=.55;
lagon.material=lagonMat;lagon.position.y=WATER_Y;

// Vagues cartoon — cercles blancs
for(var wi=0;wi<10;wi++){
  var wR=B.MeshBuilder.CreateTorus('wv'+wi,{diameter:(85+wi*10)*2,thickness:.35,tessellation:80},sc);
  var wMat=new B.StandardMaterial('wm'+wi,sc);
  wMat.diffuseColor=new B.Color3(1,1,1);
  wMat.emissiveColor=new B.Color3(.8,.9,1);
  wMat.specularColor=new B.Color3(0,0,0);
  wMat.alpha=.6-wi*.05;wMat.backFaceCulling=false;
  wR.material=wMat;wR.position.y=WATER_Y+.05;wR.rotation.x=Math.PI/2;
  waveRings.push({m:wR,ph:wi/10*Math.PI*2,spd:.7+Math.random()*.4});
}

step(44,'PALMIERS CARTOON...');

// ── PALMIER STYLE LILO & STITCH ──
// Tronc courbé reconnaissable + couronne large et verte
function makePalm(x,z,h,leanX,leanZ){
  var gh=terrH(x,z);
  // Couleur tronc grise/beige cartoon
  var trunkCol=new B.Color3(.72,.62,.48);

  // Tronc en 10 segments bien courbés
  var NS=10;
  var pts=[new B.Vector3(x,gh,z)];
  var cx2=x,cy=gh,cz2=z;
  for(var i=1;i<=NS;i++){
    var t=i/NS;
    var curve=Math.pow(t,1.5)*1.8;
    cx2+=leanX/NS*curve;
    cy+=h/NS;
    cz2+=leanZ/NS*curve;
    pts.push(new B.Vector3(cx2,cy,cz2));
  }
  for(var i=0;i<NS;i++){
    var p0=pts[i],p1=pts[i+1];
    var diam=(.32-.022*i);
    var seg=B.MeshBuilder.CreateCylinder('ts'+Math.random(),{
      height:p0.subtract(p1).length()*1.05,
      diameterTop:Math.max(.05,diam-.03),
      diameterBottom:diam,
      tessellation:7
    },sc);
    var tMat=celMat('tM'+Math.random(),trunkCol);
    seg.material=tMat;
    var mid=B.Vector3.Lerp(p0,p1,.5);
    seg.position=mid.clone();
    var dir=p1.subtract(p0).normalize();
    var up=new B.Vector3(0,1,0);
    var axis=B.Vector3.Cross(up,dir);
    if(axis.length()>.001){axis.normalize();seg.rotate(axis,Math.acos(Math.min(1,B.Vector3.Dot(up,dir))),B.Space.WORLD);}
    addOutline(seg,.025);
    seg.receiveShadows=true;if(shadows)shadows.addShadowCaster(seg);
  }

  // Feuilles vertes vives — grandes et retombantes
  var top=pts[NS];
  var NL=10+Math.floor(Math.random()*4);
  var leafGreen=new B.Color3(.22,.78,.18);
  for(var i=0;i<NL;i++){
    var ang=i/NL*Math.PI*2+(Math.random()-.5)*.25;
    var ll=3.5+Math.random()*2.5;
    var lf=B.MeshBuilder.CreateCylinder('lf'+Math.random(),{
      height:ll,diameterTop:.04,diameterBottom:.28,tessellation:5
    },sc);
    var lfMat=celMat('lfM'+Math.random(),new B.Color3(.18+Math.random()*.15,.72+Math.random()*.25,.12+Math.random()*.1));
    lf.material=lfMat;
    var droop=.65+Math.random()*.45;
    var lx=top.x+Math.sin(ang)*ll*.42;
    var ly=top.y-droop;
    var lz=top.z+Math.cos(ang)*ll*.42;
    lf.position.set(lx,ly,lz);
    lf.rotation.set(-droop*.82,ang,(Math.random()-.5)*.1);
    addOutline(lf,.02,new B.Color3(0,.2,0));
    if(shadows)shadows.addShadowCaster(lf);
  }
  // Boule verte au sommet (couronne dense)
  var crown=B.MeshBuilder.CreateSphere('cr'+Math.random(),{diameter:h*.28,segments:7},sc);
  var crMat=celMat('crM'+Math.random(),new B.Color3(.2,.75,.15));
  crown.material=crMat;crown.position.set(top.x,top.y,top.z);
  addOutline(crown,.03,new B.Color3(0,.15,0));
  if(shadows)shadows.addShadowCaster(crown);

  colCircles.push({x:x,z:z,r:.4});
}

// Palmiers — grande île, très nombreux, partout
// Plage loin du centre (r > 25)
var palmPositions=[];
// Anneau plage extérieur
for(var i=0;i<50;i++){
  var a=i/50*Math.PI*2+(Math.random()-.5)*.2;
  var r=28+Math.random()*18;
  palmPositions.push([Math.sin(a)*r,Math.cos(a)*r,5+Math.random()*3,(Math.random()-.5)*1.2,(Math.random()-.5)*1.2]);
}
// Jungle intérieure dense
for(var i=0;i<80;i++){
  var a=Math.random()*Math.PI*2;
  var r=2+Math.random()*24;
  palmPositions.push([Math.sin(a)*r,Math.cos(a)*r,7+Math.random()*5,(Math.random()-.5)*.8,(Math.random()-.5)*.8]);
}
// Extra fond jungle
for(var i=0;i<30;i++){
  var a=Math.random()*Math.PI*2;
  var r=5+Math.random()*18;
  palmPositions.push([Math.sin(a)*r,Math.cos(a)*r,9+Math.random()*6,(Math.random()-.5)*.6,(Math.random()-.5)*.6]);
}
palmPositions.forEach(function(d){makePalm(d[0],d[1],d[2],d[3],d[4]);});

step(58,'FORET...');

// Arbres jungle — gros feuillages cartoon (bulles vertes)
function makeTree(x,z,h,r){
  var gh=terrH(x,z);if(gh<.1)return;
  var trunk=B.MeshBuilder.CreateCylinder('tt'+Math.random(),{height:h,diameterTop:r*.18,diameterBottom:r*.3,tessellation:7},sc);
  trunk.material=celMat('ttM',new B.Color3(.55,.42,.28));
  trunk.position.set(x,gh+h/2,z);
  addOutline(trunk,.03);
  if(shadows)shadows.addShadowCaster(trunk);
  // Feuillage en bulles cartoon
  var cols=[new B.Color3(.2,.72,.15),new B.Color3(.16,.62,.12),new B.Color3(.24,.80,.18),new B.Color3(.28,.68,.20)];
  [[0,h*.7,0,r],[r*.3,h*.55,0,r*.7],[-(r*.3),h*.6,0,r*.7],[0,h*.55,r*.3,r*.65],[0,h*.58,-(r*.3),r*.65],[0,h*.88,0,r*.6]].forEach(function(b){
    var cr=B.MeshBuilder.CreateSphere('cr'+Math.random(),{diameter:b[3]*2,segments:7},sc);
    cr.material=celMat('crM'+Math.random(),cols[Math.floor(Math.random()*cols.length)]);
    cr.position.set(x+b[0],gh+b[1],z+b[2]);
    cr.scaling.set(1,.8+Math.random()*.3,1);
    addOutline(cr,.03,new B.Color3(0,.15,0));
    cr.receiveShadows=true;if(shadows)shadows.addShadowCaster(cr);
  });

function makePath(x0,z0,x1,z1,w){
  // Chemin = série de disques plats le long d'une ligne
  var dx=x1-x0,dz=z1-z0,len=Math.sqrt(dx*dx+dz*dz);
  var steps=Math.floor(len/(w*.7));
  for(var si=0;si<=steps;si++){
    var t=si/steps;
    // Légère sinuosité
    var sway=Math.sin(t*Math.PI*3)*(w*.6);
    var px=x0+dx*t+sway*(-(dz/len));
    var pz=z0+dz*t+sway*(dx/len);
    var gh=terrH(px,pz);
    var disc=B.MeshBuilder.CreateCylinder('path'+Math.random(),{height:.08,diameter:w*1.6,tessellation:8},sc);
    disc.material=sandPathMat;
    disc.position.set(px,gh+.04,pz);
    disc.receiveShadows=true;
  }
}

  var body=B.MeshBuilder.CreateSphere('bd',{diameter:.82,segments:14},sc);
  body.scaling.set(1,.88,1);body.material=matBlue;body.parent=g;addOutline(body,.04);

  var head=B.MeshBuilder.CreateSphere('hd',{diameter:.65,segments:14},sc);
  head.position.y=.80;head.material=matBlue;head.parent=g;addOutline(head,.04);

  var snout=B.MeshBuilder.CreateSphere('sn',{diameter:.36,segments:10},sc);
  snout.scaling.set(1.15,.72,.9);snout.position.set(0,.74,.3);snout.material=matLight;snout.parent=g;addOutline(snout,.025);

  var nose=B.MeshBuilder.CreateSphere('ns',{diameter:.11,segments:6},sc);
  nose.position.set(0,.78,.38);nose.material=matDark;nose.parent=g;

  [-1,1].forEach(function(e){
    var ear=B.MeshBuilder.CreateCylinder('ear',{height:.62,diameterTop:.08,diameterBottom:.20,tessellation:6},sc);
    ear.position.set(e*.28,1.18,.04);ear.rotation.set(-.1,0,e*.40);ear.material=matBlue;ear.parent=g;addOutline(ear,.03);
  });

  [-1,1].forEach(function(e){
    var ew=B.MeshBuilder.CreateSphere('ew',{diameter:.16,segments:8},sc);
    ew.position.set(e*.17,.82,.30);ew.material=matEye;ew.parent=g;
    var ep=B.MeshBuilder.CreateSphere('ep',{diameter:.09,segments:7},sc);
    ep.position.set(e*.17,.82,.35);ep.material=matDark;ep.parent=g;
  });

  [-1,1].forEach(function(e){
    var leg=B.MeshBuilder.CreateCylinder('lg',{height:.44,diameterTop:.15,diameterBottom:.13,tessellation:7},sc);
    leg.position.set(e*.23,-.24,0);leg.material=matBlue;leg.parent=g;addOutline(leg,.03);
    var foot=B.MeshBuilder.CreateSphere('ft',{diameter:.22,segments:7},sc);
    foot.scaling.set(1.5,.7,1.9);foot.position.set(e*.23,-.48,.08);foot.material=matBlue;foot.parent=g;addOutline(foot,.025);
    var arm=B.MeshBuilder.CreateCylinder('arm',{height:.40,diameterTop:.09,diameterBottom:.13,tessellation:6},sc);
    arm.position.set(e*.44,.14,0);arm.rotation.set(.35,0,e*.82);arm.material=matBlue;arm.parent=g;addOutline(arm,.025);
  });

  var tail=B.MeshBuilder.CreateSphere('tl',{diameter:.24,segments:7},sc);
  tail.scaling.set(.72,1.5,.72);tail.position.set(0,.12,-.45);tail.material=matBlue;tail.parent=g;addOutline(tail,.025);

  g.getChildMeshes().forEach(function(m){m.receiveShadows=true;if(shadows)shadows.addShadowCaster(m);});
  return g;
}

function setupPlayer(root,anims,isGLB){
  pRoot=root;pAnims={};curAnim=null;
  if(isGLB){
    root.scaling.setAll(1);root.computeWorldMatrix(true);
    var bb=root.getHierarchyBoundingVectors(),h=bb.max.y-bb.min.y;
    if(h>.05)root.scaling.setAll(1.9/h);
    root.computeWorldMatrix(true);
    var bb2=root.getHierarchyBoundingVectors();pYOff=-bb2.min.y+.05;
    root.getChildMeshes().forEach(function(m){m.receiveShadows=true;if(shadows)shadows.addShadowCaster(m,true);});
    if(anims&&anims.length){
      anims.forEach(function(ag){ag.stop();var n=ag.name.toLowerCase();
        if(/idle/.test(n))pAnims.idle=ag;else if(/run/.test(n))pAnims.run=ag;
        else if(/walk/.test(n))pAnims.walk=ag;else if(/jump/.test(n))pAnims.jump=ag;
      });
      if(!pAnims.idle&&anims[0])pAnims.idle=anims[0];
      if(!pAnims.walk&&anims[1])pAnims.walk=anims[1];
      playAnim(pAnims.idle);
    }
  } else {pYOff=.55;}
  root.position.set(P.x,P.y+pYOff,P.z);
  CAM.yaw=P.yaw+Math.PI;
}

// ── BOUCLE ──
eng.runRenderLoop(function(){
  var now=performance.now(),dt=Math.min((now-lastT)/1000,.05);lastT=now;

  var fwd=0,lat=0;
  if(KY['KeyW']||KY['KeyZ']||KY['ArrowUp'])fwd=1;
  if(KY['KeyS']||KY['ArrowDown'])fwd=-1;
  if(KY['KeyD']||KY['ArrowRight'])lat=1;
  if(KY['KeyA']||KY['KeyQ']||KY['ArrowLeft'])lat=-1;
  fwd+=jLY;lat+=jLX;
  var il=Math.sqrt(fwd*fwd+lat*lat);if(il>1){fwd/=il;lat/=il;}

  var moveX=fwd*(-Math.sin(CAM.yaw))+lat*Math.cos(CAM.yaw);
  var moveZ=fwd*(-Math.cos(CAM.yaw))+lat*(-Math.sin(CAM.yaw));
  var moveMag=Math.sqrt(moveX*moveX+moveZ*moveZ);
  var spd=sprint?9:5.2;

  if(moveMag>.05){
    var nx=moveX/moveMag,nz=moveZ/moveMag;
    P.vx+=(nx*spd-P.vx)*Math.min(1,dt*12);P.vz+=(nz*spd-P.vz)*Math.min(1,dt*12);
    var tYaw=Math.atan2(nx,nz),dy=tYaw-P.yaw;
    while(dy>Math.PI)dy-=Math.PI*2;while(dy<-Math.PI)dy+=Math.PI*2;
    P.yaw+=dy*Math.min(1,dt*16);
    playAnim(sprint&&pAnims.run?pAnims.run:(pAnims.walk||pAnims.idle));
  } else {
    P.vx*=Math.pow(.01,dt);P.vz*=Math.pow(.01,dt);
    if(Math.abs(P.vx)<.02)P.vx=0;if(Math.abs(P.vz)<.02)P.vz=0;
    if(pAnims.idle)playAnim(pAnims.idle);
  }

  // Gravité + eau
  P.inWater=(P.y<WATER_Y+.1);
  if(P.inWater){
    // Dans l'eau — ralenti, flotte un peu
    if(!P.onGround){P.vy-=12*dt;if(P.vy<-4)P.vy=-4;}
    P.vx*=Math.pow(.3,dt);P.vz*=Math.pow(.3,dt);
  } else {
    if(!P.onGround){P.vy-=28*dt;if(P.vy<-26)P.vy=-26;}
  }

  P.x+=P.vx*dt;P.z+=P.vz*dt;
  var gh=Math.max(terrH(P.x,P.z), P.inWater?WATER_Y:0);
  P.y+=P.vy*dt;
  var floorY=P.inWater?Math.max(WATER_Y,terrH(P.x,P.z)):terrH(P.x,P.z);
  if(P.y<=floorY&&P.vy<=0){P.y=floorY;P.vy=0;P.onGround=true;}else P.onGround=false;

  // Collisions
  for(var ci=0;ci<colCircles.length;ci++){
    var ob=colCircles[ci],ddx=P.x-ob.x,ddz=P.z-ob.z;
    var d2=ddx*ddx+ddz*ddz,mn=.6+ob.r;
    if(d2<mn*mn&&d2>.001){
      var dd=Math.sqrt(d2),nnx=ddx/dd,nnz=ddz/dd;
      P.x=ob.x+nnx*mn;P.z=ob.z+nnz*mn;
      var dot=P.vx*nnx+P.vz*nnz;if(dot<0){P.vx-=dot*nnx;P.vz-=dot*nnz;}
    }
  }
  var pd=Math.sqrt(P.x*P.x+P.z*P.z);
  if(pd>ISLAND_R){var pa=Math.atan2(P.x,P.z);P.x=Math.sin(pa)*ISLAND_R;P.z=Math.cos(pa)*ISLAND_R;P.vx*=.04;P.vz*=.04;}

  if(pRoot){
    pRoot.position.x=P.x;
    // Dans l'eau — Stitch descend un peu (effet marche dans l'eau)
    pRoot.position.y=P.y+pYOff+(P.inWater?-0.22:0);
    pRoot.position.z=P.z;
    var rd=P.yaw-pRoot.rotation.y;
    while(rd>Math.PI)rd-=Math.PI*2;while(rd<-Math.PI)rd+=Math.PI*2;
    pRoot.rotation.y+=rd*Math.min(1,dt*18);
  }
  if(fill)fill.position.set(P.x,P.y+4,P.z);

  // Caméra TPS derrière Stitch — glisser = tourner
  var tCamYaw=P.yaw+Math.PI;
  if(!camDrag.active&&moveMag>.08){
    var cyDiff=tCamYaw-CAM.yaw;
    while(cyDiff>Math.PI)cyDiff-=Math.PI*2;while(cyDiff<-Math.PI)cyDiff+=Math.PI*2;
    CAM.yaw+=cyDiff*Math.min(1,dt*4.5);
  }
  var cr=CAM.dist*Math.cos(CAM.pitch);
  var tX=P.x,tY=P.y+pYOff+0.75,tZ=P.z;
  var dX=tX+Math.sin(CAM.yaw)*cr,dY=tY+CAM.dist*Math.sin(CAM.pitch),dZ=tZ+Math.cos(CAM.yaw)*cr;
  var cGH=terrH(dX,dZ);if(dY<cGH+1.5)dY=cGH+1.5;
  cam.position.x+=(dX-cam.position.x)*Math.min(1,dt*14);
  cam.position.y+=(dY-cam.position.y)*Math.min(1,dt*10);
  cam.position.z+=(dZ-cam.position.z)*Math.min(1,dt*14);
  cam.setTarget(new B.Vector3(tX,tY,tZ));

  // Brouillard adaptatif — jungle très dense
  var distCenter=Math.sqrt(P.x*P.x+P.z*P.z);
  var inJungle=distCenter<28;
  sc.fogStart+=(( inJungle?20:55)-sc.fogStart)*dt*2;
  sc.fogEnd+=(( inJungle?70:130)-sc.fogEnd)*dt*2;

  // Animations
  waveT+=dt;
  waveRings.forEach(function(w){
    w.m.scaling.x=1+Math.sin(waveT*w.spd+w.ph)*.055;
    w.m.scaling.z=1+Math.sin(waveT*w.spd+w.ph)*.055;
    w.m.position.y=WATER_Y+.05+Math.sin(waveT*2+w.ph)*.04;
    w.m.material.alpha=.5+Math.sin(waveT*2.4+w.ph)*.12;
  });
  // Eau se déplace
  ocean.material.diffuseColor.r=.20+Math.sin(waveT*.3)*.04;
  ocean.material.diffuseColor.g=.65+Math.sin(waveT*.5)*.06;
  lagon.position.y=WATER_Y+Math.sin(waveT*.6)*.015;
  ocean.position.y=WATER_Y+Math.sin(waveT*.4)*.02;

  var dz2=Math.sqrt(P.x*P.x+P.z*P.z);
  var inW=P.inWater;
  document.getElementById('zoneTxt').innerHTML=
    inW?'&#127754; OCEAN':
    dz2<12?'&#127807; JUNGLE PROFONDE':
    dz2<30?'&#127807; JUNGLE':
    dz2<55?'&#127944; PLAGE':'&#127754; MER';

  sc.render();
});

// Joystick GAUCHE = déplacement
var jBase=document.getElementById('joy'),jNub=document.getElementById('jnub'),jid=-1,JMAX=38;
function jUp(cx,cy){
  var r=jBase.getBoundingClientRect(),dx=cx-(r.left+r.width/2),dy=cy-(r.top+r.height/2),d=Math.sqrt(dx*dx+dy*dy);
  if(d>JMAX){dx=dx/d*JMAX;dy=dy/d*JMAX;}
  jNub.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';
  jLX=d>5?dx/JMAX:0;jLY=d>5?-dy/JMAX:0;
}
function jRst(){jNub.style.transform='translate(-50%,-50%)';jLX=0;jLY=0;jid=-1;}
jBase.addEventListener('touchstart',function(e){e.preventDefault();jid=e.changedTouches[0].identifier;jUp(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
jBase.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===jid)jUp(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false});
jBase.addEventListener('touchend',jRst,{passive:true});

window.addEventListener('keydown',function(e){KY[e.code]=1;if(e.code==='Space'){e.preventDefault();doJump();}if(e.code==='ShiftLeft'||e.code==='ShiftRight')sprint=true;});
window.addEventListener('keyup',function(e){KY[e.code]=0;if(e.code==='ShiftLeft'||e.code==='ShiftRight')sprint=false;});
window.addEventListener('wheel',function(e){CAM.dist=Math.max(4,Math.min(22,CAM.dist+e.deltaY*.01));},{passive:true});

// GLISSER partout sur l'écran (sauf joystick) = tourner la caméra
var camDrag={active:false,lx:0,ly:0,tid:-1};
cv.addEventListener('touchstart',function(e){
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i];
    if(t.identifier!==jid&&!camDrag.active){
      camDrag.active=true;camDrag.lx=t.clientX;camDrag.ly=t.clientY;camDrag.tid=t.identifier;
    }
  }
},{passive:true});
cv.addEventListener('touchmove',function(e){
  if(!camDrag.active)return;
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i];
    if(t.identifier===camDrag.tid){
      CAM.yaw-=(t.clientX-camDrag.lx)*.006;
      CAM.pitch=Math.max(.04,Math.min(.55,CAM.pitch+(t.clientY-camDrag.ly)*.004));
      camDrag.lx=t.clientX;camDrag.ly=t.clientY;
    }
  }
},{passive:true});
cv.addEventListener('touchend',function(e){
  for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===camDrag.tid){camDrag.active=false;camDrag.tid=-1;}
},{passive:true});

};
