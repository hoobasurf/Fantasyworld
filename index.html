<!DOCTYPE html><html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Stitch Island</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
#joy{position:fixed;left:14px;bottom:14px;z-index:30;width:110px;height:110px;border-radius:50%;background:rgba(0,0,0,.22);border:2.5px solid rgba(255,220,80,.4);touch-action:none;pointer-events:all}
#jnub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:50%;background:radial-gradient(circle,rgba(255,220,80,.8),rgba(160,70,0,.9));border:2.5px solid rgba(255,220,80,.7)}
#rjoy{position:fixed;right:14px;bottom:14px;z-index:30;width:90px;height:90px;border-radius:50%;background:rgba(0,10,30,.22);border:2px solid rgba(100,200,255,.35);touch-action:none;pointer-events:all}
#rjnub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;background:radial-gradient(circle,rgba(100,200,255,.7),rgba(0,40,90,.9));border:2px solid rgba(100,200,255,.55)}
#btns{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:30;display:flex;gap:12px;pointer-events:none}
.btn{width:54px;height:54px;border-radius:50%;background:rgba(0,8,22,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:8px;font-family:Georgia,serif;cursor:pointer;touch-action:manipulation;border:2px solid rgba(255,255,255,.18);color:#fff;pointer-events:all}
#hud{position:fixed;top:10px;left:0;right:0;display:flex;justify-content:space-between;padding:0 12px;pointer-events:none;z-index:30}
.pill{background:rgba(0,10,25,.78);border-radius:18px;padding:5px 12px;font-family:Georgia,serif;font-size:9px;color:#7de8ff;border:1px solid rgba(125,232,255,.25)}
#toast{position:fixed;top:52px;left:50%;transform:translateX(-50%) scale(.9);opacity:0;z-index:80;background:rgba(0,8,22,.94);border:1.5px solid #7de8ff;border-radius:18px;padding:7px 16px;color:#7de8ff;font-size:10px;font-family:Georgia,serif;white-space:nowrap;pointer-events:none;transition:all .18s}
#toast.show{transform:translateX(-50%) scale(1);opacity:1}
</style>
</head>
<body>
<a-scene renderer="antialias:true;colorManagement:true" shadow="type:pcfsoft" fog="type:exponential;color:#5ac8f0;density:0.008" vr-mode-ui="enabled:false" loading-screen="enabled:false">

<a-assets timeout="30000">
  <a-asset-item id="stitchGLB" src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/stitch2.glb"></a-asset-item>
  <img id="tGrass" src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/grass.jpg" crossorigin="anonymous">
  <img id="tSand"  src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/sand.jpg"  crossorigin="anonymous">
  <img id="tBark"  src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/bark.jpg"  crossorigin="anonymous">
  <img id="tLeaf"  src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/leaf.jpg"  crossorigin="anonymous">
  <img id="tRock"  src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/rock.jpg"  crossorigin="anonymous">
</a-assets>

<a-sky color="#4ab8f0"></a-sky>
<a-light type="directional" position="-40 80 30" color="#fff4dd" intensity="2.6" cast-shadow="true" shadow-camera-left="-200" shadow-camera-right="200" shadow-camera-top="200" shadow-camera-bottom="-200" shadow-map-width="2048" shadow-map-height="2048"></a-light>
<a-light type="hemisphere" color="#88ccff" ground-color="#446622" intensity=".8"></a-light>
<a-light type="ambient" color="#ffeedd" intensity=".3"></a-light>

<!-- NUAGES -->

<a-sphere position="-60 55 -180" radius="18" color="#fff" material="roughness:0.9;opacity:0.95"></a-sphere>
<a-sphere position="-45 58 -178" radius="13" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="30 60 -190" radius="20" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="48 57 -188" radius="14" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="120 50 -200" radius="16" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="-120 52 -195" radius="15" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="0 62 -185" radius="22" color="#fff" material="roughness:0.9"></a-sphere>

<!-- OCEAN -->

<a-plane width="3000" height="3000" rotation="-90 0 0" position="0 -0.5 0" color="#0dd8c8" material="transparent:true;opacity:0.85;roughness:0.05;metalness:0.15"></a-plane>
<a-cylinder id="lagon" radius="180" height=".3" position="0 -0.38 0" color="#22eedd" material="transparent:true;opacity:0.5;roughness:0.04"></a-cylinder>

<!-- VAGUES -->

<a-torus id="w0" radius="72"  radius-tubular=".25" segments-tubular="60" rotation="90 0 0" position="0 -.42 0" color="#fff" material="transparent:true;opacity:0.5"></a-torus>
<a-torus id="w1" radius="88"  radius-tubular=".25" segments-tubular="60" rotation="90 0 0" position="0 -.42 0" color="#fff" material="transparent:true;opacity:0.45"></a-torus>
<a-torus id="w2" radius="104" radius-tubular=".25" segments-tubular="60" rotation="90 0 0" position="0 -.42 0" color="#fff" material="transparent:true;opacity:0.40"></a-torus>
<a-torus id="w3" radius="120" radius-tubular=".25" segments-tubular="60" rotation="90 0 0" position="0 -.42 0" color="#fff" material="transparent:true;opacity:0.35"></a-torus>

<!-- MONDE GENERГ‰ EN JS -->

<a-entity id="world"></a-entity>

<!-- STITCH -->

<a-entity id="stitch-root" position="0 2 3">
  <a-gltf-model id="stitch-model" src="#stitchGLB" shadow="cast:true;receive:false"></a-gltf-model>
</a-entity>

<!-- CAMERA -->

<a-entity id="cam-rig" position="0 6 10">
  <a-camera id="mainCam" look-controls="enabled:false" wasd-controls="enabled:false" fov="62" near=".1" far="600"></a-camera>
</a-entity>

</a-scene>

<div id="hud">
  <div class="pill" id="zL">рџЊї ILE PRINCIPALE</div>
  <div class="pill">рџЏќ STITCH ISLAND</div>
</div>
<div id="joy"><div id="jnub"></div></div>
<div id="rjoy"><div id="rjnub"></div></div>
<div id="btns">
  <div class="btn" style="border-color:#7de8ff;color:#7de8ff" onclick="doJump()" ontouchstart="doJump(event)">в¬†<br>JUMP</div>
  <div class="btn" style="border-color:#ffd700;color:#ffd700" ontouchstart="setSprint(1,event)" ontouchend="setSprint(0)" onmousedown="setSprint(1)" onmouseup="setSprint(0)">вљЎ<br>RUN</div>
</div>
<div id="toast"></div>

<script>
function toast(m,d){var t=document.getElementById('toast');t.textContent=m;t.className='show';clearTimeout(toast._t);toast._t=setTimeout(function(){t.className='';},d||3000);}

document.querySelector('a-scene').addEventListener('loaded',initGame);

function initGame(){
  var THREE=AFRAME.THREE;
  var W=document.getElementById('world');

  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  // SYSTEME DE PLATEFORMES / SOL
  // platforms : {x,z,y,rx,rz} вЂ” rectangles navigables
  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  var platforms=[]; // {cx,cz,y,rx,rz} half-extents
  var islandDefs=[]; // {cx,cz,groundY} pour savoir sur quelle Г®le on est

  function addPlatform(cx,cz,y,rx,rz){
    platforms.push({cx:cx,cz:cz,y:y,rx:rx,rz:rz});
  }

  // Murs AABB
  var walls=[];
  function addWall(x,z,r,h,y0){walls.push({x1:x-r,z1:z-r,x2:x+r,z2:z+r,h:h||4,y0:y0||0});}

  // в”Ђв”Ђ Helpers DOM в”Ђв”Ђ
  function el(tag,attrs){
    var e=document.createElement('a-'+tag);
    for(var k in attrs) e.setAttribute(k,attrs[k]);
    W.appendChild(e); return e;
  }
  function elC(tag,attrs,parent){
    var e=document.createElement('a-'+tag);
    for(var k in attrs) e.setAttribute(k,attrs[k]);
    (parent||W).appendChild(e); return e;
  }

  // в”Ђв”Ђ Quaternion helper в”Ђв”Ђ
  function segRot(dx,dy,dz){
    var up=new THREE.Vector3(0,1,0);
    var dir=new THREE.Vector3(dx,dy,dz).normalize();
    var q=new THREE.Quaternion().setFromUnitVectors(up,dir);
    var e=new THREE.Euler().setFromQuaternion(q,'YXZ');
    return (e.x*180/Math.PI).toFixed(1)+' '+(e.y*180/Math.PI).toFixed(1)+' '+(e.z*180/Math.PI).toFixed(1);
  }

  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  // PALMIER
  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  function makePalm(x,gy,z,h,lx,lz,parent){
    parent=parent||W;
    var NS=12, pts=[];
    for(var i=0;i<=NS;i++){var t=i/NS;pts.push({x:x+lx*h*t*t*.85,y:gy+h*t,z:z+lz*h*t*t*.85});}
    for(var i=0;i<NS;i++){
      var p0=pts[i],p1=pts[i+1];
      var dx=p1.x-p0.x,dy=p1.y-p0.y,dz=p1.z-p0.z;
      var len=Math.sqrt(dx*dx+dy*dy+dz*dz);
      var mx=(p0.x+p1.x)/2,my=(p0.y+p1.y)/2,mz=(p0.z+p1.z)/2;
      var tr=i/NS,rB=Math.max(.03,.11-tr*.065),rT=Math.max(.02,.085-tr*.055);
      elC('cylinder',{
        'radius-bottom':rB.toFixed(3),'radius-top':rT.toFixed(3),
        height:len.toFixed(3),'segments-radial':'8',
        position:mx.toFixed(2)+' '+my.toFixed(2)+' '+mz.toFixed(2),
        rotation:segRot(dx,dy,dz),
        material:'roughness:0.93;color:'+(i%2===0?'#c8a86a':'#b09050'),
        shadow:'cast:true'
      },parent);
      if(i%2===0&&i>0){
        elC('torus',{
          radius:(rB*1.3).toFixed(3),'radius-tubular':(rB*.3).toFixed(3),'segments-radial':'7',
          position:p0.x.toFixed(2)+' '+p0.y.toFixed(2)+' '+p0.z.toFixed(2),
          rotation:segRot(dx,dy,dz),
          material:'color:#7a5020;roughness:0.95'
        },parent);
      }
    }
    var top=pts[NS];
    var NL=9+Math.floor(Math.random()*4);
    for(var i=0;i<NL;i++){
      var ang=i/NL*Math.PI*2+(Math.random()-.5)*.3;
      var ll=4+Math.random()*3.5, lw=.5+Math.random()*.38, droop=.5+Math.random()*.55;
      var fx=top.x+Math.sin(ang)*1.1,fy=top.y+.18,fz=top.z+Math.cos(ang)*1.1;
      var brx=(-droop*58).toFixed(1), bry=((ang+Math.PI/2)*180/Math.PI).toFixed(1);
      var gv=.7+Math.random()*.25;
      var lf=elC('plane',{
        width:ll.toFixed(2),height:lw.toFixed(2),
        position:fx.toFixed(2)+' '+fy.toFixed(2)+' '+fz.toFixed(2),
        rotation:brx+' '+bry+' 0',
        material:'roughness:0.7;side:double;color:#'+Math.floor(gv*.5*255).toString(16).padStart(2,'0')+Math.floor(gv*255).toString(16).padStart(2,'0')+Math.floor(gv*.28*255).toString(16).padStart(2,'0'),
        shadow:'cast:true'
      },parent);
      lf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);
      lf.dataset.brx=brx; lf.dataset.bry=bry;
      lf.classList.add('palm-leaf');
    }
  }

  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  // VEGГ‰TATION TROPICALE
  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  // Monstera
  function makeMonstera(x,gy,z,parent){
    parent=parent||W;
    var sh=.8+Math.random()*.6;
    elC('cylinder',{radius:'.02',height:sh.toFixed(2),position:x+' '+(gy+sh/2)+' '+z,material:'color:#1a6010;roughness:.9'},parent);
    for(var i=0;i<4;i++){
      var ang=i/4*Math.PI*2, r=.6+Math.random()*.3;
      var lx=x+Math.sin(ang)*r, lz=z+Math.cos(ang)*r;
      var leaf=elC('plane',{
        width:(.7+Math.random()*.4).toFixed(2), height:(.55+Math.random()*.3).toFixed(2),
        position:lx.toFixed(2)+' '+(gy+sh+.1).toFixed(2)+' '+lz.toFixed(2),
        rotation:(-40-Math.random()*20).toFixed(1)+' '+(ang*180/Math.PI).toFixed(1)+' 0',
        material:'roughness:.7;side:double;color:#1a8818'
      },parent);
      leaf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);
      leaf.dataset.brx=(-40-Math.random()*20).toFixed(1);
      leaf.dataset.bry=(ang*180/Math.PI).toFixed(1);
      leaf.classList.add('palm-leaf');
    }
  }

  // Liane (corde courbГ©e entre 2 palmiers)
  function makeLiane(x1,y1,z1,x2,y2,z2,parent){
    parent=parent||W;
    var NS=8;
    for(var i=0;i<NS;i++){
      var t0=i/NS, t1=(i+1)/NS;
      var sag=Math.sin(t0*Math.PI)*1.8;
      var sag2=Math.sin(t1*Math.PI)*1.8;
      var ax=x1+(x2-x1)*t0, ay=y1+(y2-y1)*t0-sag, az=z1+(z2-z1)*t0;
      var bx=x1+(x2-x1)*t1, by=y1+(y2-y1)*t1-sag2, bz=z1+(z2-z1)*t1;
      var dx=bx-ax,dy=by-ay,dz=bz-az;
      var len=Math.sqrt(dx*dx+dy*dy+dz*dz);
      elC('cylinder',{
        radius:'.025',height:len.toFixed(2),
        position:((ax+bx)/2).toFixed(2)+' '+((ay+by)/2).toFixed(2)+' '+((az+bz)/2).toFixed(2),
        rotation:segRot(dx,dy,dz),
        material:'color:#6a4010;roughness:.95'
      },parent);
    }
  }

  // Fleur hibiscus
  function makeHibiscus(x,gy,z,parent){
    parent=parent||W;
    var colors=['#ff1155','#ff4400','#ff0088','#ff6600','#ff2200'];
    var c=colors[Math.floor(Math.random()*colors.length)];
    var sh=.4+Math.random()*.5;
    elC('cylinder',{radius:'.02',height:sh.toFixed(2),position:x+' '+(gy+sh/2)+' '+z,material:'color:#1a7010'},parent);
    for(var i=0;i<5;i++){
      var ang=i/5*Math.PI*2, pr=.14+Math.random()*.08;
      elC('plane',{
        width:(pr*1.1).toFixed(3),height:(pr*1.6).toFixed(3),
        position:(x+Math.sin(ang)*pr*.6).toFixed(2)+' '+(gy+sh+pr*.35).toFixed(2)+' '+(z+Math.cos(ang)*pr*.6).toFixed(2),
        rotation:'-65 '+(ang*180/Math.PI).toFixed(1)+' 0',
        material:'roughness:.6;side:double;color:'+c
      },parent);
    }
    elC('sphere',{radius:(0.045).toFixed(3),position:x+' '+(gy+sh+.05)+' '+z,material:'color:#ffee00;emissive:#ffcc00;emissiveIntensity:.4;roughness:.5'},parent);
  }

  // Oiseau de paradis (strelitzia)
  function makeStrelitzia(x,gy,z,parent){
    parent=parent||W;
    var sh=1.0+Math.random()*.5;
    for(var i=0;i<3;i++){
      var ang=i/3*Math.PI*2+.2;
      var lx=x+Math.sin(ang)*.3, lz=z+Math.cos(ang)*.3;
      elC('cylinder',{radius:'.018',height:(sh+i*.15).toFixed(2),position:lx+' '+(gy+(sh+i*.15)/2)+' '+lz,material:'color:#228810'},parent);
    }
    elC('plane',{width:'.12',height:'.35',position:x+' '+(gy+sh+.18)+' '+z,rotation:'0 0 0',material:'side:double;color:#ff6600'},parent);
    elC('plane',{width:'.08',height:'.28',position:(x+.08)+' '+(gy+sh+.22)+' '+z,rotation:'0 30 20',material:'side:double;color:#4400ff'},parent);
  }

  // Herbe haute
  function makeHighGrass(x,gy,z,cnt,parent){
    parent=parent||W;
    for(var i=0;i<cnt;i++){
      var ox=(Math.random()-.5)*2.5, oz=(Math.random()-.5)*2.5;
      var gh=.55+Math.random()*.9;
      var blade=elC('plane',{
        width:(.055+Math.random()*.06).toFixed(3), height:gh.toFixed(3),
        position:(x+ox).toFixed(2)+' '+(gy+gh/2).toFixed(2)+' '+(z+oz).toFixed(2),
        rotation:(Math.random()-.5)*28+' '+Math.random()*360+' 0',
        material:'roughness:.8;side:double;color:rgb('+(20+Math.floor(Math.random()*40))+','+(130+Math.floor(Math.random()*80))+',18)'
      },parent);
      blade.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);
      blade.dataset.brx=((Math.random()-.5)*28).toFixed(1);
      blade.dataset.bry=(Math.random()*360).toFixed(1);
      blade.classList.add('palm-leaf');
    }
  }

  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  // MAISON STYLE LILO & STITCH
  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  var houseColors=['#e8643a','#3a8ae8','#e8c23a','#3ae864','#e83a8a','#a83ae8'];
  function makeHouse(x,gy,z,col,parent){
    parent=parent||W;
    col=col||houseColors[Math.floor(Math.random()*houseColors.length)];
    var hw=3.5, hd=4, hh=2.4;
    // Fondation
    elC('box',{width:hw+1,height:.3,depth:hd+1,position:x+' '+(gy+.15)+' '+z,material:'color:#c8a850;roughness:.95',shadow:'cast:true;receive:true'},parent);
    // Murs
    elC('box',{width:hw,height:hh,depth:hd,position:x+' '+(gy+hh/2+.3)+' '+z,material:'color:'+col+';roughness:.8',shadow:'cast:true;receive:true'},parent);
    // Toit
    elC('cone',{'radius-bottom':(Math.max(hw,hd)/2+.5).toFixed(1),'radius-top':'.3',height:'2',position:x+' '+(gy+hh+1.3)+' '+z,material:'color:#8B4513;roughness:.9',shadow:'cast:true'},parent);
    // Porte
    elC('box',{width:.8,height:1.4,depth:.12,position:x+' '+(gy+.3+.7)+' '+(z+hd/2+.05),material:'color:#5a3010;roughness:.9'},parent);
    // FenГЄtre x2

  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  // PONT EN CORDE
  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  function makeBridge(x1,y1,z1,x2,y2,z2){
    var dx=x2-x1,dz=z2-z1;
    var len=Math.sqrt(dx*dx+dz*dz);
    var ang=Math.atan2(dx,dz)*180/Math.PI;
    var NS=12;
    var mx=(x1+x2)/2, mz=(z1+z2)/2;
    var my=(y1+y2)/2;
    // Planches
    for(var i=0;i<=NS;i++){
      var t=i/NS, sag=Math.sin(t*Math.PI)*.8;
      var px=x1+dx*t, pz=z1+dz*t;
      var py=y1+(y2-y1)*t-sag+.05;
      elC('box',{width:(len/NS+.05).toFixed(2),height:.08,depth:.8,
        position:px.toFixed(2)+' '+py.toFixed(2)+' '+pz.toFixed(2),
        rotation:'0 '+ang.toFixed(1)+' 0',
        material:'color:#c8a020;roughness:.95',shadow:'cast:true;receive:true'});
    }
    // Cordes latГ©rales
    for(var side=-1;side<=1;side+=2){
      var perp=new THREE.Vector3(-dz,0,dx).normalize().multiplyScalar(.4*side);
      for(var i=0;i<NS;i++){
        var t0=i/NS, t1=(i+1)/NS;
        var s0=Math.sin(t0*Math.PI)*.8, s1=Math.sin(t1*Math.PI)*.8;
        var ax=x1+dx*t0+perp.x, ay=y1+(y2-y1)*t0-s0+.8, az=z1+dz*t0+perp.z;
        var bx=x1+dx*t1+perp.x, by=y1+(y2-y1)*t1-s1+.8, bz=z1+dz*t1+perp.z;
        var ddx=bx-ax,ddy=by-ay,ddz=bz-az;
        var ll=Math.sqrt(ddx*ddx+ddy*ddy+ddz*ddz);
        elC('cylinder',{radius:'.03',height:ll.toFixed(2),
          position:((ax+bx)/2).toFixed(2)+' '+((ay+by)/2).toFixed(2)+' '+((az+bz)/2).toFixed(2),
          rotation:segRot(ddx,ddy,ddz),
          material:'color:#7a5010;roughness:.95'});
      }
    }
    // Poteaux
    [[x1,y1,z1],[x2,y2,z2]].forEach(function(p){
      for(var side=-1;side<=1;side+=2){
        var perp2=new THREE.Vector3(-dz,0,dx).normalize().multiplyScalar(.4*side);
        elC('cylinder',{radius:'.07',height:'2.5',
          position:(p[0]+perp2.x).toFixed(2)+' '+(p[1]+1.25).toFixed(2)+' '+(p[2]+perp2.z).toFixed(2),
          material:'color:#7a5010;roughness:.95',shadow:'cast:true'});
      }
    });
    // Sol du pont (plateforme de collision)
    addPlatform(mx,mz,(y1+y2)/2-.4,len/2+.5,.45);
  }

  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  // ILE SUD-OUEST вЂ” petite mais haute
  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  // PONTS EN CORDE
  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  // ГЋle principale в†’ Г®le tropicale (Г  travers l'eau)
  makeBridge(62,0,0, 116,-0.1,-120);
  // ГЋle principale в†’ Г®le nord
  makeBridge(0,0,-66, 0,-0.1,-134);
  // ГЋle principale в†’ Г®le volcanique
  makeBridge(-62,0,-50, -108,-0.1,-130);

  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  // STITCH FIX
  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  var stitchModel=document.getElementById('stitch-model');
  stitchModel.addEventListener('model-loaded',function(){
    var mesh=stitchModel.getObject3D('mesh');
    if(!mesh)return;
    var box=new THREE.Box3().setFromObject(mesh);
    var h=box.max.y-box.min.y;
    if(h>.05){var sc=1.4/h;stitchModel.setAttribute('scale',sc+' '+sc+' '+sc);}
    // Recalc aprГЁs scale
    setTimeout(function(){
      var box2=new THREE.Box3().setFromObject(mesh);
      P.yOff=Math.abs(box2.min.y)+.05;
      P.y=getGroundY(P.x,P.z)+P.yOff;
    },100);
    toast('Bienvenue sur Stitch Island ! Explore les iles !',4500);
  });

  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  // JOUEUR
  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  function getGroundY(px,pz){
    // Trouve la plateforme sous le joueur
    var best=-99;
    for(var i=0;i<platforms.length;i++){
      var pl=platforms[i];
      if(Math.abs(px-pl.cx)<=pl.rx+1 && Math.abs(pz-pl.cz)<=pl.rz+1){
        if(pl.y>best) best=pl.y;
      }
    }
    return best>-99?best:-99; // -99 = dans l eau
  }

  var WATER_Y=-0.2;
  var P={x:0,y:1.5,z:3,vx:0,vy:0,vz:0,yaw:Math.PI,onGround:false,yOff:.7,swimming:false,swimBob:0};
  var CAM={yaw:Math.PI,pitch:.18,dist:6.5};
  var jLX=0,jLY=0,jid=-1,rjLX=0,rjLY=0,rjid=-1,KY={},sprint=false;
  var waveT=0,lastT=performance.now();
  var palmLeaves=null;

  function loop(){
    requestAnimationFrame(loop);
    var now=performance.now(),dt=Math.min((now-lastT)/1000,.05);lastT=now;
    waveT+=dt;

    // Feuilles vent
    if(!palmLeaves) palmLeaves=document.querySelectorAll('.palm-leaf');
    palmLeaves.forEach(function(lf){
      var ph=parseFloat(lf.dataset.windPhase||0);
      var brx=parseFloat(lf.dataset.brx||0), bry=lf.dataset.bry||'0';
      var s=Math.sin(waveT*1.2+ph)*3;
      lf.setAttribute('rotation',(brx+s).toFixed(1)+' '+bry+' '+Math.cos(waveT*.8+ph).toFixed(1));
    });

    // INPUT
    var fwd=0,lat=0;
    if(KY['KeyW']||KY['KeyZ']||KY['ArrowUp'])fwd=1;
    if(KY['KeyS']||KY['ArrowDown'])fwd=-1;
    if(KY['KeyD']||KY['ArrowRight'])lat=1;
    if(KY['KeyA']||KY['KeyQ']||KY['ArrowLeft'])lat=-1;
    fwd-=jLY; lat+=jLX;
    var moveMag=Math.sqrt(fwd*fwd+lat*lat);

    // Sol sous le joueur
    var gy=getGroundY(P.x,P.z);
    P.swimming=(gy<-10);

    var spd=sprint?9.5:5.2;
    if(P.swimming) spd*=.65;

    if(moveMag>.05){
      var mx=fwd*(-Math.sin(CAM.yaw))+lat*Math.cos(CAM.yaw);
      var mz=fwd*(-Math.cos(CAM.yaw))+lat*(-Math.sin(CAM.yaw));
      var mn=Math.sqrt(mx*mx+mz*mz);
      P.vx=mx/mn*spd; P.vz=mz/mn*spd;
      var tYaw=Math.atan2(mx/mn,mz/mn), dyw=tYaw-P.yaw;
      while(dyw>Math.PI)dyw-=Math.PI*2; while(dyw<-Math.PI)dyw+=Math.PI*2;
      P.yaw+=dyw*Math.min(1,dt*14);
    } else {P.vx=0;P.vz=0;}

    // Physique
    if(P.swimming){
      P.swimBob+=dt;
      P.y=WATER_Y+Math.sin(P.swimBob*2.4)*.09;
      P.vy=0; P.onGround=true;
    } else {
      P.vy-=22*dt;
      if(P.vy<-20) P.vy=-20;
      P.y+=P.vy*dt;
      var floorY=gy+P.yOff;
      if(P.y<=floorY){
        P.y=floorY;
        P.vy=0;
        P.onGround=true;
      } else {
        P.onGround=false;
      }
    }

    // Collisions murs
    var PRAD=.48;
    var nx=P.x+P.vx*dt, nz=P.z+P.vz*dt;
    for(var wi=0;wi<walls.length;wi++){
      var w=walls[wi];
      if(P.y-P.yOff>w.y0+w.h) continue;
      var inX=(nx+PRAD>w.x1&&nx-PRAD<w.x2);
      var inZ=(nz+PRAD>w.z1&&nz-PRAD<w.z2);
      var curX=(P.x+PRAD>w.x1&&P.x-PRAD<w.x2);
      var curZ=(P.z+PRAD>w.z1&&P.z-PRAD<w.z2);
      if(inX&&inZ){if(!curX){P.vx=0;nx=P.x;}if(!curZ){P.vz=0;nz=P.z;}}
    }
    P.x=nx; P.z=nz;

    // Stitch
    var stEl=document.getElementById('stitch-root');
    var tiltFwd=P.swimming&&moveMag>.05?-18:0;
    stEl.setAttribute('position',P.x.toFixed(2)+' '+P.y.toFixed(2)+' '+P.z.toFixed(2));
    stEl.setAttribute('rotation',tiltFwd+' '+(P.yaw*180/Math.PI).toFixed(1)+' 0');

    // Camera
    if(Math.abs(rjLX)>.04) CAM.yaw+=rjLX*dt*2.5;
    else if(moveMag>.1){
      var tc=P.yaw+Math.PI, cd=tc-CAM.yaw;
      while(cd>Math.PI)cd-=Math.PI*2; while(cd<-Math.PI)cd+=Math.PI*2;
      CAM.yaw+=cd*dt*2.2;
    }
    if(Math.abs(rjLY)>.04) CAM.pitch=Math.max(.08,Math.min(.5,CAM.pitch+rjLY*dt*1.5));
    var cr=CAM.dist*Math.cos(CAM.pitch);
    var cX=P.x+Math.sin(CAM.yaw)*cr, cZ=P.z+Math.cos(CAM.yaw)*cr;
    var cY=P.y+CAM.dist*Math.sin(CAM.pitch)+1.8;
    var camRig=document.getElementById('cam-rig');
    var cp=camRig.getAttribute('position');
    var lf=Math.min(1,dt*18);
    camRig.setAttribute('position',(cp.x+(cX-cp.x)*lf).toFixed(2)+' '+(cp.y+(cY-cp.y)*lf*.8).toFixed(2)+' '+(cp.z+(cZ-cp.z)*lf).toFixed(2));
    document.getElementById('mainCam').components.camera.camera.lookAt(P.x,P.y+.9,P.z);

    // Vagues
    ['w0','w1','w2','w3'].forEach(function(id,i){
      var wEl=document.getElementById(id); if(!wEl)return;
      var sc=1+Math.sin(waveT*.8+i*1.2)*.05;
      wEl.setAttribute('scale',sc+' 1 '+sc);
      wEl.setAttribute('position','0 '+(-.42+Math.sin(waveT*1.6+i*1.2)*.04).toFixed(3)+' 0');
    });
    var lg=document.getElementById('lagon');
    if(lg) lg.setAttribute('position','0 '+(-.38+Math.sin(waveT*.5)*.012).toFixed(3)+' 0');

    // HUD zone
    var zone='рџЊЉ OCEAN';
    if(!P.swimming){
      zone='рџЏ– PLAGE';
      for(var i=0;i<islandDefs.length;i++){
        var id=islandDefs[i];
        if(Math.sqrt((P.x-id.cx)*(P.x-id.cx)+(P.z-id.cz)*(P.z-id.cz))<55){
          zone='рџЏќ '+id.label; break;
        }
      }
    }
    document.getElementById('zL').textContent=zone;
  }
  loop();

  window.doJump=function(e){if(e&&e.preventDefault)e.preventDefault();if(P.onGround&&!P.swimming){P.vy=8;P.onGround=false;}};
  window.setSprint=function(v,e){if(e&&e.preventDefault)e.preventDefault();sprint=!!v;};

  // Joysticks
  var jB=document.getElementById('joy'),jN=document.getElementById('jnub'),JMAX=38;
  function jUp(cx,cy){var r=jB.getBoundingClientRect(),dx=cx-(r.left+r.width/2),dy=cy-(r.top+r.height/2),d=Math.sqrt(dx*dx+dy*dy);if(d>JMAX){dx=dx/d*JMAX;dy=dy/d*JMAX;}jN.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';jLX=d>4?dx/JMAX:0;jLY=d>4?dy/JMAX:0;}
  function jRst(){jN.style.transform='translate(-50%,-50%)';jLX=0;jLY=0;}
  jB.addEventListener('touchstart',function(e){e.preventDefault();jid=e.changedTouches[0].identifier;jUp(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
  jB.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===jid)jUp(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false});
  jB.addEventListener('touchend',jRst,{passive:true});
  jB.addEventListener('mousedown',function(e){jUp(e.clientX,e.clientY);});
  window.addEventListener('mouseup',jRst);

  var rjB=document.getElementById('rjoy'),rjN=document.getElementById('rjnub'),RJMAX=32;
  function rjUp(cx,cy){var r=rjB.getBoundingClientRect(),dx=cx-(r.left+r.width/2),dy=cy-(r.top+r.height/2),d=Math.sqrt(dx*dx+dy*dy);if(d>RJMAX){dx=dx/d*RJMAX;dy=dy/d*RJMAX;}rjN.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';rjLX=d>4?dx/RJMAX:0;rjLY=d>4?dy/RJMAX:0;}
  function rjRst(){rjN.style.transform='translate(-50%,-50%)';rjLX=0;rjLY=0;}
  rjB.addEventListener('touchstart',function(e){e.preventDefault();rjid=e.changedTouches[0].identifier;rjUp(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
  rjB.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===rjid)rjUp(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false});
  rjB.addEventListener('touchend',rjRst,{passive:true});

  window.addEventListener('keydown',function(e){KY[e.code]=1;if(e.code==='Space'){e.preventDefault();window.doJump();}if(e.code==='ShiftLeft')sprint=true;});
  window.addEventListener('keyup',function(e){KY[e.code]=0;if(e.code==='ShiftLeft')sprint=false;});
}
</script>
