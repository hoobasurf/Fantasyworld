<!DOCTYPE html><html lang="fr"><head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Stitch Island</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
#joy{position:fixed;left:14px;bottom:14px;z-index:30;width:110px;height:110px;border-radius:50%;background:rgba(0,0,0,.22);border:2.5px solid rgba(255,220,80,.4);touch-action:none;pointer-events:all}
#jnub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:50%;background:radial-gradient(circle,rgba(255,220,80,.8),rgba(160,70,0,.9));border:2.5px solid rgba(255,220,80,.7)}
#rjoy{position:fixed;right:14px;bottom:14px;z-index:30;width:90px;height:90px;border-radius:50%;background:rgba(0,10,30,.22);border:2px solid rgba(100,200,255,.35);touch-action:none;pointer-events:all}
#rjnub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;background:radial-gradient(circle,rgba(100,200,255,.7),rgba(0,40,90,.9));border:2px solid rgba(100,200,255,.55)}
#btns{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:30;display:flex;gap:12px;pointer-events:none}
.btn{width:54px;height:54px;border-radius:50%;background:rgba(0,8,22,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:8px;font-family:Georgia,serif;cursor:pointer;touch-action:manipulation;border:2px solid rgba(255,255,255,.18);color:#fff;pointer-events:all}
#hud{position:fixed;top:10px;left:0;right:0;display:flex;justify-content:space-between;padding:0 12px;pointer-events:none;z-index:30}
.pill{background:rgba(0,10,25,.78);border-radius:18px;padding:5px 12px;font-family:Georgia,serif;font-size:9px;color:#7de8ff;border:1px solid rgba(125,232,255,.25)}
#toast{position:fixed;top:52px;left:50%;transform:translateX(-50%) scale(.9);opacity:0;z-index:80;background:rgba(0,8,22,.94);border:1.5px solid #7de8ff;border-radius:18px;padding:7px 16px;color:#7de8ff;font-size:10px;font-family:Georgia,serif;white-space:nowrap;pointer-events:none;transition:all .18s}
#toast.show{transform:translateX(-50%) scale(1);opacity:1}
#breath-bar{position:fixed;top:48px;left:50%;transform:translateX(-50%);z-index:40;display:none;flex-direction:column;align-items:center;gap:3px;pointer-events:none}
#breath-label{font-family:Georgia,serif;font-size:9px;color:#88ffee;text-shadow:0 0 6px #00ffcc}
#breath-bg{width:140px;height:12px;border-radius:6px;background:rgba(0,20,40,.7);border:1.5px solid rgba(0,255,200,.4);overflow:hidden}
#breath-fill{height:100%;width:100%;border-radius:6px;background:linear-gradient(90deg,#00ffcc,#0088ff);transition:background .3s}
#underwater-overlay{position:fixed;inset:0;pointer-events:none;z-index:20;background:radial-gradient(ellipse at 50% 30%,rgba(0,200,220,0.08) 0%,rgba(0,80,160,0.5) 60%,rgba(0,20,80,0.75) 100%);opacity:0;transition:opacity .6s}
#sink-overlay{position:fixed;inset:0;pointer-events:none;z-index:21;background:rgba(0,10,40,0);transition:background .4s}
/* Effet caustiques sous l'eau */
#caustic-overlay{position:fixed;inset:0;pointer-events:none;z-index:19;opacity:0;transition:opacity .6s;
  background:repeating-linear-gradient(45deg,rgba(0,200,255,0.04) 0px,rgba(0,200,255,0) 8px,rgba(0,150,200,0.03) 12px,rgba(0,200,255,0) 20px),
             repeating-linear-gradient(-45deg,rgba(0,255,200,0.03) 0px,rgba(0,255,200,0) 10px,rgba(0,200,255,0.04) 15px,rgba(0,255,200,0) 24px);}
</style>
</head>
<body>
<a-scene renderer="antialias:true;colorManagement:true" shadow="type:pcfsoft" fog="type:exponential;color:#5ac8f0;density:0.007" vr-mode-ui="enabled:false" loading-screen="enabled:false">
<a-assets timeout="30000">
  <a-asset-item id="stitchGLB" src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/stitch2.glb"></a-asset-item>
  <img id="tGrass" src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/grass.jpg" crossorigin="anonymous">
  <img id="tSand"  src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/sand.jpg"  crossorigin="anonymous">
  <img id="tBark"  src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/bark.jpg"  crossorigin="anonymous">
  <img id="tLeaf"  src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/leaf.jpg"  crossorigin="anonymous">
  <img id="tRock"  src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/rock.jpg"  crossorigin="anonymous">
</a-assets>
<a-sky id="skyEl" color="#4ab8f0"></a-sky>
<a-light type="directional" position="-40 80 30" color="#fff4dd" intensity="2.6" cast-shadow="true" shadow-camera-left="-200" shadow-camera-right="200" shadow-camera-top="200" shadow-camera-bottom="-200" shadow-map-width="2048" shadow-map-height="2048"></a-light>
<a-light type="hemisphere" color="#88ccff" ground-color="#446622" intensity=".8"></a-light>
<a-light type="ambient" id="ambientLight" color="#ffeedd" intensity=".3"></a-light>
<!-- NUAGES -->
<a-sphere position="-60 55 -180" radius="18" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="-45 58 -178" radius="13" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="30 60 -190" radius="20" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="48 57 -188" radius="14" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="120 50 -200" radius="16" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="-120 52 -195" radius="15" color="#fff" material="roughness:0.9"></a-sphere>
<!-- SURFACE EAU translucide style Vaiana -->
<a-plane id="waterSurf" width="3000" height="3000" rotation="-90 0 0" position="0 -0.3 0" color="#00d4e8" material="transparent:true;opacity:0.28;roughness:0.02;metalness:0.15;side:double" shadow="receive:false"></a-plane>
<!-- Lagon turquoise translucide -->
<a-cylinder id="lagon" radius="90" height=".25" position="0 -0.4 0" color="#00f0d0" material="transparent:true;opacity:0.22;roughness:0.02" shadow="receive:false"></a-cylinder>
<!-- Zone intermédiaire bleue -->
<a-cylinder radius="200" height=".2" position="0 -1.5 0" color="#00b8e8" material="transparent:true;opacity:0.32;roughness:0.03" shadow="receive:false"></a-cylinder>
<!-- Zone profonde bleu marine -->
<a-cylinder radius="600" height=".2" position="0 -6.0 0" color="#0044aa" material="transparent:true;opacity:0.42;roughness:0.04" shadow="receive:false"></a-cylinder>
<!-- FOND OCEAN visible depuis la surface -->
<a-plane id="oceanFloor" width="3000" height="3000" rotation="-90 0 0" position="0 -20 0" color="#0a3a28" material="roughness:0.95"></a-plane>
<!-- Fond sableux lagon près des îles -->
<a-cylinder radius="80" height=".1" position="0 -4.5 0" color="#c8b870" material="roughness:0.92"></a-cylinder>
<!-- Vagues -->
<a-torus id="w0" radius="72"  radius-tubular=".2" segments-tubular="64" rotation="90 0 0" position="0 -.42 0" color="#fff" material="transparent:true;opacity:0.5"></a-torus>
<a-torus id="w1" radius="92"  radius-tubular=".2" segments-tubular="64" rotation="90 0 0" position="0 -.42 0" color="#fff" material="transparent:true;opacity:0.42"></a-torus>
<a-torus id="w2" radius="112" radius-tubular=".2" segments-tubular="64" rotation="90 0 0" position="0 -.42 0" color="#fff" material="transparent:true;opacity:0.35"></a-torus>
<a-entity id="world"></a-entity>
<a-entity id="underwater-world"></a-entity>
<!-- STITCH -->
<a-entity id="stitch-root" position="0 2 3">
  <a-gltf-model id="stitch-model" src="#stitchGLB" shadow="cast:true;receive:false"></a-gltf-model>
</a-entity>
<!-- CAMERA -->
<a-entity id="cam-rig" position="0 6 10">
  <a-camera id="mainCam" look-controls="enabled:false" wasd-controls="enabled:false" fov="62" near=".05" far="700"></a-camera>
</a-entity>
</a-scene>

<div id="hud">
  <div class="pill" id="zL">🏝 ILE PRINCIPALE</div>
  <div class="pill">🏝 STITCH ISLAND</div>
</div>
<div id="breath-bar">
  <div id="breath-label">🤿 RESPIRATION</div>
  <div id="breath-bg"><div id="breath-fill"></div></div>
</div>
<div id="underwater-overlay"></div>
<div id="sink-overlay"></div>
<div id="caustic-overlay"></div>
<div id="joy"><div id="jnub"></div></div>
<div id="rjoy"><div id="rjnub"></div></div>
<div id="btns">
  <div class="btn" style="border-color:#7de8ff;color:#7de8ff" ontouchstart="doJump(event)" onclick="doJump()">⬆<br>JUMP</div>
  <div class="btn" style="border-color:#00ffcc;color:#00ffcc" id="diveBtn" ontouchstart="doDive(event)" onclick="doDive()">🤿<br>DIVE</div>
  <div class="btn" style="border-color:#ffd700;color:#ffd700" ontouchstart="setSprint(1,event)" ontouchend="setSprint(0)" onmousedown="setSprint(1)" onmouseup="setSprint(0)">⚡<br>RUN</div>
</div>
<div id="toast"></div>

<script>
function toast(m,d){var t=document.getElementById('toast');t.textContent=m;t.className='show';clearTimeout(toast._t);toast._t=setTimeout(function(){t.className='';},d||3000);}
document.querySelector('a-scene').addEventListener('loaded',initGame);

function initGame(){
  var THREE=AFRAME.THREE;
  var W=document.getElementById('world');
  var UW=document.getElementById('underwater-world');

  var platforms=[];
  var walls=[];
  var islandDefs=[];

  function addPlatform(cx,cz,y,rx,rz){platforms.push({cx:cx,cz:cz,y:y,rx:rx,rz:rz});}
  function addWall(x,z,r,h,y0){walls.push({x1:x-r,z1:z-r,x2:x+r,z2:z+r,h:h||5,y0:y0||0});}

  function mk(tag,attrs,par){
    var e=document.createElement('a-'+tag);
    for(var k in attrs)e.setAttribute(k,attrs[k]);
    (par||W).appendChild(e);return e;
  }

  function segRot(dx,dy,dz){
    var up=new THREE.Vector3(0,1,0);
    var dir=new THREE.Vector3(dx,dy,dz).normalize();
    var q=new THREE.Quaternion().setFromUnitVectors(up,dir);
    var e=new THREE.Euler().setFromQuaternion(q,'YXZ');
    return (e.x*180/Math.PI).toFixed(1)+' '+(e.y*180/Math.PI).toFixed(1)+' '+(e.z*180/Math.PI).toFixed(1);
  }

  function getGroundY(px,pz){
    var best=null;
    for(var i=0;i<platforms.length;i++){
      var pl=platforms[i];
      if(Math.abs(px-pl.cx)<=pl.rx+.5&&Math.abs(pz-pl.cz)<=pl.rz+.5){
        if(best===null||pl.y>best)best=pl.y;
      }
    }
    return best;
  }

  var SAND_COL='#f5e8b0';
  var SAND_WET='#ddd090';

  function makePalm(x,gy,z,h,lx,lz,par){
    par=par||W;
    // Collision tronc
    addWall(x,z,0.35,h*0.6,gy);
    var NS=12,pts=[];
    for(var i=0;i<=NS;i++){var t=i/NS;pts.push({x:x+lx*h*t*t*.85,y:gy+h*t,z:z+lz*h*t*t*.85});}
    for(var i=0;i<NS;i++){
      var p0=pts[i],p1=pts[i+1];
      var dx=p1.x-p0.x,dy=p1.y-p0.y,dz=p1.z-p0.z,len=Math.sqrt(dx*dx+dy*dy+dz*dz);
      var tr=i/NS;
      var rB=Math.max(.002,.006-tr*.004),rT=Math.max(.001,.004-tr*.003);
      mk('cylinder',{'radius-bottom':rB.toFixed(4),'radius-top':rT.toFixed(4),height:len.toFixed(3),'segments-radial':'6',
        position:((p0.x+p1.x)/2).toFixed(2)+' '+((p0.y+p1.y)/2).toFixed(2)+' '+((p0.z+p1.z)/2).toFixed(2),
        rotation:segRot(dx,dy,dz),material:'roughness:.93;color:'+(i%2===0?'#c8a86a':'#b09050'),shadow:'cast:true'},par);
    }
    var top=pts[NS];
    for(var i=0;i<9+Math.floor(Math.random()*4);i++){
      var ang=i/(9+3)*Math.PI*2+(Math.random()-.5)*.3;
      var ll=3+Math.random()*2.5,lw=.22+Math.random()*.15,droop=.5+Math.random()*.5;
      var fx=top.x+Math.sin(ang)*.4,fy=top.y+.1,fz=top.z+Math.cos(ang)*.4;
      var brx=(-droop*56).toFixed(1),bry=((ang+Math.PI/2)*180/Math.PI).toFixed(1);
      var gv=.7+Math.random()*.25;
      var lf=mk('plane',{width:ll.toFixed(2),height:lw.toFixed(2),
        position:fx.toFixed(2)+' '+fy.toFixed(2)+' '+fz.toFixed(2),rotation:brx+' '+bry+' 0',
        material:'roughness:.7;side:double;color:#'+Math.floor(gv*.5*255).toString(16).padStart(2,'0')+Math.floor(gv*255).toString(16).padStart(2,'0')+Math.floor(gv*.28*255).toString(16).padStart(2,'0'),
        shadow:'cast:true'},par);
      lf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);
      lf.dataset.brx=brx;lf.dataset.bry=bry;lf.classList.add('wind-leaf');
    }
  }

  function makeTallGrass(x,gy,z,par){
    par=par||W;
    var nc=6+Math.floor(Math.random()*5);
    for(var i=0;i<nc;i++){
      var ang=i/nc*Math.PI*2+Math.random()*.5;
      var r=.05+Math.random()*.3;
      var sh=0.8+Math.random()*1.4;
      var gcol=['#4a9a20','#3a8a18','#5aaa28','#2a7a10','#6aba30'][Math.floor(Math.random()*5)];
      var lf=mk('plane',{width:(.06+Math.random()*.05).toFixed(3),height:sh.toFixed(2),
        position:(x+Math.sin(ang)*r).toFixed(2)+' '+(gy+sh*.5).toFixed(2)+' '+(z+Math.cos(ang)*r).toFixed(2),
        rotation:'0 '+(ang*180/Math.PI).toFixed(1)+' '+(Math.random()*15-7).toFixed(1),
        material:'roughness:.8;side:double;color:'+gcol},par);
      lf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);
      lf.dataset.brx='0';lf.dataset.bry=(ang*180/Math.PI).toFixed(1);
      lf.classList.add('wind-leaf');
    }
  }

  function makeBirdOfParadise(x,gy,z,par){
    par=par||W;
    var sh=2.2+Math.random()*1.2;
    for(var i=0;i<4;i++){
      var ang=i/4*Math.PI*2+.2;
      var r=.15+Math.random()*.2;
      var stemH=sh+Math.random()*.5;
      mk('cylinder',{radius:'.012',height:stemH.toFixed(2),
        position:(x+Math.sin(ang)*r).toFixed(2)+' '+(gy+stemH*.5).toFixed(2)+' '+(z+Math.cos(ang)*r).toFixed(2),
        material:'color:#1a6010;roughness:.88'},par);
      var leafH=1.4+Math.random()*.6,leafW=.38+Math.random()*.18;
      var lf=mk('plane',{width:leafW.toFixed(2),height:leafH.toFixed(2),
        position:(x+Math.sin(ang)*r).toFixed(2)+' '+(gy+stemH+leafH*.3).toFixed(2)+' '+(z+Math.cos(ang)*r).toFixed(2),
        rotation:(-20-Math.random()*15).toFixed(1)+' '+(ang*180/Math.PI).toFixed(1)+' 0',
        material:'roughness:.7;side:double;color:#1a7a22'},par);
      lf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);
      lf.dataset.brx=(-22).toFixed(1);lf.dataset.bry=(ang*180/Math.PI).toFixed(1);
      lf.classList.add('wind-leaf');
    }
    var fx=x,fz=z,fy=gy+sh+.3;
    mk('cylinder',{radius:'.015',height:'1.0',position:fx+' '+(fy-.5)+' '+fz,material:'color:#226614;roughness:.88'},par);
    mk('plane',{width:'.22',height:'.6',position:fx+' '+fy+' '+fz,rotation:'-15 0 0',material:'side:double;color:#1a5a08;roughness:.6'},par);
    for(var pi=0;pi<3;pi++){
      mk('plane',{width:'.18',height:'.38',
        position:(fx+.06+pi*.04)+' '+(fy+.12+pi*.06)+' '+fz,
        rotation:(-30-pi*12).toFixed(1)+' '+(pi*25).toFixed(1)+' '+(pi*15).toFixed(1),
        material:'side:double;color:#ff6600;roughness:.5;emissive:#cc3300;emissiveIntensity:.15'},par);
    }
    for(var pi=0;pi<2;pi++){
      mk('plane',{width:'.14',height:'.32',
        position:(fx-.04).toFixed(2)+' '+(fy+.18+pi*.08).toFixed(2)+' '+fz,
        rotation:(-20+pi*10).toFixed(1)+' '+(pi*30+15).toFixed(1)+' -12',
        material:'side:double;color:#4422cc;roughness:.5;emissive:#2200aa;emissiveIntensity:.12'},par);
    }
  }

  function makeGiantHibiscus(x,gy,z,par){
    par=par||W;
    var cols=['#ff1155','#ff3300','#ff0088','#ff6600','#cc0044','#ff4422'];
    var c=cols[Math.floor(Math.random()*cols.length)];
    var sh=1.2+Math.random()*.8;
    mk('cylinder',{radius:'.025',height:sh.toFixed(2),position:x+' '+(gy+sh/2)+' '+z,material:'color:#1a7010'},par);
    for(var li=0;li<3;li++){
      var lang=li/3*Math.PI*2;
      mk('plane',{width:'.28',height:'.35',
        position:(x+Math.sin(lang)*.3).toFixed(2)+' '+(gy+sh*.4+li*.2).toFixed(2)+' '+(z+Math.cos(lang)*.3).toFixed(2),
        rotation:'-25 '+(lang*180/Math.PI).toFixed(1)+' 0',
        material:'side:double;color:#2a8020;roughness:.7'},par);
    }
    for(var i=0;i<5;i++){
      var ang=i/5*Math.PI*2;
      var pr=.32+Math.random()*.08;
      mk('plane',{width:(pr*1.1).toFixed(3),height:(pr*1.9).toFixed(3),
        position:(x+Math.sin(ang)*pr*.55).toFixed(2)+' '+(gy+sh+pr*.4).toFixed(2)+' '+(z+Math.cos(ang)*pr*.55).toFixed(2),
        rotation:'-58 '+(ang*180/Math.PI).toFixed(1)+' 0',material:'roughness:.5;side:double;color:'+c},par);
    }
    mk('sphere',{radius:'.07',position:x+' '+(gy+sh+.06)+' '+z,material:'color:#ffee00;emissive:#ffcc00;emissiveIntensity:.6'},par);
    mk('cylinder',{radius:'.012',height:'.2',position:x+' '+(gy+sh+.18)+' '+z,material:'color:#ffdd00;roughness:.5'},par);
  }

  function makeFern(x,gy,z,par){
    par=par||W;
    var nc=5+Math.floor(Math.random()*4);
    for(var i=0;i<nc;i++){
      var ang=i/nc*Math.PI*2, r=.15+Math.random()*.25;
      var sh=.5+Math.random()*.7;
      var lf=mk('plane',{width:(.12+Math.random()*.1).toFixed(3),height:sh.toFixed(2),
        position:(x+Math.sin(ang)*r).toFixed(2)+' '+(gy+sh*.55).toFixed(2)+' '+(z+Math.cos(ang)*r).toFixed(2),
        rotation:(-25-Math.random()*20).toFixed(1)+' '+(ang*180/Math.PI+90).toFixed(1)+' 0',
        material:'roughness:.8;side:double;color:#'+Math.floor((20+Math.random()*30)).toString(16).padStart(2,'0')+(Math.floor(110+Math.random()*80)).toString(16).padStart(2,'0')+'14'},par);
      lf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);
      lf.dataset.brx=(-30).toFixed(1);lf.dataset.bry=(ang*180/Math.PI+90).toFixed(1);
      lf.classList.add('wind-leaf');
    }
  }

  function makeMonstera(x,gy,z,par){
    par=par||W;
    var sh=.9+Math.random()*.5;
    mk('cylinder',{radius:'.025',height:sh.toFixed(2),position:x+' '+(gy+sh/2)+' '+z,material:'color:#1a6010;roughness:.9'},par);
    for(var i=0;i<3;i++){
      var ang=i/3*Math.PI*2+.3,r=.7+Math.random()*.25;
      var lsize=.55+Math.random()*.3;
      var lf=mk('plane',{width:lsize.toFixed(2),height:(lsize*.8).toFixed(2),
        position:(x+Math.sin(ang)*r*.6).toFixed(2)+' '+(gy+sh+.15+i*.05).toFixed(2)+' '+(z+Math.cos(ang)*r*.6).toFixed(2),
        rotation:(-35-i*8).toFixed(1)+' '+(ang*180/Math.PI).toFixed(1)+' '+(i*12).toFixed(1),
        material:'roughness:.7;side:double;color:#1e9918'},par);
      lf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);
      lf.dataset.brx=(-35-i*8).toFixed(1);lf.dataset.bry=(ang*180/Math.PI).toFixed(1);
      lf.classList.add('wind-leaf');
    }
  }

  function makeStrelitzia(x,gy,z,par){
    par=par||W;
    var sh=1.1+Math.random()*.5;
    for(var i=0;i<3;i++){var ang=i/3*Math.PI*2;mk('cylinder',{radius:'.016',height:(sh+i*.12).toFixed(2),position:(x+Math.sin(ang)*.28)+' '+(gy+(sh+i*.12)/2)+' '+(z+Math.cos(ang)*.28),material:'color:#228810'},par);}
    mk('plane',{width:'.14',height:'.4',position:x+' '+(gy+sh+.2)+' '+z,rotation:'0 0 0',material:'side:double;color:#ff6600'},par);
    mk('plane',{width:'.09',height:'.3',position:(x+.09)+' '+(gy+sh+.24)+' '+z,rotation:'0 30 20',material:'side:double;color:#3300ff'},par);
  }

  function makeLiane(x1,y1,z1,x2,y2,z2,par){
    par=par||W;
    var NS=8;
    for(var i=0;i<NS;i++){
      var t0=i/NS,t1=(i+1)/NS;
      var s0=Math.sin(t0*Math.PI)*1.6,s1=Math.sin(t1*Math.PI)*1.6;

  function makeBridge(x1,y1,z1,x2,y2,z2){
    var bdx=x2-x1,bdz=z2-z1;
    var len=Math.sqrt(bdx*bdx+bdz*bdz);
    var ang=Math.atan2(bdx,bdz)*180/Math.PI;
    var perp=new THREE.Vector3(-bdz,0,bdx).normalize();
    var BRIDGE_WIDTH=1.0;
    var ROPE_OFFSET=BRIDGE_WIDTH/2;
    var PLANK_H=0.10;
    var PLANK_W=0.38;
    var GAP=0.08;
    var nPlanks=Math.floor(len/(PLANK_W+GAP));
    var WATER_SURFACE_Y=-0.48;
    var MIN_H=WATER_SURFACE_Y+1.8;
    function bY(t){return Math.max(MIN_H, y1+(y2-y1)*t);}
    for(var i=0;i<nPlanks;i++){
      var t=(i+.5)/nPlanks;
      var px=x1+bdx*t, pz=z1+bdz*t, py=bY(t);
      mk('box',{
        width:PLANK_W, height:PLANK_H, depth:BRIDGE_WIDTH,
        position:px.toFixed(2)+' '+py.toFixed(2)+' '+pz.toFixed(2),
        rotation:'0 '+ang.toFixed(1)+' 0',
        material:'color:'+(i%2===0?'#a0622a':'#8a5020')+';roughness:.95',
        shadow:'cast:true;receive:true'
      });
      addPlatform(px,pz,py,PLANK_W*.6,BRIDGE_WIDTH*.5);
    }
    for(var side=-1;side<=1;side+=2){
      var pOff=perp.clone().multiplyScalar(ROPE_OFFSET*side);
      var ROPE_H=[0.55, 1.05];
      for(var ri=0;ri<ROPE_H.length;ri++){
        var rh=ROPE_H[ri];
        for(var i=0;i<nPlanks;i++){
          var t0=i/nPlanks, t1=(i+1)/nPlanks;
          var ax=x1+bdx*t0+pOff.x, ay=bY(t0)+rh, az=z1+bdz*t0+pOff.z;
          var bx2=x1+bdx*t1+pOff.x, by2=bY(t1)+rh, bz2=z1+bdz*t1+pOff.z;
          var dx2=bx2-ax,dy2=by2-ay,dz2=bz2-az,rl=Math.sqrt(dx2*dx2+dy2*dy2+dz2*dz2);
          mk('cylinder',{radius:'.028',height:rl.toFixed(2),
            position:((ax+bx2)/2).toFixed(2)+' '+((ay+by2)/2).toFixed(2)+' '+((az+bz2)/2).toFixed(2),
            rotation:segRot(dx2,dy2,dz2),
            material:'color:#6a3a10;roughness:.95'});
        }
      }
      for(var i=1;i<nPlanks-1;i+=3){
        var t=i/nPlanks;
        var px2=x1+bdx*t+pOff.x, pz2=z1+bdz*t+pOff.z, py2=bY(t);
        mk('cylinder',{radius:'.035',height:'1.1',
          position:px2.toFixed(2)+' '+(py2+.55).toFixed(2)+' '+pz2.toFixed(2),
          material:'color:#7a4a10;roughness:.95'});
      }
      [[x1,bY(0),z1],[x2,bY(1),z2]].forEach(function(p){
        mk('cylinder',{radius:'.1',height:'2.8',
          position:(p[0]+pOff.x).toFixed(2)+' '+(p[1]+1.4).toFixed(2)+' '+(p[2]+pOff.z).toFixed(2),
          material:'color:#7a4a10;roughness:.95',shadow:'cast:true'});
      });
    }
  }

  function makeChurch(cx,gy,cz,rot,par){
    par=par||W;rot=rot||0;

    function lp(ox,oz){return{x:cx+ox*cs-oz*sn,z:cz+ox*sn+oz*cs};}
    function lpos(ox,oy,oz){var p=lp(ox,oz);return p.x.toFixed(2)+' '+(gy+oy).toFixed(2)+' '+p.z.toFixed(2);}
    var BW=5.5,BD=9,BH=3.5;
    mk('box',{width:BW,height:BH,depth:BD,position:lpos(0,BH/2+.15,0),rotation:'0 '+rot+' 0',material:'color:#e8e0cc;roughness:.88'},par);
    mk('box',{width:BW+.4,height:'.25',depth:BD+.4,position:lpos(0,.12,0),rotation:'0 '+rot+' 0',material:'color:#c0b890;roughness:.9'},par);
    [-1.8,0,1.8].forEach(function(ox){
      var pp=lp(ox,BD/2+.1);
      mk('cylinder',{radius:'.15',height:BH,position:pp.x.toFixed(2)+' '+(gy+BH/2+.15)+' '+pp.z.toFixed(2),material:'color:#d8d0b8;roughness:.88'},par);
    });
    mk('cone',{'radius-bottom':(BW/2+.5).toFixed(1),'radius-top':'.12',height:'2.2','segments-radial':'4',position:lpos(0,BH+1.25,0),rotation:'0 '+(rot+45)+' 0',material:'color:#8a5a22;roughness:.9'},par);
    mk('box',{width:'1.8',height:BH+1.8,depth:'1.8',position:lpos(0,BH+.9+.15,BD/2+.8),rotation:'0 '+rot+' 0',material:'color:#e0d8c4;roughness:.88'},par);
    mk('cone',{'radius-bottom':'1.3','radius-top':'.06',height:'2.5','segments-radial':'4',position:lpos(0,BH+2.8+.15+1.25,BD/2+.8),rotation:'0 '+(rot+45)+' 0',material:'color:#8a5a22;roughness:.9'},par);

    hillRocks.forEach(function(r){makeRock(r[0],r[1],r[2],r[3],r[4],par);});
    var pathPoints=[
      {x:0, y:HILL_BASE_Y+.02, z:HILL_CZ+HILL_R},

      {x:HILL_CX, y:HILL_TOP_Y+.1, z:HILL_CZ}
    ];
    makeSandPathUp(pathPoints, par);
    makeSandPath(0, 0, 0, HILL_CZ+HILL_R+2, HILL_BASE_Y, par, 1.4);
    var VX=HILL_CX, VZ=HILL_CZ, VY=HILL_TOP_Y+.2;

    makeFountain(VX, VY, VZ, par);
    makeChurch(VX, VY, VZ-6.5, 0, par);
    var hutPositions=[
      [VX+7.0, VZ+2.5, 35],[VX-7.0, VZ+2.5, -35],[VX+6.2, VZ-4.5, 80],
      [VX-6.2, VZ-4.5, -80],[VX+3.5, VZ+6.5, 15],[VX-3.5, VZ+6.5, -15],
    ];
    hutPositions.forEach(function(h){makeRealisticHut(h[0], VY, h[1], h[2], par);});
    [[VX+3.5,VZ+3.5,'fruits',20],[VX-3.5,VZ+3.5,'artisanat',-20],[VX+4.0,VZ-1.5,'poisson',55],[VX-4.0,VZ-1.5,'artisanat',-55]].forEach(function(s){makeMarketStall(s[0],VY,s[1],s[2],s[3],par);});
    makePerson(VX+3.5,VY,VZ+5.5,'#f4c08a','market',200,par);
    makePerson(VX-3.2,VY,VZ+5.8,'#d4906a','market',160,par);
    makePerson(VX+1.8,VY,VZ+3.5,'#f0c8a0','walk',45,par);
    makePerson(VX-2.0,VY,VZ+3.0,'#e0b090','walk',-30,par);
    makePerson(VX+1.0,VY,VZ-2.8,'#d8a880','walk',180,par);
    // 5 palmiers autour du village seulement
    var hillPalmAngles=[0,1.25,2.5,3.8,5.1];
    hillPalmAngles.forEach(function(ang){
      var r4=8.5+Math.random()*1.5;
      var px=VX+Math.cos(ang)*r4, pz=VZ+Math.sin(ang)*r4;
      makePalm(px,VY,pz,4+Math.random()*2,Math.cos(ang)*.25,Math.sin(ang)*.25,par);
    });
    for(var vi=0;vi<12;vi++){
      var vang=vi/12*Math.PI*2,vr=7+Math.random()*2.5;
      var vx=VX+Math.cos(vang)*vr,vz=VZ+Math.sin(vang)*vr;
      makeTallGrass(vx,VY,vz,par);
      if(vi%3===0) makeBirdOfParadise(vx+.5,VY,vz+.3,par);
      if(vi%4===0) makeGiantHibiscus(vx-.4,VY,vz-.3,par);
    }
    // 4 palmiers seulement sur les pentes
    var slopePalms=[[HILL_CX-9,3,HILL_CZ+4],[HILL_CX+8,4,HILL_CZ+6],[HILL_CX-6,5,HILL_CZ-8],[HILL_CX+10,4,HILL_CZ-4]];
    slopePalms.forEach(function(p){

      if(Math.random()>.6) makeGiantHibiscus(p[0]+.5,p[1],p[2]+.5,par);
    });
  }

  function makeSeaStar(x,y,z,par){
    par=par||UW;
    var cols=['#ff4400','#ff6600','#ff2244','#ee3311','#ff8822','#dd1155'];
    var c=cols[Math.floor(Math.random()*cols.length)];
    var s=.3+Math.random()*.3;
    for(var i=0;i<5;i++){
      var ang=i/5*Math.PI*2;
      mk('sphere',{radius:(s*.28).toFixed(3),scale:'3 .3 .8',
        position:(x+Math.sin(ang)*s*.6).toFixed(2)+' '+y+' '+(z+Math.cos(ang)*s*.6).toFixed(2),
        rotation:'0 '+(ang*180/Math.PI).toFixed(1)+' 0',
        material:'color:'+c+';roughness:.6;emissive:'+c+';emissiveIntensity:.08'},par);
    }
    mk('sphere',{radius:(s*.22).toFixed(3),position:x+' '+y+' '+z,material:'color:'+c+';roughness:.5'},par);
  }

  function makeSeaweed(x,y,z,h,par){
    par=par||UW;
    var gcols=['#0a8a20','#1a9a30','#0a7018','#2aaa40','#156025'];
    var gc=gcols[Math.floor(Math.random()*gcols.length)];
    var NS=6,pts=[];
    for(var i=0;i<=NS;i++){
      var t=i/NS;
      pts.push({x:x+Math.sin(t*Math.PI*1.5)*.3,y:y+h*t,z:z+Math.cos(t*Math.PI*1.5)*.2});
    }
    for(var i=0;i<NS;i++){
      var p0=pts[i],p1=pts[i+1];
      var dx=p1.x-p0.x,dy=p1.y-p0.y,dz=p1.z-p0.z,len=Math.sqrt(dx*dx+dy*dy+dz*dz);
      var w=(.18-i*.02).toFixed(3);
      var lf=mk('plane',{width:w,height:len.toFixed(2),
        position:((p0.x+p1.x)/2).toFixed(2)+' '+((p0.y+p1.y)/2).toFixed(2)+' '+((p0.z+p1.z)/2).toFixed(2),
        rotation:segRot(dx,dy,dz)+' ',
        material:'side:double;color:'+gc+';roughness:.7;transparent:true;opacity:.9'},par);
      lf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);
      lf.dataset.brx='0';lf.dataset.bry='0';lf.classList.add('wind-leaf');
    }
  }

  var SFX = '_Stitch_Armature';
  var BONES = {};
  var BONE_REST = {};
  var ANIM_T = 0;
  var stitchMixer = null;
  var nativeClip = null;
  var nativeAction = null;

  var BONE_MAP = {
    root:'ROOT'+SFX, spine0:'Spine_start'+SFX, spine1:'Spine.001'+SFX,
    spine2:'Spine.002'+SFX, spine3:'Spine.003'+SFX, shoulders:'Shoulders'+SFX,
    neck:'Neck'+SFX, head:'Head'+SFX,
    shoulderL:'Shoulder.L'+SFX, armL:'Arm.L'+SFX, foreArmL:'ForeArm.L'+SFX, wristL:'Wrist.L'+SFX,
    shoulderR:'Shoulder.R'+SFX, armR:'Arm.R'+SFX, foreArmR:'ForeArm.R'+SFX, wristR:'Wrist.R'+SFX,
    hipL:'Hip.L'+SFX, legL:'Leg.L'+SFX, foreLegL:'ForeLeg.L'+SFX, heelL:'Heel.L'+SFX, stepL:'Step.L'+SFX,
    hipR:'Hip.R'+SFX, legR:'Leg.R'+SFX, foreLegR:'ForeLeg.R'+SFX, heelR:'Heel.R'+SFX, stepR:'Step.R'+SFX,
    butt:'Butt'+SFX, tail:'Tail'+SFX,
    earAL:'Ear_A.L'+SFX, earAR:'Ear_A.R'+SFX,
  };

  function findBoneByName(root, name){
    var found = null;
    root.traverse(function(o){ if(found) return; if(o.name === name) found = o; });
    return found;
  }
  function saveBoneRest(key, bone){
    if(!bone) return;
    BONE_REST[key] = {x:bone.rotation.x, y:bone.rotation.y, z:bone.rotation.z};
  }
  function rb(key, rx, ry, rz){
    var b = BONES[key]; if(!b) return;
    var r = BONE_REST[key] || {x:0,y:0,z:0};
    b.rotation.x = r.x + (rx||0); b.rotation.y = r.y + (ry||0); b.rotation.z = r.z + (rz||0);
  }
  function resetBone(key){
    var b = BONES[key]; if(!b) return;
    var r = BONE_REST[key] || {x:0,y:0,z:0};
    b.rotation.x = r.x; b.rotation.y = r.y; b.rotation.z = r.z;
  }

  var stitchModel = document.getElementById('stitch-model');
  stitchModel.addEventListener('model-loaded', function(){
    var mesh = stitchModel.getObject3D('mesh');
    if(!mesh) return;

    var box = new THREE.Box3().setFromObject(mesh);
    var h = box.max.y - box.min.y;
    if(h > .05){ var sc = 1.4/h; stitchModel.setAttribute('scale', sc+' '+sc+' '+sc); }

    setTimeout(function(){
      var mesh2 = stitchModel.getObject3D('mesh');
      if(!mesh2) return;
      var b2 = new THREE.Box3().setFromObject(mesh2);
      P.yOff = Math.abs(b2.min.y) + .06;
      var gy0 = getGroundY(P.x, P.z);
      if(gy0 !== null) P.y = gy0 + P.yOff;

      for(var key in BONE_MAP){
        BONES[key] = findBoneByName(mesh2, BONE_MAP[key]);
        saveBoneRest(key, BONES[key]);
      }
      var found = Object.keys(BONES).filter(function(k){return !!BONES[k];});
      console.log('Bones Stitch trouvés: ' + found.length + '/' + Object.keys(BONE_MAP).length, found);

      // ── Récupérer l'animation native du GLB ──
      // Remonter dans la hiérarchie Three.js pour trouver le groupe qui possède les clips
      var clips = [];
      var cur = mesh2;
      while(cur){
        if(cur.animations && cur.animations.length){ clips = clips.concat(cur.animations); break; }
        cur = cur.parent;
      }
      console.log('Clips trouvés:', clips.length, clips.map(function(c){return c.name;}));

      if(clips.length > 0){
        nativeClip = clips[0];
        var mixerRoot = cur;
        stitchMixer = new THREE.AnimationMixer(mixerRoot);
        nativeAction = stitchMixer.clipAction(nativeClip);
        nativeAction.setLoop(THREE.LoopRepeat, Infinity);
        nativeAction.timeScale = 0;
        nativeAction.play();
        console.log('Animation prête:', nativeClip.name, nativeClip.duration.toFixed(2)+'s');
      } else {
        console.log('Pas d animation native, animation procédurale uniquement');
      }

    }, 300);
    toast('Bienvenue ! Explore les iles ! Saute du pont dans l eau !', 5000);
  });

  function lerp(a, b, t){ return a + (b-a)*t; }

  function animateStitch(dt2, moveMag2, state, sprint2){
    if(!Object.keys(BONES).length) return;
    // Animation native : on l'utilise UNIQUEMENT si elle existe ET qu'on marche
    // Mais on superpose toujours l'animation procédurale des pieds/bras
    if(stitchMixer && nativeAction){
      if(state === 'ground' && moveMag2 > 0.05){
        var walkSpeed = sprint2 ? 2.5 : 1.4;
        stitchMixer.update(dt2 * walkSpeed);
        nativeAction.timeScale = 1;
      } else {
        nativeAction.timeScale = 0;
        nativeAction.time = 0;
        stitchMixer.update(0);
      }
    }
    // Animation procédurale — TOUJOURS active pour garantir le mouvement visible
    ANIM_T += dt2 * 2.5;
    var s = Math.sin(ANIM_T);
    var c = Math.cos(ANIM_T);
    if(state === 'ground' && moveMag2 > 0.05){
      var freq  = sprint2 ? 9.0 : 6.0;
      var ampL  = sprint2 ? 1.2 : 0.95; // jambes très amples
      var ampA  = sprint2 ? 1.0 : 0.75; // bras très amples
      ANIM_T += dt2 * (freq - 2.5);
      var sw = Math.sin(ANIM_T);
      // Hanches/cuisses — grand balancement
      rb('hipL',   sw * ampL, 0, 0);
      rb('hipR',  -sw * ampL, 0, 0);
      // Genoux — pliage exagéré
      rb('legL',  Math.max(0,  sw) * 0.9, 0, 0);
      rb('legR',  Math.max(0, -sw) * 0.9, 0, 0);
      // ForeLeg (tibia) — extension avant/arrière
      rb('foreLegL', Math.max(0,-sw)*0.65, 0, 0);
      rb('foreLegR', Math.max(0, sw)*0.65, 0, 0);
      // Talons/pieds — rotation du pied en fin de pas
      rb('heelL', -sw * 0.55, 0, 0);
      rb('heelR',  sw * 0.55, 0, 0);
      // Step (pointe du pied)
      rb('stepL',  sw * 0.4, 0, 0);
      rb('stepR', -sw * 0.4, 0, 0);
      // Bras opposés — très visibles
      rb('armL',  -sw * ampA, 0,  sw * 0.12);
      rb('armR',   sw * ampA, 0, -sw * 0.12);
      rb('foreArmL', Math.max(0,-sw)*0.65, 0, 0);
      rb('foreArmR', Math.max(0, sw)*0.65, 0, 0);
      // Tronc oscille
      rb('spine0', 0, -sw*0.12, sw*0.08);
      rb('shoulders', 0, sw*0.10, 0);
      // Oreilles qui battent en courant
      rb('earAL', Math.abs(sw)*0.2, 0, 0);
      rb('earAR', Math.abs(sw)*0.2, 0, 0);
    } else if(state === 'air'){
      rb('hipL', -0.30, 0, 0); rb('hipR', -0.30, 0, 0);
      rb('legL', 0.65, 0, 0); rb('legR', 0.65, 0, 0);
      rb('armL', -0.70, 0, -0.45); rb('armR', -0.70, 0, 0.45);
      rb('foreArmL', 0.4, 0, 0); rb('foreArmR', 0.4, 0, 0);
      rb('spine0', 0.12, 0, 0);
      rb('earAL', -0.3, 0, -0.15); rb('earAR', -0.3, 0, 0.15);
    } else if(state === 'surface'){
      rb('armL', s * 0.8 - 0.3, 0, -0.35); rb('armR', -s * 0.8 - 0.3, 0, 0.35);
      rb('foreArmL', Math.max(0, s)*0.5, 0, 0); rb('foreArmR', Math.max(0,-s)*0.5, 0, 0);
      rb('hipL', s * 0.3, 0, 0); rb('hipR', -s * 0.3, 0, 0);
      rb('legL', Math.max(0,-s)*0.2, 0, 0); rb('legR', Math.max(0, s)*0.2, 0, 0);
      rb('spine0', 0.28, 0, 0); rb('head', -0.15, 0, 0);
    } else if(state === 'diving'){
      rb('spine0', 0.18, 0, 0); rb('spine1', 0.12, 0, 0); rb('shoulders', 0.08, 0, 0);
      rb('armL', -0.95 + s*0.15, 0, -0.18); rb('armR', -0.95 - s*0.15, 0, 0.18);
      rb('foreArmL', 0.1, 0, 0); rb('foreArmR', 0.1, 0, 0);
      rb('hipL', s * 0.32, 0, 0); rb('hipR', -s * 0.32, 0, 0);
      rb('legL', Math.max(0,-s)*0.22, 0, 0); rb('legR', Math.max(0, s)*0.22, 0, 0);
      rb('tail', s*0.15, 0, 0);
    } else if(state === 'sinking'){
      var panic = Math.sin(ANIM_T * 1.8);
      rb('armL', -1.2 + panic*0.25, 0, -0.25 + panic*0.1); rb('armR', -1.2 - panic*0.25, 0, 0.25 - panic*0.1);
      rb('foreArmL', 0.6, 0, 0); rb('foreArmR', 0.6, 0, 0);
      rb('hipL', panic * 0.35, 0, 0); rb('hipR', -panic * 0.35, 0, 0);
      rb('legL', Math.max(0,-panic)*0.3, 0, 0); rb('legR', Math.max(0, panic)*0.3, 0, 0);
      rb('head', -0.2, 0, 0);
    } else {
      var breathe = Math.sin(ANIM_T * 0.65) * 0.035;
      var earWave  = Math.sin(ANIM_T * 0.4) * 0.06;
      rb('spine0', breathe, 0, 0); rb('spine1', breathe * 0.5, 0, 0); rb('shoulders', breathe * 0.3, 0, 0);
      rb('armL', 0, 0, -0.06 + Math.sin(ANIM_T*0.45)*0.025); rb('armR', 0, 0, 0.06 - Math.sin(ANIM_T*0.45)*0.025);
      rb('earAL', earWave, 0, 0); rb('earAR', earWave, 0, 0);
      rb('tail', Math.sin(ANIM_T*0.7)*0.1, 0, 0);
    }
  }

  var WATER_SURFACE=-0.3;  // aligné avec la surface visuelle
  var MAX_BREATH=100;
  var BREATH_LOSE=5;   // perd moins vite — plus de temps sous l'eau
  var BREATH_GAIN=30;
  var SINK_SPEED=2.5;   // coule moins vite
  var SWIM_SPEED=5.5;   // nage plus vite

  var P={x:0,y:1.5,z:3,vx:0,vy:0,vz:0,yaw:Math.PI,onGround:false,yOff:.7,
         state:'ground',breath:MAX_BREATH,swimBob:0,canSwim:true,sinkTimer:0};

  var CAM={yaw:Math.PI,pitch:.18,dist:6.5};
  var jLX=0,jLY=0,jid=-1,rjLX=0,rjLY=0,rjid=-1,KY={},sprint=false;
  var waveT=0,lastT=performance.now();
  var windLeaves=null,fishEls=null;

  function getGroundY2(px,pz){
    var best=null;
    for(var i=0;i<platforms.length;i++){
      var pl=platforms[i];
      if(Math.abs(px-pl.cx)<=pl.rx+.5&&Math.abs(pz-pl.cz)<=pl.rz+.5){
        if(best===null||pl.y>best)best=pl.y;
      }
    }
    return best;
  }
  getGroundY=getGroundY2;

  function loop(){
    requestAnimationFrame(loop);
    var now=performance.now(),dt=Math.min((now-lastT)/1000,.05);lastT=now;
    waveT+=dt;

    if(!windLeaves)windLeaves=document.querySelectorAll('.wind-leaf');
    windLeaves.forEach(function(lf){
      var ph=parseFloat(lf.dataset.windPhase||0);
      var brx=parseFloat(lf.dataset.brx||0),bry=lf.dataset.bry||'0';
      var s=Math.sin(waveT*1.15+ph)*3.2;
      lf.setAttribute('rotation',(brx+s).toFixed(1)+' '+bry+' '+Math.cos(waveT*.75+ph).toFixed(1));
    });

    if(!fishEls)fishEls=document.querySelectorAll('.fish-anim');
    fishEls.forEach(function(fish){
      var ph=parseFloat(fish.dataset.fishPhase||0);
      var r=parseFloat(fish.dataset.fishR||10);
      var dep=parseFloat(fish.dataset.fishDepth||-5);
      var spd=parseFloat(fish.dataset.fishSpeed||.35);
      var t=waveT*spd;
      var fx=Math.sin(t+ph)*r, fz=Math.cos(t+ph)*r;
      var fy=dep+Math.sin(waveT*.6+ph)*.5;
      var ang=Math.atan2(Math.cos(t+ph),-Math.sin(t+ph));
      fish.setAttribute('position',fx.toFixed(2)+' '+fy.toFixed(2)+' '+fz.toFixed(2));
      fish.setAttribute('rotation','0 '+(ang*180/Math.PI).toFixed(1)+' 0');
    });

    // Animation tortues
    if(!window._turtleEls) window._turtleEls=document.querySelectorAll('.turtle-anim');
    window._turtleEls.forEach(function(t){
      var ph=parseFloat(t.dataset.tPhase||0);
      var r=parseFloat(t.dataset.tR||20);
      var dep=parseFloat(t.dataset.tDepth||-5);
      var sp=parseFloat(t.dataset.tSpeed||.07);
      var tm=waveT*sp;
      var tx=Math.sin(tm+ph)*r, tz=Math.cos(tm+ph)*r;
      var ty=dep+Math.sin(waveT*.4+ph)*1.5;
      var tang=Math.atan2(Math.cos(tm+ph),-Math.sin(tm+ph));
      // Nageoires qui battent
      var flipAng=Math.sin(waveT*2+ph)*0.3;
      t.setAttribute('position',tx.toFixed(2)+' '+ty.toFixed(2)+' '+tz.toFixed(2));
      t.setAttribute('rotation','0 '+(tang*180/Math.PI).toFixed(1)+' '+( Math.sin(waveT*1.5+ph)*4).toFixed(1));
    });

    // Animation requins
    if(!window._sharkEls) window._sharkEls=document.querySelectorAll('.shark-anim');
    window._sharkEls.forEach(function(s){
      var ph=parseFloat(s.dataset.sPhase||0);
      var r=parseFloat(s.dataset.sR||70);
      var dep=parseFloat(s.dataset.sDepth||-12);
      var sp=parseFloat(s.dataset.sSpeed||.04);
      var tm=waveT*sp;
      var sx2=Math.sin(tm+ph)*r, sz2=Math.cos(tm+ph)*r;
      var sy2=dep+Math.sin(waveT*.3+ph)*2;
      var sang=Math.atan2(Math.cos(tm+ph),-Math.sin(tm+ph));
      s.setAttribute('position',sx2.toFixed(2)+' '+sy2.toFixed(2)+' '+sz2.toFixed(2));
      s.setAttribute('rotation','0 '+(sang*180/Math.PI).toFixed(1)+' 0');
    });

    var fwd=0,lat=0;
    if(KY['KeyW']||KY['KeyZ']||KY['ArrowUp'])fwd=1;
    if(KY['KeyS']||KY['ArrowDown'])fwd=-1;
    if(KY['KeyD']||KY['ArrowRight'])lat=1;
    if(KY['KeyA']||KY['KeyQ']||KY['ArrowLeft'])lat=-1;
    fwd-=jLY;lat+=jLX;
    var moveMag=Math.sqrt(fwd*fwd+lat*lat);

    var gy=getGroundY2(P.x,P.z);
    var spd=sprint?9.5:5.2;

    if(moveMag>.05){
      var mx=fwd*(-Math.sin(CAM.yaw))+lat*Math.cos(CAM.yaw);
      var mz=fwd*(-Math.cos(CAM.yaw))+lat*(-Math.sin(CAM.yaw));
      var mn=Math.sqrt(mx*mx+mz*mz);
      var spdMult=(P.state==='surface')?0.7:(P.state==='diving')?0.6:(P.state==='sinking')?0.2:1.0;
      P.vx=mx/mn*spd*spdMult;P.vz=mz/mn*spd*spdMult;
      var ty=Math.atan2(mx/mn,mz/mn),dyw=ty-P.yaw;
      while(dyw>Math.PI)dyw-=Math.PI*2;while(dyw<-Math.PI)dyw+=Math.PI*2;
      P.yaw+=dyw*Math.min(1,dt*14);
    } else {P.vx=0;P.vz=0;}

    if(P.state==='ground'||P.state==='air'){
      P.vy-=22*dt;if(P.vy<-25)P.vy=-25;
      P.y+=P.vy*dt;
      if(gy!==null&&P.y<=gy+P.yOff){
        P.y=gy+P.yOff;P.vy=0;P.onGround=true;P.state='ground';
      } else {
        P.onGround=false;
        if(P.state==='ground')P.state='air';
      }
      if(P.y<=WATER_SURFACE+.1&&gy===null){
        if(P.vy<-2){
          P.state='diving';P.vy=Math.max(P.vy*0.3,-3.5);P.y=WATER_SURFACE-.5;
          toast('Splash ! Appuie DIVE pour plonger, sinon tu remontes !',3000);
        } else {P.state='surface';P.y=WATER_SURFACE;P.vy=0;}
        P.breath=MAX_BREATH;
      }
    } else if(P.state==='surface'){
      P.swimBob+=dt;
      P.breath=Math.min(MAX_BREATH,P.breath+BREATH_GAIN*dt);
      // En surface : Stitch flotte toujours, jamais de sinking automatique
      P.y=WATER_SURFACE+Math.sin(P.swimBob*2.2)*.06;
      P.vy=0;P.onGround=true;P.sinkTimer=0;
      if(gy!==null&&gy>WATER_SURFACE-.2){P.state='ground';P.y=gy+P.yOff;P.sinkTimer=0;}
    } else if(P.state==='sinking'){
      // Sinking = urgence noyade seulement si souffle épuisé
      P.vy=Math.max(P.vy-6*dt,-SINK_SPEED);P.y+=P.vy*dt;
      P.breath=Math.max(0,P.breath-BREATH_LOSE*2*dt);P.onGround=false;
      if(moveMag>.05){P.state='diving';P.vy=1.5;}
      if(P.y<-19.5){P.y=-19.5;P.vy=0;}
      if(P.y>=WATER_SURFACE-.1){P.state='surface';P.y=WATER_SURFACE;P.vy=0;P.sinkTimer=0;}
      if(P.breath<=0){P.y=WATER_SURFACE+.5;P.vy=4;P.state='surface';P.breath=30;toast('Stitch reprend son souffle !',2000);}
    } else if(P.state==='diving'){
      // Stitch nage librement en 3D sous l'eau
      // Le joystick gauche contrôle horizontal + vertical
      // Joystick vers le haut = avancer ET remonter légèrement
      // Joystick vers le bas = avancer ET descendre
      P.vy*=.82;
      // Contrôle vertical : joystick droit Y ou touche spéciale
      if(Math.abs(rjLY)>.06) P.vy=Math.max(-5,Math.min(5,P.vy-rjLY*8*dt));
      // Si joystick gauche poussé vers le haut (jLY<0) → légère remontée
      if(jLY<-.5) P.vy=Math.min(P.vy+4*dt,4);
      // Flottabilité très légère
      P.vy+=0.25*dt;
      P.y+=P.vy*dt;
      P.onGround=false;
      P.breath=Math.max(0,P.breath-BREATH_LOSE*dt);

      // Remontée douce à la surface
      if(P.y>=WATER_SURFACE-.08){
        P.y=WATER_SURFACE;P.state='surface';P.vy=0;
        toast('Stitch reprend son souffle !',2000);
      }
      // Fond océan
      if(P.y<-19.5){P.y=-19.5;P.vy=Math.max(.3,P.vy);}
      // Manque d'air
      if(P.breath<=0){
        P.vy=5;P.state='surface';P.breath=30;
        toast('Plus d air ! Stitch remonte !',2500);
      }
      // Rejoint le sol d'une île
      if(gy!==null&&gy>WATER_SURFACE-0.5&&P.y<=gy+P.yOff){
        P.y=gy+P.yOff;P.vy=0;P.state='ground';
      }
    } // fin diving

    var PRAD=.48,nx=P.x+P.vx*dt,nz=P.z+P.vz*dt;
    for(var wi=0;wi<walls.length;wi++){
      var w=walls[wi];if(P.y-P.yOff>w.y0+w.h)continue;
      var inX=(nx+PRAD>w.x1&&nx-PRAD<w.x2),inZ=(nz+PRAD>w.z1&&nz-PRAD<w.z2);
      var curX=(P.x+PRAD>w.x1&&P.x-PRAD<w.x2),curZ=(P.z+PRAD>w.z1&&P.z-PRAD<w.z2);
      if(inX&&inZ){if(!curX){P.vx=0;nx=P.x;}if(!curZ){P.vz=0;nz=P.z;}}
    }
    P.x=nx;P.z=nz;

    var stEl=document.getElementById('stitch-root');
    var tiltF=(P.state==='diving'&&moveMag>.05)?-30:(P.state==='surface'&&moveMag>.05)?-12:(P.state==='sinking')?-45:0;
    stEl.setAttribute('position',P.x.toFixed(2)+' '+P.y.toFixed(2)+' '+P.z.toFixed(2));
    stEl.setAttribute('rotation',tiltF+' '+(P.yaw*180/Math.PI).toFixed(1)+' 0');
    animateStitch(dt, moveMag, P.state, sprint);

    if(Math.abs(rjLX)>.04)CAM.yaw+=rjLX*dt*2.5;
    else if(moveMag>.1){
      var tc=P.yaw+Math.PI,cd=tc-CAM.yaw;
      while(cd>Math.PI)cd-=Math.PI*2;while(cd<-Math.PI)cd+=Math.PI*2;
      CAM.yaw+=cd*dt*2.2;
    }
    if(Math.abs(rjLY)>.04)CAM.pitch=Math.max(.04,Math.min(.85,CAM.pitch+rjLY*dt*1.5));

    // Caméra suit Stitch — sous l'eau la pitch s'adapte automatiquement
    var camDist = (P.state==='diving'||P.state==='sinking') ? 5.0 : CAM.dist;
    // Sous l'eau : caméra légèrement derrière et au-dessus de Stitch
    var camPitch = CAM.pitch;
    if(P.state==='diving'||P.state==='sinking'){
      camPitch = Math.max(.1, Math.min(.55, camPitch));
    }
    var cr=camDist*Math.cos(camPitch);
    var cX=P.x+Math.sin(CAM.yaw)*cr;
    var cZ=P.z+Math.cos(CAM.yaw)*cr;
    var cY=P.y+camDist*Math.sin(camPitch)+((P.state==='diving'||P.state==='sinking')?1.5:1.8);
    // La caméra ne remonte PAS à la surface quand Stitch plonge
    var camRig=document.getElementById('cam-rig');
    var cp=camRig.getAttribute('position');
    var lf2=Math.min(1,dt*12);
    camRig.setAttribute('position',
      (cp.x+(cX-cp.x)*lf2).toFixed(2)+' '+
      (cp.y+(cY-cp.y)*lf2).toFixed(2)+' '+
      (cp.z+(cZ-cp.z)*lf2).toFixed(2));
    // Regarder Stitch — sous l'eau légèrement vers le bas
    var lookY = P.y + ((P.state==='diving'||P.state==='sinking') ? 0.2 : 0.8);
    document.getElementById('mainCam').components.camera.camera.lookAt(P.x, lookY, P.z);

    ['w0','w1','w2'].forEach(function(id,i){
      var wEl=document.getElementById(id);if(!wEl)return;
      wEl.setAttribute('scale',(1+Math.sin(waveT*.8+i*1.4)*.05)+' 1 '+(1+Math.sin(waveT*.8+i*1.4)*.05));
      wEl.setAttribute('position','0 '+(-.42+Math.sin(waveT*1.6+i*1.4)*.04).toFixed(3)+' 0');
    });
    var lg=document.getElementById('lagon');
    if(lg)lg.setAttribute('position','0 '+(-.35+Math.sin(waveT*.45)*.012).toFixed(3)+' 0');

    var breathBar=document.getElementById('breath-bar');
    var breathFill=document.getElementById('breath-fill');
    var uwOverlay=document.getElementById('underwater-overlay');
    var sinkOverlay=document.getElementById('sink-overlay');
    var causticOverlay=document.getElementById('caustic-overlay');
    var inWater=(P.state==='diving'||P.state==='surface'||P.state==='sinking');
    if(inWater){
      breathBar.style.display='flex';
      var pct=P.breath/MAX_BREATH;
      breathFill.style.width=(pct*100).toFixed(0)+'%';
      breathFill.style.background=pct>.5?'linear-gradient(90deg,#00ffcc,#0088ff)':pct>.2?'linear-gradient(90deg,#ffcc00,#ff6600)':'linear-gradient(90deg,#ff2200,#ff6600)';
    } else { breathBar.style.display='none'; }
    // Overlay bleu sous l'eau — s'intensifie avec la profondeur
    var divDepth=(P.state==='diving'||P.state==='sinking')?Math.min(1,Math.max(0,(WATER_SURFACE-P.y)/15)):0;
    uwOverlay.style.opacity=(P.state==='diving'||P.state==='sinking')?(0.35+divDepth*0.45):(P.state==='surface'?0.12:0);
    causticOverlay.style.opacity=(P.state==='diving'||P.state==='sinking')?(0.6+Math.sin(waveT*1.4)*0.2):0;
    var sinkDepth=(P.state==='sinking'||P.state==='diving')? Math.min(1,Math.max(0,(WATER_SURFACE-P.y)/15)) : 0;
    sinkOverlay.style.background='rgba(0,10,40,'+(sinkDepth*.5).toFixed(2)+')';
    var scene=document.querySelector('a-scene');
    if(P.state==='diving'||P.state==='sinking'){
      // Fog bleu progressif selon profondeur
      var fogDensity=(0.018+divDepth*0.022).toFixed(4);
      var fogG=Math.max(0,Math.min(255,Math.floor(80-divDepth*60)));
      var fogB=Math.max(0,Math.min(255,Math.floor(130+divDepth*80)));
      var fogHex='#00'+fogG.toString(16).padStart(2,'0')+fogB.toString(16).padStart(2,'0');
      scene.setAttribute('fog','type:exponential;color:'+fogHex+';density:'+fogDensity);
      document.getElementById('skyEl').setAttribute('color','#001a3a');
    } else {
      scene.setAttribute('fog','type:exponential;color:#5ac8f0;density:0.007');
      document.getElementById('skyEl').setAttribute('color','#4ab8f0');
    }

    var zone='🌊 OCEAN';
    if(P.state==='diving'||P.state==='sinking')zone='🤿 SOUS L EAU';
    else if(P.state!=='surface'){
      zone='🏖 PLAGE';
      for(var i=0;i<islandDefs.length;i++){
        var id2=islandDefs[i];
        if(Math.sqrt((P.x-id2.cx)*(P.x-id2.cx)+(P.z-id2.cz)*(P.z-id2.cz))<60){zone='🏝 '+id2.label;break;}
      }
      if(P.y>3)zone='🏔 COLLINE';
    }
    document.getElementById('zL').textContent=zone;
    if(P.breath<15&&(P.state==='diving'||P.state==='sinking')&&Math.floor(waveT*2)%2===0){
      document.getElementById('zL').style.color='#ff2200';
    } else { document.getElementById('zL').style.color='#7de8ff'; }
  }
  loop();

  window.doJump=function(e){
    if(e&&e.preventDefault)e.preventDefault();
    if(P.onGround&&P.state==='ground'){P.vy=8.5;P.onGround=false;P.state='air';}
    else if(P.state==='surface'){P.vy=5;P.state='air';}
  };

  window.doDive=function(e){
    if(e&&e.preventDefault)e.preventDefault();
    if(P.state==='diving'){
      // DIVE en plongeant = remonter vite vers la surface
      P.vy=6;
    } else if(P.state==='surface'){
      // DIVE en surface = plonger
      P.state='diving';P.vy=-5;P.onGround=false;P.y=WATER_SURFACE-.5;
      toast('Stitch plonge ! Joystick D haut/bas pour monter/descendre',3000);
    } else if(P.state==='air'){
      var gy3=getGroundY2(P.x,P.z);
      if(gy3===null&&P.y<WATER_SURFACE+4){P.state='diving';P.vy=-4;}
    }
  };

  window.setSprint=function(v,e){if(e&&e.preventDefault)e.preventDefault();sprint=!!v;};

  var jB=document.getElementById('joy'),jN=document.getElementById('jnub'),JMAX=38;
  function jUp(cx,cy){var r=jB.getBoundingClientRect(),dx=cx-(r.left+r.width/2),dy=cy-(r.top+r.height/2),d=Math.sqrt(dx*dx+dy*dy);if(d>JMAX){dx=dx/d*JMAX;dy=dy/d*JMAX;}jN.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';jLX=d>4?dx/JMAX:0;jLY=d>4?dy/JMAX:0;}
  function jRst(){jN.style.transform='translate(-50%,-50%)';jLX=0;jLY=0;}
  jB.addEventListener('touchstart',function(e){e.preventDefault();jid=e.changedTouches[0].identifier;jUp(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
  jB.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===jid)jUp(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false});
  jB.addEventListener('touchend',jRst,{passive:true});
  jB.addEventListener('mousedown',function(e){jUp(e.clientX,e.clientY);});
  window.addEventListener('mouseup',jRst);
  var rjB=document.getElementById('rjoy'),rjN=document.getElementById('rjnub'),RJMAX=32;
  function rjUp(cx,cy){var r=rjB.getBoundingClientRect(),dx=cx-(r.left+r.width/2),dy=cy-(r.top+r.height/2),d=Math.sqrt(dx*dx+dy*dy);if(d>RJMAX){dx=dx/d*RJMAX;dy=dy/d*RJMAX;}rjN.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';rjLX=d>4?dx/RJMAX:0;rjLY=d>4?dy/RJMAX:0;}
  function rjRst(){rjN.style.transform='translate(-50%,-50%)';rjLX=0;rjLY=0;}
  rjB.addEventListener('touchstart',function(e){e.preventDefault();rjid=e.changedTouches[0].identifier;rjUp(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
  rjB.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===rjid)rjUp(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false});
  rjB.addEventListener('touchend',rjRst,{passive:true});
  window.addEventListener('keydown',function(e){KY[e.code]=1;if(e.code==='Space'){e.preventDefault();window.doJump();}if(e.code==='KeyF'){e.preventDefault();window.doDive();}if(e.code==='ShiftLeft')sprint=true;});
  window.addEventListener('keyup',function(e){KY[e.code]=0;if(e.code==='ShiftLeft')sprint=false;});
}
</script>
