<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>FantasyWorld</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Barlow Condensed',sans-serif}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:#000;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#loading .title{font-family:‘Cinzel’,serif;font-size:28px;color:#f0c060;letter-spacing:8px;text-shadow:0 0 40px rgba(240,180,60,.5)}
#loading .bar-wrap{width:260px;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
#loading .bar-fill{height:100%;background:linear-gradient(90deg,#f0c060,#ff8800);border-radius:2px;width:0%;transition:width .3s}
#loading .step{font-size:10px;color:rgba(255,255,255,.25);letter-spacing:3px}

/* ── CHAR SELECT ── */
#charsel{position:fixed;inset:0;background:#06040f;z-index:90;display:none;flex-direction:column}
#charsel .cs-top{flex-shrink:0;padding:16px 0 4px;text-align:center}
#charsel .cs-top h1{font-family:‘Cinzel’,serif;font-size:10px;letter-spacing:8px;color:rgba(240,180,60,.45)}
#charsel .cs-top h2{font-family:‘Cinzel’,serif;font-size:20px;letter-spacing:4px;color:#f0c060;margin-top:2px}
#cscv{flex:1;display:block;width:100%;min-height:0;touch-action:none}
#charsel .cs-bot{flex-shrink:0;background:rgba(0,0,0,.9);border-top:1px solid rgba(240,180,60,.1);padding:10px 16px 14px}
#charsel .cs-nav{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cs-arr{width:44px;height:44px;background:rgba(240,180,60,.08);border:1.5px solid rgba(240,180,60,.35);border-radius:3px;color:#f0c060;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;touch-action:manipulation}
.cs-arr:active{background:rgba(240,180,60,.2)}
.cs-info{flex:1;text-align:center}
.cs-info .cs-name{font-family:‘Cinzel’,serif;font-size:17px;letter-spacing:3px;margin-bottom:2px}
.cs-info .cs-desc{font-size:10px;color:rgba(255,255,255,.32);letter-spacing:.8px}
#csDots{display:flex;justify-content:center;gap:8px;margin-bottom:10px}
.csdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.12);cursor:pointer;transition:all .2s}
.csdot.on{background:#f0c060;box-shadow:0 0 8px rgba(240,180,60,.6)}
#btnPlay{width:100%;padding:15px;background:linear-gradient(135deg,#f0c060,#cc7700);border:none;color:#080408;font-family:‘Cinzel’,serif;font-size:13px;letter-spacing:4px;cursor:pointer;border-radius:3px;touch-action:manipulation}
#btnPlay:active{opacity:.88}

/* ── GAME CANVAS ── */
#cv{position:fixed;inset:0;width:100%;height:100%;display:none;touch-action:none}

/* ── HUD ── */
#hud{position:fixed;inset:0;pointer-events:none;z-index:20;display:none}
.hpill{display:inline-flex;align-items:center;gap:5px;background:rgba(0,0,0,.82);border-radius:2px;padding:5px 10px;font-family:‘Cinzel’,serif;font-size:11px}
.hbar-wrap{width:60px;height:5px;background:rgba(255,255,255,.07);border-radius:1px;overflow:hidden}
.hbar{height:100%;border-radius:1px;transition:width .25s}
#minimap{position:absolute;bottom:74px;right:14px;width:110px;height:110px;border-radius:50%;overflow:hidden;border:2px solid rgba(240,180,60,.4)}

/* ── JOY ── */
#joy{position:fixed;left:16px;bottom:74px;z-index:30;width:86px;height:86px;border-radius:50%;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.09);touch-action:none;pointer-events:all}
#jnub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#3a3a3a,#0f0f0f);border:1.5px solid rgba(255,255,255,.14);pointer-events:none}
#btns{position:fixed;right:14px;bottom:74px;z-index:30;display:flex;flex-direction:column;gap:6px;pointer-events:all}
.btn{width:52px;height:52px;border-radius:5px;background:rgba(0,0,0,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-family:‘Cinzel’,serif;font-size:8px;letter-spacing:.5px;cursor:pointer;touch-action:manipulation}
#mbar{position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(0,0,0,.96);border-top:1px solid rgba(240,180,60,.08);z-index:30;display:none;align-items:center;justify-content:center;gap:4px;padding:0 6px;pointer-events:all}
.mbb{padding:7px 10px;border-radius:2px;font-size:8px;border:1.5px solid rgba(255,255,255,.05);color:rgba(255,255,255,.22);cursor:pointer;touch-action:manipulation;letter-spacing:.8px;font-family:‘Cinzel’,serif;background:transparent}
.mbb.on{background:rgba(240,180,60,.1);border-color:#f0c060;color:#f0c060}

/* ── TOAST ── */
#toast{position:fixed;top:56px;left:50%;transform:translateX(-50%) scale(.9);opacity:0;z-index:80;background:rgba(0,0,0,.95);border:1.5px solid #f0c060;border-radius:2px;padding:6px 16px;color:#f0c060;font-size:11px;font-family:‘Barlow Condensed’,sans-serif;letter-spacing:.5px;white-space:nowrap;pointer-events:none;transition:all .15s}
#toast.show{transform:translateX(-50%) scale(1);opacity:1}
</style>

</head>
<body>

<!-- LOADING -->

<div id="loading">
  <div class="title">FANTASYWORLD</div>
  <div class="bar-wrap"><div class="bar-fill" id="barFill"></div></div>
  <div class="step" id="stepTxt">INITIALISATION...</div>
</div>

<!-- CHARACTER SELECT -->

<div id="charsel">
  <div class="cs-top">
    <h1>FANTASYWORLD</h1>
    <h2>CHOIX DU PERSONNAGE</h2>
  </div>
  <canvas id="cscv"></canvas>
  <div class="cs-bot">
    <div class="cs-nav">
      <div class="cs-arr" onclick="csNav(-1)">‹</div>
      <div class="cs-info">
        <div class="cs-name" id="csName" style="color:#f0c060">JOE</div>
        <div class="cs-desc" id="csDesc">Homme réaliste</div>
      </div>
      <div class="cs-arr" onclick="csNav(1)">›</div>
    </div>
    <div id="csDots"></div>
    <button id="btnPlay" onclick="startGame()">▶ &nbsp; JOUER</button>
  </div>
</div>

<!-- GAME -->

<canvas id="cv"></canvas>

<!-- HUD -->

<div id="hud">
  <div style="position:absolute;top:10px;left:12px;display:flex;flex-direction:column;gap:3px">
    <div class="hpill" style="border-left:3px solid #f0c060;color:#f0c060">💰 <span id="goldVal">5 000</span> $</div>
    <div class="hpill" style="border-left:3px solid #4af;color:#4af">🏠 <span id="propVal">0</span>/5</div>
  </div>
  <div style="position:absolute;top:10px;left:50%;transform:translateX(-50%)">
    <div class="hpill" id="charBadge" style="border-left:3px solid #cc44ff;color:#cc44ff">👤 JOE</div>
  </div>
  <div style="position:absolute;top:10px;right:12px">
    <div class="hpill" style="border-left:3px solid rgba(240,180,60,.4);color:#f0c060;letter-spacing:3px;font-size:12px">FANTASYWORLD</div>
  </div>
  <div style="position:absolute;bottom:74px;left:14px;display:flex;flex-direction:column;gap:2px">
    <div class="hpill" id="zoneTxt" style="border-left:3px solid rgba(255,255,255,.4);color:#fff;font-size:9px">🏢 CENTRE</div>
    <div style="display:flex;flex-direction:column;gap:2px;margin-top:4px">
      <div style="display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.7);padding:3px 8px;border-radius:2px">
        <span style="font-size:8px;color:#555;font-family:'Cinzel',serif;width:40px">HP</span>
        <div class="hbar-wrap"><div class="hbar" id="hpBar" style="background:#22cc44;width:100%"></div></div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.7);padding:3px 8px;border-radius:2px">
        <span style="font-size:8px;color:#555;font-family:'Cinzel',serif;width:40px">SPRINT</span>
        <div class="hbar-wrap"><div class="hbar" id="spBar" style="background:#f0c060;width:100%"></div></div>
      </div>
    </div>
  </div>
  <div id="minimap"><canvas id="mmcv" width="110" height="110"></canvas></div>
</div>

<!-- CONTROLS -->

<div id="joy"><div id="jnub"></div></div>
<div id="btns">
  <div class="btn" style="border:2px solid #22cc44;color:#22cc44" ontouchstart="doJump(event)" onclick="doJump()">↑<br>JUMP</div>
  <div class="btn" style="border:2px solid #f0c060;color:#f0c060" ontouchstart="setSprint(1,event)" ontouchend="setSprint(0)" onmousedown="setSprint(1)" onmouseup="setSprint(0)">⚡<br>RUN</div>
  <div class="btn" id="dnBtn" style="border:2px solid #4af;color:#4af" onclick="toggleDN()">☀<br>JOUR</div>
</div>
<div id="mbar">
  <div class="mbb on" onclick="setMode('explore',this)">◈ EXPLORER</div>
  <div class="mbb" onclick="setMode('buy',this)">$ ACHETER</div>
  <div class="mbb" onclick="toggleDN()">☀ JOUR/NUIT</div>
</div>
<div id="toast"></div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>

<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

<script>
'use strict';
var B = BABYLON;
var BASE = 'https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/';

// ══════════════════════════════════════════
// CONFIG PERSONNAGES
// ══════════════════════════════════════════
var CHARS = [
  { file:'joe__realistic_human_3d_model.glb', name:'JOE',   desc:'Homme réaliste game-ready', color:'#f0c060' },
  { file:'Ely%20By%20K.Atienza.glb',          name:'ELY',   desc:'Style cinématique',          color:'#ff88cc' },
  { file:'rumi_lobby.glb',                    name:'RUMI',  desc:'Personnage élégant',         color:'#88ccff' },
  { file:'stitch%202.glb',                    name:'STITCH',desc:'Créature fantastique',       color:'#44ddaa' }
];
var selChar = 0;

// ══════════════════════════════════════════
// ÉTATS
// ══════════════════════════════════════════
var eng, sc, cam;
var night = true;
var sun, amb, shadows;
var fillLight;
var pPos = {x:0,y:0,z:0}, pAngle = 0, pVY = 0, onGround = true;
var jX=0, jY=0, sprint=false, stamina=100;
var camYaw = Math.PI, CAM_D = 14, CAM_H = 6;
var gold = 5000, props = 0;
var mode = 'explore';
var toastTimer = null;
var pRoot = null, pYOff = 0;
var pAnims = {};
var curAnim = null;
var npcs = [];
var plotMeshes = [];
var _k = {u:0,d:0,l:0,r:0};
var lastT = performance.now(), mmT = 0;

var PLOTS = [
  {x:-10,z:-30,price:2500,name:'LOT CENTRE',desc:'Cœur de ville'},
  {x:25,z:25,  price:3200,name:'LOT NORD',  desc:'Vue panoramique'},
  {x:50,z:-10, price:2800,name:'LOT EST',   desc:'Zone résidentielle'},
  {x:-50,z:25, price:1800,name:'LOT OUEST', desc:'Grand espace'},
  {x:25,z:-50, price:4500,name:'LOT PREMIUM',desc:'Exclusif'}
];

// ══════════════════════════════════════════
// LOADING UI
// ══════════════════════════════════════════
var STEPS = ['MOTEUR 3D...','LUMIÈRES...','SOL & ROUTES...','BÂTIMENTS...','NATURE...','PERSONNAGES...','PRÊT !'];
function setStep(i, txt){
  document.getElementById('barFill').style.width = (i/STEPS.length*100)+'%';
  document.getElementById('stepTxt').textContent = txt || STEPS[Math.min(i,STEPS.length-1)];
}

// ══════════════════════════════════════════
// CHARACTER SELECT
// ══════════════════════════════════════════
var csEng=null, csScene=null, csModels=[], csIdx=0, csLoading=false;

function initCharSelect(){
  document.getElementById('loading').style.display='none';
  document.getElementById('charsel').style.display='flex';

  var cv = document.getElementById('cscv');
  var resize = function(){
    var r = cv.parentElement.getBoundingClientRect();
    cv.width = r.width * window.devicePixelRatio;
    cv.height = cv.clientHeight * window.devicePixelRatio;
  };
  resize();

  csEng = new B.Engine(cv, true, {antialias:true});
  csScene = new B.Scene(csEng);
  csScene.clearColor = new B.Color4(0.04, 0.02, 0.1, 1);

  new B.HemisphericLight('h', new B.Vector3(0,1,0), csScene).intensity = 1.4;
  var dl = new B.DirectionalLight('d', new B.Vector3(-1,-2,-1), csScene);
  dl.intensity = 1.6;
  var rim = new B.PointLight('r', new B.Vector3(2,3,-1), csScene);
  rim.diffuse = new B.Color3(.3,.5,1); rim.intensity = 1.8; rim.range = 10;

  var arcCam = new B.ArcRotateCamera('cc', 0.1, 1.2, 3.2, new B.Vector3(0,0.9,0), csScene);
  arcCam.lowerRadiusLimit = 1.5; arcCam.upperRadiusLimit = 7;
  arcCam.attachControl(cv, true);

  // Sol réfléchissant
  var gnd = B.MeshBuilder.CreateGround('g', {width:6,height:6}, csScene);
  var gm = new B.StandardMaterial('gm', csScene);
  gm.diffuseColor = new B.Color3(.04,.02,.09);
  gm.specularColor = new B.Color3(.5,.4,.7);
  gm.specularPower = 25;
  gnd.material = gm;

  // Anneau doré
  var ring = B.MeshBuilder.CreateTorus('ring', {diameter:1.1,thickness:.035,tessellation:48}, csScene);
  ring.position.y = .015;
  var rm = new B.StandardMaterial('rm', csScene);
  rm.emissiveColor = new B.Color3(.85,.62,.08);
  ring.material = rm;

  buildCsDots();
  csLoadChar(0);

  csEng.runRenderLoop(function(){
    if(csModels[csIdx]) csModels[csIdx].rotation.y += .006;
    csScene.render();
  });
  window.addEventListener('resize', function(){ if(csEng) csEng.resize(); });
}

function buildCsDots(){
  var el = document.getElementById('csDots'); el.innerHTML='';
  CHARS.forEach(function(c,i){
    var d = document.createElement('div');
    d.className = 'csdot'+(i===csIdx?' on':'');
    d.onclick = function(){ csGoTo(i); };
    el.appendChild(d);
  });
}

function csUpdateInfo(){
  var c = CHARS[csIdx];
  var nm = document.getElementById('csName');
  nm.textContent = c.name; nm.style.color = c.color;
  document.getElementById('csDesc').textContent = c.desc;
  buildCsDots();
}

async function csLoadChar(idx){
  if(csModels[idx]){
    csModels.forEach(function(m,i){ if(m) m.setEnabled(i===idx); });
    return;
  }
  if(csLoading) return;
  csLoading = true;
  csModels.forEach(function(m){ if(m) m.setEnabled(false); });

  var c = CHARS[idx];
  try{
    var r = await B.SceneLoader.ImportMeshAsync('','', BASE+c.file, csScene);
    if(!r.meshes.length) throw new Error('empty');
    var root = r.meshes[0];
    root.scaling.setAll(1);
    root.position = B.Vector3.Zero();
    root.computeWorldMatrix(true);
    var bb = root.getHierarchyBoundingVectors();
    var h = bb.max.y - bb.min.y || 1.8;
    var s = 1.8/h;
    root.scaling.setAll(s);
    root.computeWorldMatrix(true);
    var bb2 = root.getHierarchyBoundingVectors();
    root.position.y = -bb2.min.y;
    if(r.animationGroups.length){
      r.animationGroups.forEach(function(ag){ag.stop();});
      var idle = r.animationGroups.find(function(a){return /idle/i.test(a.name);})||r.animationGroups[0];
      if(idle) idle.start(true);
    }
    csModels[idx] = root;
  }catch(e){
    // Mannequin fallback si GLB absent
    var g = new B.TransformNode('m'+idx, csScene);
    var mat = new B.StandardMaterial('mm'+idx, csScene);
    var col = B.Color3.FromHexString(c.color);
    mat.diffuseColor = col; mat.emissiveColor = col.scale(.18);
    var body = B.MeshBuilder.CreateCylinder('b',{height:1.1,diameter:.46,tessellation:16},csScene);
    body.position.y=.55; body.material=mat; body.parent=g;
    var head = B.MeshBuilder.CreateSphere('h',{diameter:.42,segments:14},csScene);
    head.position.y=1.42; head.material=mat; head.parent=g;
    [-1,1].forEach(function(sx){
      var a=B.MeshBuilder.CreateCylinder('a',{height:.6,diameter:.14,tessellation:8},csScene);
      a.position=new B.Vector3(sx*.32,.52,0); a.rotation.z=sx*.5; a.material=mat; a.parent=g;
    });
    csModels[idx] = g;
  }
  csLoading = false;
  if(csModels[idx]) csModels[idx].setEnabled(true);
}

function csNav(dir){
  if(csModels[csIdx]) csModels[csIdx].setEnabled(false);
  csIdx = (csIdx+dir+CHARS.length)%CHARS.length;
  csUpdateInfo();
  csLoadChar(csIdx);
}
function csGoTo(idx){
  if(csModels[csIdx]) csModels[csIdx].setEnabled(false);
  csIdx=idx; csUpdateInfo(); csLoadChar(idx);
}

// ══════════════════════════════════════════
// START GAME
// ══════════════════════════════════════════
async function startGame(){
  selChar = csIdx;
  document.getElementById('charsel').style.display='none';
  if(csEng){ csEng.stopRenderLoop(); try{csEng.dispose();}catch(e){} csEng=null; csScene=null; }
  // 2 frames de pause pour libérer WebGL
  await new Promise(function(r){ requestAnimationFrame(function(){ requestAnimationFrame(r); }); });
  document.getElementById('loading').style.display='flex';
  setStep(0);
  await initWorld();
}

// ══════════════════════════════════════════
// INIT MONDE
// ══════════════════════════════════════════
async function initWorld(){
  var cv = document.getElementById('cv');
  cv.style.display = 'block';

  eng = new B.Engine(cv, true, {antialias:true, stencil:true}, true);
  sc  = new B.Scene(eng);
  sc.clearColor = new B.Color4(.02,.02,.04,1);

  // Caméra 3ème personne
  cam = new B.FreeCamera('c', new B.Vector3(0,8,20), sc);
  cam.minZ=.1; cam.maxZ=900; cam.fov=.92;
  cam.setTarget(new B.Vector3(0,1,0));

  setStep(1);
  initLights();

  // Brouillard nuit urbain
  sc.fogMode   = B.Scene.FOGMODE_EXP2;
  sc.fogDensity = .008;
  sc.fogColor  = new B.Color3(.03,.03,.06);

  setStep(2);
  buildGround();
  buildPlots();
  setupJoystick();
  setupCamDrag(cv);
  setupKeys();

  // Lancer le renderLoop IMMÉDIATEMENT — le sol est déjà là
  eng.runRenderLoop(gameLoop);
  window.addEventListener('resize', function(){ if(eng) eng.resize(); });

  // Masquer le loading, afficher le jeu
  document.getElementById('loading').style.display='none';
  document.getElementById('cv').style.display='block';
  document.getElementById('hud').style.display='block';
  document.getElementById('mbar').style.display='flex';
  document.getElementById('charBadge').textContent = '👤 '+CHARS[selChar].name;
  toast('✦ BIENVENUE — '+CHARS[selChar].name+' ✦');

  // Charger le reste en arrière-plan (non bloquant)
  loadWorldAsync();
}

// Chargement asynchrone du monde (non-bloquant)
async function loadWorldAsync(){
  try{ await buildRoads(); }catch(e){}
  try{ await buildCity(); }catch(e){}
  try{ await buildNature(); }catch(e){}
  try{ await loadPlayer(); }catch(e){}
  try{ await spawnNPCs(); }catch(e){}
}

// ══════════════════════════════════════════
// LUMIÈRES
// ══════════════════════════════════════════
function initLights(){
  amb = new B.HemisphericLight('a', new B.Vector3(0,1,0), sc);
  amb.intensity = .18;
  amb.diffuse = new B.Color3(.12,.14,.3);
  amb.groundColor = new B.Color3(.04,.04,.08);

  sun = new B.DirectionalLight('s', new B.Vector3(-.4,-1,-.3), sc);
  sun.position = new B.Vector3(60,120,60);
  sun.intensity = .28;
  sun.diffuse = new B.Color3(.45,.5,.9);

  try{
    shadows = new B.ShadowGenerator(512, sun);
    shadows.useBlurExponentialShadowMap = true;
    shadows.blurKernel = 12;
  }catch(e){ shadows=null; }

  fillLight = new B.PointLight('fl', new B.Vector3(0,5,0), sc);
  fillLight.diffuse = new B.Color3(1,.6,.2);
  fillLight.intensity = 2.2;
  fillLight.range = 18;
}

// ══════════════════════════════════════════
// SOL
// ══════════════════════════════════════════
function buildGround(){
  var g = B.MeshBuilder.CreateGround('gnd',{width:500,height:500,subdivisions:1},sc);
  var m = new B.StandardMaterial('gm',sc);
  m.diffuseColor  = new B.Color3(.055,.055,.065);
  m.specularColor = new B.Color3(.2,.2,.25);
  m.specularPower = 100;
  g.material=m; g.receiveShadows=true;

  // Trottoirs
  var sm = new B.StandardMaterial('swm',sc);
  sm.diffuseColor = new B.Color3(.16,.16,.19);
  for(var i=-10;i<=10;i++){
    for(var j=-10;j<=10;j++){
      if(i%4===0||j%4===0){
        var sw=B.MeshBuilder.CreateGround('sw',{width:1.8,height:1.8},sc);
        sw.position=new B.Vector3(i*8,.03,j*8);
        sw.material=sm; sw.receiveShadows=true;
      }
    }
  }
}

// ══════════════════════════════════════════
// SYSTÈME DE TEMPLATES GLB (clone léger)
// ══════════════════════════════════════════
var TMPL = {};
async function loadTmpl(file){
  if(TMPL[file]) return TMPL[file];
  try{
    var r = await B.SceneLoader.ImportMeshAsync('','', BASE+file, sc);
    if(!r||!r.meshes.length) return null;
    // Masquer tous les meshes du template
    r.meshes.forEach(function(m){ m.setEnabled(false); });
    TMPL[file] = r.meshes; // stocker TOUS les meshes
    return r.meshes;
  }catch(e){ return null; }
}
function place(file, x, y, z, ry, sc2){
  var meshes = TMPL[file]; if(!meshes||!meshes.length) return null;
  // Cloner chaque mesh individuellement et les regrouper
  var root = new B.TransformNode('g_'+Math.random().toString(36).slice(2), sc);
  root.position.set(x, y||0, z);
  if(ry!=null) root.rotation.y = ry;
  if(sc2) root.scaling.setAll(sc2);
  // Trouver le vrai root (pas de parent dans notre set)
  var meshSet = new Set(meshes);
  meshes.forEach(function(m){
    // Cloner seulement les meshes visibles (pas les TransformNodes racines)
    if(m.getClassName && (m.getClassName()==='Mesh' || m.getClassName()==='AbstractMesh')){
      var c = m.clone('c_'+Math.random().toString(36).slice(2), root);
      if(c){
        c.setEnabled(true);
        c.isVisible = true;
        c.receiveShadows = true;
        if(shadows) shadows.addShadowCaster(c, false);
      }
    }
  });
  return root;
}

async function buildRoads(){

  await loadTmpl('road-bend.glb');

  for(var i=-5;i<=5;i++){

        // Intersection aux croisements
        if(i===0 && j===0){ place('road-crossroad.glb',0,0,0,0,1); continue; }
        if(i===0){ place('road-straight.glb',0,0,j*16,0,1); continue; }

  // Routes secondaires
  [-32,-16,16,32].forEach(function(x){
    for(var j=-5;j<=5;j++){
      place('road-straight.glb',x,0,j*16,Math.PI/2,1);

  [-32,-16,16,32].forEach(function(z){
    for(var i=-5;i<=5;i++){
      place('road-straight.glb',i*16,0,z,0,1);
    }

  [-32,-16,0,16,32].forEach(function(x){
    [-32,-16,0,16,32].forEach(function(z){

async function buildCity(){
  // Listes de bâtiments
  var BLDG = ['building-a','building-b','building-c','building-d','building-e',
              'building-f','building-g','building-h','building-i','building-j',
              'building-k','building-l','building-m','building-n','building-o',
              'building-p','building-q','building-r','building-s','building-t'];
  var SKY  = ['building-skyscraper-a','building-skyscraper-b','building-skyscraper-c',
              'building-skyscraper-d','building-skyscraper-e'];
  var LOW  = ['low-detail-building-a','low-detail-building-b','low-detail-building-c',
              'low-detail-building-d','low-detail-building-e','low-detail-building-f',
              'low-detail-building-g','low-detail-building-h'];

  // Charger les templates
  for(var i=0;i<BLDG.length;i++) await loadTmpl(BLDG[i]+'.glb');
  for(var i=0;i<SKY.length;i++)  await loadTmpl(SKY[i]+'.glb');
  for(var i=0;i<LOW.length;i++)  await loadTmpl(LOW[i]+'.glb');
  await loadTmpl('Taxi.glb');

  // Placement sur grille : 7x7 blocs, chaque bloc = 16x16
  var ni=0;
  for(var gx=-3;gx<=3;gx++){
    for(var gz=-3;gz<=3;gz++){
      // Laisser le centre libre (joueur spawn là)
      if(Math.abs(gx)<=1 && Math.abs(gz)<=1) continue;

      var wx=gx*16, wz=gz*16;
      var d=Math.sqrt(gx*gx+gz*gz);
      var file, sc2;

      if(d<=1.5){        // Centre : gratte-ciels
        file=SKY[ni%SKY.length]+'.glb'; sc2=1.1+Math.random()*.4;
      }else if(d<=2.5){  // Milieu : gros bâtiments
        file=BLDG[ni%BLDG.length]+'.glb'; sc2=.9+Math.random()*.3;
      }else{             // Périphérie : bâtiments bas
        file=LOW[ni%LOW.length]+'.glb'; sc2=.8+Math.random()*.25;
      }

      var ry=Math.round(Math.random()*3)*Math.PI*.5; // angles 0/90/180/270
      var mesh=place(file,wx,0,wz,ry,sc2);

      // Fallback si le GLB n'existe pas
      if(!mesh){
        var h2=sc2*(4+Math.random()*6);
        var box=B.MeshBuilder.CreateBox('fb'+ni,{width:sc2*6,height:h2,depth:sc2*6},sc);
        box.position.set(wx,h2/2,wz);
        var bm=new B.StandardMaterial('fm'+ni,sc);
        bm.diffuseColor=new B.Color3(.07+Math.random()*.06,.07+Math.random()*.06,.09+Math.random()*.08);
        bm.specularColor=new B.Color3(.3,.3,.35); box.material=bm; box.receiveShadows=true;
        if(shadows) shadows.addShadowCaster(box);
        // Fenêtres lumineuses
        for(var wi=0;wi<Math.floor(h2/1.8);wi++){
          if(Math.random()>.3){
            var wn=B.MeshBuilder.CreateBox('wn',{width:.5,height:.5,depth:.05},sc);
            wn.position.set(wx+(Math.random()<.5?sc2*3.02:-sc2*3.02),wi*1.8+1,wz);
            var wmm=new B.StandardMaterial('wm'+ni+wi,sc);
            wmm.emissiveColor=Math.random()<.4?new B.Color3(.95,.85,.5):new B.Color3(.25,.5,1);
            wn.material=wmm;
          }
        }
      }

      // Lampadaires aux coins de blocs
      if(ni%3===0) addStreetLight(wx+7.5,wz+7.5);
      // Néons aléatoires
      if(Math.random()>.5) addNeonSign(wx,3.5+Math.random()*2,wz+3,NEONS[ni%NEONS.length]);
      ni++;
    }
  }

  // Taxis stationnés
  place('Taxi.glb',12,0,4,.35,.5);
  place('Taxi.glb',-18,0,-12,2.8,.5);
  place('Taxi.glb',30,0,8,1.2,.5);
}

async function loadPlayer(){
  var c = CHARS[selChar];
  try{
    var r = await B.SceneLoader.ImportMeshAsync('','', BASE+c.file, sc);
    if(!r.meshes.length) throw new Error('empty');
    var root = r.meshes[0];

    root.scaling.setAll(1);
    root.position = B.Vector3.Zero();
    root.computeWorldMatrix(true);
    var bb = root.getHierarchyBoundingVectors();
    var h = bb.max.y - bb.min.y || 1.8;
    var s = 1.8/h;
    root.scaling.setAll(s);
    root.computeWorldMatrix(true);
    var bb2 = root.getHierarchyBoundingVectors();
    pYOff = -bb2.min.y;
    root.position.set(pPos.x, pPos.y+pYOff, pPos.z);
    root.rotation.y = pAngle;

    r.meshes.forEach(function(m){
      m.receiveShadows=true;
      if(shadows) shadows.addShadowCaster(m,true);
    });

    // Détection animations
    if(r.animationGroups.length){
      r.animationGroups.forEach(function(ag){
        ag.stop();
        var n=ag.name.toLowerCase();
        if(/idle/.test(n))  pAnims.idle=ag;
        else if(/walk/.test(n)) pAnims.walk=ag;
        else if(/run/.test(n))  pAnims.run=ag;
        else if(/jump/.test(n)) pAnims.jump=ag;
      });
      if(!pAnims.idle) pAnims.idle=r.animationGroups[0];
      if(!pAnims.walk && r.animationGroups[1]) pAnims.walk=r.animationGroups[1];
      if(!pAnims.run  && r.animationGroups[2]) pAnims.run=r.animationGroups[2];
      playAnim(pAnims.idle);
    }
    pRoot = root;
  }catch(e){
    // Capsule visible si GLB échoue
    var cap=B.MeshBuilder.CreateCapsule('pl',{height:1.8,radius:.28},sc);
    cap.position.set(0,.9,0);
    var cm=new B.StandardMaterial('cm',sc);
    var col=B.Color3.FromHexString(CHARS[selChar].color);
    cm.diffuseColor=col; cm.emissiveColor=col.scale(.15);
    cap.material=cm; pRoot=cap; pYOff=.9;
  }
}

function playAnim(anim){
  if(!anim||anim===curAnim) return;
  if(curAnim) curAnim.stop();
  anim.start(true); curAnim=anim;
}

// GAME LOOP
// ══════════════════════════════════════════
function gameLoop(){
  var now=performance.now(), dt=Math.min((now-lastT)/1000,.05); lastT=now;
  movePlayer(dt);
  moveNPCs(dt);
  updateCam();
  mmT+=dt; if(mmT>.25){mmT=0;drawMinimap();}
  sc.render();
}

function movePlayer(dt){
  var spd=(sprint&&stamina>2?9:5)*dt;
  var fw=new B.Vector3(Math.sin(camYaw),0,Math.cos(camYaw));
  var rt=new B.Vector3(Math.cos(camYaw),0,-Math.sin(camYaw));
  var mv=B.Vector3.Zero(), moved=false;

  if(Math.abs(jX)>.04||Math.abs(jY)>.04){
    mv.addInPlace(rt.scale(jX)); mv.addInPlace(fw.scale(-jY)); moved=true;
    var l=mv.length(); if(l>0) mv.scaleInPlace(spd*Math.min(l,1)/l);
  }else{
    if(_k.u) mv.subtractInPlace(fw); if(_k.d) mv.addInPlace(fw);
    if(_k.l) mv.subtractInPlace(rt); if(_k.r) mv.addInPlace(rt);
    if(mv.length()>0){moved=true; mv.normalize().scaleInPlace(spd);}
  }

  if(moved){
    var ta=Math.atan2(mv.x,mv.z), da=ta-pAngle;
    while(da>Math.PI) da-=Math.PI*2; while(da<-Math.PI) da+=Math.PI*2;
    pAngle+=da*Math.min(1,dt*14);
    sprint?stamina=Math.max(0,stamina-dt*22):stamina=Math.min(100,stamina+dt*10);
    playAnim(sprint&&pAnims.run?pAnims.run:pAnims.walk||pAnims.idle);
  }else{
    stamina=Math.min(100,stamina+dt*16);
    playAnim(pAnims.idle);
  }

  pPos.x=Math.max(-110,Math.min(110,pPos.x+mv.x));
  pPos.z=Math.max(-110,Math.min(110,pPos.z+mv.z));
  pVY-=22*dt; pPos.y+=pVY*dt;
  if(pPos.y<0){pPos.y=0;pVY=0;onGround=true;}else onGround=false;

  if(pRoot){
    pRoot.position.x=pPos.x;
    pRoot.position.y=pPos.y+pYOff;
    pRoot.position.z=pPos.z;
    var da2=pAngle-pRoot.rotation.y;
    while(da2>Math.PI) da2-=Math.PI*2; while(da2<-Math.PI) da2+=Math.PI*2;
    pRoot.rotation.y+=da2*Math.min(1,dt*12);
  }

  if(fillLight) fillLight.position.set(pPos.x,pPos.y+5,pPos.z);
  document.getElementById('spBar').style.width=stamina+'%';
  updateZone();
}

function moveNPCs(dt){
  npcs.forEach(function(npc){
    if(!npc.root) return;
    var tgt=npc.route[npc.ptIdx];
    var dx=tgt.x-npc.root.position.x;
    var dz=tgt.z-npc.root.position.z;
    var dist=Math.sqrt(dx*dx+dz*dz);
    if(dist<.5){ npc.ptIdx=(npc.ptIdx+1)%npc.route.length; return; }
    var spd=npc.speed*dt;
    npc.root.position.x+=dx/dist*spd;
    npc.root.position.z+=dz/dist*spd;
    var ta=Math.atan2(dx,dz), da=ta-npc.root.rotation.y;
    while(da>Math.PI) da-=Math.PI*2; while(da<-Math.PI) da+=Math.PI*2;
    npc.root.rotation.y+=da*Math.min(1,dt*8);
    if(npc.lbl){
      npc.lbl.position.x=npc.root.position.x;
      npc.lbl.position.z=npc.root.position.z;
    }
  });
}

function updateCam(){
  var tx=pPos.x+Math.sin(camYaw)*CAM_D;
  var ty=pPos.y+CAM_H;
  var tz=pPos.z+Math.cos(camYaw)*CAM_D;
  cam.position=B.Vector3.Lerp(cam.position,new B.Vector3(tx,ty,tz),.1);
  cam.target=B.Vector3.Lerp(cam.target,new B.Vector3(pPos.x,pPos.y+1.7,pPos.z),.12);
}

function updateZone(){
  var d=Math.sqrt(pPos.x*pPos.x+pPos.z*pPos.z);
  var z=d<12?'🏢 CENTRE':pPos.z<-32&&Math.abs(pPos.x)<28?'🏙️ DOWNTOWN':d<40?'🏘️ RÉSIDENTIEL':'🌳 PÉRIPHÉRIE';
  document.getElementById('zoneTxt').textContent=z;
}

  function mv(cx,cy){
    var r=base.getBoundingClientRect(),bx=r.left+r.width/2,by=r.top+r.height/2;
    var dx=cx-bx,dy=cy-by,d=Math.sqrt(dx*dx+dy*dy),mx=30;
    if(d>mx){dx=dx/d*mx;dy=dy/d*mx;d=mx;}
    nub.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';
    jX=d>5?dx/mx:0; jY=d>5?dy/mx:0;
  }
  function rs(){nub.style.transform='translate(-50%,-50%)';jX=0;jY=0;tid=-1;}
  base.addEventListener('touchstart',function(e){e.preventDefault();if(!e.touches[0])return;tid=e.touches[0].identifier;mv(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  base.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===tid)mv(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false});
  base.addEventListener('touchend',rs,{passive:false});
  base.addEventListener('mousedown',function(e){mv(e.clientX,e.clientY);});
  window.addEventListener('mouseup',rs);
}

function setupCamDrag(cv){
  var lx=0,drag=false;
  cv.addEventListener('touchstart',function(e){if(e.touches.length===1){lx=e.touches[0].clientX;drag=true;}},{passive:true});
  cv.addEventListener('touchmove',function(e){if(drag&&e.touches.length===1){camYaw+=(e.touches[0].clientX-lx)*.005;lx=e.touches[0].clientX;}},{passive:true});
  cv.addEventListener('touchend',function(){drag=false;},{passive:true});
  cv.addEventListener('mousedown',function(e){if(e.button===2){lx=e.clientX;drag=true;}});
  window.addEventListener('mousemove',function(e){if(drag){camYaw+=(e.clientX-lx)*.004;lx=e.clientX;}});
  window.addEventListener('mouseup',function(){drag=false;});
  window.addEventListener('wheel',function(e){CAM_D=Math.max(4,Math.min(28,CAM_D+e.deltaY*.01));},{passive:true});
  cv.addEventListener('contextmenu',function(e){e.preventDefault();});
}

function setupKeys(){
  window.addEventListener('keydown',function(e){
    if(e.key==='ArrowUp'||e.key==='w'||e.key==='W')_k.u=1;
    if(e.key==='ArrowDown'||e.key==='s'||e.key==='S')_k.d=1;
    if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')_k.l=1;
    if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')_k.r=1;
    if(e.key===' '){e.preventDefault();doJump();}
    if(e.key==='Shift')sprint=true;
  });
  window.addEventListener('keyup',function(e){
    if(e.key==='ArrowUp'||e.key==='w'||e.key==='W')_k.u=0;
    if(e.key==='ArrowDown'||e.key==='s'||e.key==='S')_k.d=0;
    if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')_k.l=0;
    if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')_k.r=0;
    if(e.key==='Shift')sprint=false;
  });
}
function doJump(e){if(e&&e.preventDefault)e.preventDefault();if(onGround){pVY=9;onGround=false;if(pAnims.jump)playAnim(pAnims.jump);}}
function setSprint(v,e){if(e&&e.preventDefault)e.preventDefault();sprint=!!v;}

// ══════════════════════════════════════════
// MODE ACHAT
// ══════════════════════════════════════════
function setMode(m,el){
  mode=m;
  document.querySelectorAll('.mbb').forEach(function(b){b.classList.remove('on');});
  if(el)el.classList.add('on');
  if(m==='buy'){
    toast('MODE ACHAT — approche un terrain vert');
    plotMeshes.forEach(function(mesh,i){
      if(!mesh.actionManager)mesh.actionManager=new B.ActionManager(sc);
      mesh.actionManager.registerAction(new B.ExecuteCodeAction(B.ActionManager.OnPickTrigger,function(){buyPlot(i);}));
    });
  }else toast('MODE EXPLORATION');
}
function buyPlot(i){
  var p=PLOTS[i];
  if(gold<p.price){toast('❌ Fonds insuffisants');return;}
  gold-=p.price; props++;
  var m=plotMeshes[i];
  if(m&&m.material){m.material.diffuseColor=new B.Color3(.07,.07,.9);m.material.emissiveColor=new B.Color3(.01,.01,.18);}
  document.getElementById('goldVal').textContent=gold.toLocaleString('fr-FR');
  document.getElementById('propVal').textContent=props;
  toast('✦ '+p.name+' acheté !');
}
setInterval(function(){if(eng){gold+=80+props*40;document.getElementById('goldVal').textContent=gold.toLocaleString('fr-FR');}},30000);

// ══════════════════════════════════════════
// MINIMAP
// ══════════════════════════════════════════
var mmCtx=null;
function drawMinimap(){
  if(!mmCtx){var c=document.getElementById('mmcv');if(!c)return;mmCtx=c.getContext('2d');}
  var W=110,H=110;
  mmCtx.clearRect(0,0,W,H);
  mmCtx.save(); mmCtx.beginPath(); mmCtx.arc(55,55,54,0,Math.PI*2); mmCtx.clip();
  mmCtx.fillStyle='#080a16'; mmCtx.fillRect(0,0,W,H);
  // Grille routes
  mmCtx.strokeStyle='#111628'; mmCtx.lineWidth=1;
  [-32,-16,0,16,32].forEach(function(v){
    var x=(v/200+.5)*W; mmCtx.beginPath();mmCtx.moveTo(x,0);mmCtx.lineTo(x,H);mmCtx.stroke();
    var z=(v/200+.5)*H; mmCtx.beginPath();mmCtx.moveTo(0,z);mmCtx.lineTo(W,z);mmCtx.stroke();
  });
  // Terrains
  PLOTS.forEach(function(p,i){
    var mx=(p.x/200+.5)*W, mz=(p.z/200+.5)*H;
    mmCtx.fillStyle=i<props?'#2233ff':'#22cc44';
    mmCtx.beginPath();mmCtx.arc(mx,mz,3,0,Math.PI*2);mmCtx.fill();
  });
  // PNJ
  npcs.forEach(function(npc){
    if(!npc.root)return;
    var nx=(npc.root.position.x/200+.5)*W, nz=(npc.root.position.z/200+.5)*H;
    mmCtx.fillStyle=CHARS[npc.ci].color;
    mmCtx.beginPath();mmCtx.arc(nx,nz,2.5,0,Math.PI*2);mmCtx.fill();
  });
  // Joueur
  var ax=(pPos.x/200+.5)*W, az=(pPos.z/200+.5)*H;
  mmCtx.save();mmCtx.translate(ax,az);mmCtx.rotate(pAngle);
  mmCtx.fillStyle='#ff3333';
  mmCtx.beginPath();mmCtx.moveTo(0,-5);mmCtx.lineTo(3,4);mmCtx.lineTo(0,2);mmCtx.lineTo(-3,4);mmCtx.closePath();mmCtx.fill();
  mmCtx.restore();mmCtx.restore();
}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='show';
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.className='';},3000);
}
