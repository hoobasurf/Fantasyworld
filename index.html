<!DOCTYPE html><html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Lilo & Stitch Island</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#001020}
#cv{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
#loading{position:fixed;inset:0;background:linear-gradient(180deg,#001830,#003060);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#loading h1{font-family:Georgia,serif;font-size:22px;color:#7de8ff;letter-spacing:5px;text-shadow:0 0 30px rgba(125,232,255,.6)}
#loading p{font-size:10px;color:rgba(125,232,255,.45);letter-spacing:3px}
.bw{width:220px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.bf{height:100%;background:linear-gradient(90deg,#7de8ff,#6affb0);border-radius:2px;transition:width .25s}
#stepTxt{font-size:9px;color:rgba(255,255,255,.28);letter-spacing:2px}
#hud{position:fixed;top:12px;left:0;right:0;display:none;justify-content:space-between;align-items:flex-start;padding:0 14px;pointer-events:none;z-index:20}
.pill{background:rgba(0,8,20,.82);border-radius:20px;padding:5px 13px;font-family:Georgia,serif;font-size:10px;backdrop-filter:blur(8px);color:#7de8ff;border:1px solid rgba(125,232,255,.2)}
#zone{position:fixed;bottom:80px;left:130px;pointer-events:none;z-index:20;display:none}
#joy{position:fixed;left:16px;bottom:80px;z-index:30;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.04);border:2px solid rgba(125,232,255,.2);touch-action:none}
#jnub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 38% 32%,rgba(125,232,255,.6),rgba(0,50,90,.95));border:2px solid rgba(125,232,255,.5)}
#btns{position:fixed;right:14px;bottom:80px;z-index:30;display:flex;flex-direction:column;gap:8px}
.btn{width:54px;height:54px;border-radius:50%;background:rgba(0,8,22,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-family:Georgia,serif;font-size:8px;cursor:pointer;touch-action:manipulation;backdrop-filter:blur(6px);border:2px solid rgba(255,255,255,.1)}
#toast{position:fixed;top:54px;left:50%;transform:translateX(-50%) scale(.9);opacity:0;z-index:80;background:rgba(0,8,22,.95);border:1.5px solid #7de8ff;border-radius:20px;padding:7px 18px;color:#7de8ff;font-size:11px;font-family:Georgia,serif;white-space:nowrap;pointer-events:none;transition:all .2s;backdrop-filter:blur(10px)}
#toast.show{transform:translateX(-50%) scale(1);opacity:1}
</style>
</head>
<body>
<div id="loading">
  <h1>LILO &amp; STITCH ISLAND</h1>
  <p>HAWAII — PARADISE</p>
  <div class="bw"><div class="bf" id="bf" style="width:2%"></div></div>
  <div id="stepTxt">CHARGEMENT...</div>
</div>
<canvas id="cv"></canvas>
<div id="hud">
  <div class="pill">&#127796; HAWAII</div>
  <div class="pill">&#128100; STITCH</div>
  <div class="pill" id="dnBtn" onclick="toggleDN()" style="pointer-events:all;cursor:pointer">&#9790; NUIT</div>
</div>
<div id="zone"><div class="pill" id="zoneTxt">&#127944; PLAGE</div></div>
<div id="joy"><div id="jnub"></div></div>
<div id="btns">
  <div class="btn" style="border-color:#7de8ff;color:#7de8ff" ontouchstart="doJump(event)" onclick="doJump()">&#8679;<br>JUMP</div>
  <div class="btn" style="border-color:#ffd700;color:#ffd700" ontouchstart="setSprint(1,event)" ontouchend="setSprint(0)" onmousedown="setSprint(1)" onmouseup="setSprint(0)">&#9889;<br>RUN</div>
</div>
<div id="toast"></div>

<script>
(function(){
  var stEl=document.getElementById('stepTxt');
  var cdns=[
    {b:'https://cdn.babylonjs.com/babylon.js',l:'https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js'},
    {b:'https://unpkg.com/babylonjs@6.26.0/babylon.js',l:'https://unpkg.com/babylonjs-loaders@6.26.0/babylonjs.loaders.min.js'},
    {b:'https://cdnjs.cloudflare.com/ajax/libs/babylonjs/6.26.0/babylon.js',l:'https://cdnjs.cloudflare.com/ajax/libs/babylonjs-loaders/6.26.0/babylonjs.loaders.min.js'}
  ];
  var idx=0;
  function tryNext(){
    if(idx>=cdns.length){stEl.textContent='ERREUR CDN';return;}
    var p=cdns[idx++];stEl.textContent='CDN '+idx+'/'+cdns.length+'...';
    load(p.b,function(){load(p.l,function(){if(window.startGame)window.startGame();},tryNext);},tryNext);
  }
  function load(url,ok,fail){
    var s=document.createElement('script');s.src=url;s.onload=ok;
    s.onerror=function(){document.head.removeChild(s);fail();};
    document.head.appendChild(s);
  }
  tryNext();
})();
</script>

<script>
window.startGame=function(){
'use strict';
var B=BABYLON;
var BASE='https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/';

var bfEl=document.getElementById('bf');
var stEl=document.getElementById('stepTxt');
function step(p,t){bfEl.style.width=p+'%';if(t)stEl.textContent=t;}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.className='show';clearTimeout(toast._t);toast._t=setTimeout(function(){t.className='';},3000);}
function showGame(){document.getElementById('loading').style.display='none';document.getElementById('hud').style.display='flex';document.getElementById('zone').style.display='block';}

var P={x:2,y:0,z:2,vx:0,vy:0,vz:0,yaw:0,onGround:true};
var pRoot=null,pYOff=0,pAnims={},curAnim=null;
var jLX=0,jLY=0,KY={};
var CAM={yaw:Math.PI,pitch:.28,dist:12};
var night=false,sprint=false;
var waveT=0,lastT=performance.now();
var waveRings=[],colCircles=[];
var ISLAND_R=60;

var cv=document.getElementById('cv');
var eng=new B.Engine(cv,true,{antialias:true,stencil:true,adaptToDeviceRatio:true},true);
var sc=new B.Scene(eng);
sc.clearColor=new B.Color4(.38,.68,.90,1);
sc.fogMode=B.Scene.FOGMODE_EXP2;
// Brouillard jungle dense — on voit pas loin
sc.fogDensity=.018;
sc.fogColor=new B.Color3(.22,.42,.18);

var cam=new B.FreeCamera('cam',new B.Vector3(2,8,14),sc);
cam.minZ=.1;cam.maxZ=400;cam.fov=1.05;
cam.inputs.clear();

step(6,'LUMIERES...');

var sun=new B.DirectionalLight('sun',new B.Vector3(-.4,-1,-.3),sc);
sun.position=new B.Vector3(80,160,60);
sun.intensity=2.6;
sun.diffuse=new B.Color3(1.0,.93,.75);
sun.specular=new B.Color3(.15,.12,.06);

var shadows=null;
try{
  shadows=new B.ShadowGenerator(2048,sun);
  shadows.useBlurExponentialShadowMap=true;
  shadows.blurKernel=28;shadows.darkness=.45;
  shadows.transparencyShadow=true;
}catch(e){}

// Lumiere jungle verte filtree
var sky=new B.HemisphericLight('sky',new B.Vector3(0,1,0),sc);
sky.intensity=.55;
sky.diffuse=new B.Color3(.62,.82,.52);
sky.groundColor=new B.Color3(.28,.45,.18);
sky.specular=new B.Color3(0,0,0);

var fill=new B.PointLight('fill',new B.Vector3(0,4,0),sc);
fill.intensity=.22;fill.range=8;
fill.diffuse=new B.Color3(.9,.8,.5);

var cascLight=new B.PointLight('casc',new B.Vector3(-20,6,-22),sc);
cascLight.intensity=1.4;cascLight.range=20;
cascLight.diffuse=new B.Color3(.4,.8,1.0);

step(14,'TEXTURES REELLES...');

// Charge texture depuis GitHub
function loadTex(name,uS,vS){
  var t=new B.Texture(BASE+name,sc);
  t.uScale=uS||8;t.vScale=vS||8;
  t.wrapU=1;t.wrapV=1;
  return t;
}

var grassTex=loadTex('grass.jpg',12,12);
var dirtTex =loadTex('dirt.jpg',8,8);
var barkTex =loadTex('bark.jpg',2,4);
var leafTex =loadTex('leaf.jpg',1,1);
var rockTex =loadTex('rock.jpg',3,3);
var sandTex =loadTex('sand.jpg',10,10);

step(24,'TERRAIN...');

// Terrain heightmap
var TSIZE=130,TSUB=70;
var terrain=B.MeshBuilder.CreateGround('terrain',{width:TSIZE,height:TSIZE,subdivisions:TSUB,updatable:true},sc);

function noise2(x,z,freq){
  var xi=Math.floor(x*freq),zi=Math.floor(z*freq);
  var xf=x*freq-xi,zf=z*freq-zi;
  function h(a,b){var n=Math.sin(a*127.1+b*311.7+a*b*.05);return n*.5+.5;}
  var a=h(xi,zi),b=h(xi+1,zi),c=h(xi,zi+1),d=h(xi+1,zi+1);
  var ux=xf*xf*(3-2*xf),uz=zf*zf*(3-2*zf);
  return (a*(1-ux)+b*ux)*(1-uz)+(c*(1-ux)+d*ux)*uz;
}
function getH(wx,wz){
  var dx=wx/TSIZE,dz=wz/TSIZE;
  var dist=Math.sqrt(dx*dx+dz*dz)*2.1;
  var island=Math.max(0,1-dist);
  island=Math.pow(island,1.2);
  var h=island*(
    noise2(wx,wz,.025)*6+
    noise2(wx,wz,.06)*3+
    noise2(wx,wz,.14)*1.5+
    noise2(wx,wz,.32)*.6
  );
  // Montagne cascade nord-ouest
  var mx=wx+20,mz=wz+22;
  h+=Math.max(0,(1-Math.sqrt(mx*mx+mz*mz)/24))*18;
  // Vallee riviere vers cascade
  var rx=wx+12,rz=wz+10;
  var rv=Math.max(0,(1-Math.sqrt(rx*rx+rz*rz)/10));
  h-=rv*2;
  h=Math.max(0,h);
  if(dist>0.82)h=Math.min(h,.25);
  return h;
}

// Build heightmap cache
var hCache={};
var pos=terrain.getVerticesData(B.VertexBuffer.PositionKind);
for(var i=0;i<pos.length;i+=3){
  var wx=pos[i],wz=pos[i+2];
  var hv=getH(wx,wz);
  pos[i+1]=hv;
  var key=Math.round(wx*4)+'_'+Math.round(wz*4);
  hCache[key]=hv;
}
terrain.updateVerticesData(B.VertexBuffer.PositionKind,pos);
terrain.bakeCurrentTransformIntoVertices();

function terrH(wx,wz){
  var key=Math.round(wx*4)+'_'+Math.round(wz*4);
  if(hCache[key]!==undefined)return hCache[key];
  return getH(wx,wz);
}

// Mat terrain herbe reelle
var terrMat=new B.StandardMaterial('terrMat',sc);
terrMat.diffuseTexture=grassTex;
terrMat.specularColor=new B.Color3(.02,.04,.01);
terrain.material=terrMat;terrain.receiveShadows=true;

// Sable plage
var beach=B.MeshBuilder.CreateGround('beach',{width:250,height:250,subdivisions:2},sc);
var beachMat=new B.StandardMaterial('beachMat',sc);
beachMat.diffuseTexture=sandTex;
beachMat.specularColor=new B.Color3(.04,.03,.02);
beach.material=beachMat;beach.position.y=-.04;beach.receiveShadows=true;

step(34,'OCEAN...');

var ocean=B.MeshBuilder.CreateGround('ocean',{width:1400,height:1400,subdivisions:3},sc);
var oceanMat=new B.StandardMaterial('oceanMat',sc);
// Eau procédurale simple mais belle
var waterDynTex=new B.DynamicTexture('wdt',{width:512,height:512},sc,true);
(function(){
  var ctx=waterDynTex.getContext();
  var c=document.createElement('canvas');c.width=512;c.height=512;
  var cx=c.getContext('2d');
  var g=cx.createLinearGradient(0,0,512,512);
  g.addColorStop(0,'#08c8e0');g.addColorStop(.3,'#059ab8');g.addColorStop(.7,'#047090');g.addColorStop(1,'#034e6a');
  cx.fillStyle=g;cx.fillRect(0,0,512,512);
  for(var i=0;i<220;i++){
    var x=Math.random()*512,y=Math.random()*512;
    cx.globalAlpha=Math.random()*.22+.04;
    cx.strokeStyle='rgba(255,255,255,1)';cx.lineWidth=.5+Math.random()*2;
    cx.beginPath();cx.moveTo(x,y);cx.lineTo(x+12+Math.random()*32,y+Math.random()*4-2);cx.stroke();
  }
  ctx.drawImage(c,0,0);waterDynTex.update(false);
})();
oceanMat.diffuseTexture=waterDynTex;
oceanMat.diffuseTexture.uScale=55;oceanMat.diffuseTexture.vScale=55;
oceanMat.diffuseColor=new B.Color3(.88,.97,1.0);
oceanMat.specularColor=new B.Color3(1,1,1);oceanMat.specularPower=110;
oceanMat.emissiveColor=new B.Color3(.01,.08,.18);
ocean.material=oceanMat;ocean.position.y=-.52;

// Lagon
var lagon=B.MeshBuilder.CreateCylinder('lagon',{height:.2,diameter:155,tessellation:64},sc);
var lagonMat=new B.StandardMaterial('lagonMat',sc);
lagonMat.diffuseColor=new B.Color3(.18,.75,.88);lagonMat.alpha=.44;
lagonMat.specularColor=new B.Color3(.9,1,1);lagonMat.specularPower=45;
lagon.material=lagonMat;lagon.position.y=-.3;

// Dome ciel gradient
var skyDome=B.MeshBuilder.CreateSphere('skyD',{diameter:1000,segments:8},sc);
skyDome.flipFaces(true);
var skyMat=new B.StandardMaterial('skyMat',sc);
skyMat.backFaceCulling=false;skyMat.disableLighting=true;
var skyDynTex=new B.DynamicTexture('sdt',{width:2,height:256},sc,false);
(function(){
  var ctx=skyDynTex.getContext();
  var c=document.createElement('canvas');c.width=2;c.height=256;
  var cx=c.getContext('2d');
  var g=cx.createLinearGradient(0,0,0,256);
  g.addColorStop(0,'#1455aa');g.addColorStop(.35,'#2878cc');g.addColorStop(.75,'#5aaae0');g.addColorStop(1,'#90cce8');
  cx.fillStyle=g;cx.fillRect(0,0,2,256);
  ctx.drawImage(c,0,0);skyDynTex.update(false);
})();
skyMat.emissiveTexture=skyDynTex;skyMat.emissiveTexture.uScale=1;skyMat.emissiveTexture.vScale=1;
skyDome.material=skyMat;

step(42,'VAGUES...');

for(var wi=0;wi<9;wi++){
  var wr=B.MeshBuilder.CreateTorus('wv'+wi,{diameter:(65+wi*9)*2,thickness:.3,tessellation:80},sc);
  var wm=new B.StandardMaterial('wm'+wi,sc);
  wm.diffuseColor=new B.Color3(.92,.98,1.0);wm.emissiveColor=new B.Color3(.05,.22,.35);
  wm.alpha=.55-wi*.05;wm.backFaceCulling=false;
  wr.material=wm;wr.position.y=-.22;wr.rotation.x=Math.PI/2;
  waveRings.push({m:wr,ph:wi/9*Math.PI*2,spd:.7+Math.random()*.5});
}

step(50,'PALMIERS REALISTES...');

// Palmier avec vraies textures
function makePalm(x,z,h,leanX,leanZ,thick){
  thick=thick||1;
  var segs=10;
  var pts=[new B.Vector3(x,terrH(x,z),z)];
  var cx=x,cy=terrH(x,z),cz=z;
  for(var i=1;i<=segs;i++){
    var t=i/segs;
    var bend=Math.sin(t*Math.PI*.55)*1.4;
    cx+=leanX/segs*bend+(Math.random()-.5)*.04;
    cy+=(h/segs)*(1-.08*t);
    cz+=leanZ/segs*bend+(Math.random()-.5)*.04;
    pts.push(new B.Vector3(cx,cy,cz));
  }
  for(var i=0;i<segs;i++){
    var p0=pts[i],p1=pts[i+1];
    var mid=B.Vector3.Lerp(p0,p1,.5);
    var seg=B.MeshBuilder.CreateCylinder('ts',{
      height:p0.subtract(p1).length()*1.02,
      diameterTop:(.14-.009*i)*thick,
      diameterBottom:(.22-.007*i)*thick,
      tessellation:8
    },sc);
    var trMat=new B.StandardMaterial('trM',sc);
    trMat.diffuseTexture=barkTex;
    trMat.diffuseTexture=new B.Texture(BASE+'bark.jpg',sc);
    trMat.diffuseTexture.uScale=1;trMat.diffuseTexture.vScale=2;
    trMat.specularColor=new B.Color3(.04,.03,.02);
    seg.material=trMat;seg.position=mid.clone();
    var dir=p1.subtract(p0).normalize();
    var up=new B.Vector3(0,1,0);
    var axis=B.Vector3.Cross(up,dir).normalize();
    var angle=Math.acos(Math.min(1,B.Vector3.Dot(up,dir)));
    if(axis.length()>.001)seg.rotate(axis,angle,B.Space.WORLD);
    seg.receiveShadows=true;if(shadows)shadows.addShadowCaster(seg);
  }
  // Feuilles avec vraie texture
  var top=pts[segs];
  var numLeaves=8+Math.floor(Math.random()*5);
  for(var i=0;i<numLeaves;i++){
    var angle=i/numLeaves*Math.PI*2+(Math.random()-.5)*.4;
    var ll=2.8+Math.random()*2.5;
    var lf=B.MeshBuilder.CreatePlane('lf',{width:ll,height:.65+Math.random()*.45},sc);
    var lfMat=new B.StandardMaterial('lfM',sc);
    lfMat.diffuseTexture=new B.Texture(BASE+'leaf.jpg',sc);
    lfMat.diffuseTexture.uScale=1;lfMat.diffuseTexture.vScale=1;
    lfMat.backFaceCulling=false;
    lfMat.specularColor=new B.Color3(.03,.06,.01);
    lf.material=lfMat;
    var droop=.6+Math.random()*.4;
    lf.position.set(
      top.x+Math.sin(angle)*ll*.48,
      top.y-droop-.1,
      top.z+Math.cos(angle)*ll*.48
    );
    lf.rotation.set(-droop*.75+(Math.random()-.5)*.15,angle+Math.PI/2,(Math.random()-.5)*.1);
    if(shadows)shadows.addShadowCaster(lf);
  }
  // Noix coco
  if(Math.random()>.4){
    for(var c=0;c<1+Math.floor(Math.random()*3);c++){
      var co=B.MeshBuilder.CreateSphere('co',{diameter:.25+Math.random()*.12,segments:7},sc);
      var coMat=new B.StandardMaterial('coM',sc);
      coMat.diffuseColor=new B.Color3(.3+Math.random()*.1,.18+Math.random()*.08,.05);
      coMat.specularColor=new B.Color3(.05,.04,.02);
      co.material=coMat;
      co.position.set(top.x+(Math.random()-.5)*.5,top.y-.35+Math.random()*.25,top.z+(Math.random()-.5)*.5);
    }
  }
  colCircles.push({x:x,z:z,r:.4*thick});
}

// Palmiers répartis — très denses en jungle, plage autour
var palms=[
  // Plage
  [14,12,5.5,.5,.3,1],[16,-7,5,.55,-.4,1],[12,18,5.5,-.3,.5,1],[-13,15,5,-.5,.4,1],
  [-15,9,5.5,.4,-.5,1],[-14,-10,5,-.4,-.3,1],[12,-15,5.5,.3,.6,1],[18,3,5,.5,.2,1],
  [20,-11,5.5,.6,-.2,1],[-17,-15,5,.4,.4,1],[10,22,5,-.2,.5,1],[-11,24,5.5,-.4,.3,1],
  [22,9,5,.5,.3,1],[-21,7,5.5,-.5,.2,1],[16,-20,5,.4,-.5,1],[-17,18,5,-.4,.4,1],
  [24,-5,5,.5,.1,1],[-24,-2,5.5,-.5,.1,1],[8,28,4.5,-.1,.5,.9],[28,2,5,.6,.1,1],
  // Jungle intérieure dense
  [5,9,9,.3,.15,1.2],[6,-8,8.5,.25,-.3,1.1],[-6,10,9,-.3,.2,1.2],[-5,-9,8.5,-.25,-.2,1.1],
  [9,6,8.5,.35,.2,1],[10,-4,9,.3,-.25,1.1],[-9,5,8.5,-.35,.15,1],[-10,-5,9,-.3,-.2,1.1],
  [3,6,10,.15,.1,1.3],[4,-5,9.5,.15,-.15,1.2],[-4,7,10,-.15,.1,1.3],[-3,-6,9.5,-.15,-.1,1.2],
  [7,2,9,.25,.05,1.1],[-7,3,9.5,-.25,.05,1.2],[2,12,9.5,.1,.3,1.1],[-3,14,9,-.15,.25,1],
  [8,14,9,.3,.3,1.1],[-8,15,9.5,-.35,.2,1],[4,20,8.5,.15,.4,1.1],[-5,21,8,-.2,.4,1],
  [0,8,10.5,.05,.1,1.4],[1,-7,10,.05,-.1,1.3],[0,4,11,.02,.05,1.5],
  // Zone cascade + forêt nord-ouest dense
  [-12,-17,10,-.4,-.35,1.3],[-15,-13,10.5,-.45,-.3,1.4],[-18,-9,10,-.5,-.2,1.3],
  [-13,-22,9.5,-.35,-.45,1.2],[-20,-17,10.5,-.55,-.3,1.4],[-10,-20,9,-.3,-.45,1.1],
  [-22,-7,9.5,-.5,-.1,1.3],[-9,-25,9,-.25,-.5,1.1],[-24,-12,10,-.55,-.2,1.3],
  [-16,-26,9,-.4,-.5,1.2],[-6,-15,9.5,-.2,-.4,1.1],[-4,-18,9,-.15,-.4,1],
  // Extra partout
  [11,-9,8,.4,-.35,.9],[13,5,7.5,.45,.2,.9],[-11,-3,8,-.4,-.1,.9],[-13,3,7.5,-.4,.1,.9],
  [6,25,7,.2,.45,.9],[-7,26,7.5,-.25,.45,.9],[18,15,6.5,.5,.4,.9],[-19,14,6.5,-.5,.35,.9],
];
palms.forEach(function(d){
  makePalm(d[0],d[1],d[2]*((.7+Math.random()*.6)),d[3],d[4],d[5]||1);
});

step(60,'VEGETATION JUNGLE...');

// Arbres feuillus tropicaux — masse de feuillage sphérique dense
function makeTree(x,z,h,radius){
  var gh=terrH(x,z);
  // Tronc
  var trunk=B.MeshBuilder.CreateCylinder('tt',{height:h,diameterTop:radius*.15,diameterBottom:radius*.25,tessellation:7},sc);
  var trMat=new B.StandardMaterial('ttM',sc);
  trMat.diffuseTexture=new B.Texture(BASE+'bark.jpg',sc);
  trMat.diffuseTexture.uScale=1;trMat.diffuseTexture.vScale=3;

eng.runRenderLoop(function(){
  var now=performance.now(),dt=Math.min((now-lastT)/1000,.05);lastT=now;

  var fwd=0,lat=0;
  if(KY['KeyW']||KY['KeyZ']||KY['ArrowUp'])fwd=1;
  if(KY['KeyS']||KY['ArrowDown'])fwd=-1;
  if(KY['KeyD']||KY['ArrowRight'])lat=1;
  if(KY['KeyA']||KY['KeyQ']||KY['ArrowLeft'])lat=-1;
  fwd+=jLY;lat+=jLX;
  var il=Math.sqrt(fwd*fwd+lat*lat);
  if(il>1){fwd/=il;lat/=il;}

  // Direction relative à la caméra
  var moveX=fwd*(-Math.sin(CAM.yaw))+lat*Math.cos(CAM.yaw);
  var moveZ=fwd*(-Math.cos(CAM.yaw))+lat*(-Math.sin(CAM.yaw));
  var moveMag=Math.sqrt(moveX*moveX+moveZ*moveZ);
  var spd=sprint?9:5.5;

  if(moveMag>.05){
    var nx=moveX/moveMag,nz=moveZ/moveMag;
    P.vx+=(nx*spd-P.vx)*Math.min(1,dt*12);
    P.vz+=(nz*spd-P.vz)*Math.min(1,dt*12);
    // Stitch regarde vers où il va
    var tYaw=Math.atan2(nx,nz);
    var dy=tYaw-P.yaw;
    while(dy>Math.PI)dy-=Math.PI*2;while(dy<-Math.PI)dy+=Math.PI*2;
    P.yaw+=dy*Math.min(1,dt*16);
    playAnim(sprint&&pAnims.run?pAnims.run:(pAnims.walk||pAnims.idle));
  } else {
    P.vx*=Math.pow(.01,dt);P.vz*=Math.pow(.01,dt);
    if(Math.abs(P.vx)<.02)P.vx=0;if(Math.abs(P.vz)<.02)P.vz=0;
    if(pAnims.idle)playAnim(pAnims.idle);
  }

  if(!P.onGround){P.vy-=28*dt;if(P.vy<-26)P.vy=-26;}
  P.x+=P.vx*dt;P.z+=P.vz*dt;
  var gh=terrH(P.x,P.z);
  P.y+=P.vy*dt;
  if(P.y<=gh&&P.vy<=0){P.y=gh;P.vy=0;P.onGround=true;}else P.onGround=false;

  // Collisions
  for(var ci=0;ci<colCircles.length;ci++){
    var ob=colCircles[ci],ddx=P.x-ob.x,ddz=P.z-ob.z;
    var d2=ddx*ddx+ddz*ddz,mn=.55+ob.r;
    if(d2<mn*mn&&d2>.001){
      var dd=Math.sqrt(d2),nnx=ddx/dd,nnz=ddz/dd;
      P.x=ob.x+nnx*mn;P.z=ob.z+nnz*mn;
      var dot=P.vx*nnx+P.vz*nnz;if(dot<0){P.vx-=dot*nnx;P.vz-=dot*nnz;}
    }
  }
  var pd=Math.sqrt(P.x*P.x+P.z*P.z);
  if(pd>ISLAND_R-3){var pa=Math.atan2(P.x,P.z);P.x=Math.sin(pa)*(ISLAND_R-3);P.z=Math.cos(pa)*(ISLAND_R-3);P.vx*=.04;P.vz*=.04;}
  if(P.y<-20){P.x=2;P.y=terrH(2,2);P.z=2;P.vx=0;P.vy=0;P.vz=0;P.onGround=true;}

  if(pRoot){
    pRoot.position.x=P.x;pRoot.position.y=P.y+pYOff;pRoot.position.z=P.z;
    var rd=P.yaw-pRoot.rotation.y;
    while(rd>Math.PI)rd-=Math.PI*2;while(rd<-Math.PI)rd+=Math.PI*2;
    pRoot.rotation.y+=rd*Math.min(1,dt*18);
  }
  if(fill)fill.position.set(P.x,P.y+4,P.z);

  // ── CAMERA TPS strictement derrière Stitch ──
  var tCamYaw=P.yaw+Math.PI;
  var cyDiff=tCamYaw-CAM.yaw;
  while(cyDiff>Math.PI)cyDiff-=Math.PI*2;while(cyDiff<-Math.PI)cyDiff+=Math.PI*2;
  var followSpd=moveMag>.08?6:1.5;
  CAM.yaw+=cyDiff*Math.min(1,dt*followSpd);

  var cr=CAM.dist*Math.cos(CAM.pitch);
  var tX=P.x,tY=P.y+pYOff+1.5,tZ=P.z;
  var dX=tX+Math.sin(CAM.yaw)*cr;
  var dY=tY+CAM.dist*Math.sin(CAM.pitch);
  var dZ=tZ+Math.cos(CAM.yaw)*cr;
  var cGH=terrH(dX,dZ);
  if(dY<cGH+1.8)dY=cGH+1.8;
  cam.position.x+=(dX-cam.position.x)*Math.min(1,dt*14);
  cam.position.y+=(dY-cam.position.y)*Math.min(1,dt*10);
  cam.position.z+=(dZ-cam.position.z)*Math.min(1,dt*14);
  cam.setTarget(new B.Vector3(tX,tY,tZ));

  // Brouillard adaptatif — jungle plus dense
  var inJungle=Math.sqrt(P.x*P.x+P.z*P.z)<22;
  sc.fogDensity+=(( inJungle?.022:.008)-sc.fogDensity)*dt*2;
  sc.fogColor.r+=((inJungle?.18:.45)-sc.fogColor.r)*dt*2;
  sc.fogColor.g+=((inJungle?.38:.72)-sc.fogColor.g)*dt*2;
  sc.fogColor.b+=((inJungle?.15:.88)-sc.fogColor.b)*dt*2;

    w.m.scaling.x=1+Math.sin(waveT*w.spd+w.ph)*.05;
    w.m.scaling.z=1+Math.sin(waveT*w.spd+w.ph)*.05;
    w.m.position.y=-.22+Math.sin(waveT*1.9+w.ph)*.04;
    w.m.material.alpha=.44+Math.sin(waveT*2.3+w.ph)*.12;
  });
  ocean.material.diffuseTexture.uOffset+=.00012;
  ocean.material.diffuseTexture.vOffset+=.00005;
  lagon.position.y=-.3+Math.sin(waveT*.7)*.012;
  cascWater.material.diffuseTexture.vOffset+=.025;
  mistMeshes.forEach(function(mi){
    mi.m.position.x=mi.ox+Math.sin(waveT*mi.sp+mi.ph)*.5;
    mi.m.position.y=mi.oy+Math.sin(waveT*mi.sp*.6+mi.ph)*.35;
    mi.m.material.alpha=.05+Math.sin(waveT*.4+mi.ph)*.04;
  });
  cascParts.forEach(function(d){
    d.lf+=dt*(.7+Math.random()*.5);if(d.lf>1)d.lf=0;
    d.m.position.set(-20+(Math.random()-.5)*6,1+(1-d.lf)*14,-21.5+(Math.random()-.5)*2);
    d.m.material.alpha=.45*(1-d.lf);

  var nearC=Math.sqrt((P.x+20)*(P.x+20)+(P.z+22)*(P.z+22))<10;
  document.getElementById('zoneTxt').innerHTML=nearC?'&#128166; CASCADE':dz2<10?'&#127807; JUNGLE PROFONDE':dz2<25?'&#127807; JUNGLE':dz2<42?'&#127944; PLAGE':'&#127754; OCEAN';

  sc.render();
});

window.addEventListener('resize',function(){if(eng)eng.resize();});

function playAnim(a){if(!a||a===curAnim)return;if(curAnim)curAnim.stop();a.start(true);curAnim=a;}
function doJump(e){if(e&&e.preventDefault)e.preventDefault();if(P.onGround){P.vy=9.5;P.onGround=false;if(pAnims.jump)playAnim(pAnims.jump);}}
function setSprint(v,e){if(e&&e.preventDefault)e.preventDefault();sprint=!!v;}

window.toggleDN=function(){
  night=!night;
  if(night){
    sc.clearColor=new B.Color4(.01,.02,.06,1);
    sky.intensity=.07;sky.diffuse=new B.Color3(.05,.08,.28);
    sun.intensity=.1;sun.diffuse=new B.Color3(.2,.25,.6);
    skyMat.emissiveColor=new B.Color3(.01,.02,.08);
    cascLight.intensity=2.5;
    document.getElementById('dnBtn').innerHTML='&#9728; JOUR';toast('Nuit hawaiienne...');
  }else{
    sc.clearColor=new B.Color4(.38,.68,.90,1);
    sky.intensity=.55;sky.diffuse=new B.Color3(.62,.82,.52);
    sun.intensity=2.6;sun.diffuse=new B.Color3(1.0,.93,.75);
    skyMat.emissiveTexture=skyDynTex;skyMat.emissiveColor=new B.Color3(1,1,1);
    cascLight.intensity=1.4;
    document.getElementById('dnBtn').innerHTML='&#9790; NUIT';toast('Belle journee !');
  }
};

var jBase=document.getElementById('joy'),jNub=document.getElementById('jnub'),jid=-1,JMAX=38;
function jUp(cx,cy){
  var r=jBase.getBoundingClientRect(),dx=cx-(r.left+r.width/2),dy=cy-(r.top+r.height/2),d=Math.sqrt(dx*dx+dy*dy);
  if(d>JMAX){dx=dx/d*JMAX;dy=dy/d*JMAX;}
  jNub.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';
  jLX=d>5?dx/JMAX:0;jLY=d>5?-dy/JMAX:0;
}
function jRst(){jNub.style.transform='translate(-50%,-50%)';jLX=0;jLY=0;jid=-1;}
jBase.addEventListener('touchstart',function(e){e.preventDefault();jid=e.touches[0].identifier;jUp(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
jBase.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===jid)jUp(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false});
jBase.addEventListener('touchend',jRst,{passive:true});
jBase.addEventListener('mousedown',function(e){if(e.button!==2)jUp(e.clientX,e.clientY);});
window.addEventListener('mouseup',jRst);
window.addEventListener('keydown',function(e){KY[e.code]=1;if(e.code==='Space'){e.preventDefault();doJump();}if(e.code==='ShiftLeft'||e.code==='ShiftRight')sprint=true;});
window.addEventListener('keyup',function(e){KY[e.code]=0;if(e.code==='ShiftLeft'||e.code==='ShiftRight')sprint=false;});
window.addEventListener('wheel',function(e){CAM.dist=Math.max(5,Math.min(20,CAM.dist+e.deltaY*.01));},{passive:true});
var mDn=false,mLx=0,mLy=0;
cv.addEventListener('mousedown',function(e){if(e.button===2){mDn=true;mLx=e.clientX;mLy=e.clientY;}});
window.addEventListener('mousemove',function(e){if(!mDn)return;CAM.yaw-=(e.clientX-mLx)*.004;CAM.pitch=Math.max(.08,Math.min(.72,CAM.pitch+(e.clientY-mLy)*.003));mLx=e.clientX;mLy=e.clientY;});
window.addEventListener('mouseup',function(e){if(e.button===2)mDn=false;});
cv.addEventListener('contextmenu',function(e){e.preventDefault();});
var p0t=null,iDt=0,iCDt=0;
cv.addEventListener('touchstart',function(e){if(e.touches.length===2){p0t=e.touches[0];var p1=e.touches[1];iDt=Math.hypot(p1.clientX-p0t.clientX,p1.clientY-p0t.clientY);iCDt=CAM.dist;}},{passive:true});
cv.addEventListener('touchmove',function(e){if(e.touches.length===2&&iDt>0){var d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);CAM.dist=Math.max(5,Math.min(20,iCDt*(iDt/d)));}},{passive:true});
};
if(window.BABYLON&&window.startGame)window.startGame();
</script>
