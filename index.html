<!DOCTYPE html><html lang="fr"><head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Stitch Island</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
#joy{position:fixed;left:14px;bottom:14px;z-index:30;width:110px;height:110px;border-radius:50%;background:rgba(0,0,0,.22);border:2.5px solid rgba(255,220,80,.4);touch-action:none;pointer-events:all}
#jnub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:50%;background:radial-gradient(circle,rgba(255,220,80,.8),rgba(160,70,0,.9));border:2.5px solid rgba(255,220,80,.7)}
#rjoy{position:fixed;right:14px;bottom:14px;z-index:30;width:90px;height:90px;border-radius:50%;background:rgba(0,10,30,.22);border:2px solid rgba(100,200,255,.35);touch-action:none;pointer-events:all}
#rjnub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;background:radial-gradient(circle,rgba(100,200,255,.7),rgba(0,40,90,.9));border:2px solid rgba(100,200,255,.55)}
#btns{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:30;display:flex;gap:12px;pointer-events:none}
.btn{width:54px;height:54px;border-radius:50%;background:rgba(0,8,22,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:8px;font-family:Georgia,serif;cursor:pointer;touch-action:manipulation;border:2px solid rgba(255,255,255,.18);color:#fff;pointer-events:all}
#hud{position:fixed;top:10px;left:0;right:0;display:flex;justify-content:space-between;padding:0 12px;pointer-events:none;z-index:30}
.pill{background:rgba(0,10,25,.78);border-radius:18px;padding:5px 12px;font-family:Georgia,serif;font-size:9px;color:#7de8ff;border:1px solid rgba(125,232,255,.25)}
#toast{position:fixed;top:52px;left:50%;transform:translateX(-50%) scale(.9);opacity:0;z-index:80;background:rgba(0,8,22,.94);border:1.5px solid #7de8ff;border-radius:18px;padding:7px 16px;color:#7de8ff;font-size:10px;font-family:Georgia,serif;white-space:nowrap;pointer-events:none;transition:all .18s}
#toast.show{transform:translateX(-50%) scale(1);opacity:1}
#breath-bar{position:fixed;top:48px;left:50%;transform:translateX(-50%);z-index:40;display:none;flex-direction:column;align-items:center;gap:3px;pointer-events:none}
#breath-label{font-family:Georgia,serif;font-size:9px;color:#88ffee;text-shadow:0 0 6px #00ffcc}
#breath-bg{width:140px;height:12px;border-radius:6px;background:rgba(0,20,40,.7);border:1.5px solid rgba(0,255,200,.4);overflow:hidden}
#breath-fill{height:100%;width:100%;border-radius:6px;background:linear-gradient(90deg,#00ffcc,#0088ff);transition:background .3s}
#water-overlay{position:fixed;inset:0;pointer-events:none;z-index:20;background:rgba(0,60,160,0);transition:background .8s ease}
#water-overlay.underwater{background:rgba(0,40,120,.35)}
#caustic-overlay{position:fixed;inset:0;pointer-events:none;z-index:19;opacity:0;transition:opacity .6s;
background:repeating-linear-gradient(45deg,rgba(0,200,255,0.05) 0px,rgba(0,200,255,0) 8px,rgba(0,150,200,0.04) 12px,rgba(0,200,255,0) 20px),
repeating-linear-gradient(-45deg,rgba(0,255,200,0.04) 0px,rgba(0,255,200,0) 10px,rgba(0,200,255,0.05) 15px,rgba(0,255,200,0) 24px)}
#dive-hint{position:fixed;bottom:148px;left:50%;transform:translateX(-50%);z-index:40;background:rgba(0,10,30,.88);border:1.5px solid rgba(0,220,200,.5);border-radius:12px;padding:5px 14px;color:#88ffee;font-size:10px;font-family:Georgia,serif;display:none;white-space:nowrap;pointer-events:none}
</style>

</head>
<body>

<a-scene renderer="antialias:true;colorManagement:true" shadow="type:pcfsoft" fog="type:exponential;color:#5ac8f0;density:0.007" vr-mode-ui="enabled:false" loading-screen="enabled:false">
<a-assets timeout="30000">
  <a-asset-item id="stitchGLB" src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/stitch2.glb"></a-asset-item>
  <img id="tGrass" src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/grass.jpg" crossorigin="anonymous">
  <img id="tSand"  src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/sand.jpg"  crossorigin="anonymous">
  <img id="tBark"  src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/bark.jpg"  crossorigin="anonymous">
  <img id="tLeaf"  src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/leaf.jpg"  crossorigin="anonymous">
  <img id="tRock"  src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/rock.jpg"  crossorigin="anonymous">
</a-assets>

<a-sky id="skyEl" color="#4ab8f0"></a-sky>
<a-light type="directional" id="sunLight" position="-40 80 30" color="#fff4dd" intensity="2.2" cast-shadow="true" shadow-camera-left="-200" shadow-camera-right="200" shadow-camera-top="200" shadow-camera-bottom="-200" shadow-map-width="2048" shadow-map-height="2048"></a-light>
<a-light type="hemisphere" id="hemiLight" color="#88ccff" ground-color="#446622" intensity=".7"></a-light>
<a-light type="ambient" id="ambientLight" color="#ffeedd" intensity=".25"></a-light>

<!-- Lumières sous-marines — désactivées par défaut, activées en JS quand diving -->

<a-light type="point" id="uwLight1" position="0 -2 0"    color="#00eedd" intensity="0" distance="60"></a-light>
<a-light type="point" id="uwLight2" position="15 -3 15"  color="#00ccff" intensity="0" distance="50"></a-light>
<a-light type="point" id="uwLight3" position="-15 -3 -15" color="#22ffdd" intensity="0" distance="50"></a-light>
<a-light type="point" id="uwLight4" position="0 -4 20"   color="#00eeff" intensity="0" distance="55"></a-light>
<a-light type="point" id="uwLight5" position="-20 -3 5"  color="#44ffcc" intensity="0" distance="50"></a-light>

<!-- Nuages -->

<a-sphere position="-60 55 -180" radius="18" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="-45 58 -178" radius="13" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="30 60 -190" radius="20" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="48 57 -188" radius="14" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="120 50 -200" radius="16" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="-120 52 -195" radius="15" color="#fff" material="roughness:0.9"></a-sphere>

<!-- Surface eau -->

<a-plane id="waterSurf" width="3000" height="3000" rotation="-90 0 0" position="0 -0.3 0" color="#00d4e8" material="transparent:true;opacity:0.28;roughness:0.02;metalness:0.15;side:double"></a-plane>
<a-cylinder id="lagon" radius="90" height=".25" position="0 -0.4 0" color="#00f0d0" material="transparent:true;opacity:0.22;roughness:0.02"></a-cylinder>
<a-cylinder radius="200" height=".2" position="0 -1.5 0" color="#00b8e8" material="transparent:true;opacity:0.32;roughness:0.03"></a-cylinder>
<a-cylinder radius="600" height=".2" position="0 -6.0 0" color="#0044aa" material="transparent:true;opacity:0.42;roughness:0.04"></a-cylinder>

<!-- Fond de l'océan — sable visible sous l'eau -->

<a-cylinder id="oceanFloor" radius="3000" height=".4" position="0 -18 0" color="#c8b870" material="roughness:0.95"></a-cylinder>

<!-- Zones sableuses proches de la surface -->

<a-cylinder radius="80" height=".3" position="0 -1.2 0" color="#e8d890" material="roughness:0.92"></a-cylinder>
<a-cylinder radius="55" height=".3" position="0 -0.8 0" color="#f0e098" material="roughness:0.90"></a-cylinder>

<a-torus id="w0" radius="72"  radius-tubular=".2" segments-tubular="64" rotation="90 0 0" position="0 -.42 0" color="#fff" material="transparent:true;opacity:0.5"></a-torus>
<a-torus id="w1" radius="92"  radius-tubular=".2" segments-tubular="64" rotation="90 0 0" position="0 -.42 0" color="#fff" material="transparent:true;opacity:0.42"></a-torus>
<a-torus id="w2" radius="112" radius-tubular=".2" segments-tubular="64" rotation="90 0 0" position="0 -.42 0" color="#fff" material="transparent:true;opacity:0.35"></a-torus>

<a-entity id="world"></a-entity>

<!-- Stitch -->

<a-entity id="stitch-root" position="0 2 3">
  <a-gltf-model id="stitch-model" src="#stitchGLB" shadow="cast:true;receive:false"></a-gltf-model>
</a-entity>

<!-- Caméra -->

<a-entity id="cam-rig" position="0 6 10">
  <a-camera id="mainCam" look-controls="enabled:false" wasd-controls="enabled:false" fov="62" near=".05" far="700"></a-camera>
</a-entity>
</a-scene>

<!-- HUD -->

<div id="hud">
  <div class="pill" id="zL">🏝 ILE PRINCIPALE</div>
  <div class="pill">🏝 STITCH ISLAND</div>
</div>

<div id="breath-bar">
  <div id="breath-label">🤿 RESPIRATION</div>
  <div id="breath-bg"><div id="breath-fill"></div></div>
</div>

<div id="water-overlay"></div>
<div id="caustic-overlay"></div>
<div id="dive-hint"></div>

<div id="joy"><div id="jnub"></div></div>
<div id="rjoy"><div id="rjnub"></div></div>

<div id="btns">
  <div class="btn" style="border-color:#7de8ff;color:#7de8ff" ontouchstart="doJump(event)" onclick="doJump()">⬆<br>JUMP</div>
  <div class="btn" style="border-color:#00ffcc;color:#00ffcc"
    ontouchstart="startDive(event)" ontouchend="stopDive(event)"
    onmousedown="startDive()" onmouseup="stopDive()">⬇<br>PLONGE</div>
  <div class="btn" style="border-color:#ffd700;color:#ffd700"
    ontouchstart="setSprint(1,event)" ontouchend="setSprint(0)"
    onmousedown="setSprint(1)" onmouseup="setSprint(0)">⚡<br>RUN</div>
</div>

<div id="toast"></div>

<script>
function toast(m,d){var t=document.getElementById('toast');t.textContent=m;t.className='show';clearTimeout(toast._t);toast._t=setTimeout(function(){t.className='';},d||3000);}
document.querySelector('a-scene').addEventListener('loaded',initGame);

function initGame(){
  var THREE=AFRAME.THREE;
  var W=document.getElementById('world');
  var platforms=[],walls=[],islandDefs=[],bridgeSegs=[];

  function addPlatform(cx,cz,y,rx,rz){platforms.push({cx:cx,cz:cz,y:y,rx:rx,rz:rz});}
  function addBridgeSeg(x1,z1,x2,z2,y,hw){bridgeSegs.push({x1:x1,z1:z1,x2:x2,z2:z2,y:y,hw:hw});}
  function addWall(x,z,r,h,y0){walls.push({x1:x-r,z1:z-r,x2:x+r,z2:z+r,h:h||5,y0:y0||0});}

  function mk(tag,attrs,par){
    var e=document.createElement('a-'+tag);
    for(var k in attrs)e.setAttribute(k,attrs[k]);
    (par||W).appendChild(e);return e;
  }

  function segRot(dx,dy,dz){
    var up=new THREE.Vector3(0,1,0);
    var dir=new THREE.Vector3(dx,dy,dz).normalize();
    var q=new THREE.Quaternion().setFromUnitVectors(up,dir);
    var e=new THREE.Euler().setFromQuaternion(q,'YXZ');
    return (e.x*180/Math.PI).toFixed(1)+' '+(e.y*180/Math.PI).toFixed(1)+' '+(e.z*180/Math.PI).toFixed(1);
  }

  function getGroundY(px,pz){
    var best=null;
    for(var i=0;i<platforms.length;i++){
      var pl=platforms[i];
      if(Math.abs(px-pl.cx)<=pl.rx+.4&&Math.abs(pz-pl.cz)<=pl.rz+.4){
        if(best===null||pl.y>best)best=pl.y;
      }
    }
    for(var i=0;i<bridgeSegs.length;i++){
      var seg=bridgeSegs[i];
      var dx=seg.x2-seg.x1,dz=seg.z2-seg.z1,len=Math.sqrt(dx*dx+dz*dz);
      if(len<0.001)continue;
      var nx2=dx/len,nz2=dz/len;
      var px2=px-seg.x1,pz2=pz-seg.z1;
      var along=px2*nx2+pz2*nz2;
      var perp=Math.abs(px2*(-nz2)+pz2*nx2);
      if(along>=-0.5&&along<=len+0.5&&perp<=seg.hw){
        if(best===null||seg.y>best)best=seg.y;
      }
    }
    return best;
  }

  var SAND_COL='#f5e8b0',SAND_WET='#ddd090';

  function makePalm(x,gy,z,h,lx,lz,par){
    par=par||W;
    addWall(x,z,0.35,h*0.5,gy);
    var NS=14,pts=[];
    for(var i=0;i<=NS;i++){var t=i/NS;pts.push({x:x+lx*h*t*t*.7,y:gy+h*t,z:z+lz*h*t*t*.7});}
    for(var i=0;i<NS;i++){
      var p0=pts[i],p1=pts[i+1];
      var dx=p1.x-p0.x,dy=p1.y-p0.y,dz=p1.z-p0.z,len=Math.sqrt(dx*dx+dy*dy+dz*dz);
      var tr=i/NS;
      // Tronc très fin : 0.055 à la base → 0.025 en haut
      var rB=Math.max(.022,.055-tr*.032),rT=Math.max(.018,.042-tr*.022);
      mk('cylinder',{'radius-bottom':rB.toFixed(4),'radius-top':rT.toFixed(4),height:len.toFixed(3),'segments-radial':'6',
        position:((p0.x+p1.x)/2).toFixed(2)+' '+((p0.y+p1.y)/2).toFixed(2)+' '+((p0.z+p1.z)/2).toFixed(2),
        rotation:segRot(dx,dy,dz),material:'roughness:.93;color:'+(i%2===0?'#c8a86a':'#b09050'),shadow:'cast:true'},par);
    }
    var top=pts[NS];
    // Feuilles très larges et très longues
    var nL=11+Math.floor(Math.random()*4);
    for(var i=0;i<nL;i++){
      var ang=i/nL*Math.PI*2+(Math.random()-.5)*.2;
      var ll=5+Math.random()*4;    // longueur 5 à 9 unités
      var lw=.5+Math.random()*.35; // largeur 0.5 à 0.85 — très large
      var droop=.5+Math.random()*.48;
      var fx=top.x+Math.sin(ang)*.28,fy=top.y+.06,fz=top.z+Math.cos(ang)*.28;
      var brx=(-droop*64).toFixed(1),bry=((ang+Math.PI/2)*180/Math.PI).toFixed(1);
      var gv=.62+Math.random()*.3;
      var lf=mk('plane',{width:ll.toFixed(2),height:lw.toFixed(2),
        position:fx.toFixed(2)+' '+fy.toFixed(2)+' '+fz.toFixed(2),rotation:brx+' '+bry+' 0',
        material:'roughness:.65;side:double;color:#'+Math.floor(gv*.38*255).toString(16).padStart(2,'0')+Math.floor(gv*255).toString(16).padStart(2,'0')+Math.floor(gv*.2*255).toString(16).padStart(2,'0'),
        shadow:'cast:true'},par);
      lf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);
      lf.dataset.brx=brx;lf.dataset.bry=bry;lf.classList.add('wind-leaf');
    }
  }

  function makeTallGrass(x,gy,z,par){
    par=par||W;
    var nc=6+Math.floor(Math.random()*5);
    for(var i=0;i<nc;i++){
      var ang=i/nc*Math.PI*2+Math.random()*.5,r=.05+Math.random()*.3,sh=0.8+Math.random()*1.4;
      var gcol=['#4a9a20','#3a8a18','#5aaa28','#2a7a10','#6aba30'][Math.floor(Math.random()*5)];
      var lf=mk('plane',{width:(.06+Math.random()*.05).toFixed(3),height:sh.toFixed(2),
        position:(x+Math.sin(ang)*r).toFixed(2)+' '+(gy+sh*.5).toFixed(2)+' '+(z+Math.cos(ang)*r).toFixed(2),
        rotation:'0 '+(ang*180/Math.PI).toFixed(1)+' '+(Math.random()*15-7).toFixed(1),
        material:'roughness:.8;side:double;color:'+gcol},par);
      lf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);
      lf.dataset.brx='0';lf.dataset.bry=(ang*180/Math.PI).toFixed(1);lf.classList.add('wind-leaf');
    }
  }

  function makeBirdOfParadise(x,gy,z,par){
    par=par||W;
    var sh=2.2+Math.random()*1.2;
    for(var i=0;i<4;i++){
      var ang=i/4*Math.PI*2+.2,r=.15+Math.random()*.2,stemH=sh+Math.random()*.5;
      mk('cylinder',{radius:'.012',height:stemH.toFixed(2),
        position:(x+Math.sin(ang)*r).toFixed(2)+' '+(gy+stemH*.5).toFixed(2)+' '+(z+Math.cos(ang)*r).toFixed(2),
        material:'color:#1a6010;roughness:.88'},par);
      var lf=mk('plane',{width:(.38+Math.random()*.18).toFixed(2),height:(1.4+Math.random()*.6).toFixed(2),
        position:(x+Math.sin(ang)*r).toFixed(2)+' '+(gy+stemH+.5).toFixed(2)+' '+(z+Math.cos(ang)*r).toFixed(2),
        rotation:(-20-Math.random()*15).toFixed(1)+' '+(ang*180/Math.PI).toFixed(1)+' 0',
        material:'roughness:.7;side:double;color:#1a7a22'},par);
      lf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);lf.dataset.brx='-22';lf.dataset.bry=(ang*180/Math.PI).toFixed(1);lf.classList.add('wind-leaf');
    }
    mk('plane',{width:'.22',height:'.6',position:x+' '+(gy+sh+.6)+' '+z,rotation:'-15 0 0',material:'side:double;color:#1a5a08'},par);
    for(var pi=0;pi<3;pi++){mk('plane',{width:'.18',height:'.38',position:(x+.06+pi*.04)+' '+(gy+sh+.75+pi*.06)+' '+z,rotation:(-30-pi*12)+' '+(pi*25)+' '+(pi*15),material:'side:double;color:#ff6600;roughness:.5'},par);}
    for(var pi=0;pi<2;pi++){mk('plane',{width:'.14',height:'.32',position:(x-.04)+' '+(gy+sh+.82+pi*.08)+' '+z,rotation:(-20+pi*10)+' '+(pi*30+15)+' -12',material:'side:double;color:#4422cc;roughness:.5'},par);}
  }

  function makeGiantHibiscus(x,gy,z,par){
    par=par||W;
    var cols=['#ff1155','#ff3300','#ff0088','#ff6600','#cc0044','#ff4422'];
    var c=cols[Math.floor(Math.random()*cols.length)],sh=1.2+Math.random()*.8;
    mk('cylinder',{radius:'.025',height:sh.toFixed(2),position:x+' '+(gy+sh/2)+' '+z,material:'color:#1a7010'},par);
    for(var i=0;i<5;i++){var ang=i/5*Math.PI*2,pr=.32+Math.random()*.08;mk('plane',{width:(pr*1.1).toFixed(3),height:(pr*1.9).toFixed(3),position:(x+Math.sin(ang)*pr*.55).toFixed(2)+' '+(gy+sh+pr*.4).toFixed(2)+' '+(z+Math.cos(ang)*pr*.55).toFixed(2),rotation:'-58 '+(ang*180/Math.PI).toFixed(1)+' 0',material:'roughness:.5;side:double;color:'+c},par);}
    mk('sphere',{radius:'.07',position:x+' '+(gy+sh+.06)+' '+z,material:'color:#ffee00;emissive:#ffcc00;emissiveIntensity:.6'},par);
  }

  function makeFern(x,gy,z,par){
    par=par||W;
    for(var i=0;i<5+Math.floor(Math.random()*4);i++){
      var ang=i/(5+4)*Math.PI*2,r=.15+Math.random()*.25,sh=.5+Math.random()*.7;
      var lf=mk('plane',{width:(.12+Math.random()*.1).toFixed(3),height:sh.toFixed(2),
        position:(x+Math.sin(ang)*r).toFixed(2)+' '+(gy+sh*.55).toFixed(2)+' '+(z+Math.cos(ang)*r).toFixed(2),
        rotation:(-25-Math.random()*20).toFixed(1)+' '+(ang*180/Math.PI+90).toFixed(1)+' 0',
        material:'roughness:.8;side:double;color:#2a7a14'},par);
      lf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);lf.dataset.brx='-30';lf.dataset.bry=(ang*180/Math.PI+90).toFixed(1);lf.classList.add('wind-leaf');
    }
  }

  function makeMonstera(x,gy,z,par){
    par=par||W;
    var sh=.9+Math.random()*.5;
    mk('cylinder',{radius:'.025',height:sh.toFixed(2),position:x+' '+(gy+sh/2)+' '+z,material:'color:#1a6010'},par);
    for(var i=0;i<3;i++){
      var ang=i/3*Math.PI*2+.3,lsize=.55+Math.random()*.3;
      var lf=mk('plane',{width:lsize.toFixed(2),height:(lsize*.8).toFixed(2),
        position:(x+Math.sin(ang)*.4).toFixed(2)+' '+(gy+sh+.2+i*.05).toFixed(2)+' '+(z+Math.cos(ang)*.4).toFixed(2),
        rotation:(-35-i*8)+' '+(ang*180/Math.PI)+' '+(i*12),material:'roughness:.7;side:double;color:#1e9918'},par);
      lf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);lf.dataset.brx=(-35-i*8).toFixed(1);lf.dataset.bry=(ang*180/Math.PI).toFixed(1);lf.classList.add('wind-leaf');
    }
  }

  function makeStrelitzia(x,gy,z,par){
    par=par||W;
    var sh=1.1+Math.random()*.5;
    for(var i=0;i<3;i++){var ang=i/3*Math.PI*2;mk('cylinder',{radius:'.016',height:(sh+i*.12).toFixed(2),position:(x+Math.sin(ang)*.28)+' '+(gy+(sh+i*.12)/2)+' '+(z+Math.cos(ang)*.28),material:'color:#228810'},par);}
    mk('plane',{width:'.14',height:'.4',position:x+' '+(gy+sh+.2)+' '+z,rotation:'0 0 0',material:'side:double;color:#ff6600'},par);
    mk('plane',{width:'.09',height:'.3',position:(x+.09)+' '+(gy+sh+.24)+' '+z,rotation:'0 30 20',material:'side:double;color:#3300ff'},par);
  }

  function makeLiane(x1,y1,z1,x2,y2,z2,par){
    par=par||W;
    for(var i=0;i<8;i++){
      var t0=i/8,t1=(i+1)/8;
      var s0=Math.sin(t0*Math.PI)*1.6,s1=Math.sin(t1*Math.PI)*1.6;
      var ax=x1+(x2-x1)*t0,ay=y1+(y2-y1)*t0-s0,az=z1+(z2-z1)*t0;
      var bx=x1+(x2-x1)*t1,by=y1+(y2-y1)*t1-s1,bz=z1+(z2-z1)*t1;
      var dx=bx-ax,dy=by-ay,dz=bz-az,len=Math.sqrt(dx*dx+dy*dy+dz*dz);

  function makeBridge(x1,y1,z1,x2,y2,z2){
    var bdx=x2-x1,bdz=z2-z1;
    var len=Math.sqrt(bdx*bdx+bdz*bdz);
    var ang=Math.atan2(bdx,bdz)*180/Math.PI;
    var perp=new THREE.Vector3(-bdz,0,bdx).normalize();
    var BW=4.5,MIN_H=1.8;
    function bY(t){return Math.max(MIN_H,y1+(y2-y1)*t-Math.sin(t*Math.PI)*0.5);}
    addBridgeSeg(x1,z1,x2,z2,bY(0.5),BW*0.5);
    var STEP=0.8,GAP=0.06,nP=Math.floor(len/STEP);
    for(var i=0;i<nP;i++){
      var t=(i+.5)/nP,px=x1+bdx*t,pz=z1+bdz*t,py=bY(t),col=i%2===0?'#8a5218':'#724010';
      mk('box',{width:BW,height:0.14,depth:(STEP-GAP),position:px.toFixed(2)+' '+py.toFixed(2)+' '+pz.toFixed(2),rotation:'0 '+ang.toFixed(1)+' 0',material:'color:'+col+';roughness:.96',shadow:'cast:true;receive:true'});
    }
    for(var side=-1;side<=1;side+=2){
      var off=perp.clone().multiplyScalar((BW/2)*side);
      var ax=x1+off.x,az=z1+off.z,bx2=x2+off.x,bz2=z2+off.z,ll=len;
      mk('box',{width:0.18,height:0.18,depth:ll.toFixed(1),position:((ax+bx2)/2).toFixed(2)+' '+(bY(0.5)+0.06).toFixed(2)+' '+((az+bz2)/2).toFixed(2),rotation:'0 '+ang.toFixed(1)+' 0',material:'color:#5a2e08;roughness:.95'});
    }
    for(var side=-1;side<=1;side+=2){
      var off=perp.clone().multiplyScalar((BW/2+0.1)*side);
      [0.6,1.3,2.1].forEach(function(rh){
        var NS=Math.ceil(nP/3);
        for(var i=0;i<NS;i++){
          var t0=i/NS,t1=(i+1)/NS,sag=Math.sin((t0+t1)/2*Math.PI)*0.2;
          var ax2=x1+bdx*t0+off.x,ay=bY(t0)+rh-sag,az2=z1+bdz*t0+off.z;
          var bx3=x1+bdx*t1+off.x,by2=bY(t1)+rh-sag,bz3=z1+bdz*t1+off.z;
          var ddx=bx3-ax2,ddy=by2-ay,ddz=bz3-az2,rl=Math.sqrt(ddx*ddx+ddy*ddy+ddz*ddz);
          mk('cylinder',{radius:'.026',height:rl.toFixed(2),position:((ax2+bx3)/2).toFixed(2)+' '+((ay+by2)/2).toFixed(2)+' '+((az2+bz3)/2).toFixed(2),rotation:segRot(ddx,ddy,ddz),material:'color:#2a1206;roughness:.9'});
        }
      });
      for(var i=2;i<nP-2;i+=4){
        var t=i/nP,mpx=x1+bdx*t+off.x,mpz=z1+bdz*t+off.z,mpy=bY(t);
        mk('cylinder',{radius:'.022',height:'2.2',position:mpx.toFixed(2)+' '+(mpy+1.1).toFixed(2)+' '+mpz.toFixed(2),material:'color:#2a1206;roughness:.9'});
      }
      [[x1,bY(0),z1],[x2,bY(1),z2]].forEach(function(p){
        mk('cylinder',{radius:'0.22',height:'5.5',position:(p[0]+off.x).toFixed(2)+' '+(p[1]+2.75).toFixed(2)+' '+(p[2]+off.z).toFixed(2),material:'color:#4a2506;roughness:.95',shadow:'cast:true'});
        mk('cylinder',{radius:'0.07',height:(BW+0.8).toFixed(1),position:(p[0]).toFixed(2)+' '+(p[1]+5.6).toFixed(2)+' '+(p[2]).toFixed(2),rotation:'0 0 90',material:'color:#3a1e06;roughness:.95'});
      });
    }
  }

  function buildUnderwaterWorld(){
    // ── Fond sableux sous-marin ──
    mk('cylinder',{radius:'200',height:'.4',position:'0 -4.5 0',
      material:'color:#d4c070;roughness:.95'},W);
    mk('cylinder',{radius:'70',height:'.3',position:'0 -1.8 0',
      material:'color:#e8d880;roughness:.92'},W);

    // makeCoral local — emissive modéré (0.25), couleurs naturelles récif
    function uwCoral(x,y,z,col){
      var h=0.6+Math.random()*1.4, nb=3+Math.floor(Math.random()*5);
      mk('cylinder',{'radius-bottom':'.18','radius-top':'.04',height:h.toFixed(2),
        position:x.toFixed(2)+' '+(y+h/2).toFixed(2)+' '+z.toFixed(2),
        material:'color:'+col+';roughness:.6;emissive:'+col+';emissiveIntensity:.22'},W);
      for(var b=0;b<nb;b++){
        var ang=b/nb*Math.PI*2,br=.1+Math.random()*.35,bh=.25+Math.random()*.9;
        mk('cylinder',{'radius-bottom':'.06','radius-top':'.02',height:bh.toFixed(2),
          position:(x+Math.sin(ang)*br).toFixed(2)+' '+(y+h*.5+bh/2).toFixed(2)+' '+(z+Math.cos(ang)*br).toFixed(2),
          rotation:(Math.random()*20-10).toFixed(1)+' '+(ang*180/Math.PI).toFixed(1)+' 0',
          material:'color:'+col+';roughness:.5;emissive:'+col+';emissiveIntensity:.28'},W);
        mk('sphere',{radius:(.04+Math.random()*.05).toFixed(3),
          position:(x+Math.sin(ang)*br).toFixed(2)+' '+(y+h*.5+bh+.04).toFixed(2)+' '+(z+Math.cos(ang)*br).toFixed(2),
          material:'color:'+col+';roughness:.3;emissive:'+col+';emissiveIntensity:.4'},W);
      }
    }

    var CC=['#ff55bb','#ff6622','#ff1166','#ffaa33','#ff55dd','#ff8822',
            '#00bbdd','#ff4433','#ff7766','#ee2299','#ff7733','#ff3366',
            '#00ffcc','#ffcc33','#ff55ff','#33ccff','#ff9933','#bb22ff'];

    // Coraux au fond — Y=-1.8 (juste sur le sable sous la surface à Y=-0.3)
    // Rayon 0-15 : très dense, visible immédiatement
    for(var i=0;i<60;i++){
      var a=Math.random()*Math.PI*2,r=0.5+Math.random()*14;
      uwCoral(Math.sin(a)*r,-1.8,Math.cos(a)*r, CC[Math.floor(Math.random()*CC.length)]);
    }
    // Rayon 15-45
    for(var i=0;i<80;i++){
      var a=Math.random()*Math.PI*2,r=110+Math.random()*70;
      uwCoral(Math.sin(a)*r,-1.8,Math.cos(a)*r, CC[Math.floor(Math.random()*CC.length)]);
    }
    // Rayon 45-80
    for(var i=0;i<60;i++){
      var a=Math.random()*Math.PI*2,r=410+Math.random()*75;
      uwCoral(Math.sin(a)*r,-2.5,Math.cos(a)*r, CC[Math.floor(Math.random()*CC.length)]);
    }
    // Autour îles volcanique et tropicale
    [[-165,-140],[165,-125]].forEach(function(ile){
      for(var i=0;i<35;i++){
        var a=Math.random()*Math.PI*2,r=5+Math.random()*45;
        uwCoral(ile[0]+Math.sin(a)*r,-1.8,ile[1]+Math.cos(a)*r, CC[Math.floor(Math.random()*CC.length)]);
      }
    });

    // ── ALGUES (emissive 0.2 max) ──

  function findBone(root,name){var f=null;root.traverse(function(o){if(!f&&o.name===name)f=o;});return f;}

  function animateStitch(dt,moveMag,state,sprint){
    if(!Object.keys(BONES).length)return;
    if(stitchMixer&&nativeAction){if(state==='ground'&&moveMag>.05){stitchMixer.update(dt*(sprint?2.5:1.4));nativeAction.timeScale=1;}else{nativeAction.timeScale=0;nativeAction.time=0;stitchMixer.update(0);}}
    ANIM_T+=dt*2.5;var s=Math.sin(ANIM_T);
    if(state==='ground'&&moveMag>.05){
      var freq=sprint?9:6,ampL=sprint?1.2:.95,ampA=sprint?1:.75;
      ANIM_T+=dt*(freq-2.5);var sw=Math.sin(ANIM_T);
      rb('hipL',sw*ampL,0,0);rb('hipR',-sw*ampL,0,0);rb('legL',Math.max(0,sw)*.9,0,0);rb('legR',Math.max(0,-sw)*.9,0,0);rb('foreLegL',Math.max(0,-sw)*.65,0,0);rb('foreLegR',Math.max(0,sw)*.65,0,0);rb('heelL',-sw*.55,0,0);rb('heelR',sw*.55,0,0);rb('armL',-sw*ampA,0,sw*.12);rb('armR',sw*ampA,0,-sw*.12);rb('foreArmL',Math.max(0,-sw)*.65,0,0);rb('foreArmR',Math.max(0,sw)*.65,0,0);rb('spine0',0,-sw*.12,sw*.08);rb('earAL',Math.abs(sw)*.2,0,0);rb('earAR',Math.abs(sw)*.2,0,0);
    } else if(state==='air'){
      rb('hipL',-.30,0,0);rb('hipR',-.30,0,0);rb('legL',.65,0,0);rb('legR',.65,0,0);rb('armL',-.70,0,-.45);rb('armR',-.70,0,.45);
    } else if(state==='surface'){
      // Stitch flotte — bras qui pagaient
      rb('armL',s*.7-.3,0,-.35);rb('armR',-s*.7-.3,0,.35);rb('hipL',s*.3,0,0);rb('hipR',-s*.3,0,0);rb('spine0',.28,0,0);
    } else if(state==='diving'){
      rb('spine0',.15,0,0);rb('shoulders',.08,0,0);
      rb('armL',-.9+s*.15,0,-.18);rb('armR',-.9-s*.15,0,.18);
      rb('hipL',s*.32,0,0);rb('hipR',-s*.32,0,0);rb('legL',Math.max(0,-s)*.25,0,0);rb('legR',Math.max(0,s)*.25,0,0);rb('tail',s*.15,0,0);

      var spdM=(P.state==='surface')?.7:(P.state==='diving')?.65:1.0;
      P.vx=mx/mn*spd*spdM;P.vz=mz/mn*spd*spdM;
      var ty=Math.atan2(mx/mn,mz/mn),dyw=ty-P.yaw;
      while(dyw>Math.PI)dyw-=Math.PI*2;while(dyw<-Math.PI)dyw+=Math.PI*2;
      P.yaw+=dyw*Math.min(1,dt*14);
    } else {P.vx=0;P.vz=0;}

    // ══ PHYSIQUE PRINCIPALE ══
    if(P.state==='ground'||P.state==='air'){
      P.vy-=22*dt;if(P.vy<-25)P.vy=-25;P.y+=P.vy*dt;

      if(gy!==null&&P.y<=gy+P.yOff){
        // Sur le sol d'une île — mais les pieds touchent-ils l'eau ?
        // Si le sol est sous la surface de l'eau, on force le mode surface
        if(gy<WATER_SURFACE-0.1){
          // Sol immergé → mode surface
          P.state='surface';P.y=WATER_SURFACE;P.vy=0;P.breath=MAX_BREATH;
          toast('Dans l eau ! ⬇ PLONGE pour descendre',2200);
        } else if(P.y<=WATER_SURFACE+WATER_ENTER_THRESHOLD&&gy<WATER_SURFACE+0.3){
          // Pieds dans l'eau sur la plage — entrer dans l'eau dès qu'on est au bord
          P.state='surface';P.y=WATER_SURFACE;P.vy=0;P.breath=MAX_BREATH;
          toast('Dans l eau ! ⬇ PLONGE pour descendre',2200);
        } else {
          P.y=gy+P.yOff;P.vy=0;P.onGround=true;P.state='ground';
        }
      } else if(gy===null&&P.y<=WATER_SURFACE+0.05){
        // Tombé dans l'eau loin de toute île
        P.state='surface';P.y=WATER_SURFACE;P.vy=0;P.breath=MAX_BREATH;
        toast('Dans l eau ! ⬇ PLONGE pour descendre',2200);
      } else {
        P.onGround=false;
        if(P.state==='ground')P.state='air';
      }
    } else if(P.state==='surface'){
      P.swimBob+=dt;
      P.breath=Math.min(MAX_BREATH,P.breath+BREATH_GAIN*dt);
      P.y=WATER_SURFACE+Math.sin(P.swimBob*2.2)*.06;
      P.vy=0;P.onGround=true;

      // Remonter sur l'île si le sol est bien au-dessus de la surface
      if(gy!==null&&gy>WATER_SURFACE+0.3){
        P.state='ground';P.y=gy+P.yOff;P.vy=0;
      }
      // Plonger
      if(_pressingDown||jLY>0.4){
        P.state='diving';P.vy=-7;P.y=WATER_SURFACE-1.2;P.onGround=false;
      }
    } else if(P.state==='diving'){
      if(_pressingDown||jLY>0.3){P.vy=Math.max(P.vy-9*dt,-8);}
      else if(KY['Space']){P.vy=Math.min(P.vy+9*dt,8);}
      else{P.vy=P.vy*.95+.3*dt;}
      P.y+=P.vy*dt;P.onGround=false;
      P.breath=Math.max(0,P.breath-BREATH_LOSE*dt);
      // Remonter à la surface
      if(P.y>=WATER_SURFACE-.05){P.y=WATER_SURFACE;P.state='surface';P.vy=0;toast('Stitch reprend son souffle ! 💨',2000);}
      if(P.y<-19){P.y=-19;P.vy=0;}
      if(P.breath<=0){P.vy=7;P.state='surface';P.breath=25;toast('Plus d air ! 😮‍💨',2000);}
      // Toucher le sol d'une île depuis sous l'eau — seulement si le sol est au-dessus de la surface
      if(gy!==null&&gy>WATER_SURFACE+0.3&&P.y>=gy-0.3&&P.y<=gy+P.yOff+0.5){
        P.y=gy+P.yOff;P.vy=0;P.state='ground';
      }
    }

    // Collisions murs
    var PRAD=.44,nx=P.x+P.vx*dt,nz=P.z+P.vz*dt;
    for(var wi=0;wi<walls.length;wi++){
      var w=walls[wi];if(P.y-P.yOff>w.y0+w.h)continue;
      var inX=nx+PRAD>w.x1&&nx-PRAD<w.x2,inZ=nz+PRAD>w.z1&&nz-PRAD<w.z2;
      var curX=P.x+PRAD>w.x1&&P.x-PRAD<w.x2,curZ=P.z+PRAD>w.z1&&P.z-PRAD<w.z2;
      if(inX&&inZ){if(!curX){P.vx=0;nx=P.x;}if(!curZ){P.vz=0;nz=P.z;}}
    }
    P.x=nx;P.z=nz;

    // Stitch rotation
    var stEl=document.getElementById('stitch-root');
    // En diving : Stitch nage à plat ventre — rotation X vers l'avant seulement
    // On utilise Z=0, X=70-80 pour incliner vers l'avant (ventre vers le bas visuel)
    // MAIS le modèle GLB est orienté différemment : on teste X négatif
    var tiltX=0,tiltZ=0;
    if(P.state==='diving'){
      // Stitch allongé sur le ventre qui descend — inclinaison douce vers l'avant
      tiltX=Math.max(-15,Math.min(15,P.vy*4)); // incline selon vitesse verticale
    } else if(P.state==='surface'){
      tiltX=8; // légèrement incliné sur l'eau
    }
    stEl.setAttribute('position',P.x.toFixed(2)+' '+P.y.toFixed(2)+' '+P.z.toFixed(2));
    stEl.setAttribute('rotation',tiltX.toFixed(1)+' '+(P.yaw*180/Math.PI).toFixed(1)+' 0');
    animateStitch(dt,moveMag,P.state,sprint);

    // Caméra
    if(Math.abs(rjLX)>.04)CAM.yaw+=rjLX*dt*2.5;
    else if(moveMag>.1){var tc=P.yaw+Math.PI,cd=tc-CAM.yaw;while(cd>Math.PI)cd-=Math.PI*2;while(cd<-Math.PI)cd+=Math.PI*2;CAM.yaw+=cd*dt*2.2;}
    if(Math.abs(rjLY)>.04)CAM.pitch=Math.max(.06,Math.min(.75,CAM.pitch+rjLY*dt*1.5));
    var camDist=CAM.dist;
    var camPitch=CAM.pitch;
    if(P.state==='diving'){
      camDist=5.0;
      camPitch=0.10; // caméra presque horizontale — derrière Stitch, pas au-dessus
    }
    var cr=camDist*Math.cos(camPitch);
    var cX=P.x+Math.sin(CAM.yaw)*cr,cZ=P.z+Math.cos(CAM.yaw)*cr;
    var cY=P.y+camDist*Math.sin(camPitch)+(P.state==='diving'?0.5:1.8);
    var camRig=document.getElementById('cam-rig');
    var cp=camRig.getAttribute('position'),lf2=Math.min(1,dt*10);
    camRig.setAttribute('position',(cp.x+(cX-cp.x)*lf2).toFixed(2)+' '+(cp.y+(cY-cp.y)*lf2).toFixed(2)+' '+(cp.z+(cZ-cp.z)*lf2).toFixed(2));
    var lookY=P.y+(P.state==='diving'?0.0:.9);
    document.getElementById('mainCam').components.camera.camera.lookAt(P.x,lookY,P.z);

    // Vagues
    ['w0','w1','w2'].forEach(function(id,i){var wEl=document.getElementById(id);if(!wEl)return;wEl.setAttribute('scale',(1+Math.sin(waveT*.8+i*1.4)*.05)+' 1 '+(1+Math.sin(waveT*.8+i*1.4)*.05));wEl.setAttribute('position','0 '+(-.42+Math.sin(waveT*1.6+i*1.4)*.04).toFixed(3)+' 0');});
    var lg=document.getElementById('lagon');if(lg)lg.setAttribute('position','0 '+(-.35+Math.sin(waveT*.45)*.012).toFixed(3)+' 0');

    // ══ EFFETS OCÉAN ══
    var inWater=(P.state==='diving'||P.state==='surface');
    var breathBar=document.getElementById('breath-bar');
    var breathFill=document.getElementById('breath-fill');
    var waterOv=document.getElementById('water-overlay');
    var causticOv=document.getElementById('caustic-overlay');
    var diveHint=document.getElementById('dive-hint');
    var ambLightEl=document.getElementById('ambientLight');
    var scnEl=document.querySelector('a-scene');

    if(inWater){
      breathBar.style.display='flex';
      var pct=P.breath/MAX_BREATH;
      breathFill.style.width=(pct*100).toFixed(0)+'%';
      breathFill.style.background=pct>.5?'linear-gradient(90deg,#00ffcc,#0088ff)':pct>.25?'linear-gradient(90deg,#ffcc00,#ff6600)':'linear-gradient(90deg,#ff2200,#ff6600)';
    } else {breathBar.style.display='none';}

    if(P.state==='diving'){
      waterOv.className='underwater';
      causticOv.style.opacity='0.5';
      ambLightEl.setAttribute('intensity','2.2');
      ambLightEl.setAttribute('color','#88ddcc');
      document.getElementById('sunLight').setAttribute('intensity','0');
      document.getElementById('hemiLight').setAttribute('intensity','0');
      ['uwLight1','uwLight2','uwLight3','uwLight4','uwLight5'].forEach(function(id){
        var l=document.getElementById(id);if(l)l.setAttribute('intensity','3.5');
      });
      scnEl.setAttribute('fog','type:exponential;color:#004455;density:0.010');
      document.getElementById('skyEl').setAttribute('color','#003355');
      diveHint.style.display='block';
      diveHint.textContent='🌊 ⬆ SURF = remonter  ·  ⬇ PLONGE = descendre';
      if(P.breath<20&&Math.floor(waveT*2)%2===0)diveHint.style.color='#ff3300';else diveHint.style.color='#88ffee';
    } else if(P.state==='surface'){
      waterOv.className='underwater';
      causticOv.style.opacity='0';
      ['uwLight1','uwLight2','uwLight3','uwLight4','uwLight5'].forEach(function(id){
        var l=document.getElementById(id);if(l)l.setAttribute('intensity','0');
      });
      document.getElementById('sunLight').setAttribute('intensity','2.2');
      document.getElementById('hemiLight').setAttribute('intensity','.7');
      ambLightEl.setAttribute('intensity','.25');ambLightEl.setAttribute('color','#ffeedd');
      scnEl.setAttribute('fog','type:exponential;color:#5ac8f0;density:0.007');
      document.getElementById('skyEl').setAttribute('color','#4ab8f0');
      diveHint.style.display='block';diveHint.textContent='🌊 Appuie ⬇ PLONGE pour descendre';diveHint.style.color='#88ffee';
    } else {
      waterOv.className='';causticOv.style.opacity='0';
      ['uwLight1','uwLight2','uwLight3','uwLight4','uwLight5'].forEach(function(id){
        var l=document.getElementById(id);if(l)l.setAttribute('intensity','0');
      });
      document.getElementById('sunLight').setAttribute('intensity','2.2');
      document.getElementById('hemiLight').setAttribute('intensity','.7');
      ambLightEl.setAttribute('intensity','.25');ambLightEl.setAttribute('color','#ffeedd');
      scnEl.setAttribute('fog','type:exponential;color:#5ac8f0;density:0.007');
      document.getElementById('skyEl').setAttribute('color','#4ab8f0');
      diveHint.style.display='none';
    }

    // Zone HUD
    var zone='🌊 OCEAN';
    if(P.state==='diving')zone='🤿 SOUS L EAU';
    else if(P.state!=='surface'){
      zone='🏖 PLAGE';
      for(var ii=0;ii<islandDefs.length;ii++){var id2=islandDefs[ii];if(Math.sqrt((P.x-id2.cx)*(P.x-id2.cx)+(P.z-id2.cz)*(P.z-id2.cz))<62){zone='🏝 '+id2.label;break;}}
    }
    document.getElementById('zL').textContent=zone;
  }
  loop();

  // ══ CONTRÔLES ══
  window.doJump=function(e){
    if(e&&e.preventDefault)e.preventDefault();
    if(P.state==='diving'){P.vy=7;}
    else if(P.state==='ground'&&P.onGround){P.vy=8.5;P.onGround=false;P.state='air';}
    else if(P.state==='surface'){P.vy=6;P.state='air';}
  };
  window.startDive=function(e){
    if(e&&e.preventDefault)e.preventDefault();
    _pressingDown=true;
    if(P.state==='surface'){P.state='diving';P.vy=-7;P.y=WATER_SURFACE-1.2;P.onGround=false;}
  };
  window.stopDive=function(e){if(e&&e.preventDefault)e.preventDefault();_pressingDown=false;};
  window.setSprint=function(v,e){if(e&&e.preventDefault)e.preventDefault();sprint=!!v;};

  // Joystick gauche
  var jB=document.getElementById('joy'),jN=document.getElementById('jnub'),JMAX=38;
  function jUp(cx,cy){var r=jB.getBoundingClientRect(),dx=cx-(r.left+r.width/2),dy=cy-(r.top+r.height/2),d=Math.sqrt(dx*dx+dy*dy);if(d>JMAX){dx=dx/d*JMAX;dy=dy/d*JMAX;}jN.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';jLX=d>4?dx/JMAX:0;jLY=d>4?dy/JMAX:0;}
  function jRst(){jN.style.transform='translate(-50%,-50%)';jLX=0;jLY=0;}
  jB.addEventListener('touchstart',function(e){e.preventDefault();jid=e.changedTouches[0].identifier;jUp(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
  jB.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===jid)jUp(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false});
  jB.addEventListener('touchend',jRst,{passive:true});
  jB.addEventListener('mousedown',function(e){jUp(e.clientX,e.clientY);});
  window.addEventListener('mouseup',jRst);

  // Joystick droit
  var rjB=document.getElementById('rjoy'),rjN=document.getElementById('rjnub'),RJMAX=32;
  function rjUp(cx,cy){var r=rjB.getBoundingClientRect(),dx=cx-(r.left+r.width/2),dy=cy-(r.top+r.height/2),d=Math.sqrt(dx*dx+dy*dy);if(d>RJMAX){dx=dx/d*RJMAX;dy=dy/d*RJMAX;}rjN.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';rjLX=d>4?dx/RJMAX:0;rjLY=d>4?dy/RJMAX:0;}
  function rjRst(){rjN.style.transform='translate(-50%,-50%)';rjLX=0;rjLY=0;}
  rjB.addEventListener('touchstart',function(e){e.preventDefault();rjid=e.changedTouches[0].identifier;rjUp(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
  rjB.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===rjid)rjUp(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false});
  rjB.addEventListener('touchend',rjRst,{passive:true});

  // Clavier desktop
  window.addEventListener('keydown',function(e){KY[e.code]=1;if(e.code==='Space'){e.preventDefault();window.doJump();}if(e.code==='ShiftLeft')sprint=true;});
  window.addEventListener('keyup',function(e){KY[e.code]=0;if(e.code==='ShiftLeft')sprint=false;});
}
</script>
