<!DOCTYPE html><html lang="fr"><head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Stitch Island</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
#joy{position:fixed;left:14px;bottom:14px;z-index:30;width:110px;height:110px;border-radius:50%;background:rgba(0,0,0,.22);border:2.5px solid rgba(255,220,80,.4);touch-action:none;pointer-events:all}
#jnub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:50%;background:radial-gradient(circle,rgba(255,220,80,.8),rgba(160,70,0,.9));border:2.5px solid rgba(255,220,80,.7)}
#rjoy{position:fixed;right:14px;bottom:14px;z-index:30;width:90px;height:90px;border-radius:50%;background:rgba(0,10,30,.22);border:2px solid rgba(100,200,255,.35);touch-action:none;pointer-events:all}
#rjnub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;background:radial-gradient(circle,rgba(100,200,255,.7),rgba(0,40,90,.9));border:2px solid rgba(100,200,255,.55)}
#btns{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:30;display:flex;gap:12px;pointer-events:none}
.btn{width:54px;height:54px;border-radius:50%;background:rgba(0,8,22,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:8px;font-family:Georgia,serif;cursor:pointer;touch-action:manipulation;border:2px solid rgba(255,255,255,.18);color:#fff;pointer-events:all}
#hud{position:fixed;top:10px;left:0;right:0;display:flex;justify-content:space-between;padding:0 12px;pointer-events:none;z-index:30}
.pill{background:rgba(0,10,25,.78);border-radius:18px;padding:5px 12px;font-family:Georgia,serif;font-size:9px;color:#7de8ff;border:1px solid rgba(125,232,255,.25)}
#toast{position:fixed;top:52px;left:50%;transform:translateX(-50%) scale(.9);opacity:0;z-index:80;background:rgba(0,8,22,.94);border:1.5px solid #7de8ff;border-radius:18px;padding:7px 16px;color:#7de8ff;font-size:10px;font-family:Georgia,serif;white-space:nowrap;pointer-events:none;transition:all .18s}
#toast.show{transform:translateX(-50%) scale(1);opacity:1}
#breath-bar{position:fixed;top:48px;left:50%;transform:translateX(-50%);z-index:40;display:none;flex-direction:column;align-items:center;gap:3px;pointer-events:none}
#breath-label{font-family:Georgia,serif;font-size:9px;color:#88ffee;text-shadow:0 0 6px #00ffcc}
#breath-bg{width:140px;height:12px;border-radius:6px;background:rgba(0,20,40,.7);border:1.5px solid rgba(0,255,200,.4);overflow:hidden}
#breath-fill{height:100%;width:100%;border-radius:6px;background:linear-gradient(90deg,#00ffcc,#0088ff);transition:background .3s}
#underwater-overlay{position:fixed;inset:0;pointer-events:none;z-index:20;background:radial-gradient(ellipse at center,rgba(0,80,160,0) 40%,rgba(0,40,100,.55) 100%);opacity:0;transition:opacity .8s}
#sink-overlay{position:fixed;inset:0;pointer-events:none;z-index:21;background:rgba(0,20,60,0);transition:background .5s}
</style>
</head>
<body>
<a-scene renderer="antialias:true;colorManagement:true" shadow="type:pcfsoft" fog="type:exponential;color:#5ac8f0;density:0.007" vr-mode-ui="enabled:false" loading-screen="enabled:false">
<a-assets timeout="30000">
  <a-asset-item id="stitchGLB" src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/stitch2.glb"></a-asset-item>
  <img id="tGrass" src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/grass.jpg" crossorigin="anonymous">
  <img id="tSand"  src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/sand.jpg"  crossorigin="anonymous">
  <img id="tBark"  src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/bark.jpg"  crossorigin="anonymous">
  <img id="tLeaf"  src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/leaf.jpg"  crossorigin="anonymous">
  <img id="tRock"  src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/rock.jpg"  crossorigin="anonymous">
</a-assets>
<a-sky id="skyEl" color="#4ab8f0"></a-sky>
<a-light type="directional" position="-40 80 30" color="#fff4dd" intensity="2.6" cast-shadow="true" shadow-camera-left="-200" shadow-camera-right="200" shadow-camera-top="200" shadow-camera-bottom="-200" shadow-map-width="2048" shadow-map-height="2048"></a-light>
<a-light type="hemisphere" color="#88ccff" ground-color="#446622" intensity=".8"></a-light>
<a-light type="ambient" id="ambientLight" color="#ffeedd" intensity=".3"></a-light>
<!-- NUAGES -->
<a-sphere position="-60 55 -180" radius="18" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="-45 58 -178" radius="13" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="30 60 -190" radius="20" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="48 57 -188" radius="14" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="120 50 -200" radius="16" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="-120 52 -195" radius="15" color="#fff" material="roughness:0.9"></a-sphere>
<!-- SURFACE EAU -->
<a-plane id="waterSurf" width="3000" height="3000" rotation="-90 0 0" position="0 -0.5 0" color="#14b8d4" material="transparent:true;opacity:0.82;roughness:0.04;metalness:0.2" shadow="receive:false"></a-plane>
<a-cylinder id="lagon" radius="180" height=".3" position="0 -0.38 0" color="#22eedd" material="transparent:true;opacity:0.5;roughness:0.04" shadow="receive:false"></a-cylinder>
<!-- FOND OCEAN -->
<a-plane width="3000" height="3000" rotation="-90 0 0" position="0 -22 0" color="#0a4a30" material="roughness:0.95"></a-plane>
<!-- Vagues -->
<a-torus id="w0" radius="72"  radius-tubular=".2" segments-tubular="64" rotation="90 0 0" position="0 -.42 0" color="#fff" material="transparent:true;opacity:0.5"></a-torus>
<a-torus id="w1" radius="92"  radius-tubular=".2" segments-tubular="64" rotation="90 0 0" position="0 -.42 0" color="#fff" material="transparent:true;opacity:0.42"></a-torus>
<a-torus id="w2" radius="112" radius-tubular=".2" segments-tubular="64" rotation="90 0 0" position="0 -.42 0" color="#fff" material="transparent:true;opacity:0.35"></a-torus>
<a-entity id="world"></a-entity>
<a-entity id="underwater-world"></a-entity>
<!-- STITCH -->
<a-entity id="stitch-root" position="0 2 3">
  <a-gltf-model id="stitch-model" src="#stitchGLB" shadow="cast:true;receive:false"></a-gltf-model>
</a-entity>
<!-- CAMERA -->
<a-entity id="cam-rig" position="0 6 10">
  <a-camera id="mainCam" look-controls="enabled:false" wasd-controls="enabled:false" fov="62" near=".05" far="700"></a-camera>
</a-entity>
</a-scene>

<div id="hud">
  <div class="pill" id="zL">🏝 ILE PRINCIPALE</div>
  <div class="pill">🏝 STITCH ISLAND</div>
</div>
<div id="breath-bar">
  <div id="breath-label">🤿 RESPIRATION</div>
  <div id="breath-bg"><div id="breath-fill"></div></div>
</div>
<div id="underwater-overlay"></div>
<div id="sink-overlay"></div>
<div id="joy"><div id="jnub"></div></div>
<div id="rjoy"><div id="rjnub"></div></div>
<div id="btns">
  <div class="btn" style="border-color:#7de8ff;color:#7de8ff" ontouchstart="doJump(event)" onclick="doJump()">⬆<br>JUMP</div>
  <div class="btn" style="border-color:#00ffcc;color:#00ffcc" id="diveBtn" ontouchstart="doDive(event)" onclick="doDive()">🤿<br>DIVE</div>
  <div class="btn" style="border-color:#ffd700;color:#ffd700" ontouchstart="setSprint(1,event)" ontouchend="setSprint(0)" onmousedown="setSprint(1)" onmouseup="setSprint(0)">⚡<br>RUN</div>
</div>
<div id="toast"></div>

<script>
function toast(m,d){var t=document.getElementById('toast');t.textContent=m;t.className='show';clearTimeout(toast._t);toast._t=setTimeout(function(){t.className='';},d||3000);}
document.querySelector('a-scene').addEventListener('loaded',initGame);

function initGame(){
  var THREE=AFRAME.THREE;
  var W=document.getElementById('world');
  var UW=document.getElementById('underwater-world');

  var platforms=[];
  var walls=[];
  var islandDefs=[];

  function addPlatform(cx,cz,y,rx,rz){platforms.push({cx:cx,cz:cz,y:y,rx:rx,rz:rz});}
  function addWall(x,z,r,h,y0){walls.push({x1:x-r,z1:z-r,x2:x+r,z2:z+r,h:h||5,y0:y0||0});}

  function mk(tag,attrs,par){
    var e=document.createElement('a-'+tag);
    for(var k in attrs)e.setAttribute(k,attrs[k]);
    (par||W).appendChild(e);return e;
  }

  function segRot(dx,dy,dz){
    var up=new THREE.Vector3(0,1,0);
    var dir=new THREE.Vector3(dx,dy,dz).normalize();
    var q=new THREE.Quaternion().setFromUnitVectors(up,dir);
    var e=new THREE.Euler().setFromQuaternion(q,'YXZ');
    return (e.x*180/Math.PI).toFixed(1)+' '+(e.y*180/Math.PI).toFixed(1)+' '+(e.z*180/Math.PI).toFixed(1);
  }

  function getGroundY(px,pz){
    var best=null;
    for(var i=0;i<platforms.length;i++){
      var pl=platforms[i];
      if(Math.abs(px-pl.cx)<=pl.rx+.5&&Math.abs(pz-pl.cz)<=pl.rz+.5){
        if(best===null||pl.y>best)best=pl.y;
      }
    }
    return best;
  }

  var SAND_COL='#f5e8b0';
  var SAND_WET='#ddd090';

  // ══ PALMIER — troncs 3x plus fins ══
  function makePalm(x,gy,z,h,lx,lz,par){
    par=par||W;
    var NS=12,pts=[];
    for(var i=0;i<=NS;i++){var t=i/NS;pts.push({x:x+lx*h*t*t*.85,y:gy+h*t,z:z+lz*h*t*t*.85});}
    for(var i=0;i<NS;i++){
      var p0=pts[i],p1=pts[i+1];
      var dx=p1.x-p0.x,dy=p1.y-p0.y,dz=p1.z-p0.z,len=Math.sqrt(dx*dx+dy*dy+dz*dz);
      var tr=i/NS;
      // TRONCS 3x plus fins : rayon divisé par 3
      var rB=Math.max(.004,.012-tr*.007),rT=Math.max(.003,.009-tr*.005);
      mk('cylinder',{'radius-bottom':rB.toFixed(4),'radius-top':rT.toFixed(4),height:len.toFixed(3),'segments-radial':'6',
        position:((p0.x+p1.x)/2).toFixed(2)+' '+((p0.y+p1.y)/2).toFixed(2)+' '+((p0.z+p1.z)/2).toFixed(2),
        rotation:segRot(dx,dy,dz),material:'roughness:.93;color:'+(i%2===0?'#c8a86a':'#b09050'),shadow:'cast:true'},par);
    }
    var top=pts[NS];
    for(var i=0;i<9+Math.floor(Math.random()*4);i++){
      var ang=i/(9+3)*Math.PI*2+(Math.random()-.5)*.3;
      var ll=3+Math.random()*2.5,lw=.22+Math.random()*.15,droop=.5+Math.random()*.5;
      var fx=top.x+Math.sin(ang)*.4,fy=top.y+.1,fz=top.z+Math.cos(ang)*.4;
      var brx=(-droop*56).toFixed(1),bry=((ang+Math.PI/2)*180/Math.PI).toFixed(1);
      var gv=.7+Math.random()*.25;
      var lf=mk('plane',{width:ll.toFixed(2),height:lw.toFixed(2),
        position:fx.toFixed(2)+' '+fy.toFixed(2)+' '+fz.toFixed(2),rotation:brx+' '+bry+' 0',
        material:'roughness:.7;side:double;color:#'+Math.floor(gv*.5*255).toString(16).padStart(2,'0')+Math.floor(gv*255).toString(16).padStart(2,'0')+Math.floor(gv*.28*255).toString(16).padStart(2,'0'),
        shadow:'cast:true'},par);
      lf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);
      lf.dataset.brx=brx;lf.dataset.bry=bry;lf.classList.add('wind-leaf');
    }
  }

  // ══ HERBE HAUTE ══
  function makeTallGrass(x,gy,z,par){
    par=par||W;
    var nc=6+Math.floor(Math.random()*5);
    for(var i=0;i<nc;i++){
      var ang=i/nc*Math.PI*2+Math.random()*.5;
      var r=.05+Math.random()*.3;
      var sh=0.8+Math.random()*1.4;
      var gcol=['#4a9a20','#3a8a18','#5aaa28','#2a7a10','#6aba30'][Math.floor(Math.random()*5)];
      var lf=mk('plane',{width:(.06+Math.random()*.05).toFixed(3),height:sh.toFixed(2),
        position:(x+Math.sin(ang)*r).toFixed(2)+' '+(gy+sh*.5).toFixed(2)+' '+(z+Math.cos(ang)*r).toFixed(2),
        rotation:'0 '+(ang*180/Math.PI).toFixed(1)+' '+(Math.random()*15-7).toFixed(1),
        material:'roughness:.8;side:double;color:'+gcol},par);
      lf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);
      lf.dataset.brx='0';lf.dataset.bry=(ang*180/Math.PI).toFixed(1);
      lf.classList.add('wind-leaf');
    }
  }

  // ══ OISEAU DE PARADIS GÉANT ══
  function makeBirdOfParadise(x,gy,z,par){
    par=par||W;
    var sh=2.2+Math.random()*1.2;
    // Tiges fines
    for(var i=0;i<4;i++){
      var ang=i/4*Math.PI*2+.2;
      var r=.15+Math.random()*.2;
      var stemH=sh+Math.random()*.5;
      mk('cylinder',{radius:'.012',height:stemH.toFixed(2),
        position:(x+Math.sin(ang)*r).toFixed(2)+' '+(gy+stemH*.5).toFixed(2)+' '+(z+Math.cos(ang)*r).toFixed(2),
        material:'color:#1a6010;roughness:.88'},par);
      // Grande feuille vert foncé
      var leafH=1.4+Math.random()*.6,leafW=.38+Math.random()*.18;
      var lf=mk('plane',{width:leafW.toFixed(2),height:leafH.toFixed(2),
        position:(x+Math.sin(ang)*r).toFixed(2)+' '+(gy+stemH+leafH*.3).toFixed(2)+' '+(z+Math.cos(ang)*r).toFixed(2),
        rotation:(-20-Math.random()*15).toFixed(1)+' '+(ang*180/Math.PI).toFixed(1)+' 0',
        material:'roughness:.7;side:double;color:#1a7a22'},par);
      lf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);
      lf.dataset.brx=(-22).toFixed(1);lf.dataset.bry=(ang*180/Math.PI).toFixed(1);
      lf.classList.add('wind-leaf');
    }
    // Fleur orange vif — grande
    var fx=x,fz=z,fy=gy+sh+.3;
    mk('cylinder',{radius:'.015',height:'1.0',position:fx+' '+(fy-.5)+' '+fz,material:'color:#226614;roughness:.88'},par);
    // Spathe (bractée verte)
    mk('plane',{width:'.22',height:'.6',position:fx+' '+fy+' '+fz,rotation:'-15 0 0',
      material:'side:double;color:#1a5a08;roughness:.6'},par);
    // Pétales orange
    for(var pi=0;pi<3;pi++){
      mk('plane',{width:'.18',height:'.38',
        position:(fx+.06+pi*.04)+' '+(fy+.12+pi*.06)+' '+fz,
        rotation:(-30-pi*12).toFixed(1)+' '+(pi*25).toFixed(1)+' '+(pi*15).toFixed(1),
        material:'side:double;color:#ff6600;roughness:.5;emissive:#cc3300;emissiveIntensity:.15'},par);
    }
    // Pétales bleus/violets
    for(var pi=0;pi<2;pi++){
      mk('plane',{width:'.14',height:'.32',
        position:(fx-.04).toFixed(2)+' '+(fy+.18+pi*.08).toFixed(2)+' '+fz,
        rotation:(-20+pi*10).toFixed(1)+' '+(pi*30+15).toFixed(1)+' -12',
        material:'side:double;color:#4422cc;roughness:.5;emissive:#2200aa;emissiveIntensity:.12'},par);
    }
  }

  // ══ HIBISCUS GÉANT ══
  function makeGiantHibiscus(x,gy,z,par){
    par=par||W;
    var cols=['#ff1155','#ff3300','#ff0088','#ff6600','#cc0044','#ff4422'];
    var c=cols[Math.floor(Math.random()*cols.length)];
    var sh=1.2+Math.random()*.8;
    mk('cylinder',{radius:'.025',height:sh.toFixed(2),position:x+' '+(gy+sh/2)+' '+z,material:'color:#1a7010'},par);
    // Feuilles
    for(var li=0;li<3;li++){
      var lang=li/3*Math.PI*2;
      mk('plane',{width:'.28',height:'.35',
        position:(x+Math.sin(lang)*.3).toFixed(2)+' '+(gy+sh*.4+li*.2).toFixed(2)+' '+(z+Math.cos(lang)*.3).toFixed(2),
        rotation:'-25 '+(lang*180/Math.PI).toFixed(1)+' 0',
        material:'side:double;color:#2a8020;roughness:.7'},par);
    }
    // Grande fleur
    for(var i=0;i<5;i++){
      var ang=i/5*Math.PI*2;
      var pr=.32+Math.random()*.08;
      mk('plane',{width:(pr*1.1).toFixed(3),height:(pr*1.9).toFixed(3),
        position:(x+Math.sin(ang)*pr*.55).toFixed(2)+' '+(gy+sh+pr*.4).toFixed(2)+' '+(z+Math.cos(ang)*pr*.55).toFixed(2),
        rotation:'-58 '+(ang*180/Math.PI).toFixed(1)+' 0',material:'roughness:.5;side:double;color:'+c},par);
    }
    mk('sphere',{radius:'.07',position:x+' '+(gy+sh+.06)+' '+z,material:'color:#ffee00;emissive:#ffcc00;emissiveIntensity:.6'},par);
    // Pistil
    mk('cylinder',{radius:'.012',height:'.2',position:x+' '+(gy+sh+.18)+' '+z,material:'color:#ffdd00;roughness:.5'},par);
  }

  // ══ FOUGERE ══
  function makeFern(x,gy,z,par){
    par=par||W;
    var nc=5+Math.floor(Math.random()*4);
    for(var i=0;i<nc;i++){
      var ang=i/nc*Math.PI*2, r=.15+Math.random()*.25;
      var sh=.5+Math.random()*.7;
      var lf=mk('plane',{width:(.12+Math.random()*.1).toFixed(3),height:sh.toFixed(2),
        position:(x+Math.sin(ang)*r).toFixed(2)+' '+(gy+sh*.55).toFixed(2)+' '+(z+Math.cos(ang)*r).toFixed(2),
        rotation:(-25-Math.random()*20).toFixed(1)+' '+(ang*180/Math.PI+90).toFixed(1)+' 0',
        material:'roughness:.8;side:double;color:#'+Math.floor((20+Math.random()*30)).toString(16).padStart(2,'0')+(Math.floor(110+Math.random()*80)).toString(16).padStart(2,'0')+'14'},par);
      lf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);
      lf.dataset.brx=(-30).toFixed(1);lf.dataset.bry=(ang*180/Math.PI+90).toFixed(1);
      lf.classList.add('wind-leaf');
    }
  }

  // ══ MONSTERA ══
  function makeMonstera(x,gy,z,par){
    par=par||W;
    var sh=.9+Math.random()*.5;
    mk('cylinder',{radius:'.025',height:sh.toFixed(2),position:x+' '+(gy+sh/2)+' '+z,material:'color:#1a6010;roughness:.9'},par);
    for(var i=0;i<3;i++){
      var ang=i/3*Math.PI*2+.3,r=.7+Math.random()*.25;
      var lsize=.55+Math.random()*.3;
      var lf=mk('plane',{width:lsize.toFixed(2),height:(lsize*.8).toFixed(2),
        position:(x+Math.sin(ang)*r*.6).toFixed(2)+' '+(gy+sh+.15+i*.05).toFixed(2)+' '+(z+Math.cos(ang)*r*.6).toFixed(2),
        rotation:(-35-i*8).toFixed(1)+' '+(ang*180/Math.PI).toFixed(1)+' '+(i*12).toFixed(1),
        material:'roughness:.7;side:double;color:#1e9918'},par);
      lf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);
      lf.dataset.brx=(-35-i*8).toFixed(1);lf.dataset.bry=(ang*180/Math.PI).toFixed(1);
      lf.classList.add('wind-leaf');
    }
  }

  // ══ STRELITZIA ══
  function makeStrelitzia(x,gy,z,par){
    par=par||W;
    var sh=1.1+Math.random()*.5;
    for(var i=0;i<3;i++){var ang=i/3*Math.PI*2;mk('cylinder',{radius:'.016',height:(sh+i*.12).toFixed(2),position:(x+Math.sin(ang)*.28)+' '+(gy+(sh+i*.12)/2)+' '+(z+Math.cos(ang)*.28),material:'color:#228810'},par);}
    mk('plane',{width:'.14',height:'.4',position:x+' '+(gy+sh+.2)+' '+z,rotation:'0 0 0',material:'side:double;color:#ff6600'},par);
    mk('plane',{width:'.09',height:'.3',position:(x+.09)+' '+(gy+sh+.24)+' '+z,rotation:'0 30 20',material:'side:double;color:#3300ff'},par);
  }

  // ══ LIANE ══
  function makeLiane(x1,y1,z1,x2,y2,z2,par){
    par=par||W;
    var NS=8;
    for(var i=0;i<NS;i++){
      var t0=i/NS,t1=(i+1)/NS;
      var s0=Math.sin(t0*Math.PI)*1.6,s1=Math.sin(t1*Math.PI)*1.6;
      var ax=x1+(x2-x1)*t0,ay=y1+(y2-y1)*t0-s0,az=z1+(z2-z1)*t0;
      var bx=x1+(x2-x1)*t1,by=y1+(y2-y1)*t1-s1,bz=z1+(z2-z1)*t1;
      var dx=bx-ax,dy=by-ay,dz=bz-az,len=Math.sqrt(dx*dx+dy*dy+dz*dz);
      mk('cylinder',{radius:'.022',height:len.toFixed(2),position:((ax+bx)/2).toFixed(2)+' '+((ay+by)/2).toFixed(2)+' '+((az+bz)/2).toFixed(2),rotation:segRot(dx,dy,dz),material:'color:#5a3508;roughness:.95'},par);
    }
  }

  // ══ CHEMIN DE SABLE simple (sans cailloux intrusifs) ══
  function makeSandPath(x1,z1,x2,z2,gy,par,width){
    par=par||W;
    width=width||1.2;
    var dx=x2-x1,dz=z2-z1,len=Math.sqrt(dx*dx+dz*dz);
    var ang=Math.atan2(dx,dz)*180/Math.PI;
    var mx=(x1+x2)/2,mz=(z1+z2)/2;
    mk('plane',{width:width,height:len.toFixed(2),rotation:'-90 '+ang.toFixed(1)+' 0',
      position:mx.toFixed(2)+' '+(gy+.02).toFixed(3)+' '+mz.toFixed(2),
      material:'color:#d4b88a;roughness:.95'},par);
  }

  // ══ CHEMIN EN SABLE QUI MONTE (plusieurs segments droits) ══
  function makeSandPathUp(pts, par){
    par=par||W;
    for(var i=0;i<pts.length-1;i++){
      var p0=pts[i],p1=pts[i+1];
      var dx=p1.x-p0.x,dy=p1.y-p0.y,dz=p1.z-p0.z;
      var len=Math.sqrt(dx*dx+dz*dz);
      var ang=Math.atan2(dx,dz)*180/Math.PI;
      var mx=(p0.x+p1.x)/2,mz=(p0.z+p1.z)/2,my=(p0.y+p1.y)/2;
      // Plan incliné de sable
      var pitchAng=Math.atan2(dy,len)*180/Math.PI;
      mk('plane',{width:'1.4',height:(Math.sqrt(dx*dx+dy*dy+dz*dz)).toFixed(2),
        rotation:(-(90-pitchAng)).toFixed(1)+' '+ang.toFixed(1)+' 0',
        position:mx.toFixed(2)+' '+(my+.03).toFixed(2)+' '+mz.toFixed(2),
        material:'color:#d4b88a;roughness:.95'},par);
    }
  }

  // ══ PONT LARGE 1m ══
  function makeBridge(x1,y1,z1,x2,y2,z2){
    var bdx=x2-x1,bdz=z2-z1;
    var len=Math.sqrt(bdx*bdx+bdz*bdz);
    var ang=Math.atan2(bdx,bdz)*180/Math.PI;
    var perp=new THREE.Vector3(-bdz,0,bdx).normalize();

    // Largeur du pont : 1 unité (1 mètre de jeu)
    var BRIDGE_WIDTH=1.0;
    var ROPE_OFFSET=BRIDGE_WIDTH/2; // 0.5 de chaque côté
    var PLANK_H=0.10;
    var PLANK_W=0.38; // sens de marche
    var GAP=0.08;
    var nPlanks=Math.floor(len/(PLANK_W+GAP));

    var WATER_SURFACE_Y=-0.48;
    var MIN_H=WATER_SURFACE_Y+1.8;

    function bY(t){return Math.max(MIN_H, y1+(y2-y1)*t);}

    // Planches : width = PLANK_W (sens marche), depth = BRIDGE_WIDTH (largeur)
    for(var i=0;i<nPlanks;i++){
      var t=(i+.5)/nPlanks;
      var px=x1+bdx*t, pz=z1+bdz*t, py=bY(t);
      mk('box',{
        width:PLANK_W, height:PLANK_H, depth:BRIDGE_WIDTH,
        position:px.toFixed(2)+' '+py.toFixed(2)+' '+pz.toFixed(2),
        rotation:'0 '+ang.toFixed(1)+' 0',
        material:'color:'+(i%2===0?'#a0622a':'#8a5020')+';roughness:.95',
        shadow:'cast:true;receive:true'
      });
      addPlatform(px,pz,py,PLANK_W*.6,BRIDGE_WIDTH*.5);
    }

    // Cordes (2 côtés, 2 hauteurs) — à peine 0.5 de chaque côté
    for(var side=-1;side<=1;side+=2){
      var pOff=perp.clone().multiplyScalar(ROPE_OFFSET*side);
      var ROPE_H=[0.55, 1.05];
      for(var ri=0;ri<ROPE_H.length;ri++){
        var rh=ROPE_H[ri];
        for(var i=0;i<nPlanks;i++){
          var t0=i/nPlanks, t1=(i+1)/nPlanks;
          var ax=x1+bdx*t0+pOff.x, ay=bY(t0)+rh, az=z1+bdz*t0+pOff.z;
          var bx2=x1+bdx*t1+pOff.x, by2=bY(t1)+rh, bz2=z1+bdz*t1+pOff.z;
          var dx2=bx2-ax,dy2=by2-ay,dz2=bz2-az,rl=Math.sqrt(dx2*dx2+dy2*dy2+dz2*dz2);
          mk('cylinder',{radius:'.028',height:rl.toFixed(2),
            position:((ax+bx2)/2).toFixed(2)+' '+((ay+by2)/2).toFixed(2)+' '+((az+bz2)/2).toFixed(2),
            rotation:segRot(dx2,dy2,dz2),
            material:'color:#6a3a10;roughness:.95'});
        }
      }
      // Poteaux verticaux
      for(var i=1;i<nPlanks-1;i+=3){
        var t=i/nPlanks;
        var px2=x1+bdx*t+pOff.x, pz2=z1+bdz*t+pOff.z, py2=bY(t);
        mk('cylinder',{radius:'.035',height:'1.1',
          position:px2.toFixed(2)+' '+(py2+.55).toFixed(2)+' '+pz2.toFixed(2),
          material:'color:#7a4a10;roughness:.95'});
      }
      // Poteaux aux extrémités
      [[x1,bY(0),z1],[x2,bY(1),z2]].forEach(function(p){
        mk('cylinder',{radius:'.1',height:'2.8',
          position:(p[0]+pOff.x).toFixed(2)+' '+(p[1]+1.4).toFixed(2)+' '+(p[2]+pOff.z).toFixed(2),
          material:'color:#7a4a10;roughness:.95',shadow:'cast:true'});
      });
    }
  }

  // ══ ETAL DE MARCHE ══
  function makeMarketStall(x,gy,z,type,rot,par){
    par=par||W;rot=rot||0;

    [[-0.9,-.8],[0.9,-.8],[-0.9,.8],[0.9,.8]].forEach(function(off){
      var pp=lp(off[0],off[1]);mk('cylinder',{radius:'.04',height:'1.8',position:pp.x.toFixed(2)+' '+(gy+.9)+' '+pp.z.toFixed(2),material:'color:#8a5010;roughness:.9'},par);

        var ap=lp(-.6+ai*.3,0);
        mk('cylinder',{radius:'.04',height:'.3',position:ap.x.toFixed(2)+' '+(gy+1.08)+' '+ap.z.toFixed(2),material:'color:#ffcc44;roughness:.5;emissive:#ffaa00;emissiveIntensity:.2'},par);

  // ══ MAISON HAWAIIENNE RÉALISTE (bois+paille, style vrai bungalow) ══
  function makeRealisticHut(cx,gy,cz,rot,par){
    par=par||W;rot=rot||0;
    var rad=rot*Math.PI/180,cs=Math.cos(rad),sn=Math.sin(rad);
    function lp(ox,oz){return{x:cx+ox*cs-oz*sn,z:cz+ox*sn+oz*cs};}
    function lpos(ox,oy,oz){var p=lp(ox,oz);return p.x.toFixed(2)+' '+(gy+oy).toFixed(2)+' '+p.z.toFixed(2);}

    var BW=4.5,BD=5.0,BH=2.8;
    var wallCol='#c8a862'; // bois clair naturel
    var roofCol='#8b6914';

    // Pilotis (fondation)
    [[-BW/2+.4,-BD/2+.4],[BW/2-.4,-BD/2+.4],[-BW/2+.4,BD/2-.4],[BW/2-.4,BD/2-.4],
     [0,-BD/2+.4],[0,BD/2-.4]].forEach(function(off){
      var pp=lp(off[0],off[1]);
      mk('cylinder',{radius:'.12',height:'1.1',
        position:pp.x.toFixed(2)+' '+(gy+.55)+' '+pp.z.toFixed(2),
        material:'color:#7a4a15;roughness:.92'},par);
    });

    // Plancher
    mk('box',{width:BW,height:'.16',depth:BD,
      position:lpos(0,1.08,0),rotation:'0 '+rot+' 0',
      material:'color:#b8903a;roughness:.88'},par);
    // Lames de plancher
    for(var li=-4;li<=4;li++){
      mk('box',{width:BW-.05,height:'.02',depth:'.28',
        position:lpos(0,1.17,li*.32),rotation:'0 '+rot+' 0',
        material:'color:#c09840;roughness:.85'},par);
    }

    // Murs (planches de bois horizontales)
    var wallH=BH;
    // Façade
    mk('box',{width:BW,height:wallH,depth:'.14',
      position:lpos(0,1.08+wallH/2,BD/2),rotation:'0 '+rot+' 0',
      material:'color:'+wallCol+';roughness:.88'},par);
    // Lignes de planches horizontales façade
    for(var wli=0;wli<6;wli++){
      mk('box',{width:BW-.1,height:'.045',depth:'.12',
        position:lpos(0,1.2+wli*.46,BD/2+.07),rotation:'0 '+rot+' 0',
        material:'color:#b09045;roughness:.9'},par);
    }
    // Arrière
    mk('box',{width:BW,height:wallH,depth:'.14',
      position:lpos(0,1.08+wallH/2,-BD/2),rotation:'0 '+rot+' 0',
      material:'color:'+wallCol+';roughness:.88'},par);
    // Côtés
    mk('box',{width:'.14',height:wallH,depth:BD,
      position:lpos(-BW/2,1.08+wallH/2,0),rotation:'0 '+rot+' 0',
      material:'color:'+wallCol+';roughness:.88'},par);
    mk('box',{width:'.14',height:wallH,depth:BD,
      position:lpos(BW/2,1.08+wallH/2,0),rotation:'0 '+rot+' 0',
      material:'color:'+wallCol+';roughness:.88'},par);

    // Toit en 2 pans (pignon) — plus réaliste qu'un cône
    var roofH=2.2,roofY=1.08+wallH;
    // Pan avant (gauche)
    mk('box',{width:BW+.5,height:'.14',depth:BD/2+.5,
      position:lpos(0,roofY+roofH*.5,BD/4),rotation:((-Math.atan2(roofH,BD/2)*180/Math.PI)).toFixed(1)+' '+rot+' 0',
      material:'color:'+roofCol+';roughness:.92'},par);
    // Pan arrière (droit)
    mk('box',{width:BW+.5,height:'.14',depth:BD/2+.5,
      position:lpos(0,roofY+roofH*.5,-BD/4),rotation:((Math.atan2(roofH,BD/2)*180/Math.PI)).toFixed(1)+' '+rot+' 0',
      material:'color:'+roofCol+';roughness:.92'},par);
    // Faîtage
    mk('cylinder',{radius:'.07',height:(BW+.6).toFixed(1),
      position:lpos(0,roofY+roofH,0),rotation:'0 0 90',
      material:'color:#6a4a10;roughness:.9'},par);
    // Avant-toit (bordures)
    mk('box',{width:'.1',height:(roofH+.2).toFixed(2),depth:BD+1.0,
      position:lpos(-BW/2-.24,roofY+roofH/2,0),rotation:'0 '+rot+' 0',
      material:'color:#6a4a10;roughness:.9'},par);
    mk('box',{width:'.1',height:(roofH+.2).toFixed(2),depth:BD+1.0,
      position:lpos(BW/2+.24,roofY+roofH/2,0),rotation:'0 '+rot+' 0',
      material:'color:#6a4a10;roughness:.9'},par);
    // Planches de chaume sur le toit
    for(var ri=0;ri<8;ri++){
      mk('box',{width:(BW+.5).toFixed(1),height:'.06',depth:'.35',
        position:lpos(0,roofY+ri*.23,(BD/2+.5)*(.5-ri/14)),
        rotation:((-Math.atan2(roofH,BD/2)*180/Math.PI)).toFixed(1)+' '+rot+' 0',
        material:'color:#9a7a1a;roughness:.95'},par);
      mk('box',{width:(BW+.5).toFixed(1),height:'.06',depth:'.35',
        position:lpos(0,roofY+ri*.23,-(BD/2+.5)*(.5-ri/14)),
        rotation:((Math.atan2(roofH,BD/2)*180/Math.PI)).toFixed(1)+' '+rot+' 0',
        material:'color:#9a7a1a;roughness:.95'},par);
    }

    // Porte en bois sculpté
    mk('box',{width:'1.1',height:'2.0',depth:'.12',
      position:lpos(0,1.08+1.0,BD/2+.08),rotation:'0 '+rot+' 0',

    // Encadrement porte

    // Véranda/terrasse avec rambarde
    mk('box',{width:BW,height:'.1',depth:'1.2',

    for(var bi=-4;bi<=4;bi++){
      var bp=lp(bi*(BW/9),BD/2+1.25);

        position:bp.x.toFixed(2)+' '+(gy+1.43)+' '+bp.z.toFixed(2),

    mk('box',{width:BW,height:'.06',depth:'.06',
      position:lpos(0,1.08+.74,BD/2+1.25),rotation:'0 '+rot+' 0',
      material:'color:#7a5015;roughness:.88'},par);

    // Escalier d'entrée (3 marches)
    for(var si=0;si<3;si++){
      mk('box',{width:'1.4',height:'.14',depth:'.5',
        position:lpos(0,1.08-.04-si*.14,BD/2+1.0+si*.52),rotation:'0 '+rot+' 0',
        material:'color:#c0a048;roughness:.9'},par);

    // Plante en pot sur la véranda

    makeBirdOfParadise(ppos.x,gy+1.6,ppos.z,par);

    addWall(cx,cz,BW/2+.4,BH+2.5,gy);
  }

  // ══ FONTAINE CENTRALE ══
  function makeFountain(x,gy,z,par){
    par=par||W;
    mk('cylinder',{radius:'2.2',height:'.35',position:x+' '+(gy+.17)+' '+z,material:'color:#c0b8a0;roughness:.88'},par);
    mk('torus',{radius:'1.8','radius-tubular':'.22','segments-radial':'6',rotation:'90 0 0',position:x+' '+(gy+.52)+' '+z,material:'color:#c0b8a0;roughness:.85'},par);
    mk('cylinder',{radius:'1.78',height:'.42',position:x+' '+(gy+.72)+' '+z,material:'color:#22ccee;transparent:true;opacity:.75;roughness:.04'},par);
    mk('cylinder',{radius:'.22',height:'2.2',position:x+' '+(gy+1.1+.52)+' '+z,material:'color:#d0c8b0;roughness:.85'},par);
    mk('sphere',{radius:'.38',position:x+' '+(gy+2.5)+' '+z,material:'color:#d8d0b8;roughness:.82'},par);
    for(var ji=0;ji<6;ji++){
      var jang=ji/6*Math.PI*2;
      var jr=.28;
      mk('cylinder',{radius:'.03',height:'.7',position:(x+Math.sin(jang)*jr).toFixed(2)+' '+(gy+2.8).toFixed(2)+' '+(z+Math.cos(jang)*jr).toFixed(2),rotation:(20).toFixed(0)+' '+(jang*180/Math.PI).toFixed(1)+' 0',material:'color:#88ddff;transparent:true;opacity:.78;roughness:.04'},par);
    }
    addWall(x,z,2.4,2.5,gy);
  }

  // ══ EGLISE HAWAIIENNE ══
  function makeChurch(cx,gy,cz,rot,par){
    par=par||W;rot=rot||0;
    var rad=rot*Math.PI/180,cs=Math.cos(rad),sn=Math.sin(rad);
    function lp(ox,oz){return{x:cx+ox*cs-oz*sn,z:cz+ox*sn+oz*cs};}
    function lpos(ox,oy,oz){var p=lp(ox,oz);return p.x.toFixed(2)+' '+(gy+oy).toFixed(2)+' '+p.z.toFixed(2);}
    var BW=5.5,BD=9,BH=3.5;
    mk('box',{width:BW,height:BH,depth:BD,position:lpos(0,BH/2+.15,0),rotation:'0 '+rot+' 0',material:'color:#e8e0cc;roughness:.88'},par);
    mk('box',{width:BW+.4,height:'.25',depth:BD+.4,position:lpos(0,.12,0),rotation:'0 '+rot+' 0',material:'color:#c0b890;roughness:.9'},par);
    [-1.8,0,1.8].forEach(function(ox){
      var pp=lp(ox,BD/2+.1);
      mk('cylinder',{radius:'.15',height:BH,position:pp.x.toFixed(2)+' '+(gy+BH/2+.15)+' '+pp.z.toFixed(2),material:'color:#d8d0b8;roughness:.88'},par);
    });
    mk('cone',{'radius-bottom':(BW/2+.5).toFixed(1),'radius-top':'.12',height:'2.2','segments-radial':'4',position:lpos(0,BH+1.25,0),rotation:'0 '+(rot+45)+' 0',material:'color:#8a5a22;roughness:.9'},par);
    mk('box',{width:'1.8',height:BH+1.8,depth:'1.8',position:lpos(0,BH+.9+.15,BD/2+.8),rotation:'0 '+rot+' 0',material:'color:#e0d8c4;roughness:.88'},par);
    mk('cone',{'radius-bottom':'1.3','radius-top':'.06',height:'2.5','segments-radial':'4',position:lpos(0,BH+2.8+.15+1.25,BD/2+.8),rotation:'0 '+(rot+45)+' 0',material:'color:#8a5a22;roughness:.9'},par);
    mk('cylinder',{radius:'.04',height:'1.1',position:lpos(0,BH+5.5+.15,BD/2+.8),material:'color:#f8f8f0;roughness:.8'},par);
    mk('cylinder',{radius:'.04',height:'.55',position:lpos(0,BH+5.9+.15,BD/2+.8),rotation:'0 0 90',material:'color:#f8f8f0;roughness:.8'},par);
    mk('box',{width:'1.2',height:'2.1',depth:'.15',position:lpos(0,1.2+.15,BD/2+.12),rotation:'0 '+rot+' 0',material:'color:#4a2808;roughness:.88'},par);
    mk('torus',{radius:'.45','radius-tubular':'.06','segments-radial':'12',position:lpos(0,BH-.5,BD/2+.2),rotation:'0 '+rot+' 0',material:'color:#c8a840;roughness:.7'},par);
    mk('circle',{radius:'.38',position:lpos(0,BH-.5,BD/2+.22),rotation:'0 '+rot+' 0',material:'color:#aaddff;transparent:true;opacity:.65;roughness:.1'},par);
    for(var si=0;si<3;si++){mk('box',{width:BW-.2,height:'.14',depth:'.7',position:lpos(0,si*.14+.15,BD/2+si*.38+.55),rotation:'0 '+rot+' 0',material:'color:#d0c8b0;roughness:.9'},par);}
    addWall(cx,cz,BW/2+.4,BH+4,gy);
  }

  // ══ COLLINE + VILLAGE ══
  function buildHill(par){
    par=par||W;
    var HILL_CX=0, HILL_CZ=-22;
    var HILL_BASE_Y=0.0;
    var HILL_TOP_Y=14.0;
    var HILL_R=24;

    mk('sphere',{radius:HILL_R.toFixed(0),position:HILL_CX+' '+(HILL_BASE_Y-18)+' '+HILL_CZ,scale:'1 .85 1',material:'color:#3a7a20;roughness:.95',shadow:'cast:true;receive:true'},par);
    mk('sphere',{radius:(HILL_R*.78).toFixed(0),position:HILL_CX+' '+(HILL_BASE_Y-12)+' '+HILL_CZ,scale:'1 .82 1',material:'color:#2a7018;roughness:.95'},par);
    mk('sphere',{radius:(HILL_R*.55).toFixed(0),position:HILL_CX+' '+(HILL_BASE_Y-4)+' '+HILL_CZ,scale:'1 .8 1',material:'color:#5a4a30;roughness:.97'},par);
    mk('sphere',{radius:(HILL_R*.38).toFixed(0),position:HILL_CX+' '+(HILL_BASE_Y+3)+' '+HILL_CZ,scale:'1 .75 1',material:'color:#3a8a22;roughness:.95'},par);
    mk('sphere',{radius:(HILL_R*.22).toFixed(0),position:HILL_CX+' '+(HILL_BASE_Y+9)+' '+HILL_CZ,scale:'1 .7 1',material:'color:#2a7a18;roughness:.94'},par);
    mk('cylinder',{radius:'10',height:'.4',position:HILL_CX+' '+HILL_TOP_Y+' '+HILL_CZ,material:'color:#2a8018;roughness:.94'},par);
    addPlatform(HILL_CX,HILL_CZ,HILL_TOP_Y,10,10);

    // Rochers
    var hillRocks=[[HILL_CX-8,4,HILL_CZ-5,1.4,.52],[HILL_CX+7,5,HILL_CZ+4,1.2,.5],[HILL_CX-5,7,HILL_CZ+8,1.8,.48],[HILL_CX+9,8,HILL_CZ-6,1.1,.55],[HILL_CX-10,6,HILL_CZ-2,1.6,.5],[HILL_CX+3,9,HILL_CZ-9,2.0,.46],[HILL_CX-3,3,HILL_CZ+12,1.4,.52],[HILL_CX+11,3,HILL_CZ+7,1.3,.5]];
    hillRocks.forEach(function(r){makeRock(r[0],r[1],r[2],r[3],r[4],par);});

    // ── CHEMIN DE SABLE UNIQUE qui monte en pente (pas de spirale, pas de cailloux partout)
    // Chemin du bas de l'île jusqu'au sommet de la colline
    var pathPoints=[
      {x:0, y:HILL_BASE_Y+.02, z:HILL_CZ+HILL_R},       // début au bord de la colline
      {x:4, y:1.8, z:HILL_CZ+18},
      {x:8, y:3.5, z:HILL_CZ+12},
      {x:10, y:5.5, z:HILL_CZ+6},
      {x:8, y:8.0, z:HILL_CZ+0},
      {x:4, y:11.0, z:HILL_CZ-5},
      {x:HILL_CX, y:HILL_TOP_Y+.1, z:HILL_CZ}            // sommet
    ];
    makeSandPathUp(pathPoints, par);

    // Chemin depuis la plage jusqu'au pied de la colline
    makeSandPath(0, 0, 0, HILL_CZ+HILL_R+2, HILL_BASE_Y, par, 1.4);

    // ── PLACE DU VILLAGE au sommet
    var VX=HILL_CX, VZ=HILL_CZ, VY=HILL_TOP_Y+.2;
    mk('cylinder',{radius:'8',height:'.08',position:VX+' '+VY+' '+VZ,material:'color:#d4b070;roughness:.96'},par);
    for(var pi=0;pi<3;pi++){mk('torus',{radius:(2+pi*1.8).toFixed(1),'radius-tubular':'.06','segments-radial':'16',rotation:'90 0 0',position:VX+' '+(VY+.04)+' '+VZ,material:'color:#c4a060;roughness:.96'},par);}

    makeFountain(VX, VY, VZ, par);
    makeChurch(VX, VY, VZ-6.5, 0, par);

    // MAISONS RÉALISTES au sommet
    var hutPositions=[
      [VX+7.0, VZ+2.5, 35],
      [VX-7.0, VZ+2.5, -35],
      [VX+6.2, VZ-4.5, 80],
      [VX-6.2, VZ-4.5, -80],
      [VX+3.5, VZ+6.5, 15],
      [VX-3.5, VZ+6.5, -15],
    ];
    hutPositions.forEach(function(h){makeRealisticHut(h[0], VY, h[1], h[2], par);});

    // Marchés
    [[VX+3.5,VZ+3.5,'fruits',20],[VX-3.5,VZ+3.5,'artisanat',-20],[VX+4.0,VZ-1.5,'poisson',55],[VX-4.0,VZ-1.5,'artisanat',-55]].forEach(function(s){makeMarketStall(s[0],VY,s[1],s[2],s[3],par);});

    // Personnes
    makePerson(VX+3.5,VY,VZ+5.5,'#f4c08a','market',200,par);
    makePerson(VX-3.2,VY,VZ+5.8,'#d4906a','market',160,par);
    makePerson(VX+1.8,VY,VZ+3.5,'#f0c8a0','walk',45,par);
    makePerson(VX-2.0,VY,VZ+3.0,'#e0b090','walk',-30,par);
    makePerson(VX+1.0,VY,VZ-2.8,'#d8a880','walk',180,par);

    // PALMIERS fins autour du village
    var hillPalmAngles=[0,.5,1.1,1.7,2.3,2.9,3.5,4.1,4.7,5.3];
    hillPalmAngles.forEach(function(ang){
      var r4=8+Math.random()*2;
      var px=VX+Math.cos(ang)*r4, pz=VZ+Math.sin(ang)*r4;
      makePalm(px,VY,pz,4+Math.random()*2,Math.cos(ang)*.3,Math.sin(ang)*.3,par);
    });

    // VÉGÉTATION HAUTE au sommet — herbes, oiseaux de paradis, hibiscus géants
    for(var vi=0;vi<12;vi++){
      var vang=vi/12*Math.PI*2,vr=7+Math.random()*2.5;
      var vx=VX+Math.cos(vang)*vr,vz=VZ+Math.sin(vang)*vr;
      makeTallGrass(vx,VY,vz,par);
      if(vi%3===0) makeBirdOfParadise(vx+.5,VY,vz+.3,par);
      if(vi%4===0) makeGiantHibiscus(vx-.4,VY,vz-.3,par);
    }

    // Sur les pentes de la colline
    var slopePalms=[[HILL_CX-9,3,HILL_CZ+4],[HILL_CX+8,4,HILL_CZ+6],[HILL_CX-6,5,HILL_CZ-8],[HILL_CX+10,4,HILL_CZ-4],[HILL_CX-11,3,HILL_CZ-6],[HILL_CX+5,6,HILL_CZ-10],[HILL_CX-4,5,HILL_CZ+10],[HILL_CX+12,3,HILL_CZ+2],[HILL_CX-2,8,HILL_CZ-12]];
    slopePalms.forEach(function(p){
      makePalm(p[0],p[1],p[2],4.5+Math.random()*2.5,(Math.random()-.5)*.4,(Math.random()-.5)*.4,par);
      // Herbe haute et fleurs sur les pentes
      makeTallGrass(p[0]+1,p[1],p[2]-.5,par);
      if(Math.random()>.5) makeBirdOfParadise(p[0]-.5,p[1],p[2]+.5,par);
      if(Math.random()>.6) makeGiantHibiscus(p[0]+.5,p[1],p[2]+.5,par);
    });
  }

  // ══ MONDE SOUS-MARIN ══
  function buildUnderwaterWorld(){
    var U=UW;var DEPTH=-18;
    mk('plane',{width:'800',height:'800',rotation:'-90 0 0',position:'0 '+DEPTH+' 0',material:'color:#c8d890;roughness:.92'},U);
    var coralData=[[10,-15,15,'#ff4488'],[18,-15,8,'#ff6600'],[5,-15,22,'#ff1155'],[25,-15,18,'#ee2200'],[-12,-15,10,'#ff44aa'],[-8,-15,20,'#ff7700'],[20,-15,-10,'#cc0088'],[-20,-15,15,'#ff3300'],[15,-15,-18,'#ff5500'],[-15,-15,-12,'#ee1155'],[30,-15,5,'#ff6622'],[-28,-15,8,'#ff2244'],[0,-15,28,'#ff4400'],[22,-15,25,'#dd1166'],[-22,-15,22,'#ff5533']];
    coralData.forEach(function(c){makeCoral(c[0],c[1],c[2],c[3],U);});
    for(var i=0;i<40;i++){
      var ax=(Math.random()-.5)*100,az=(Math.random()-.5)*100,ah=1.2+Math.random()*2.5;
      var alg=mk('plane',{width:'.18',height:ah.toFixed(2),position:ax.toFixed(1)+' '+(DEPTH+ah/2)+' '+az.toFixed(1),rotation:'0 '+(Math.random()*360)+' 0',material:'side:double;color:#1a8a30;roughness:.7;transparent:true;opacity:.85'},U);
      alg.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);alg.dataset.brx='0';alg.dataset.bry=(Math.random()*360).toFixed(1);alg.classList.add('wind-leaf');
    }
    for(var i=0;i<8;i++){var sx=(Math.random()-.5)*60,sz=(Math.random()-.5)*60;mk('cylinder',{radius:'.3',height:'.06',position:sx.toFixed(1)+' '+(DEPTH+.03)+' '+sz.toFixed(1),material:'color:#ff6633;roughness:.7'},U);}
    for(var i=0;i<12;i++){var shx=(Math.random()-.5)*70,shz=(Math.random()-.5)*70;mk('sphere',{radius:'.12',position:shx.toFixed(1)+' '+(DEPTH+.06)+' '+shz.toFixed(1),scale:'1 .4 1',material:'color:#f0d080;roughness:.6'},U);}
    for(var i=0;i<10;i++){var rrx=(Math.random()-.5)*80,rrz=(Math.random()-.5)*80;mk('sphere',{radius:(1+Math.random()*2).toFixed(1),position:rrx.toFixed(1)+' '+(DEPTH+1)+' '+rrz.toFixed(1),scale:'1 .6 1',material:'color:#4a3a28;roughness:.97'},U);}
    for(var i=0;i<18;i++){
      var fish=mk('entity',{},U);
      var fr=.1+Math.random()*.15,fc=randomFishColor();
      mk('sphere',{radius:fr.toFixed(3),material:'color:#'+fc+';roughness:.5;emissive:#'+fc+';emissiveIntensity:.3'},fish);
      mk('cone',{'radius-bottom':(fr*.5).toFixed(3),'radius-top':'.01',height:(fr*1.2).toFixed(3),position:(-fr*1.0).toFixed(3)+' 0 0',rotation:'0 0 90',material:'color:#'+fc+';roughness:.5'},fish);
      mk('sphere',{radius:(fr*.22).toFixed(3),position:(fr*.5).toFixed(3)+' '+(fr*.2).toFixed(3)+' '+(fr*.55).toFixed(3),material:'color:#111;roughness:.4'},fish);
      fish.classList.add('fish-anim');fish.dataset.fishPhase=(Math.random()*Math.PI*2).toFixed(3);fish.dataset.fishR=(8+Math.random()*25).toFixed(1);fish.dataset.fishDepth=(-5-Math.random()*12).toFixed(1);fish.dataset.fishSpeed=(.3+Math.random()*.4).toFixed(3);
    }
    mk('point',{position:'0 -10 0',color:'#0088cc',intensity:'1.2',distance:'60'},U);
    mk('point',{position:'20 -14 20',color:'#00aaff',intensity:'0.8',distance:'40'},U);
    mk('point',{position:'-20 -14 -20',color:'#00ccaa',intensity:'0.6',distance:'35'},U);
  }
  function randomFishColor(){var cols=['ff8800','ff0044','00ccff','ffff00','ff44aa','88ffcc','ff6622','22ffcc','ff2266'];return cols[Math.floor(Math.random()*cols.length)];}
  function makeCoral(x,y,z,col,par){
    par=par||UW;var h=1.5+Math.random()*2.5,nb=4+Math.floor(Math.random()*5);
    mk('cylinder',{'radius-bottom':'.18','radius-top':'.12',height:h.toFixed(2),position:x+' '+(y+h/2)+' '+z,material:'color:'+col+';roughness:.6;emissive:'+col+';emissiveIntensity:.2'},par);
    for(var b=0;b<nb;b++){var ang=b/nb*Math.PI*2,br=.3+Math.random()*.5,bh=.8+Math.random()*1.4;var bx=x+Math.sin(ang)*br,bz=z+Math.cos(ang)*br;mk('cylinder',{'radius-bottom':'.1','radius-top':'.06',height:bh.toFixed(2),position:bx.toFixed(2)+' '+(y+h+bh/2).toFixed(2)+' '+bz.toFixed(2),rotation:(Math.random()*30-15).toFixed(1)+' '+(ang*180/Math.PI).toFixed(1)+' 0',material:'color:'+col+';roughness:.5;emissive:'+col+';emissiveIntensity:.3'},par);}
    for(var bb=0;bb<3;bb++){var bang=Math.random()*Math.PI*2,br2=.1+Math.random()*.2;mk('sphere',{radius:'.08',position:(x+Math.sin(bang)*br2).toFixed(2)+' '+(y+h+.5+Math.random()*.5).toFixed(2)+' '+(z+Math.cos(bang)*br2).toFixed(2),material:'color:'+col+';roughness:.4;emissive:'+col+';emissiveIntensity:.4'},par);}
  }

  // — ILE PRINCIPALE —
  (function(){
    var GY=0.0;
    mk('plane',{width:'64',height:'64',rotation:'-90 0 0',position:'0 .01 0',src:'#tGrass',repeat:'8 8',material:'roughness:.88',shadow:'receive:true'});
    mk('ring',{'radius-inner':'28','radius-outer':'68','segments-theta':'64',rotation:'-90 0 0',position:'0 .005 0',material:'color:'+SAND_COL+';roughness:.92',shadow:'receive:true'});
    mk('cylinder',{radius:'68',height:'1.4',position:'0 -.7 0',material:'color:'+SAND_WET+';roughness:.95'});
    addPlatform(0,0,GY,67,67);
    islandDefs.push({cx:0,cz:0,y:GY,label:'ILE PRINCIPALE'});

    buildHill();

    // Palmiers fins autour de l'île
    var palmRings=[[14,3.5,6],[22,3.2,7],[30,2.8,8],[38,2.5,10],[50,2.2,12],[60,2.0,14]];
    palmRings.forEach(function(rd,ri){
      var spacing=rd[1];
      var cnt=Math.floor(2*Math.PI*rd[0]/spacing);
      for(var j=0;j<cnt;j++){
        var ang=j/cnt*Math.PI*2+ri*.55;
        var px=Math.sin(ang)*rd[0],pz=Math.cos(ang)*rd[0];
        // Éviter la zone colline
        if(rd[0]<26&&pz<-10)continue;
        makePalm(px,GY,pz,4.5+Math.random()*3,Math.sin(ang)*(.2+Math.random()*.4),Math.cos(ang)*(.2+Math.random()*.4));
      }
    });
    // Palmiers épars
    for(var i=0;i<16;i++){
      var ang=Math.random()*Math.PI*2,r=3+Math.random()*20;
      if(r<26&&Math.cos(ang)<-.3)continue;
      var px=Math.sin(ang)*r,pz=Math.cos(ang)*r;
      makePalm(px,GY,pz,4+Math.random()*3,(Math.random()-.5)*.3,(Math.random()-.5)*.3);
    }

    // HERBE HAUTE + FLEURS partout sur la plage et l'île
    for(var gi=0;gi<35;gi++){
      var gang=Math.random()*Math.PI*2,gr=4+Math.random()*55;
      if(gr<26&&Math.cos(gang)<-.3)continue;
      var gx=Math.sin(gang)*gr,gz=Math.cos(gang)*gr;
      makeTallGrass(gx,GY,gz);
      if(Math.random()>.65) makeBirdOfParadise(gx+.5,GY,gz+.3);
      if(Math.random()>.7) makeGiantHibiscus(gx-.4,GY,gz-.2);

  // ══ ANIMATION STITCH — bones exacts du GLB stitch2_2.glb ══
  // Noms réels extraits du fichier GLB (suffixe _Stitch_Armature)
  var SFX = '_Stitch_Armature'; // suffixe commun
  var BONES = {};   // os par clé fonctionnelle
  var BONE_REST = {}; // rotations au repos
  var ANIM_T = 0;

  // Correspondance clé → nom exact du bone dans le GLB
  var BONE_MAP = {
    root:      'ROOT'+SFX,
    spine0:    'Spine_start'+SFX,

    spine2:    'Spine.002'+SFX,

    armL:      'Arm.L'+SFX,
    foreArmL:  'ForeArm.L'+SFX,
    wristL:    'Wrist.L'+SFX,
    // Bras droit
    shoulderR: 'Shoulder.R'+SFX,
    armR:      'Arm.R'+SFX,
    foreArmR:  'ForeArm.R'+SFX,
    wristR:    'Wrist.R'+SFX,
    // Jambe gauche (cuisse → genou → pied)
    hipL:      'Hip.L'+SFX,
    legL:      'Leg.L'+SFX,
    foreLegL:  'ForeLeg.L'+SFX,
    heelL:     'Heel.L'+SFX,
    stepL:     'Step.L'+SFX,
    // Jambe droite
    hipR:      'Hip.R'+SFX,
    legR:      'Leg.R'+SFX,
    foreLegR:  'ForeLeg.R'+SFX,
    heelR:     'Heel.R'+SFX,
    stepR:     'Step.R'+SFX,
    // Queue / extras
    butt:      'Butt'+SFX,
    tail:      'Tail'+SFX,
    // Oreilles
    earAL:     'Ear_A.L'+SFX,
    earAR:     'Ear_A.R'+SFX,
  };

  function findBoneByName(root, name){
    var found = null;
    root.traverse(function(o){
      if(found) return;
      if(o.name === name) found = o;
    });
    return found;
  }

  function saveBoneRest(key, bone){
    if(!bone) return;
    BONE_REST[key] = {x:bone.rotation.x, y:bone.rotation.y, z:bone.rotation.z};
  }

  // Appliquer rotation RELATIVE à la pose au repos
  function rb(key, rx, ry, rz){
    var b = BONES[key]; if(!b) return;
    var r = BONE_REST[key] || {x:0,y:0,z:0};
    b.rotation.x = r.x + (rx||0);
    b.rotation.y = r.y + (ry||0);
    b.rotation.z = r.z + (rz||0);
  }

  // Remettre un bone à sa pose de repos
  function resetBone(key){
    var b = BONES[key]; if(!b) return;
    var r = BONE_REST[key] || {x:0,y:0,z:0};
    b.rotation.x = r.x; b.rotation.y = r.y; b.rotation.z = r.z;
  }

  var stitchModel = document.getElementById('stitch-model');
  stitchModel.addEventListener('model-loaded', function(){
    var mesh = stitchModel.getObject3D('mesh');
    if(!mesh) return;

    // Mise à l'échelle
    var box = new THREE.Box3().setFromObject(mesh);
    var h = box.max.y - box.min.y;
    if(h > .05){ var sc = 1.4/h; stitchModel.setAttribute('scale', sc+' '+sc+' '+sc); }

    setTimeout(function(){
      var mesh2 = stitchModel.getObject3D('mesh');
      if(!mesh2) return;
      var b2 = new THREE.Box3().setFromObject(mesh2);
      P.yOff = Math.abs(b2.min.y) + .06;
      var gy0 = getGroundY(P.x, P.z);
      if(gy0 !== null) P.y = gy0 + P.yOff;

      // ── Récupérer tous les bones par nom exact ──
      for(var key in BONE_MAP){
        BONES[key] = findBoneByName(mesh2, BONE_MAP[key]);
        saveBoneRest(key, BONES[key]);
      }
      var found = Object.keys(BONES).filter(function(k){return !!BONES[k];});
      console.log('Bones Stitch trouvés: ' + found.length + '/' + Object.keys(BONE_MAP).length, found);

      // ── Récupérer l'animation native du GLB (Stitch_Anim) ──
      // L'animation est stockée sur le groupe racine de la scène A-Frame
      var sceneObj = document.querySelector('a-scene').object3D;
      var clips = [];
      sceneObj.traverse(function(o){
        if(o.animations && o.animations.length) clips = clips.concat(o.animations);
      });
      // Aussi chercher sur le mesh directement
      if(mesh2.animations && mesh2.animations.length) clips = clips.concat(mesh2.animations);

      if(clips.length > 0){
        nativeClip = clips[0];
        stitchMixer = new THREE.AnimationMixer(mesh2);
        nativeAction = stitchMixer.clipAction(nativeClip);
        nativeAction.setLoop(THREE.LoopRepeat, Infinity);
        nativeAction.timeScale = 0; // on contrôle la vitesse manuellement
        nativeAction.play();
        console.log('Animation native trouvée:', nativeClip.name, '— durée:', nativeClip.duration.toFixed(2)+'s');
      } else {
        console.log('Pas d animation native, animation procédurale uniquement');
      }

    }, 300);
    toast('Bienvenue ! Explore les iles ! Saute du pont dans l eau !', 5000);
  });

  // ── Interpolation douce entre deux valeurs ──
  function lerp(a, b, t){ return a + (b-a)*t; }

  // ── Animation principale : choisit native ou procédurale ──
  function animateStitch(dt2, moveMag2, state, sprint2){
    if(!Object.keys(BONES).length) return;

    // ── Animation native du GLB (marche/course) ──
    if(stitchMixer && nativeAction){
      if(state === 'ground' && moveMag2 > 0.05){
        // Avancer le temps de l'animation proportionnellement à la vitesse
        var walkSpeed = sprint2 ? 1.9 : 1.0;
        stitchMixer.update(dt2 * walkSpeed);
        nativeAction.timeScale = 1; // actif
        ANIM_T += dt2 * (sprint2 ? 6.0 : 3.8);
        return; // laisser l'animation native gérer tout
      } else {
        // Hors marche : geler l'animation native à frame 0
        nativeAction.timeScale = 0;
        nativeAction.time = 0;
        stitchMixer.update(0);
      }
    }

    // ── Animation procédurale pour les autres états ──
    ANIM_T += dt2 * 2.5;
    var s = Math.sin(ANIM_T);
    var c = Math.cos(ANIM_T);

    if(state === 'ground' && moveMag2 > 0.05){
      // Fallback si pas d'animation native
      var freq  = sprint2 ? 6.5 : 4.0;
      var ampL  = sprint2 ? 0.60 : 0.45; // jambes
      var ampA  = sprint2 ? 0.55 : 0.38; // bras
      ANIM_T += dt2 * (freq - 2.5); // ajustement car on a déjà +2.5 ci-dessus
      var sw = Math.sin(ANIM_T);

      // Hanches/cuisses
      rb('hipL',   sw * ampL, 0, 0);
      rb('hipR',  -sw * ampL, 0, 0);
      // Genoux (plient vers l'avant sur la phase de levée)
      rb('legL',  Math.max(0,  sw) * 0.55, 0, 0);
      rb('legR',  Math.max(0, -sw) * 0.55, 0, 0);
      // Pieds / talons
      rb('heelL', -sw * 0.2, 0, 0);
      rb('heelR',  sw * 0.2, 0, 0);
      // Bras opposés
      rb('armL',  -sw * ampA, 0,  sw * 0.07);
      rb('armR',   sw * ampA, 0, -sw * 0.07);
      rb('foreArmL', Math.max(0,-sw)*0.38, 0, 0);
      rb('foreArmR', Math.max(0, sw)*0.38, 0, 0);
      // Tronc/hanche légère oscillation
      rb('spine0', 0, -sw*0.07, sw*0.04);
      rb('shoulders', 0, sw*0.05, 0);

    } else if(state === 'air'){
      // SAUT : jambes repliées, bras levés
      rb('hipL',  -0.30, 0, 0);
      rb('hipR',  -0.30, 0, 0);
      rb('legL',   0.65, 0, 0);
      rb('legR',   0.65, 0, 0);
      rb('armL',  -0.70, 0, -0.45);
      rb('armR',  -0.70, 0,  0.45);
      rb('foreArmL', 0.4, 0, 0);
      rb('foreArmR', 0.4, 0, 0);
      rb('spine0',  0.12, 0, 0);
      // Oreilles qui flottent vers le haut
      rb('earAL', -0.3, 0, -0.15);
      rb('earAR', -0.3, 0,  0.15);

    } else if(state === 'surface'){
      // NAGE SURFACE : bras qui rament alternativement
      rb('armL',   s * 0.8 - 0.3, 0, -0.35);
      rb('armR',  -s * 0.8 - 0.3, 0,  0.35);
      rb('foreArmL', Math.max(0, s)*0.5, 0, 0);
      rb('foreArmR', Math.max(0,-s)*0.5, 0, 0);
      // Jambes qui battent (petits coups de pied)
      rb('hipL',   s * 0.3, 0, 0);
      rb('hipR',  -s * 0.3, 0, 0);
      rb('legL',   Math.max(0,-s)*0.2, 0, 0);
      rb('legR',   Math.max(0, s)*0.2, 0, 0);
      rb('spine0',  0.28, 0, 0);
      rb('head',   -0.15, 0, 0); // tête levée hors de l'eau

    } else if(state === 'diving'){
      // PLONGÉE : corps allongé, bras devant, jambes qui battent
      rb('spine0',  0.18, 0, 0);
      rb('spine1',  0.12, 0, 0);
      rb('shoulders', 0.08, 0, 0);
      rb('armL',   -0.95 + s*0.15, 0, -0.18);
      rb('armR',   -0.95 - s*0.15, 0,  0.18);
      rb('foreArmL', 0.1, 0, 0);
      rb('foreArmR', 0.1, 0, 0);
      // Jambes battent en alternance
      rb('hipL',   s * 0.32, 0, 0);
      rb('hipR',  -s * 0.32, 0, 0);
      rb('legL',   Math.max(0,-s)*0.22, 0, 0);
      rb('legR',   Math.max(0, s)*0.22, 0, 0);
      rb('tail',   s*0.15, 0, 0);

    } else if(state === 'sinking'){
      // COULE : bras levés en panique, jambes qui se débattent
      var panic = Math.sin(ANIM_T * 1.8);
      rb('armL',  -1.2 + panic*0.25, 0, -0.25 + panic*0.1);
      rb('armR',  -1.2 - panic*0.25, 0,  0.25 - panic*0.1);
      rb('foreArmL',  0.6, 0, 0);
      rb('foreArmR',  0.6, 0, 0);
      rb('hipL',   panic * 0.35, 0, 0);
      rb('hipR',  -panic * 0.35, 0, 0);
      rb('legL',   Math.max(0,-panic)*0.3, 0, 0);
      rb('legR',   Math.max(0, panic)*0.3, 0, 0);
      rb('head',  -0.2, 0, 0); // tête levée pour respirer

    } else {
      // IDLE : respiration calme + légère oscillation des oreilles
      var breathe = Math.sin(ANIM_T * 0.65) * 0.035;
      var earWave  = Math.sin(ANIM_T * 0.4) * 0.06;
      rb('spine0',  breathe, 0, 0);
      rb('spine1',  breathe * 0.5, 0, 0);
      rb('shoulders', breathe * 0.3, 0, 0);
      // Bras légèrement écartés, petite oscillation
      rb('armL',  0, 0, -0.06 + Math.sin(ANIM_T*0.45)*0.025);
      rb('armR',  0, 0,  0.06 - Math.sin(ANIM_T*0.45)*0.025);
      // Oreilles qui bougent légèrement
      rb('earAL', earWave, 0, 0);
      rb('earAR', earWave, 0, 0);
      // Clignement de queue
      rb('tail', Math.sin(ANIM_T*0.7)*0.1, 0, 0);
    }
  }

  // ══════════════════════════════════════
  // JOUEUR — NAGE / PLONGEE / COULE
  // ══════════════════════════════════════
  var WATER_SURFACE=-0.48;
  var MAX_BREATH=100;
  var BREATH_LOSE=7;
  var BREATH_GAIN=25;
  var SINK_SPEED=3.5;   // vitesse de coulage si on nage pas
  var SWIM_SPEED=4.5;   // vitesse nage surface

  // États : 'ground', 'air', 'surface', 'diving', 'sinking'
  var P={x:0,y:1.5,z:3,vx:0,vy:0,vz:0,yaw:Math.PI,onGround:false,yOff:.7,
         state:'ground', // ground | air | surface | diving | sinking
         breath:MAX_BREATH,swimBob:0,

         sinkTimer:0};  // délai avant de couler si on bouge plus

  var CAM={yaw:Math.PI,pitch:.18,dist:6.5};
  var jLX=0,jLY=0,jid=-1,rjLX=0,rjLY=0,rjid=-1,KY={},sprint=false;
  var waveT=0,lastT=performance.now();
  var windLeaves=null,fishEls=null;

  function getGroundY2(px,pz){
    var best=null;
    for(var i=0;i<platforms.length;i++){
      var pl=platforms[i];
      if(Math.abs(px-pl.cx)<=pl.rx+.5&&Math.abs(pz-pl.cz)<=pl.rz+.5){
        if(best===null||pl.y>best)best=pl.y;
      }
    }
    return best;
  }
  getGroundY=getGroundY2;

  function loop(){
    requestAnimationFrame(loop);
    var now=performance.now(),dt=Math.min((now-lastT)/1000,.05);lastT=now;
    waveT+=dt;

    // Feuilles vent
    if(!windLeaves)windLeaves=document.querySelectorAll('.wind-leaf');
    windLeaves.forEach(function(lf){
      var ph=parseFloat(lf.dataset.windPhase||0);
      var brx=parseFloat(lf.dataset.brx||0),bry=lf.dataset.bry||'0';
      var s=Math.sin(waveT*1.15+ph)*3.2;
      lf.setAttribute('rotation',(brx+s).toFixed(1)+' '+bry+' '+Math.cos(waveT*.75+ph).toFixed(1));
    });

    // Poissons
    if(!fishEls)fishEls=document.querySelectorAll('.fish-anim');
    fishEls.forEach(function(fish){
      var ph=parseFloat(fish.dataset.fishPhase||0);
      var r=parseFloat(fish.dataset.fishR||10);
      var dep=parseFloat(fish.dataset.fishDepth||-10);
      var spd=parseFloat(fish.dataset.fishSpeed||.35);
      var t=waveT*spd;
      var fx=Math.sin(t+ph)*r, fz=Math.cos(t+ph)*r;
      var fy=dep+Math.sin(waveT*.8+ph)*.8;
      var ang=Math.atan2(Math.cos(t+ph),-Math.sin(t+ph));
      fish.setAttribute('position',fx.toFixed(2)+' '+fy.toFixed(2)+' '+fz.toFixed(2));
      fish.setAttribute('rotation','0 '+(ang*180/Math.PI).toFixed(1)+' 0');
    });

    // INPUT
    var fwd=0,lat=0;
    if(KY['KeyW']||KY['KeyZ']||KY['ArrowUp'])fwd=1;
    if(KY['KeyS']||KY['ArrowDown'])fwd=-1;
    if(KY['KeyD']||KY['ArrowRight'])lat=1;
    if(KY['KeyA']||KY['KeyQ']||KY['ArrowLeft'])lat=-1;
    fwd-=jLY;lat+=jLX;
    var moveMag=Math.sqrt(fwd*fwd+lat*lat);

    var gy=getGroundY2(P.x,P.z);
    var onIsland=(gy!==null);

    var spd=sprint?9.5:5.2;

    // ── MOUVEMENT HORIZONTAL ──
    if(moveMag>.05){
      var mx=fwd*(-Math.sin(CAM.yaw))+lat*Math.cos(CAM.yaw);
      var mz=fwd*(-Math.cos(CAM.yaw))+lat*(-Math.sin(CAM.yaw));
      var mn=Math.sqrt(mx*mx+mz*mz);
      var spdMult=(P.state==='surface')?0.7:(P.state==='diving')?0.6:(P.state==='sinking')?0.2:1.0;
      P.vx=mx/mn*spd*spdMult;P.vz=mz/mn*spd*spdMult;
      var ty=Math.atan2(mx/mn,mz/mn),dyw=ty-P.yaw;
      while(dyw>Math.PI)dyw-=Math.PI*2;while(dyw<-Math.PI)dyw+=Math.PI*2;
      P.yaw+=dyw*Math.min(1,dt*14);
    } else {P.vx=0;P.vz=0;}

    // ══ MACHINE A ETATS PHYSIQUE ══
    if(P.state==='ground'||P.state==='air'){
      // Gravité
      P.vy-=22*dt;if(P.vy<-25)P.vy=-25;
      P.y+=P.vy*dt;

      if(gy!==null&&P.y<=gy+P.yOff){
        P.y=gy+P.yOff;P.vy=0;P.onGround=true;P.state='ground';
      } else {
        P.onGround=false;
        if(P.state==='ground')P.state='air';
      }

      // Arrive dans l'eau
      if(P.y<=WATER_SURFACE+.1&&gy===null){
        // --- SAUT DANS L'EAU ---
        // Si on arrive vite (saut depuis pont), commence à nager en surface
        if(P.vy<-2){
          // Chute dans l'eau : petite plongée brève
          P.state='diving';
          P.vy=Math.max(P.vy*0.3,-3.5); // amorti le choc
          P.y=WATER_SURFACE-.5;
          toast('Splash ! Appuie DIVE pour plonger, sinon tu remontes !',3000);
        } else {
          P.state='surface';
          P.y=WATER_SURFACE;
          P.vy=0;
        }
        P.breath=MAX_BREATH;
      }

    } else if(P.state==='surface'){
      // Nage de surface (bouge activement = reste à flot)
      P.swimBob+=dt;
      P.breath=Math.min(MAX_BREATH,P.breath+BREATH_GAIN*dt);

      if(moveMag>.08){
        // On nage : rester à la surface avec légère oscillation
        P.y=WATER_SURFACE+Math.sin(P.swimBob*2.4)*.06;
        P.sinkTimer=0;
      } else {
        // On ne bouge plus : timer avant de couler
        P.sinkTimer+=dt;
        if(P.sinkTimer>2.5){
          P.state='sinking';
          P.sinkTimer=0;
          toast('Stitch coule ! Bouge ou plonge !',2500);
        }
        P.y=WATER_SURFACE+Math.sin(P.swimBob*1.8)*.04;
      }
      P.vy=0;P.onGround=true;

      // Revient sur terre
      if(gy!==null&&gy>WATER_SURFACE-.2){
        P.state='ground';P.y=gy+P.yOff;P.sinkTimer=0;
      }

    } else if(P.state==='sinking'){
      // COULE si ne nage pas
      P.vy=Math.max(P.vy-8*dt,-SINK_SPEED);
      P.y+=P.vy*dt;
      P.breath=Math.max(0,P.breath-BREATH_LOSE*1.5*dt);
      P.onGround=false;

      // Si on commence à bouger, on passe en diving (essaie de remonter)
      if(moveMag>.1){
        P.state='diving';
        P.vy=2.0;
      }
      // Fond de l'océan
      if(P.y<-21.5){P.y=-21.5;P.vy=0;}

      // Remontée à la surface si souffle reste
      if(P.y>=WATER_SURFACE-.1){
        P.state='surface';P.y=WATER_SURFACE;P.vy=0;P.sinkTimer=0;
      }

      // Noyade = retour d'urgence
      if(P.breath<=0){
        P.y=WATER_SURFACE+1;P.vy=3;P.state='surface';P.breath=35;
        toast('Stitch a failli se noyer !',2500);
      }

    } else if(P.state==='diving'){
      // Plongée libre 3D
      P.vy*=.84;
      // Montée/descente joystick gauche (jLY) 
      if(jLY<-.08) P.vy=Math.min(P.vy+8*dt*(-jLY),5);
      else if(jLY>.08) P.vy=Math.max(P.vy-8*dt*jLY,-5);
      // Flottabilité légère (remonte naturellement)
      P.vy+=0.4*dt;
      P.y+=P.vy*dt;
      P.onGround=false;
      P.breath=Math.max(0,P.breath-BREATH_LOSE*dt);

      // Remontée automatique à la surface
      if(P.y>=WATER_SURFACE-.05){
        P.y=WATER_SURFACE;P.state='surface';P.vy=0;P.sinkTimer=0;
      }
      // Fond
      if(P.y<-21.5){P.y=-21.5;P.vy=Math.max(0,P.vy);}
      // Noyade
      if(P.breath<=0){
        P.y=WATER_SURFACE+1;P.vy=4;P.state='surface';P.breath=35;
        toast('Stitch remonte prendre de l air !',2500);
      }
      // Sur terre
      if(gy!==null&&gy>WATER_SURFACE&&P.y<=gy+P.yOff){
        P.y=gy+P.yOff;P.vy=0;P.state='ground';
      }
    }

    // Collisions murs
    var PRAD=.48,nx=P.x+P.vx*dt,nz=P.z+P.vz*dt;
    for(var wi=0;wi<walls.length;wi++){
      var w=walls[wi];if(P.y-P.yOff>w.y0+w.h)continue;
      var inX=(nx+PRAD>w.x1&&nx-PRAD<w.x2),inZ=(nz+PRAD>w.z1&&nz-PRAD<w.z2);
      var curX=(P.x+PRAD>w.x1&&P.x-PRAD<w.x2),curZ=(P.z+PRAD>w.z1&&P.z-PRAD<w.z2);
      if(inX&&inZ){if(!curX){P.vx=0;nx=P.x;}if(!curZ){P.vz=0;nz=P.z;}}
    }
    P.x=nx;P.z=nz;

    // Stitch visuel + animation bones
    var stEl=document.getElementById('stitch-root');
    var tiltF=(P.state==='diving'&&moveMag>.05)?-30:(P.state==='surface'&&moveMag>.05)?-12:(P.state==='sinking')?-45:0;
    stEl.setAttribute('position',P.x.toFixed(2)+' '+P.y.toFixed(2)+' '+P.z.toFixed(2));
    stEl.setAttribute('rotation',tiltF+' '+(P.yaw*180/Math.PI).toFixed(1)+' 0');
    // Animation procédurale des membres
    animateStitch(dt, moveMag, P.state, sprint);

    // Camera
    if(Math.abs(rjLX)>.04)CAM.yaw+=rjLX*dt*2.5;
    else if(moveMag>.1){
      var tc=P.yaw+Math.PI,cd=tc-CAM.yaw;
      while(cd>Math.PI)cd-=Math.PI*2;while(cd<-Math.PI)cd+=Math.PI*2;
      CAM.yaw+=cd*dt*2.2;
    }
    if(Math.abs(rjLY)>.04)CAM.pitch=Math.max(.04,Math.min(.7,CAM.pitch+rjLY*dt*1.5));
    var camDistActual=(P.state==='diving')?5.5:CAM.dist;
    var cr=camDistActual*Math.cos(CAM.pitch);
    var cX=P.x+Math.sin(CAM.yaw)*cr,cZ=P.z+Math.cos(CAM.yaw)*cr;
    var cY=P.y+camDistActual*Math.sin(CAM.pitch)+(P.state==='diving'?1.2:1.8);
    var camRig=document.getElementById('cam-rig');
    var cp=camRig.getAttribute('position');
    var lf2=Math.min(1,dt*18);
    camRig.setAttribute('position',(cp.x+(cX-cp.x)*lf2).toFixed(2)+' '+(cp.y+(cY-cp.y)*lf2*.8).toFixed(2)+' '+(cp.z+(cZ-cp.z)*lf2).toFixed(2));
    document.getElementById('mainCam').components.camera.camera.lookAt(P.x,P.y+(P.state==='diving'?.5:.9),P.z);

    // Vagues
    ['w0','w1','w2'].forEach(function(id,i){
      var wEl=document.getElementById(id);if(!wEl)return;
      wEl.setAttribute('scale',(1+Math.sin(waveT*.8+i*1.4)*.05)+' 1 '+(1+Math.sin(waveT*.8+i*1.4)*.05));
      wEl.setAttribute('position','0 '+(-.42+Math.sin(waveT*1.6+i*1.4)*.04).toFixed(3)+' 0');
    });
    var lg=document.getElementById('lagon');
    if(lg)lg.setAttribute('position','0 '+(-.35+Math.sin(waveT*.45)*.012).toFixed(3)+' 0');

    // UI respiration
    var breathBar=document.getElementById('breath-bar');
    var breathFill=document.getElementById('breath-fill');
    var uwOverlay=document.getElementById('underwater-overlay');
    var sinkOverlay=document.getElementById('sink-overlay');
    var inWater=(P.state==='diving'||P.state==='surface'||P.state==='sinking');
    if(inWater){
      breathBar.style.display='flex';
      var pct=P.breath/MAX_BREATH;
      breathFill.style.width=(pct*100).toFixed(0)+'%';
      breathFill.style.background=pct>.5?'linear-gradient(90deg,#00ffcc,#0088ff)':pct>.2?'linear-gradient(90deg,#ffcc00,#ff6600)':'linear-gradient(90deg,#ff2200,#ff6600)';
    } else {
      breathBar.style.display='none';
    }
    // Overlay sous-marin
    uwOverlay.style.opacity=P.state==='diving'?.72:(P.state==='surface'?.18:0);
    // Overlay coulage
    var sinkDepth=(P.state==='sinking'||P.state==='diving')? Math.min(1,Math.max(0,(WATER_SURFACE-P.y)/15)) : 0;
    sinkOverlay.style.background='rgba(0,20,60,'+( sinkDepth*.6).toFixed(2)+')';
    // Fog
    var scene=document.querySelector('a-scene');
    if(P.state==='diving'||P.state==='sinking'){
      scene.setAttribute('fog','type:exponential;color:#004466;density:0.035');
      document.getElementById('skyEl').setAttribute('color','#003355');
    } else {
      scene.setAttribute('fog','type:exponential;color:#5ac8f0;density:0.007');
      document.getElementById('skyEl').setAttribute('color','#4ab8f0');
    }

    // HUD zone
    var zone='🌊 OCEAN';
    if(P.state==='diving'||P.state==='sinking')zone='🤿 SOUS L EAU';
    else if(P.state!=='surface'){
      zone='🏖 PLAGE';
      for(var i=0;i<islandDefs.length;i++){
        var id2=islandDefs[i];
        if(Math.sqrt((P.x-id2.cx)*(P.x-id2.cx)+(P.z-id2.cz)*(P.z-id2.cz))<60){zone='🏝 '+id2.label;break;}
      }
      if(P.y>3)zone='🏔 COLLINE';
    }
    document.getElementById('zL').textContent=zone;

    if(P.breath<15&&(P.state==='diving'||P.state==='sinking')&&Math.floor(waveT*2)%2===0){
      document.getElementById('zL').style.color='#ff2200';
    } else {
      document.getElementById('zL').style.color='#7de8ff';
    }
  }
  loop();

  // ── JUMP ──
  window.doJump=function(e){
    if(e&&e.preventDefault)e.preventDefault();
    if(P.onGround&&P.state==='ground'){P.vy=8.5;P.onGround=false;P.state='air';}
    // En nage surface : petit saut hors de l'eau
    else if(P.state==='surface'){P.vy=5;P.state='air';}
  };

  // ── DIVE ──
  // Appuyer en surface → plonge
  // Appuyer en plongeant → remonte rapidement
  // Appuyer sur terre → rien
  window.doDive=function(e){
    if(e&&e.preventDefault)e.preventDefault();
    if(P.state==='diving'){
      // Remonter vite
      P.vy=6;
    } else if(P.state==='surface'||P.state==='sinking'){
      // Plonger depuis la surface
      P.state='diving';
      P.vy=-4.5;
      P.onGround=false;
      P.y=WATER_SURFACE-.3;
      P.sinkTimer=0;
    } else if(P.state==='air'){
      // En l'air au dessus de l'eau : anticipe plongée
      var gy3=getGroundY2(P.x,P.z);
      if(gy3===null&&P.y<WATER_SURFACE+3){
        P.state='diving';
        P.vy=-3;
      }
    }
  };

  window.setSprint=function(v,e){if(e&&e.preventDefault)e.preventDefault();sprint=!!v;};

  // Joystick G
  var jB=document.getElementById('joy'),jN=document.getElementById('jnub'),JMAX=38;
  function jUp(cx,cy){var r=jB.getBoundingClientRect(),dx=cx-(r.left+r.width/2),dy=cy-(r.top+r.height/2),d=Math.sqrt(dx*dx+dy*dy);if(d>JMAX){dx=dx/d*JMAX;dy=dy/d*JMAX;}jN.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';jLX=d>4?dx/JMAX:0;jLY=d>4?dy/JMAX:0;}
  function jRst(){jN.style.transform='translate(-50%,-50%)';jLX=0;jLY=0;}
  jB.addEventListener('touchstart',function(e){e.preventDefault();jid=e.changedTouches[0].identifier;jUp(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
  jB.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===jid)jUp(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false});
  jB.addEventListener('touchend',jRst,{passive:true});
  jB.addEventListener('mousedown',function(e){jUp(e.clientX,e.clientY);});
  window.addEventListener('mouseup',jRst);
  // Joystick D
  var rjB=document.getElementById('rjoy'),rjN=document.getElementById('rjnub'),RJMAX=32;
  function rjUp(cx,cy){var r=rjB.getBoundingClientRect(),dx=cx-(r.left+r.width/2),dy=cy-(r.top+r.height/2),d=Math.sqrt(dx*dx+dy*dy);if(d>RJMAX){dx=dx/d*RJMAX;dy=dy/d*RJMAX;}rjN.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';rjLX=d>4?dx/RJMAX:0;rjLY=d>4?dy/RJMAX:0;}
  function rjRst(){rjN.style.transform='translate(-50%,-50%)';rjLX=0;rjLY=0;}
  rjB.addEventListener('touchstart',function(e){e.preventDefault();rjid=e.changedTouches[0].identifier;rjUp(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
  rjB.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===rjid)rjUp(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false});
  rjB.addEventListener('touchend',rjRst,{passive:true});
  window.addEventListener('keydown',function(e){KY[e.code]=1;if(e.code==='Space'){e.preventDefault();window.doJump();}if(e.code==='KeyF'){e.preventDefault();window.doDive();}if(e.code==='ShiftLeft')sprint=true;});
  window.addEventListener('keyup',function(e){KY[e.code]=0;if(e.code==='ShiftLeft')sprint=false;});
}
</script>

</body>
