<!DOCTYPE html><html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Stitch Island</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#001828}
#cv{position:fixed;inset:0;display:block;touch-action:none}
#loading{position:fixed;inset:0;background:linear-gradient(180deg,#001828,#002840);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#loading h1{font-family:Georgia,serif;font-size:20px;color:#7de8ff;letter-spacing:4px}
.bw{width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.bf{height:100%;background:linear-gradient(90deg,#7de8ff,#44ffaa);border-radius:2px;transition:width .2s}
#stepTxt{font-size:9px;color:rgba(255,255,255,.28);letter-spacing:2px;font-family:Georgia,serif}
#hud{position:fixed;top:10px;left:0;right:0;display:none;justify-content:space-between;padding:0 12px;pointer-events:none;z-index:20}
.pill{background:rgba(0,10,25,.78);border-radius:18px;padding:5px 12px;font-family:Georgia,serif;font-size:9px;color:#7de8ff;border:1px solid rgba(125,232,255,.25)}
#joy{position:fixed;left:14px;bottom:14px;z-index:30;width:110px;height:110px;border-radius:50%;background:rgba(0,0,0,.22);border:2.5px solid rgba(255,220,80,.4);touch-action:none}
#jnub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:50%;background:radial-gradient(circle,rgba(255,220,80,.8),rgba(160,70,0,.9));border:2.5px solid rgba(255,220,80,.7)}
#rjoy{position:fixed;right:14px;bottom:14px;z-index:30;width:90px;height:90px;border-radius:50%;background:rgba(0,10,30,.22);border:2px solid rgba(100,200,255,.35);touch-action:none}
#rjnub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;background:radial-gradient(circle,rgba(100,200,255,.7),rgba(0,40,90,.9));border:2px solid rgba(100,200,255,.55)}
#btns{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:30;display:flex;gap:12px}
.btn{width:54px;height:54px;border-radius:50%;background:rgba(0,8,22,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:8px;cursor:pointer;touch-action:manipulation;border:2px solid rgba(255,255,255,.18);color:#fff}
#puzzle{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:50;background:rgba(0,0,0,.65)}
#pBox{background:linear-gradient(180deg,#2a1808,#120800);border:2px solid #8b5a2b;border-radius:12px;padding:22px;max-width:310px;width:90%;text-align:center;font-family:Georgia,serif;color:#ffd06a}
#pBox h2{font-size:13px;margin-bottom:10px;color:#ffb870}
#pBox p{font-size:11px;color:rgba(255,208,106,.85);margin-bottom:14px;line-height:1.6;white-space:pre-line}
.pBtns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.pBtn{padding:8px 14px;background:rgba(100,60,20,.4);border:1.5px solid #8b5a2b;border-radius:8px;color:#ffd06a;font-family:Georgia,serif;font-size:11px;cursor:pointer}
.pBtn.ok{border-color:#4aff7a;color:#4aff7a}
.pBtn.no{border-color:#ff4a4a;color:#ff4a4a}
#dBtns{display:flex;gap:10px;justify-content:center;margin-top:12px;flex-wrap:wrap;display:none}
.dBtn{padding:9px 16px;background:rgba(20,80,20,.4);border:1.5px solid #4a9a4a;border-radius:8px;color:#7aff7a;font-family:Georgia,serif;font-size:12px;cursor:pointer}
#toast{position:fixed;top:52px;left:50%;transform:translateX(-50%) scale(.9);opacity:0;z-index:80;background:rgba(0,8,22,.94);border:1.5px solid #7de8ff;border-radius:18px;padding:7px 16px;color:#7de8ff;font-size:10px;font-family:Georgia,serif;white-space:nowrap;pointer-events:none;transition:all .18s}
#toast.show{transform:translateX(-50%) scale(1);opacity:1}
#win{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:90;background:rgba(0,80,160,.35)}
#wBox{background:linear-gradient(180deg,#062048,#020e28);border:2px solid #7de8ff;border-radius:14px;padding:26px;text-align:center;font-family:Georgia,serif;color:#7de8ff;max-width:280px}
#wBox h1{font-size:20px;margin-bottom:10px;color:#ffd700}
</style>
</head>
<body>
<div id="loading">
  <h1>STITCH ISLAND</h1>
  <div class="bw"><div class="bf" id="bf" style="width:2%"></div></div>
  <div id="stepTxt">CHARGEMENT...</div>
</div>
<canvas id="cv"></canvas>
<div id="hud">
  <div class="pill" id="zL">🌿 JUNGLE</div>
  <div class="pill" id="cL">🔍 0/6</div>
</div>
<div id="joy"><div id="jnub"></div></div>
<div id="rjoy"><div id="rjnub"></div></div>
<div id="btns">
  <div class="btn" style="border-color:#7de8ff;color:#7de8ff" onclick="doJump()" ontouchstart="doJump(event)">⬆<br>JUMP</div>
  <div class="btn" style="border-color:#ffaa44;color:#ffaa44" onclick="tryInteract()" ontouchstart="tryInteract()">✓<br>OK</div>
</div>
<div id="puzzle">
  <div id="pBox">
    <h2 id="pT">🪵 PANNEAU</h2>
    <p id="pTxt"></p>
    <div id="pCont"></div>
    <div id="dBtns">
      <div class="dBtn" onclick="go('left')">← GAUCHE</div>
      <div class="dBtn" onclick="go('forward')">↑ DROIT</div>
      <div class="dBtn" onclick="go('right')">→ DROITE</div>
    </div>
  </div>
</div>
<div id="win">
  <div id="wBox">
    <h1>🌊 OHANA!</h1>
    <p style="font-size:11px;line-height:1.7">Tu as trouvé la plage !<br>Ohana means family 💙</p>
    <br><div class="dBtn" onclick="restart()" style="display:inline-block">↺ REJOUER</div>
  </div>
</div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
'use strict';
var BASE='https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/';

function step(p,t){document.getElementById('bf').style.width=p+'%';if(t)document.getElementById('stepTxt').textContent=t;}
function toast(m,d){var t=document.getElementById('toast');t.textContent=m;t.className='show';clearTimeout(toast._t);toast._t=setTimeout(function(){t.className='';},d||2800);}

// ── LABYRINTHE ──
var MAZE=[
  {id:0,x:0,z:-18,e:{t:'PANNEAU #1',q:'Séquence hawaiienne :\n🌺 🐚 🌴\nQuelle est la 2ème figure ?',c:['🌺 Hibiscus','🐚 Coquillage','🌴 Palmier'],b:1,m:'La mer appelle !'},dir:'forward',lft:{x:-10,z:-18},fwd:{x:0,z:-36},rgt:{x:10,z:-18},nx:1},
  {id:1,x:0,z:-36,e:{t:'PANNEAU #2',q:'Couleur qui indique l\'océan ?',c:['🔴 Rouge','🟡 Jaune - Soleil','🟣 Violet'],b:1,m:'Le soleil guide !'},dir:'right',lft:{x:-12,z:-36},fwd:{x:0,z:-52},rgt:{x:12,z:-36},nx:2},
  {id:2,x:12,z:-36,e:{t:'PANNEAU #3',q:'Nord=Montagne  Est=Mer\nOù aller pour la mer ?',c:['⬆ Nord','➡ Est - Mer','⬇ Sud'],b:1,m:'La mer à l\'Est !'},dir:'forward',lft:{x:12,z:-22},fwd:{x:26,z:-36},rgt:{x:12,z:-50},nx:3},
  {id:3,x:26,z:-36,e:{t:'PANNEAU #4',q:'Quel symbole représente l\'eau ?',c:['∧∧∧ Montagne','≈≈≈ Vagues','▲▲▲ Arbres'],b:1,m:'Les vagues !'},dir:'right',lft:{x:26,z:-22},fwd:{x:40,z:-36},rgt:{x:26,z:-50},nx:4},
  {id:4,x:26,z:-50,e:{t:'PANNEAU #5',q:'Le ciel bleu = océan devant\nVers où aller ?',c:['🔵 Bleu = Océan','🌸 Rose = Arrière','🟢 Vert = Jungle'],b:0,m:'L\'océan devant !'},dir:'forward',lft:{x:12,z:-50},fwd:{x:26,z:-64},rgt:{x:40,z:-50},nx:5},
  {id:5,x:26,z:-64,e:{t:'PANNEAU #6 — DERNIER !',q:'Ouest = PLAGE\nQuelle direction ?',c:['⬆ Nord','⬅ Ouest - Plage!','⬇ Sud'],b:1,m:'LA PLAGE ! OHANA !'},dir:'left',lft:{x:12,z:-64},fwd:{x:26,z:-78},rgt:{x:40,z:-64},nx:'WIN'}
];
var GS={clues:0,near:null,done:false,cf:null};
var walls=[];
var signs=[];

// ── THREE.JS ──
var W=window.innerWidth,H=window.innerHeight;
var renderer=new THREE.WebGLRenderer({canvas:document.getElementById('cv'),antialias:true,powerPreference:'high-performance'});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
renderer.outputColorSpace=THREE.sRGBEncoding;

var scene=new THREE.Scene();
scene.background=new THREE.Color(0x3a9ade);
scene.fog=new THREE.FogExp2(0x4ab8e8,.018);

var camera=new THREE.PerspectiveCamera(60,W/H,.1,300);
camera.position.set(0,5,10);

// ── LUMIÈRES ──
step(6,'LUMIERES...');
var ambient=new THREE.AmbientLight(0xffeedd,.6);
scene.add(ambient);

var sun=new THREE.DirectionalLight(0xfff4dd,2.8);
sun.position.set(-40,80,30);
sun.castShadow=true;
sun.shadow.mapSize.width=2048;sun.shadow.mapSize.height=2048;
sun.shadow.camera.near=1;sun.shadow.camera.far=200;
sun.shadow.camera.left=-60;sun.shadow.camera.right=60;
sun.shadow.camera.top=60;sun.shadow.camera.bottom=-60;
sun.shadow.bias=-.0005;sun.shadow.normalBias=.02;
scene.add(sun);

var hemi=new THREE.HemisphereLight(0x88ccff,0x446622,.8);
scene.add(hemi);

// ── TEXTURES ──
step(12,'TEXTURES...');
var tl=new THREE.TextureLoader();
function loadTex(name,ru,rv){
  var t=tl.load(BASE+name);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  if(ru)t.repeat.set(ru,rv||ru);
  t.colorSpace=THREE.sRGBEncoding;
  return t;
}
var texGrass=loadTex('grass.jpg',16,16);
var texSand=loadTex('sand.jpg',14,14);
var texBark=loadTex('bark.jpg',1,3);
var texLeaf=loadTex('leaf.jpg',2,2);
var texRock=loadTex('rock.jpg',3,3);

// ── CIEL ──
step(16,'CIEL...');
// Gradient ciel Canvas
var skyCanvas=document.createElement('canvas');skyCanvas.width=2;skyCanvas.height=512;
var skyCtx=skyCanvas.getContext('2d');
var skyGrad=skyCtx.createLinearGradient(0,0,0,512);
skyGrad.addColorStop(0,'#1a6abf');skyGrad.addColorStop(.4,'#3a9ade');
skyGrad.addColorStop(.75,'#62c4f0');skyGrad.addColorStop(1,'#a8e4f8');
skyCtx.fillStyle=skyGrad;skyCtx.fillRect(0,0,2,512);
var skyTex=new THREE.CanvasTexture(skyCanvas);
var skyGeo=new THREE.SphereGeometry(250,16,8);
var skyMat=new THREE.MeshBasicMaterial({map:skyTex,side:THREE.BackSide});
scene.add(new THREE.Mesh(skyGeo,skyMat));

// Nuages cartoon
function makeCloud(x,y,z,s){
  var g=new THREE.Group();
  var cm=new THREE.MeshLambertMaterial({color:0xffffff});
  [[0,0,0,1],[.55,.2,0,.78],[-.55,.15,0,.72],[.28,.45,0,.65],[-.22,.40,0,.60],[.8,.02,0,.60],[-.8,.06,0,.55]].forEach(function(b){
    var m=new THREE.Mesh(new THREE.SphereGeometry(s*b[3],8,6),cm);
    m.position.set(b[0]*s,b[1]*s,b[2]*s);g.add(m);
  });
  g.position.set(x,y,z);scene.add(g);
}
[[-45,38,-130,14],[18,42,-120,12],[85,34,-115,10],[0,45,-140,16],[52,31,-100,10]].forEach(function(c){makeCloud(c[0],c[1],c[2],c[3]);});

// Montagnes lointaines
function makeMtn(x,z,h,w){
  var m=new THREE.Mesh(
    new THREE.ConeGeometry(w,h,6),
    new THREE.MeshLambertMaterial({color:0x445566})
  );
  m.position.set(x,h*.38,z);m.rotation.y=Math.random()*Math.PI;scene.add(m);
  // Végétation
  var vm=new THREE.Mesh(new THREE.SphereGeometry(w*.35,7,5),new THREE.MeshLambertMaterial({color:0x228822}));
  vm.position.set(x,h*.75,z);vm.scale.set(1,.7,1);scene.add(vm);
}
[[-80,-160,32,20],[72,-155,26,16],[120,-140,22,14],[42,-170,28,18]].forEach(function(m){makeMtn(m[0],m[1],m[2],m[3]);});

step(24,'TERRAIN...');

// ── TERRAIN HEIGHTMAP ──
var TSIZE=160,TSUB=80;
function noise2(x,z,f){
  var xi=Math.floor(x*f),zi=Math.floor(z*f),xf=x*f-xi,zf=z*f-zi;
  function h(a,b){return Math.sin(a*127.1+b*311.7)*.5+.5;}
  var a=h(xi,zi),b=h(xi+1,zi),c=h(xi,zi+1),d=h(xi+1,zi+1);
  var ux=xf*xf*(3-2*xf),uz=zf*zf*(3-2*zf);
  return (a*(1-ux)+b*ux)*(1-uz)+(c*(1-ux)+d*ux)*uz;
}
function getH(wx,wz){
  var dx=wx/TSIZE,dz=wz/TSIZE;
  var dist=Math.sqrt(dx*dx+dz*dz)*2.1;
  var island=Math.max(0,Math.pow(Math.max(0,1-dist),1.15));
  var h=island*(noise2(wx,wz,.02)*7+noise2(wx,wz,.055)*3.5+noise2(wx,wz,.14)*1.5);
  var mx=wx+8,mz=wz+10;h+=Math.max(0,(1-Math.sqrt(mx*mx+mz*mz)/28))*14;
  h=Math.max(0,h);
  if(dist>0.74)h=Math.min(h,.15);
  return h;
}
var hCache={};
var tGeo=new THREE.PlaneGeometry(TSIZE,TSIZE,TSUB,TSUB);
tGeo.rotateX(-Math.PI/2);
var pos=tGeo.attributes.position;
for(var i=0;i<pos.count;i++){
  var wx=pos.getX(i),wz=pos.getZ(i);
  var hv=getH(wx,wz);
  pos.setY(i,hv);
  hCache[Math.round(wx*3)+'_'+Math.round(wz*3)]=hv;
}
tGeo.computeVertexNormals();
function terrH(wx,wz){var k=Math.round(wx*3)+'_'+Math.round(wz*3);return hCache[k]!==undefined?hCache[k]:getH(wx,wz);}

var terrMat=new THREE.MeshStandardMaterial({map:texGrass,roughness:.85,metalness:0});
var terrMesh=new THREE.Mesh(tGeo,terrMat);
terrMesh.receiveShadow=true;scene.add(terrMesh);

// Sable plage
var beachGeo=new THREE.PlaneGeometry(300,300,2,2);beachGeo.rotateX(-Math.PI/2);
var beachMesh=new THREE.Mesh(beachGeo,new THREE.MeshStandardMaterial({map:texSand,roughness:.9,metalness:0}));
beachMesh.position.y=-.04;beachMesh.receiveShadow=true;scene.add(beachMesh);

step(32,'EAU...');

// ── EAU ANIMÉE ──
// Plan eau turquoise avec normal map animée Canvas
var waterCanvas=document.createElement('canvas');waterCanvas.width=512;waterCanvas.height=512;
var wc=waterCanvas.getContext('2d');
var waterTex=new THREE.CanvasTexture(waterCanvas);
waterTex.wrapS=waterTex.wrapT=THREE.RepeatWrapping;
waterTex.repeat.set(8,8);

var waterGeo=new THREE.PlaneGeometry(1200,800,4,4);waterGeo.rotateX(-Math.PI/2);
var waterMat=new THREE.MeshStandardMaterial({
  color:0x11d8c8,
  transparent:true,opacity:.88,
  roughness:.05,metalness:.1,
  envMapIntensity:.8
});
var waterMesh=new THREE.Mesh(waterGeo,waterMat);
waterMesh.position.set(0,-.42,-100);waterMesh.receiveShadow=false;
scene.add(waterMesh);

// Lagon
var lagonGeo=new THREE.CylinderGeometry(120,120,.15,64);
var lagonMat=new THREE.MeshStandardMaterial({color:0x22eedd,transparent:true,opacity:.52,roughness:.05,metalness:.05});
var lagonMesh=new THREE.Mesh(lagonGeo,lagonMat);
lagonMesh.position.y=-.30;scene.add(lagonMesh);

// Vagues — anneaux animés
var waveRings=[];
for(var wi=0;wi<8;wi++){
  var wr=new THREE.Mesh(
    new THREE.TorusGeometry((70+wi*9),0.28,6,48),
    new THREE.MeshStandardMaterial({color:0xffffff,transparent:true,opacity:.55-wi*.05,roughness:.1})
  );
  wr.rotation.x=Math.PI/2;wr.position.y=-.35;
  scene.add(wr);
  waveRings.push({m:wr,ph:wi/8*Math.PI*2,spd:.7+Math.random()*.4});
}

step(40,'CHEMIN SABLE...');

// ── CHEMIN SABLE ──
var pathMat=new THREE.MeshStandardMaterial({color:0xc8a040,roughness:.9,metalness:0});
function makePath(x0,z0,x1,z1,w){
  w=w||2.0;
  var dx=x1-x0,dz=z1-z0,len=Math.sqrt(dx*dx+dz*dz);
  var steps=Math.max(3,Math.floor(len/2));
  for(var si=0;si<=steps;si++){
    var t=si/steps,px=x0+dx*t,pz=z0+dz*t;
    var g=new THREE.CylinderGeometry(w,w,.06,8);
    var m=new THREE.Mesh(g,pathMat);
    m.position.set(px,terrH(px,pz)+.04,pz);
    m.receiveShadow=true;scene.add(m);
  }
}
makePath(0,4,0,-16,2.0);makePath(0,-16,0,-36,2.0);
makePath(0,-36,12,-36,2.0);makePath(12,-36,26,-36,2.0);
makePath(26,-36,26,-50,2.0);makePath(26,-50,26,-64,2.0);
makePath(26,-64,12,-64,2.0);makePath(12,-64,0,-72,2.2);
makePath(0,-72,0,-90,2.5);

// Pierres sur chemin
var stMat=new THREE.MeshStandardMaterial({map:texRock,roughness:.9,metalness:0,color:0xaaaaaa});
[[0,-7,.35],[.6,-11,.28],[-.4,-23,.32],[12,-38,.32],[26,-43,.30],[26,-57,.32],[18,-66,.28],[6,-70,.32]].forEach(function(s){
  var sm=new THREE.Mesh(new THREE.SphereGeometry(s[2],6,4),stMat);
  sm.position.set(s[0],terrH(s[0],s[1])+s[2]*.25,s[1]);
  sm.scale.y=.45;sm.rotation.y=Math.random()*Math.PI;
  sm.castShadow=true;sm.receiveShadow=true;scene.add(sm);
});

step(48,'FUSEE...');

// ── FUSÉE ÉCRASÉE ──
var rkMat=new THREE.MeshStandardMaterial({color:0xb8b8c0,roughness:.4,metalness:.3});
var rBody=new THREE.Mesh(new THREE.CylinderGeometry(.25,.6,3.2,9),rkMat);
rBody.position.set(-4,.4,7.5);rBody.rotation.set(.65,0,.38);
rBody.castShadow=true;scene.add(rBody);
walls.push({x1:-6.5,z1:5.5,x2:-1.5,z2:10});
var rNose=new THREE.Mesh(new THREE.ConeGeometry(.25,1.2,8),rkMat);
rNose.position.set(-4.9,2.0,6.5);rNose.rotation.set(.65,0,.38);rNose.castShadow=true;scene.add(rNose);
var fMat=new THREE.MeshStandardMaterial({color:0xd04020,roughness:.6,metalness:.1});
[0,1,-1].forEach(function(i){
  var fin=new THREE.Mesh(new THREE.BoxGeometry(.07,1.1,.75),fMat);
  fin.position.set(-4+i*.55,-.05,9);fin.rotation.set(.18,i*.4,.12+i*.28);fin.castShadow=true;scene.add(fin);
});
// Fumée
var smokes=[];
var flameMat=new THREE.MeshStandardMaterial({color:0xf06010,transparent:true,opacity:.7,emissive:0x882200});
var smokeMat2=new THREE.MeshStandardMaterial({color:0x787878,transparent:true,opacity:.55});
for(var si=0;si<10;si++){
  var sp=new THREE.Mesh(new THREE.SphereGeometry(.3+Math.random()*.2,5,4),si<3?flameMat:smokeMat2);
  scene.add(sp);smokes.push({m:sp,ph:Math.random()*6.28,spd:.7+Math.random()*.5,ox:-4.5+Math.random()*.6-.3});
}

step(56,'PALMIERS...');

// ── PALMIERS RÉALISTES ──
// Tronc : segments cylindriques courbés
// Feuilles : plans larges avec texture leaf
function makePalm(x,z,h,lx,lz,addW){
  if(addW!==false)walls.push({x1:x-.38,z1:z-.38,x2:x+.38,z2:z+.38});
  var gh=terrH(x,z);
  var NS=12,pts=[new THREE.Vector3(x,gh,z)],cx2=x,cy=gh,cz2=z;
  for(var i=1;i<=NS;i++){
    var t=i/NS,bend=Math.pow(t,2.2)*2.8;
    cx2+=lx/NS*bend;cy+=h/NS;cz2+=lz/NS*bend;
    pts.push(new THREE.Vector3(cx2,cy,cz2));
  }
  // Tronc segments
  for(var i=0;i<NS;i++){
    var p0=pts[i],p1=pts[i+1];
    var dBot=Math.max(.03,.17-.012*i),dTop=Math.max(.02,.13-.010*i);
    var len2=p0.distanceTo(p1);
    var tg=new THREE.CylinderGeometry(dTop,dBot,len2,7);
    var tm=new THREE.MeshStandardMaterial({map:texBark,roughness:.9,metalness:0,color:0xddccaa});
    var seg=new THREE.Mesh(tg,tm);
    var mid=p0.clone().add(p1).multiplyScalar(.5);
    seg.position.copy(mid);
    // Orienter le cylindre
    var dir=new THREE.Vector3().subVectors(p1,p0).normalize();
    var up=new THREE.Vector3(0,1,0);
    var quat=new THREE.Quaternion().setFromUnitVectors(up,dir);

// Construire Stitch fallback
function buildStitch(){
  var g=new THREE.Group();
  function cm(col,r){return new THREE.MeshStandardMaterial({color:col,roughness:r||.5,metalness:0});}
  var bl=cm(0x1e7add),lt=cm(0x88c8f0),dk=cm(0x0a0a10);
  function add(geo,mat,px,py,pz,sx,sy,sz,rx,rz){
    var m=new THREE.Mesh(geo,mat);
    m.position.set(px||0,py||0,pz||0);
    if(sx)m.scale.set(sx,sy||sx,sz||sx);
    if(rx)m.rotation.set(rx,0,rz||0);
    m.castShadow=true;m.receiveShadow=true;g.add(m);return m;
  }
  // Corps
  var body=add(new THREE.SphereGeometry(.44,10,8),bl,0,0,0,1,.88,1);
  // Tête
  add(new THREE.SphereGeometry(.36,10,8),bl,0,.88,0);
  // Museau
  add(new THREE.SphereGeometry(.20,8,6),lt,0,.82,.30,1.1,.7,.88);
  // Nez
  add(new THREE.SphereGeometry(.06,6,5),dk,0,.86,.40);
  // Oreilles
  [-1,1].forEach(function(e){
    add(new THREE.CylinderGeometry(.04,.11,.60,6),bl,e*.29,1.30,.04,1,1,1,-.1,e*.40);
  });
  // Yeux
  var ewM=new THREE.MeshStandardMaterial({color:0xeeeeff,emissive:0x334455,roughness:.3});
  [-1,1].forEach(function(e){
    var ew=new THREE.Mesh(new THREE.SphereGeometry(.085,7,5),ewM);
    ew.position.set(e*.18,.92,.31);ew.castShadow=false;g.add(ew);
    var ep=new THREE.Mesh(new THREE.SphereGeometry(.05,6,4),dk);
    ep.position.set(e*.18,.92,.37);g.add(ep);
    // Pattes
    add(new THREE.CylinderGeometry(.075,.065,.46,7),bl,e*.25,-.28,0);
    var foot=add(new THREE.SphereGeometry(.115,7,5),bl,e*.25,-.55,.09);
    foot.scale.set(1.45,.7,1.85);
    // Bras
    add(new THREE.CylinderGeometry(.045,.07,.42,6),bl,e*.50,.16,0,1,1,1,.33,e*.82);
  });
  // Queue
  var tail=add(new THREE.SphereGeometry(.125,7,5),bl,0,.14,-.48);
  tail.scale.set(.7,1.5,.7);
  g.position.y=pYOff=.55;
  return g;
}

      if(/idle/.test(n))actions.idle=a;
      else if(/run/.test(n))actions.run=a;
      else if(/walk/.test(n))actions.walk=a;
      else if(/jump/.test(n))actions.jump=a;
    });
    if(!actions.idle&&gltf.animations[0])actions.idle=mixer.clipAction(gltf.animations[0]);
    if(!actions.walk&&gltf.animations[1])actions.walk=mixer.clipAction(gltf.animations[1]);
    playAnim(actions.idle);

);

// ── BOUCLE ──
function playAnim(a){if(!a||a===curAction)return;if(curAction){curAction.fadeOut(.2);}a.reset().fadeIn(.15).play();curAction=a;}
function doJump(e){if(e&&e.preventDefault)e.preventDefault();if(P.onGround){P.vy=7.5;P.onGround=false;}}
window.doJump=doJump;

function animate(){
  requestAnimationFrame(animate);
  var now=performance.now(),dt=Math.min((now-lastT)/1000,.05);lastT=now;
  waveT+=dt;
  if(mixer)mixer.update(dt);

  // INPUT — Mario Odyssey style
  var fwd=0,lat=0;
  if(KY['KeyW']||KY['KeyZ']||KY['ArrowUp'])fwd=1;
  if(KY['KeyS']||KY['ArrowDown'])fwd=-1;
  if(KY['KeyD']||KY['ArrowRight'])lat=1;
  if(KY['KeyA']||KY['KeyQ']||KY['ArrowLeft'])lat=-1;
  fwd-=jLY;lat+=jLX;

  var spd=sprint?8.5:4.8;
  var moveX=fwd*(-Math.sin(CAM.yaw))+lat*Math.cos(CAM.yaw);
  var moveZ=fwd*(-Math.cos(CAM.yaw))+lat*(-Math.sin(CAM.yaw));
  var moveMag=Math.sqrt(moveX*moveX+moveZ*moveZ);

  if(moveMag>.05){
    var nx=moveX/moveMag,nz=moveZ/moveMag;
    P.vx=nx*spd;P.vz=nz*spd;
    var tYaw=Math.atan2(nx,nz),dy=tYaw-P.yaw;
    while(dy>Math.PI)dy-=Math.PI*2;while(dy<-Math.PI)dy+=Math.PI*2;
    P.yaw+=dy*Math.min(1,dt*14);
    playAnim(sprint&&actions.run?actions.run:(actions.walk||actions.idle));
  } else {
    P.vx=0;P.vz=0;
    if(actions.idle)playAnim(actions.idle);
  }

  if(!P.onGround){P.vy-=26*dt;if(P.vy<-24)P.vy=-24;}
  var nx2=P.x+P.vx*dt,nz2=P.z+P.vz*dt;

  // Collisions AABB
  var PRAD=.5;
  for(var wi=0;wi<walls.length;wi++){
    var w=walls[wi];
    var inX=(nx2+PRAD>w.x1&&nx2-PRAD<w.x2);
    var inZ=(nz2+PRAD>w.z1&&nz2-PRAD<w.z2);
    var curX=(P.x+PRAD>w.x1&&P.x-PRAD<w.x2);
    var curZ=(P.z+PRAD>w.z1&&P.z-PRAD<w.z2);
    if(inX&&inZ){if(!curX){P.vx=0;nx2=P.x;}if(!curZ){P.vz=0;nz2=P.z;}}
  }
  P.x=nx2;P.z=nz2;
  P.y+=P.vy*dt;
  var flY=terrH(P.x,P.z);
  if(P.y<=flY&&P.vy<=0){P.y=flY;P.vy=0;P.onGround=true;}else P.onGround=false;
  var pd=Math.sqrt(P.x*P.x+P.z*P.z);
  if(pd>72){var pa=Math.atan2(P.x,P.z);P.x=Math.sin(pa)*72;P.z=Math.cos(pa)*72;P.vx=0;P.vz=0;}

  if(pRoot){
    pRoot.position.set(P.x,P.y+pYOff,P.z);
    pRoot.rotation.y=P.yaw;
  }

  // CAMÉRA
  if(Math.abs(rjLX)>.04)CAM.yaw+=rjLX*dt*2.5;
  else if(moveMag>.1){
    var tc=P.yaw+Math.PI,cd=tc-CAM.yaw;
    while(cd>Math.PI)cd-=Math.PI*2;while(cd<-Math.PI)cd+=Math.PI*2;
    CAM.yaw+=cd*dt*1.8;
  }
  if(Math.abs(rjLY)>.04)CAM.pitch=Math.max(.05,Math.min(.55,CAM.pitch+rjLY*dt*1.5));

  var cr=CAM.dist*Math.cos(CAM.pitch);
  var cX=P.x+Math.sin(CAM.yaw)*cr;
  var cZ=P.z+Math.cos(CAM.yaw)*cr;
  var cY=P.y+pYOff+CAM.dist*Math.sin(CAM.pitch)+1.6;
  var cGH=terrH(cX,cZ);if(cY<cGH+.9)cY=cGH+.9;
  camera.position.lerp(new THREE.Vector3(cX,cY,cZ),Math.min(1,dt*18));
  camera.lookAt(P.x,P.y+pYOff+.82,P.z);

  // Brouillard jungle
  var dc=Math.sqrt(P.x*P.x+P.z*P.z);
  scene.fog.density+=(((dc<30)?.022:.008)-scene.fog.density)*dt*2;
  scene.fog.color.setHex(dc<30?0x3a9040:0x4ab8e8);

  // Eau animée
  waterMesh.position.y=-.42+Math.sin(waveT*.5)*.025;
  waterMat.color.setHSL(.49,.75,.45+Math.sin(waveT*.3)*.03);
  lagonMesh.position.y=-.30+Math.sin(waveT*.6)*.015;
  waveRings.forEach(function(w){
    w.m.scale.x=1+Math.sin(waveT*w.spd+w.ph)*.05;
    w.m.scale.z=1+Math.sin(waveT*w.spd+w.ph)*.05;
    w.m.position.y=-.35+Math.sin(waveT*2+w.ph)*.04;
    w.m.material.opacity=.45+Math.sin(waveT*2.3+w.ph)*.12;
  });

  // Fumée
  smokes.forEach(function(s,i){
    var sy=terrH(-4.5,8.2)+ i*.35+Math.sin(waveT*s.spd+s.ph+1)*1.2+(waveT*.3%3);
    s.m.position.set(s.ox+Math.sin(waveT*s.spd+s.ph)*.25,sy,8.2);
    s.m.material.opacity=.55+Math.sin(waveT*1.1+s.ph)*.18;
    s.m.scale.setScalar(.8+Math.sin(waveT*s.spd+s.ph)*.3);
  });

  // Zones interaction
  GS.near=null;
  for(var zi=0;zi<signs.length;zi++){
    var sg=signs[zi];
    var dist2=Math.sqrt((P.x-sg.x)*(P.x-sg.x)+(P.z-sg.z)*(P.z-sg.z));
    if(dist2<sg.r){
      if(sg.id==='WIN'&&!GS.done)triggerWin();
      else if(sg.id!=='WIN')GS.near=sg.id;
    }
  }

  document.getElementById('cL').textContent='🔍 '+GS.clues+'/6';
  var dz=Math.abs(P.z);
  document.getElementById('zL').textContent=dz<12?'🚀 FUSÉE':dz<70?'🌿 JUNGLE':'🏖 PLAGE';

  renderer.render(scene,camera);
}

  P.x=dest.x;P.z=dest.z;P.vx=0;P.vz=0;
  if(dir===cf.dir){toast('Bonne direction !');if(cf.nx==='WIN')setTimeout(triggerWin,1500);}
  else{toast('Impasse ! Demi-tour !',3500);setTimeout(function(){P.x=cf.x;P.z=cf.z;P.vx=0;P.vz=0;},2500);}
};
function triggerWin(){if(GS.done)return;GS.done=true;P.x=0;P.z=-88;P.vx=0;P.vz=0;document.getElementById('win').style.display='flex';}
window.restart=function(){document.getElementById('win').style.display='none';P.x=0;P.z=3;P.vx=0;P.vz=0;P.yaw=Math.PI;P.y=0;GS.clues=0;GS.done=false;GS.near=null;toast('Nouvelle partie !');};

// ── JOYSTICK GAUCHE ──
var jB=document.getElementById('joy'),jN=document.getElementById('jnub'),JMAX=38;
function jUp(cx,cy){var r=jB.getBoundingClientRect(),dx=cx-(r.left+r.width/2),dy=cy-(r.top+r.height/2),d=Math.sqrt(dx*dx+dy*dy);if(d>JMAX){dx=dx/d*JMAX;dy=dy/d*JMAX;}jN.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';jLX=d>4?dx/JMAX:0;jLY=d>4?dy/JMAX:0;}
function jRst(){jN.style.transform='translate(-50%,-50%)';jLX=0;jLY=0;jid=-1;}
jB.addEventListener('touchstart',function(e){e.preventDefault();jid=e.changedTouches[0].identifier;jUp(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
jB.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===jid)jUp(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false});
jB.addEventListener('touchend',jRst,{passive:true});
jB.addEventListener('mousedown',function(e){jUp(e.clientX,e.clientY);});
window.addEventListener('mouseup',jRst);

// ── JOYSTICK DROIT ──
var rjB=document.getElementById('rjoy'),rjN=document.getElementById('rjnub'),RJMAX=32;
function rjUp(cx,cy){var r=rjB.getBoundingClientRect(),dx=cx-(r.left+r.width/2),dy=cy-(r.top+r.height/2),d=Math.sqrt(dx*dx+dy*dy);if(d>RJMAX){dx=dx/d*RJMAX;dy=dy/d*RJMAX;}rjN.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';rjLX=d>4?dx/RJMAX:0;rjLY=d>4?dy/RJMAX:0;}
function rjRst(){rjN.style.transform='translate(-50%,-50%)';rjLX=0;rjLY=0;rjid=-1;}
rjB.addEventListener('touchstart',function(e){e.preventDefault();rjid=e.changedTouches[0].identifier;rjUp(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
rjB.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===rjid)rjUp(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false});
rjB.addEventListener('touchend',rjRst,{passive:true});

window.addEventListener('keydown',function(e){KY[e.code]=1;if(e.code==='Space'){e.preventDefault();doJump();}if(e.code==='ShiftLeft')sprint=true;if(e.code==='KeyE')window.tryInteract();});
window.addEventListener('keyup',function(e){KY[e.code]=0;if(e.code==='ShiftLeft')sprint=false;});
window.addEventListener('wheel',function(e){CAM.dist=Math.max(4,Math.min(14,CAM.dist+e.deltaY*.008));},{passive:true});
window.addEventListener('resize',function(){W=window.innerWidth;H=window.innerHeight;camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H);});
</script>
