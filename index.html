<!DOCTYPE html><html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Lilo & Stitch Island</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#001020}
#cv{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
#loading{position:fixed;inset:0;background:linear-gradient(180deg,#001830,#003060);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#loading h1{font-family:Georgia,serif;font-size:22px;color:#7de8ff;letter-spacing:5px;text-shadow:0 0 30px rgba(125,232,255,.6)}
#loading p{font-size:10px;color:rgba(125,232,255,.45);letter-spacing:3px}
.bw{width:220px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.bf{height:100%;background:linear-gradient(90deg,#7de8ff,#6affb0);border-radius:2px;transition:width .25s}
#stepTxt{font-size:9px;color:rgba(255,255,255,.28);letter-spacing:2px}
#hud{position:fixed;top:12px;left:0;right:0;display:none;justify-content:space-between;align-items:flex-start;padding:0 14px;pointer-events:none;z-index:20}
.pill{background:rgba(0,8,20,.82);border-radius:20px;padding:5px 13px;font-family:Georgia,serif;font-size:10px;backdrop-filter:blur(8px);color:#7de8ff;border:1px solid rgba(125,232,255,.2)}
#zone{position:fixed;bottom:80px;left:130px;pointer-events:none;z-index:20;display:none}
#joy{position:fixed;left:16px;bottom:80px;z-index:30;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.04);border:2px solid rgba(125,232,255,.2);touch-action:none}
#jnub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 38% 32%,rgba(125,232,255,.6),rgba(0,50,90,.95));border:2px solid rgba(125,232,255,.5)}
#btns{position:fixed;right:14px;bottom:80px;z-index:30;display:flex;flex-direction:column;gap:8px}
.btn{width:54px;height:54px;border-radius:50%;background:rgba(0,8,22,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-family:Georgia,serif;font-size:8px;cursor:pointer;touch-action:manipulation;backdrop-filter:blur(6px);border:2px solid rgba(255,255,255,.1)}
#toast{position:fixed;top:54px;left:50%;transform:translateX(-50%) scale(.9);opacity:0;z-index:80;background:rgba(0,8,22,.95);border:1.5px solid #7de8ff;border-radius:20px;padding:7px 18px;color:#7de8ff;font-size:11px;font-family:Georgia,serif;white-space:nowrap;pointer-events:none;transition:all .2s;backdrop-filter:blur(10px)}
#toast.show{transform:translateX(-50%) scale(1);opacity:1}
</style>
</head>
<body>
<div id="loading">
  <h1>LILO &amp; STITCH ISLAND</h1>
  <p>HAWAII — PARADISE</p>
  <div class="bw"><div class="bf" id="bf" style="width:2%"></div></div>
  <div id="stepTxt">CHARGEMENT MOTEUR...</div>
</div>
<canvas id="cv"></canvas>
<div id="hud">
  <div class="pill">&#127796; HAWAII</div>
  <div class="pill">&#128100; STITCH</div>
  <div class="pill" id="dnBtn" onclick="toggleDN()" style="pointer-events:all;cursor:pointer">&#9790; NUIT</div>
</div>
<div id="zone"><div class="pill" id="zoneTxt">&#127944; PLAGE</div></div>
<div id="joy"><div id="jnub"></div></div>
<div id="btns">
  <div class="btn" style="border-color:#7de8ff;color:#7de8ff" ontouchstart="doJump(event)" onclick="doJump()">&#8679;<br>JUMP</div>
  <div class="btn" style="border-color:#ffd700;color:#ffd700" ontouchstart="setSprint(1,event)" ontouchend="setSprint(0)" onmousedown="setSprint(1)" onmouseup="setSprint(0)">&#9889;<br>RUN</div>
</div>
<div id="toast"></div>

<script>
(function(){
  var stEl=document.getElementById('stepTxt');
  var cdns=[
    {b:'https://cdn.babylonjs.com/babylon.js',            l:'https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js'},
    {b:'https://unpkg.com/babylonjs@6.26.0/babylon.js',  l:'https://unpkg.com/babylonjs-loaders@6.26.0/babylonjs.loaders.min.js'},
    {b:'https://cdnjs.cloudflare.com/ajax/libs/babylonjs/6.26.0/babylon.js',l:'https://cdnjs.cloudflare.com/ajax/libs/babylonjs-loaders/6.26.0/babylonjs.loaders.min.js'}
  ];
  var idx=0;
  function tryNext(){
    if(idx>=cdns.length){stEl.textContent='ERREUR CDN';return;}
    var p=cdns[idx++];stEl.textContent='CDN '+idx+'/'+cdns.length+'...';
    load(p.b,function(){load(p.l,function(){if(window.startGame)window.startGame();},tryNext);},tryNext);
  }
  function load(url,ok,fail){
    var s=document.createElement('script');s.src=url;s.onload=ok;
    s.onerror=function(){document.head.removeChild(s);fail();};
    document.head.appendChild(s);
  }
  tryNext();
})();
</script>

<script>
window.startGame=function(){
'use strict';
var B=BABYLON;
var BASE='https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/';

var bfEl=document.getElementById('bf');
var stEl=document.getElementById('stepTxt');
function step(p,t){bfEl.style.width=p+'%';if(t)stEl.textContent=t;}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.className='show';clearTimeout(toast._t);toast._t=setTimeout(function(){t.className='';},3000);}
function showGame(){document.getElementById('loading').style.display='none';document.getElementById('hud').style.display='flex';document.getElementById('zone').style.display='block';}

// ── ETAT JOUEUR ──
var P={x:2,y:0,z:2,vx:0,vy:0,vz:0,yaw:0,onGround:true};
var pRoot=null,pYOff=0,pAnims={},curAnim=null;
var jLX=0,jLY=0,KY={};
// CAM TPS — angle fixe derriere Stitch, suit son yaw lentement
var CAM={yaw:0,pitch:.30,dist:13,tYaw:0};
var night=false,sprint=false;
var waveT=0,lastT=performance.now();
var waveRings=[],colCircles=[],waterDrops=[];
var ISLAND_R=55;
var rng=(function(){var s=42;return function(){s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/4294967296;};})();

// ── ENGINE ──
var cv=document.getElementById('cv');
var eng=new B.Engine(cv,true,{antialias:true,stencil:true,adaptToDeviceRatio:true},true);
var sc=new B.Scene(eng);
sc.clearColor=new B.Color4(.38,.68,.92,1);
sc.fogMode=B.Scene.FOGMODE_EXP2;
sc.fogDensity=.006;
sc.fogColor=new B.Color3(.45,.72,.88);
sc.gravity=new B.Vector3(0,-20,0);

var cam=new B.FreeCamera('cam',new B.Vector3(2,10,15),sc);
cam.minZ=.1;cam.maxZ=800;cam.fov=1.0;
cam.inputs.clear();

step(6,'LUMIERES...');

// Soleil hawaïen chaud
var sun=new B.DirectionalLight('sun',new B.Vector3(-.5,-1,-.3),sc);
sun.position=new B.Vector3(100,180,80);
sun.intensity=3.2;
sun.diffuse=new B.Color3(1.0,.94,.78);
sun.specular=new B.Color3(.25,.2,.1);

var shadows=null;
try{
  shadows=new B.ShadowGenerator(2048,sun);
  shadows.useBlurExponentialShadowMap=true;
  shadows.blurKernel=24;shadows.darkness=.32;
  shadows.transparencyShadow=true;
}catch(e){}

// Lumiere ambiante ciel tropical
var sky=new B.HemisphericLight('sky',new B.Vector3(0,1,0),sc);
sky.intensity=.72;
sky.diffuse=new B.Color3(.78,.88,.98);
sky.groundColor=new B.Color3(.35,.58,.22);
sky.specular=new B.Color3(0,0,0);

// Fill chaud autour joueur
var fill=new B.PointLight('fill',new B.Vector3(0,4,0),sc);
fill.intensity=.28;fill.range=10;
fill.diffuse=new B.Color3(1.0,.85,.5);

// Lumiere cascade (bleue)
var cascLight=new B.PointLight('casc',new B.Vector3(-18,8,-20),sc);
cascLight.intensity=1.2;cascLight.range=18;
cascLight.diffuse=new B.Color3(.5,.85,1.0);

step(14,'TEXTURES...');

function mkTex(w,h,fn){
  var c=document.createElement('canvas');c.width=w;c.height=h;
  var ctx=c.getContext('2d');fn(ctx,w,h);
  var t=new B.DynamicTexture('tx'+rng(),{width:w,height:h},sc,true);
  t.getContext().drawImage(c,0,0);t.update(false);return t;
}

// Sable hawaïen chaud avec grains
var sandTex=mkTex(512,512,function(ctx,w,h){
  var g=ctx.createLinearGradient(0,0,w,h);
  g.addColorStop(0,'#f2e070');g.addColorStop(.4,'#e0c855');g.addColorStop(1,'#c8aa38');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  for(var i=0;i<12000;i++){
    var x=rng()*w,y=rng()*h,r=rng()*1.4,b=Math.floor(rng()*50-25);
    ctx.globalAlpha=.25+rng()*.2;
    ctx.fillStyle='rgb('+(190+b)+','+(168+b)+','+(60+b)+')';
    ctx.beginPath();ctx.arc(x,y,r,0,6.28);ctx.fill();
  }
  ctx.globalAlpha=1;
});

// Herbe tropicale variée avec touffes
var grassTex=mkTex(512,512,function(ctx,w,h){
  // Base gradient terrain
  var g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#1e6e10');g.addColorStop(.5,'#257015');g.addColorStop(1,'#1a5e0e');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  // Touffes d'herbe
  for(var i=0;i<15000;i++){
    var x=rng()*w,y=rng()*h,b=Math.floor(rng()*60-30);
    ctx.globalAlpha=.35+rng()*.3;
    ctx.fillStyle='rgb('+(20+b)+','+(95+b)+','+(12+b)+')';
    ctx.fillRect(x,y,1+rng()*4,3+rng()*10);
  }
  // Taches plus sombres (feuilles mortes)
  for(var i=0;i<400;i++){
    var x=rng()*w,y=rng()*h,r=2+rng()*5;
    ctx.globalAlpha=.15;ctx.fillStyle='#3a2a10';
    ctx.beginPath();ctx.arc(x,y,r,0,6.28);ctx.fill();
  }
  ctx.globalAlpha=1;
});

// Terre sombre sous foret
var dirtTex=mkTex(256,256,function(ctx,w,h){
  ctx.fillStyle='#2a1e0e';ctx.fillRect(0,0,w,h);
  for(var i=0;i<3000;i++){
    var x=rng()*w,y=rng()*h,r=rng()*3,b=Math.floor(rng()*25-12);
    ctx.globalAlpha=.4;ctx.fillStyle='rgb('+(42+b)+','+(30+b)+','+(14+b)+')';
    ctx.beginPath();ctx.arc(x,y,r,0,6.28);ctx.fill();
  }
  ctx.globalAlpha=1;
});

// Ecorce tronc palmier organique
var barkTex=mkTex(128,256,function(ctx,w,h){
  var g=ctx.createLinearGradient(0,0,w,0);
  g.addColorStop(0,'#6a4820');g.addColorStop(.5,'#7a5530');g.addColorStop(1,'#5e3e18');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  // Anneaux de palmier
  for(var i=0;i<h;i+=5+rng()*4){
    ctx.globalAlpha=.3+rng()*.2;
    ctx.fillStyle=rng()>.5?'rgba(0,0,0,.25)':'rgba(255,255,255,.06)';
    ctx.fillRect(0,i,w,1+rng()*2);
  }
  // Fibres verticales
  for(var i=0;i<20;i++){
    var x=rng()*w;ctx.globalAlpha=.1;
    ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+rng()*4-2,h);ctx.stroke();
  }
  ctx.globalAlpha=1;
});

// Feuille de palmier verte tropicale
var leafTex=mkTex(256,128,function(ctx,w,h){
  var g=ctx.createLinearGradient(0,0,w,h);
  g.addColorStop(0,'#4ed420');g.addColorStop(.4,'#38b818');g.addColorStop(1,'#1e7808');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  // Nervures
  ctx.strokeStyle='rgba(0,80,0,.35)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,h/2);ctx.lineTo(w,h/2);ctx.stroke();
  for(var i=0;i<8;i++){
    var x=i/8*w;ctx.globalAlpha=.25;ctx.lineWidth=.8;
    ctx.beginPath();ctx.moveTo(x,h/2);ctx.lineTo(x-8,rng()>0.5?0:h);ctx.stroke();
  }
  ctx.globalAlpha=1;
});

// Feuillage jungle dense (fougeres, plantes)
var jungleTex=mkTex(256,256,function(ctx,w,h){
  var g=ctx.createRadialGradient(w/2,h/2,4,w/2,h/2,w/2);
  g.addColorStop(0,'#3acc14');g.addColorStop(.5,'#28a00e');g.addColorStop(1,'#0e5806');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  for(var i=0;i<2000;i++){
    var x=rng()*w,y=rng()*h,b=Math.floor(rng()*40-20);
    ctx.globalAlpha=.3;
    ctx.fillStyle='rgb('+(20+b)+','+(120+b)+','+(8+b)+')';
    ctx.fillRect(x,y,2+rng()*6,1+rng()*4);
  }
  ctx.globalAlpha=1;
});

// Roche volcanique noire
var rockTex=mkTex(256,256,function(ctx,w,h){
  ctx.fillStyle='#181614';ctx.fillRect(0,0,w,h);
  for(var i=0;i<6000;i++){
    var x=rng()*w,y=rng()*h,r=rng()*2.5,b=Math.floor(rng()*30-15);
    ctx.globalAlpha=.5;ctx.fillStyle='rgb('+(25+b)+','+(22+b)+','+(18+b)+')';
    ctx.beginPath();ctx.arc(x,y,r,0,6.28);ctx.fill();
  }
  // Veines minerales
  for(var i=0;i<30;i++){
    ctx.globalAlpha=.08;ctx.strokeStyle='#556655';ctx.lineWidth=rng()*2;
    ctx.beginPath();var sx=rng()*w,sy=rng()*h;ctx.moveTo(sx,sy);
    ctx.lineTo(sx+rng()*30-15,sy+rng()*30-15);ctx.stroke();
  }
  ctx.globalAlpha=1;
});

// Eau lagon turquoise
var waterTex=mkTex(512,512,function(ctx,w,h){
  var g=ctx.createLinearGradient(0,0,w,h);
  g.addColorStop(0,'#08c8d8');g.addColorStop(.3,'#05a8c0');g.addColorStop(.7,'#047898');g.addColorStop(1,'#035878');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  for(var i=0;i<200;i++){
    var x=rng()*w,y=rng()*h;
    ctx.globalAlpha=rng()*.25+.04;
    ctx.strokeStyle='rgba(255,255,255,1)';ctx.lineWidth=.6+rng()*2;
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+15+rng()*35,y+rng()*5-2.5);ctx.stroke();
  }
  ctx.globalAlpha=1;
});

step(26,'TERRAIN...');

// ── TERRAIN HEIGHTMAP PROCEDURAL ──
// Grille de vertices deformee pour faire un vrai terrain
var TSIZE=120,TSUB=60;
var terrain=B.MeshBuilder.CreateGround('terrain',{width:TSIZE,height:TSIZE,subdivisions:TSUB,updatable:true},sc);

// Deformer les vertices
var pos=terrain.getVerticesData(B.VertexBuffer.PositionKind);
var TCOL=TSUB+1;
function noise(x,z,freq,amp){
  var xi=Math.floor(x*freq),zi=Math.floor(z*freq);
  var xf=x*freq-xi,zf=z*freq-zi;
  var a=Math.sin(xi*127.1+zi*311.7)*.5+.5;
  var b=Math.sin((xi+1)*127.1+zi*311.7)*.5+.5;
  var c=Math.sin(xi*127.1+(zi+1)*311.7)*.5+.5;
  var d=Math.sin((xi+1)*127.1+(zi+1)*311.7)*.5+.5;
  return (a*(1-xf)+b*xf)*(1-zf)+(c*(1-xf)+d*xf)*zf;
}
function getHeight(wx,wz){
  var dx=wx/TSIZE,dz=wz/TSIZE;
  var dist=Math.sqrt(dx*dx+dz*dz)*2;
  // Base île — bord plat, centre monte
  var island=Math.max(0,1-dist*1.1);
  island=Math.pow(island,1.4);
  // Relief
  var h=island*(
    noise(wx,wz,.04,1)*4 +
    noise(wx,wz,.09,1)*2.5 +
    noise(wx,wz,.2,1)*1.2 +
    noise(wx,wz,.45,1)*.5
  );
  // Montagne au nord-ouest (cascade)
  var dmx=wx+18,dmz=wz+20;
  var mDist=Math.sqrt(dmx*dmx+dmz*dmz);
  h+=Math.max(0,(1-mDist/22))*14;
  // Vallee cascade
  var dvx=wx+18,dvz=wz+8;
  var vDist=Math.sqrt(dvx*dvx+dvz*dvz);
  if(vDist<6) h-=Math.max(0,(1-vDist/6))*3;
  // Plage plane
  h=Math.max(0,h);
  if(dist>0.7) h=Math.min(h,.3);
  return h;
}

var hMap={};
for(var i=0;i<pos.length;i+=3){
  var wx=pos[i],wz=pos[i+2];
  var h=getHeight(wx,wz);
  pos[i+1]=h;
  hMap[Math.round(wx*10)+','+Math.round(wz*10)]=h;
}
terrain.updateVerticesData(B.VertexBuffer.PositionKind,pos);
terrain.bakeCurrentTransformIntoVertices();

// Multi-material terrain
var terrMat=new B.StandardMaterial('terrMat',sc);
terrMat.diffuseTexture=grassTex;
terrMat.diffuseTexture.uScale=18;terrMat.diffuseTexture.vScale=18;
terrMat.specularColor=new B.Color3(.03,.06,.01);
terrain.material=terrMat;terrain.receiveShadows=true;

// Sable autour du terrain
var beach=B.MeshBuilder.CreateGround('beach',{width:200,height:200,subdivisions:2},sc);
var beachMat=new B.StandardMaterial('beachMat',sc);
beachMat.diffuseTexture=sandTex;beachMat.diffuseTexture.uScale=20;beachMat.diffuseTexture.vScale=20;
beachMat.specularColor=new B.Color3(.05,.04,.02);
beach.material=beachMat;beach.position.y=-.05;beach.receiveShadows=true;

step(36,'OCEAN...');

// Ocean
var ocean=B.MeshBuilder.CreateGround('ocean',{width:1200,height:1200,subdivisions:3},sc);
var oceanMat=new B.StandardMaterial('oceanMat',sc);
oceanMat.diffuseTexture=waterTex;
oceanMat.diffuseTexture.uScale=60;oceanMat.diffuseTexture.vScale=60;
oceanMat.diffuseColor=new B.Color3(.88,.97,1.0);
oceanMat.specularColor=new B.Color3(1,1,1);oceanMat.specularPower=100;
oceanMat.emissiveColor=new B.Color3(.01,.08,.18);
oceanMesh=ocean;ocean.material=oceanMat;ocean.position.y=-.5;

// Lagon intérieur translucide
var lagon=B.MeshBuilder.CreateCylinder('lagon',{height:.18,diameter:140,tessellation:60},sc);
var lagonMat=new B.StandardMaterial('lagonMat',sc);
lagonMat.diffuseColor=new B.Color3(.2,.78,.88);lagonMat.alpha=.42;
lagonMat.specularColor=new B.Color3(.9,1,1);lagonMat.specularPower=40;
lagon.material=lagonMat;lagon.position.y=-.28;

// Dome ciel
var skyDome=B.MeshBuilder.CreateSphere('sky',{diameter:900,segments:10},sc);
skyDome.flipFaces(true);
var skyMat=new B.StandardMaterial('skyMat',sc);
skyMat.backFaceCulling=false;skyMat.disableLighting=true;
// Gradient ciel hawaïen
var skyGrad=mkTex(2,256,function(ctx,w,h){
  var g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#1a60c0');g.addColorStop(.4,'#3a8ad8');g.addColorStop(.8,'#70b8f0');g.addColorStop(1,'#b0d8f8');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
});
skyMat.emissiveTexture=skyGrad;skyMat.emissiveTexture.uScale=1;skyMat.emissiveTexture.vScale=1;
skyDome.material=skyMat;

step(44,'VAGUES...');

var oceanMesh=ocean;
var waveRings=[];
for(var wi=0;wi<8;wi++){
  var wr=B.MeshBuilder.CreateTorus('wave'+wi,{diameter:(62+wi*8)*2,thickness:.28,tessellation:72},sc);
  var wm=new B.StandardMaterial('wm'+wi,sc);
  wm.diffuseColor=new B.Color3(.9,.97,1.0);wm.emissiveColor=new B.Color3(.04,.2,.32);
  wm.alpha=.55-wi*.055;wm.backFaceCulling=false;
  wr.material=wm;wr.position.y=-.2;wr.rotation.x=Math.PI/2;
  waveRings.push({m:wr,ph:wi/8*Math.PI*2,spd:.9+rng()*.4});
}

step(52,'FORET HAWAIIENNE...');

// Fonction helper pour hauteur terrain
function terrH(wx,wz){
  var key=Math.round(wx*10)+','+Math.round(wz*10);
  if(hMap[key]!==undefined)return hMap[key];
  return getHeight(wx,wz);
}

// ── PALMIERS ORGANIQUES COURBES ──
function makePalm(x,z,h,leanX,leanZ,thick){
  thick=thick||1;
  // Tronc courbé via segments
  var segs=10;
  var pts=[new B.Vector3(x,terrH(x,z),z)];
  var cx=x,cy=terrH(x,z),cz=z;
  var dx=leanX/segs,dz=leanZ/segs,dy=h/segs;
  for(var i=1;i<=segs;i++){
    // Courbe de Bezier approximée — le tronc part droit puis penche
    var t=i/segs;
    var curve=Math.sin(t*Math.PI*.5)*1.2;
    cx+=dx*curve+rng()*.05;
    cy+=dy*(1-.1*t);
    cz+=dz*curve+rng()*.05;
    pts.push(new B.Vector3(cx,cy,cz));
  }
  // Tronc en segments cylinders
  for(var i=0;i<segs;i++){
    var p0=pts[i],p1=pts[i+1];
    var mid=B.Vector3.Lerp(p0,p1,.5);
    var seg=B.MeshBuilder.CreateCylinder('trs',{
      height:p0.subtract(p1).length(),
      diameterTop:(.12-.008*i)*thick,
      diameterBottom:(.18-.006*i)*thick,
      tessellation:7
    },sc);

    if(animGroups&&animGroups.length){
      animGroups.forEach(function(ag){
        ag.stop();var n=ag.name.toLowerCase();
        if(/idle/.test(n))pAnims.idle=ag;
        else if(/run/.test(n))pAnims.run=ag;
        else if(/walk/.test(n))pAnims.walk=ag;
        else if(/jump/.test(n))pAnims.jump=ag;
      });
      if(!pAnims.idle)pAnims.idle=animGroups[0];
      if(!pAnims.walk&&animGroups[1])pAnims.walk=animGroups[1];
      playAnim(pAnims.idle);
    }
  } else {
    pYOff=.58;
    root.position.set(P.x,P.y+pYOff,P.z);
  }
  P.y=0;
  CAM.yaw=P.yaw+Math.PI; // camera derriere
  CAM.tYaw=CAM.yaw;
}

// ── BOUCLE PRINCIPALE ──
eng.runRenderLoop(function(){
  var now=performance.now(),dt=Math.min((now-lastT)/1000,.05);lastT=now;

  // ── INPUT ──
  var fwd=0,lat=0;
  if(KY['KeyW']||KY['KeyZ']||KY['ArrowUp'])fwd=1;
  if(KY['KeyS']||KY['ArrowDown'])fwd=-1;
  if(KY['KeyD']||KY['ArrowRight'])lat=1;
  if(KY['KeyA']||KY['KeyQ']||KY['ArrowLeft'])lat=-1;
  fwd+=jLY;lat+=jLX;
  // Normaliser diagonale
  var il=Math.sqrt(fwd*fwd+lat*lat);
  if(il>1){fwd/=il;lat/=il;}

  // Direction mouvement = relatif à la caméra
  var camY=CAM.yaw;
  var moveX=fwd*(-Math.sin(camY))+lat*Math.cos(camY);
  var moveZ=fwd*(-Math.cos(camY))+lat*(-Math.sin(camY));
  var moveMag=Math.sqrt(moveX*moveX+moveZ*moveZ);
  var spd=sprint?8.5:5.2;

  if(moveMag>.05){
    var nx=moveX/moveMag,nz=moveZ/moveMag;
    P.vx+=(nx*spd-P.vx)*Math.min(1,dt*11);
    P.vz+=(nz*spd-P.vz)*Math.min(1,dt*11);
    // Stitch tourne vers direction deplacement
    var targetYaw=Math.atan2(nx,nz);
    var dy=targetYaw-P.yaw;
    while(dy>Math.PI)dy-=Math.PI*2;while(dy<-Math.PI)dy+=Math.PI*2;
    P.yaw+=dy*Math.min(1,dt*14);
    playAnim(sprint&&pAnims.run?pAnims.run:(pAnims.walk||pAnims.idle));
  } else {
    P.vx*=Math.pow(.015,dt);P.vz*=Math.pow(.015,dt);
    if(Math.abs(P.vx)<.02)P.vx=0;if(Math.abs(P.vz)<.02)P.vz=0;
    if(pAnims.idle)playAnim(pAnims.idle);
  }

  // Gravite
  if(!P.onGround){P.vy-=26*dt;if(P.vy<-25)P.vy=-25;}
  P.x+=P.vx*dt;P.z+=P.vz*dt;

  // Sol = hauteur terrain
  var groundH=terrH(P.x,P.z);
  P.y+=P.vy*dt;
  if(P.y<=groundH&&P.vy<=0){P.y=groundH;P.vy=0;P.onGround=true;}
  else P.onGround=false;

  // Collisions obstacles
  for(var ci=0;ci<colCircles.length;ci++){
    var ob=colCircles[ci],ddx=P.x-ob.x,ddz=P.z-ob.z;
    var d2=ddx*ddx+ddz*ddz,mn=.5+ob.r;
    if(d2<mn*mn&&d2>.001){
      var dd=Math.sqrt(d2),nnx=ddx/dd,nnz=ddz/dd;
      P.x=ob.x+nnx*mn;P.z=ob.z+nnz*mn;
      var dot=P.vx*nnx+P.vz*nnz;if(dot<0){P.vx-=dot*nnx;P.vz-=dot*nnz;}
    }
  }
  // Limite île
  var pd=Math.sqrt(P.x*P.x+P.z*P.z);
  if(pd>ISLAND_R-2){var pa=Math.atan2(P.x,P.z);P.x=Math.sin(pa)*(ISLAND_R-2);P.z=Math.cos(pa)*(ISLAND_R-2);P.vx*=.05;P.vz*=.05;}
  if(P.y<-20){P.x=2;P.y=terrH(2,2);P.z=2;P.vx=0;P.vy=0;P.vz=0;P.onGround=true;}

  // Mesh joueur
  if(pRoot){
    pRoot.position.x=P.x;
    pRoot.position.y=P.y+pYOff;
    pRoot.position.z=P.z;
    // Rotation douce vers direction
    var rd=P.yaw-pRoot.rotation.y;
    while(rd>Math.PI)rd-=Math.PI*2;while(rd<-Math.PI)rd+=Math.PI*2;
    pRoot.rotation.y+=rd*Math.min(1,dt*16);
  }
  if(fill)fill.position.set(P.x,P.y+4,P.z);

  // ── CAMERA TPS — TOUJOURS DERRIERE ──
  // La camera suit le yaw de Stitch avec un decalage PI (derriere)
  // Quand Stitch bouge, la camera glisse pour se mettre derriere
  var targetCamYaw=P.yaw+Math.PI;
  var cyDiff=targetCamYaw-CAM.yaw;
  while(cyDiff>Math.PI)cyDiff-=Math.PI*2;
  while(cyDiff<-Math.PI)cyDiff+=Math.PI*2;
  // Vitesse de suivi : rapide si mouvement, lent si idle
  var camFollowSpeed=moveMag>.1?5.5:2.0;
  CAM.yaw+=cyDiff*Math.min(1,dt*camFollowSpeed);

  // Position camera
  var cr=CAM.dist*Math.cos(CAM.pitch);
  var tgtX=P.x,tgtY=P.y+pYOff+1.4,tgtZ=P.z;
  var desX=tgtX+Math.sin(CAM.yaw)*cr;
  var desY=tgtY+CAM.dist*Math.sin(CAM.pitch);
  var desZ=tgtZ+Math.cos(CAM.yaw)*cr;
  // Eviter que la camera passe sous le terrain
  var camGround=terrH(desX,desZ);
  if(desY<camGround+1.5)desY=camGround+1.5;
  cam.position.x+=(desX-cam.position.x)*Math.min(1,dt*12);
  cam.position.y+=(desY-cam.position.y)*Math.min(1,dt*9);
  cam.position.z+=(desZ-cam.position.z)*Math.min(1,dt*12);
  cam.setTarget(new B.Vector3(tgtX,tgtY,tgtZ));

  // ── ANIMATIONS MONDE ──
  waveT+=dt;

  // Vagues ocean
  waveRings.forEach(function(w){
    var p=Math.sin(waveT*w.spd+w.ph);
    w.m.scaling.x=1+p*.05;w.m.scaling.z=1+p*.05;
    w.m.position.y=-.2+Math.sin(waveT*1.8+w.ph)*.04;
    w.m.material.alpha=.44+Math.sin(waveT*2.2+w.ph)*.12;
  });
  // Scroll eau
  if(ocean.material.diffuseTexture){
    ocean.material.diffuseTexture.uOffset+=.00015;
    ocean.material.diffuseTexture.vOffset+=.00006;
  }
  lagon.position.y=-.28+Math.sin(waveT*.8)*.012;

  // Cascade — eau qui glisse
  if(cascWater.material.diffuseTexture){
    cascWater.material.diffuseTexture.vOffset+=.02;
  }
  // Animation brume cascade
  mistMeshes.forEach(function(mi){
    mi.m.position.x=mi.ox+Math.sin(waveT*mi.spd+mi.ph)*.4;
    mi.m.position.y=mi.oy+Math.sin(waveT*mi.spd*.7+mi.ph)*.3;
    mi.m.material.alpha=.06+Math.sin(waveT*.5+mi.ph)*.04;
  });
  // Particules cascade
  cascParts.forEach(function(d){
    d.life+=dt*(.8+Math.random()*.4);
    if(d.life>1)d.life=0;
    d.m.position.x=d.x+(Math.random()-.5)*.3;
    d.m.position.y=d.y+(1-d.life)*10;
    d.m.position.z=d.z+(Math.random()-.5)*.2;
    d.m.material.alpha=.4*(1-d.life);
  });

  // Zone
  var dz2=Math.sqrt(P.x*P.x+P.z*P.z);
  var px=P.x,pz=P.z;
  var nearCasc=Math.sqrt((px+18)*(px+18)+(pz+20)*(pz+20))<8;
  document.getElementById('zoneTxt').innerHTML=
    nearCasc?'&#128166; CASCADE':
    dz2<8?'&#127956; VILLAGE':
    dz2<20?'&#127807; JUNGLE':
    dz2<38?'&#127944; PLAGE':'&#127754; BORD DE MER';

  sc.render();
});

window.addEventListener('resize',function(){if(eng)eng.resize();});

function playAnim(a){if(!a||a===curAnim)return;if(curAnim)curAnim.stop();a.start(true);curAnim=a;}
function doJump(e){if(e&&e.preventDefault)e.preventDefault();if(P.onGround){P.vy=9;P.onGround=false;if(pAnims.jump)playAnim(pAnims.jump);}}
function setSprint(v,e){if(e&&e.preventDefault)e.preventDefault();sprint=!!v;}

window.toggleDN=function(){
  night=!night;
  if(night){
    sc.clearColor=new B.Color4(.01,.02,.08,1);sc.fogColor=new B.Color3(.01,.02,.06);sc.fogDensity=.01;
    sky.intensity=.08;sky.diffuse=new B.Color3(.06,.10,.32);
    sun.intensity=.12;sun.diffuse=new B.Color3(.22,.28,.65);
    skyMat.emissiveTexture=null;skyMat.emissiveColor=new B.Color3(.01,.03,.1);
    cascLight.intensity=2.0;
    document.getElementById('dnBtn').innerHTML='&#9728; JOUR';toast('Nuit hawaiienne...');
  }else{
    sc.clearColor=new B.Color4(.38,.68,.92,1);sc.fogColor=new B.Color3(.45,.72,.88);sc.fogDensity=.006;
    sky.intensity=.72;sky.diffuse=new B.Color3(.78,.88,.98);
    sun.intensity=3.2;sun.diffuse=new B.Color3(1.0,.94,.78);
    skyMat.emissiveTexture=skyGrad;skyMat.emissiveColor=new B.Color3(1,1,1);
    cascLight.intensity=1.2;
    document.getElementById('dnBtn').innerHTML='&#9790; NUIT';toast('Belle journee !');
  }
};

// Joystick
var jBase=document.getElementById('joy'),jNub=document.getElementById('jnub'),jid=-1,JMAX=38;
function jUp(cx,cy){
  var r=jBase.getBoundingClientRect(),dx=cx-(r.left+r.width/2),dy=cy-(r.top+r.height/2),d=Math.sqrt(dx*dx+dy*dy);
  if(d>JMAX){dx=dx/d*JMAX;dy=dy/d*JMAX;}
  jNub.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';
  jLX=d>5?dx/JMAX:0;jLY=d>5?-dy/JMAX:0;
}
function jRst(){jNub.style.transform='translate(-50%,-50%)';jLX=0;jLY=0;jid=-1;}
jBase.addEventListener('touchstart',function(e){e.preventDefault();jid=e.touches[0].identifier;jUp(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
jBase.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===jid)jUp(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false});
jBase.addEventListener('touchend',jRst,{passive:true});
jBase.addEventListener('mousedown',function(e){if(e.button!==2)jUp(e.clientX,e.clientY);});
window.addEventListener('mouseup',jRst);
window.addEventListener('keydown',function(e){KY[e.code]=1;if(e.code==='Space'){e.preventDefault();doJump();}if(e.code==='ShiftLeft'||e.code==='ShiftRight')sprint=true;});
window.addEventListener('keyup',function(e){KY[e.code]=0;if(e.code==='ShiftLeft'||e.code==='ShiftRight')sprint=false;});
window.addEventListener('wheel',function(e){CAM.dist=Math.max(6,Math.min(22,CAM.dist+e.deltaY*.01));},{passive:true});
// Rotation camera souris droite seulement
var mDn=false,mLx=0,mLy=0;
cv.addEventListener('mousedown',function(e){if(e.button===2){mDn=true;mLx=e.clientX;mLy=e.clientY;}});
window.addEventListener('mousemove',function(e){if(!mDn)return;CAM.yaw-=(e.clientX-mLx)*.004;CAM.pitch=Math.max(.1,Math.min(.75,CAM.pitch+(e.clientY-mLy)*.003));mLx=e.clientX;mLy=e.clientY;});
window.addEventListener('mouseup',function(e){if(e.button===2)mDn=false;});
cv.addEventListener('contextmenu',function(e){e.preventDefault();});
var p0t=null,iDt=0,iCDt=0;
cv.addEventListener('touchstart',function(e){if(e.touches.length===2){p0t=e.touches[0];var p1=e.touches[1];iDt=Math.hypot(p1.clientX-p0t.clientX,p1.clientY-p0t.clientY);iCDt=CAM.dist;}},{passive:true});
cv.addEventListener('touchmove',function(e){if(e.touches.length===2&&iDt>0){var d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);CAM.dist=Math.max(6,Math.min(22,iCDt*(iDt/d)));}},{passive:true});
};
if(window.BABYLON&&window.startGame)window.startGame();
</script>
