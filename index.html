<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monde Aquatique</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:100vw;height:100vh;overflow:hidden;background:#020f18;}
canvas{display:block;width:100%;height:100%;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
var W = canvas.width, H = canvas.height;
var t = 0;

function rnd(a,b){ return Math.random()*(b-a)+a; }
function rndInt(a,b){ return Math.floor(Math.random()*(b-a)+a); }

// –– PARTICULES ––
var particles = [];
for(var i=0;i<70;i++) particles.push({x:rnd(0,W),y:rnd(0,H),r:rnd(0.4,2.5),vy:-rnd(0.08,0.35),alpha:rnd(0.15,0.55)});

// –– POISSONS ––
var fishColors = [’#ffb347’,’#ff6b6b’,’#87ceeb’,’#b0c4de’,’#ffd700’,’#ff8c69’,’#f06292’,’#80deea’,’#ff7043’,’#aed581’];
var fish = [];
for(var i=0;i<24;i++){
var dir = Math.random()>0.5?1:-1;
fish.push({x:rnd(0,W),y:rnd(H*0.05,H*0.7),vx:rnd(0.4,1.5)*dir,size:rnd(7,21),color:fishColors[rndInt(0,fishColors.length)],t:rnd(0,6.28)});
}

// –– BULLES ––
var bubbles = [];
for(var i=0;i<38;i++) bubbles.push({x:rnd(0,W),y:rnd(0,H),r:rnd(1,5),vy:-rnd(0.18,0.75),t:rnd(0,6.28)});

// –– ALGUES ––
var seaweeds = [];
for(var i=0;i<30;i++){
var leaves = [];
for(var j=0;j<9;j++) leaves.push(rnd(-0.7,0.7));
seaweeds.push({x:rnd(0,W),segments:rndInt(5,10),height:rnd(45,140),width:rnd(2,5),color:[’#1a5c30’,’#256b38’,’#1d7a40’,’#2e8b4a’,’#174d28’][rndInt(0,5)],phase:rnd(0,6.28),leaves:leaves});
}

// –– CORAUX ––
var coralColors = [’#c2185b’,’#ad1457’,’#6a1de0’,’#1565c0’,’#c62828’,’#e65100’,’#4a148c’,’#880e4f’];
var corals = [];
for(var i=0;i<24;i++) corals.push({x:rnd(0,W),type:rndInt(0,4),color:coralColors[rndInt(0,coralColors.length)],size:rnd(16,48)});

// –– ROCHERS ––
var rocks = [];
for(var i=0;i<38;i++) rocks.push({x:rnd(0,W),y:H-rnd(12,85),rx:rnd(16,78),ry:rnd(9,43),rot:rnd(-0.4,0.4),lightness:rndInt(18,38)});

// –– PIERRES ––
var pebbles = [];
for(var i=0;i<55;i++) pebbles.push({x:rnd(0,W),y:H-rnd(3,31),r:rnd(2,10),hue:rnd(195,235),light:rnd(26,48)});

// –– ETOILES MER ––
var starColors = [’#bf360c’,’#b71c1c’,’#e64a19’,’#c62828’];
var starfish = [];
for(var i=0;i<10;i++) starfish.push({x:rnd(0,W),y:H-rnd(4,46),color:starColors[rndInt(0,4)],size:rnd(7,18),rot:rnd(0,6.28)});

// –– PALMIERS ––
var palms = [];
for(var i=0;i<7;i++){
var leafLens = [];
for(var j=0;j<7;j++) leafLens.push(rnd(45,100));
palms.push({x:(W/7)*i+rnd(-W/18,W/18),height:rnd(220,380),lean:rnd(-0.5,0.5),trunkW:rnd(3,6),phase:rnd(0,6.28),leafLens:leafLens});
}

// –– TORTUES ADULTES ––
var turtles = [];
for(var i=0;i<5;i++){
var dir = Math.random()>0.5?1:-1;
turtles.push({x:rnd(0,W),y:rnd(H*0.1,H*0.6),vx:rnd(0.25,0.7)*dir,vy:rnd(-0.2,0.2),size:rnd(36,56),t:rnd(0,6.28),ft:rnd(0,6.28)});
}

// –– BEBE TORTUES ––
var babies = [];
for(var i=0;i<9;i++){
var dir = Math.random()>0.5?1:-1;
babies.push({x:rnd(0,W),y:rnd(H*0.1,H*0.8),vx:rnd(0.35,1.1)*dir,vy:rnd(-0.35,0.35),size:rnd(11,18),t:rnd(0,6.28),ft:rnd(0,6.28)});
}

// –– HIPPOCAMPES ––
var shColors = [’#f9a825’,’#ef6c00’,’#558b2f’,’#e91e8c’,’#00838f’,’#7b1fa2’];
var seahorses = [];
for(var i=0;i<10;i++) seahorses.push({x:rnd(0,W),y:rnd(H*0.15,H*0.75),vx:rnd(-0.35,0.35),vy:rnd(-0.28,0.28),size:rnd(17,28),color:shColors[rndInt(0,6)],t:rnd(0,6.28),phase:rnd(0,6.28)});

// ===================== FONCTIONS DE DESSIN =====================

function drawPalm(p){
var sway = Math.sin(t*0.5+p.phase)*5;
var topX = p.x + p.lean*p.height + sway;
var topY = H - p.height;
ctx.save();
ctx.shadowColor=‘rgba(0,0,0,0.6)’; ctx.shadowBlur=10; ctx.shadowOffsetX=4;
ctx.strokeStyle=’#3a2008’; ctx.lineWidth=p.trunkW; ctx.lineCap=‘round’;
ctx.beginPath();
ctx.moveTo(p.x, H);
ctx.quadraticCurveTo(p.x+p.lean*p.height*0.5+sway*0.4, H-p.height*0.55, topX, topY);
ctx.stroke();
ctx.shadowBlur=5;
for(var i=0;i<p.leafLens.length;i++){
var angle = (i/p.leafLens.length)*Math.PI*2 + Math.sin(t*0.6+p.phase+i)*0.1;
var len = p.leafLens[i];
var droopX = topX + Math.cos(angle)*len;
var droopY = topY + Math.sin(angle+0.5)*len*0.8;
ctx.strokeStyle=’#2e7d32’; ctx.lineWidth=Math.max(1,2.5-i*0.08);
ctx.beginPath();
ctx.moveTo(topX,topY);
ctx.quadraticCurveTo(topX+Math.cos(angle)*len*0.5, topY+Math.sin(angle+0.5)*len*0.3, droopX, droopY);
ctx.stroke();
}
ctx.restore();
}

function drawTurtle(tx,ty,size,ft,dir,baby){
ctx.save();
ctx.translate(tx,ty);
if(dir<0) ctx.scale(-1,1);
var s=size;
var sc = baby?’#4a8530’:’#3a6820’;
var sk = baby?’#6aaa3a’:’#5a9828’;
var pt = baby?’#2a5518’:’#1e4010’;

ctx.shadowColor=‘rgba(0,0,0,0.5)’; ctx.shadowBlur=s*0.5; ctx.shadowOffsetY=s*0.15;

var bf=Math.sin(ft*1.5)*0.25;
// nageoires arriere
ctx.save(); ctx.translate(-s*0.4,s*0.15); ctx.rotate(0.4+bf);
ctx.beginPath(); ctx.ellipse(0,0,s*0.35,s*0.12,0.3,0,Math.PI*2); ctx.fillStyle=sk; ctx.fill(); ctx.restore();
ctx.save(); ctx.translate(-s*0.4,-s*0.15); ctx.rotate(-0.4-bf);
ctx.beginPath(); ctx.ellipse(0,0,s*0.35,s*0.12,-0.3,0,Math.PI*2); ctx.fillStyle=sk; ctx.fill(); ctx.restore();

var ff=Math.sin(ft)*0.35;
// nageoires avant
ctx.save(); ctx.translate(s*0.35,s*0.18); ctx.rotate(0.5+ff);
ctx.beginPath(); ctx.ellipse(0,0,s*0.5,s*0.13,0.2,0,Math.PI*2); ctx.fillStyle=sk; ctx.fill(); ctx.restore();
ctx.save(); ctx.translate(s*0.35,-s*0.18); ctx.rotate(-0.5-ff);
ctx.beginPath(); ctx.ellipse(0,0,s*0.5,s*0.13,-0.2,0,Math.PI*2); ctx.fillStyle=sk; ctx.fill(); ctx.restore();

// carapace
ctx.shadowBlur=s*0.3;
ctx.beginPath(); ctx.ellipse(0,0,s*0.55,s*0.38,0,0,Math.PI*2);
var sg=ctx.createRadialGradient(-s*0.1,-s*0.1,0,0,0,s*0.6);
sg.addColorStop(0,baby?’#5d9e38’:’#4a7a24’); sg.addColorStop(1,sc);
ctx.fillStyle=sg; ctx.fill();
ctx.strokeStyle=pt; ctx.lineWidth=0.8; ctx.stroke();

ctx.strokeStyle=pt; ctx.lineWidth=0.7;
ctx.beginPath(); ctx.ellipse(0,0,s*0.2,s*0.14,0,0,Math.PI*2); ctx.stroke();
for(var i=0;i<5;i++){
var a=(i/5)*Math.PI*2;
ctx.beginPath(); ctx.ellipse(Math.cos(a)*s*0.28,Math.sin(a)*s*0.2,s*0.12,s*0.09,a,0,Math.PI*2); ctx.stroke();
}

// tete
ctx.beginPath(); ctx.ellipse(s*0.6,0,s*0.18,s*0.14,0,0,Math.PI*2); ctx.fillStyle=sk; ctx.fill();
ctx.beginPath(); ctx.arc(s*0.68,-s*0.04,s*0.055,0,Math.PI*2); ctx.fillStyle=’#0d1f0a’; ctx.fill();
ctx.beginPath(); ctx.arc(s*0.7,-s*0.055,s*0.022,0,Math.PI*2); ctx.fillStyle=‘rgba(255,255,255,0.7)’; ctx.fill();
ctx.restore();
}

function drawSeahorse(hx,hy,size,color,phase,dir){
ctx.save();
ctx.translate(hx,hy);
if(dir<0) ctx.scale(-1,1);
var s=size, bw=Math.sin(phase)*2.5;

ctx.shadowColor=‘rgba(0,0,0,0.5)’; ctx.shadowBlur=s*0.6; ctx.shadowOffsetX=2;

ctx.strokeStyle=color; ctx.lineWidth=s*0.18; ctx.lineCap=‘round’;
ctx.beginPath(); ctx.moveTo(0,0);
ctx.bezierCurveTo(s*0.3+bw,s*0.4,s*0.1+bw,s*0.8,-s*0.15,s*1.1); ctx.stroke();

ctx.lineWidth=s*0.12;
ctx.beginPath(); ctx.moveTo(-s*0.15,s*1.1);
ctx.bezierCurveTo(-s*0.5,s*1.3,-s*0.45,s*1.6,-s*0.1,s*1.55); ctx.stroke();

ctx.lineWidth=0.8; ctx.strokeStyle=‘rgba(0,0,0,0.3)’;
for(var i=0;i<5;i++){
ctx.beginPath(); ctx.ellipse(s*0.05+bw*0.2,s*0.15+i*s*0.18,s*0.22-i*s*0.02,s*0.06,0,0,Math.PI*2); ctx.stroke();
}

ctx.fillStyle=color;
ctx.beginPath(); ctx.ellipse(0,-s*0.12,s*0.18,s*0.22,0,0,Math.PI*2); ctx.fill();

ctx.strokeStyle=color; ctx.lineWidth=s*0.1;
ctx.beginPath(); ctx.moveTo(s*0.1,-s*0.18); ctx.lineTo(s*0.55,-s*0.28); ctx.stroke();

for(var i=0;i<4;i++){ ctx.beginPath(); ctx.arc(-s*0.04+i*s*0.06,-s*0.33,s*0.06,0,Math.PI*2); ctx.fill(); }

ctx.fillStyle=’#0d1f0a’;
ctx.beginPath(); ctx.arc(s*0.06,-s*0.15,s*0.07,0,Math.PI*2); ctx.fill();
ctx.fillStyle=‘white’;
ctx.beginPath(); ctx.arc(s*0.09,-s*0.17,s*0.03,0,Math.PI*2); ctx.fill();

ctx.fillStyle=‘rgba(255,255,255,0.15)’;
ctx.beginPath(); ctx.moveTo(-s*0.1,-s*0.05);
for(var i=0;i<=8;i++){
ctx.lineTo(-s*0.1-Math.abs(Math.sin(phase*3+i*0.8))*s*0.22, -s*0.05+i*s*0.12);
}
ctx.lineTo(-s*0.1,s*0.85); ctx.closePath(); ctx.fill();
ctx.restore();
}

function drawStar(cx,cy,r,color,rot){
ctx.save();
ctx.shadowColor=‘rgba(0,0,0,0.5)’; ctx.shadowBlur=6;
ctx.beginPath();
for(var i=0;i<10;i++){
var a=(i*Math.PI)/5-Math.PI/2+rot;
var rad=i%2===0?r:r*0.45;
if(i===0) ctx.moveTo(cx+rad*Math.cos(a),cy+rad*Math.sin(a));
else ctx.lineTo(cx+rad*Math.cos(a),cy+rad*Math.sin(a));
}
ctx.closePath(); ctx.fillStyle=color; ctx.fill(); ctx.restore();
}

function drawCoral(cx,y,type,color,size){
ctx.save();
ctx.shadowColor=‘rgba(0,0,0,0.55)’; ctx.shadowBlur=8; ctx.shadowOffsetY=3;
ctx.fillStyle=color; ctx.strokeStyle=color;
if(type===0){
for(var b=-3;b<=3;b++){
var angle=(b/3)*0.6-Math.PI/2;
ctx.lineWidth=2.5; ctx.beginPath();
ctx.moveTo(cx,y); ctx.lineTo(cx+Math.cos(angle)*size,y+Math.sin(angle)*size); ctx.stroke();
ctx.beginPath(); ctx.arc(cx+Math.cos(angle)*size,y+Math.sin(angle)*size,4,0,Math.PI*2); ctx.fill();
}
} else if(type===1){
for(var i=0;i<6;i++){
var a=(i/6)*Math.PI*2;
ctx.beginPath(); ctx.arc(cx+Math.cos(a)*size*0.3,y-size*0.5+Math.sin(a)*size*0.25,size*0.22,0,Math.PI*2); ctx.fill();
}
ctx.beginPath(); ctx.arc(cx,y-size*0.5,size*0.25,0,Math.PI*2); ctx.fill();
} else if(type===2){
for(var i=-2;i<=2;i++){
var h2=size*(0.8+i*i*0.05);
// tube sans roundRect
ctx.beginPath(); ctx.rect(cx+i*7-3,y-h2,6,h2); ctx.fill();
}
} else {
for(var i=0;i<7;i++){
var a=(i/7)*Math.PI-Math.PI; ctx.lineWidth=3;
ctx.beginPath(); ctx.moveTo(cx,y); ctx.lineTo(cx+Math.cos(a)*size*0.7,y+Math.sin(a)*size*0.7); ctx.stroke();
}
}
ctx.restore();
}

function drawSeaweed(sw){
var segH=sw.height/sw.segments;
ctx.save();
ctx.shadowColor=‘rgba(0,0,0,0.4)’; ctx.shadowBlur=5;
ctx.strokeStyle=sw.color; ctx.lineWidth=sw.width; ctx.lineCap=‘round’;
ctx.beginPath();
var cx2=sw.x, cy2=H;
ctx.moveTo(cx2,cy2);
for(var i=1;i<=sw.segments;i++){
var wave=Math.sin(t*0.8+sw.phase+i*0.6)*11;
var nx=sw.x+wave, ny=H-i*segH;
var cpx=(cx2+nx)/2+Math.sin(t*0.5+sw.phase+i)*5;
var cpy=(cy2+ny)/2;
ctx.quadraticCurveTo(cpx,cpy,nx,ny);
cx2=nx; cy2=ny;
}
ctx.stroke();

// Feuilles organiques
for(var i=1;i<=sw.segments;i++){
var wave=Math.sin(t*0.8+sw.phase+i*0.6)*11;
var lx=sw.x+wave, ly=H-i*segH;
var la=sw.leaves[i%sw.leaves.length];
var llen=10+Math.abs(la)*12;
ctx.fillStyle=sw.color;
ctx.save();
ctx.translate(lx,ly);
ctx.rotate(la+Math.sin(t*0.6+sw.phase)*0.15);
ctx.beginPath();
ctx.moveTo(0,0);
ctx.bezierCurveTo(llen*0.35,-llen*0.35,llen*0.8,-llen*0.18,llen,0);
ctx.bezierCurveTo(llen*0.8,llen*0.18,llen*0.35,llen*0.18,0,0);
ctx.fill();
ctx.restore();
}
ctx.restore();
}

// ===================== BOUCLE PRINCIPALE =====================

function draw(){
t+=0.016;

// Fond
var grad=ctx.createLinearGradient(0,0,0,H);
grad.addColorStop(0,’#061a28’);
grad.addColorStop(0.25,’#074a5a’);
grad.addColorStop(0.6,’#054a3a’);
grad.addColorStop(1,’#021a10’);
ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

// Rayons de lumière
ctx.save();
for(var i=0;i<10;i++){
var lx=W*(0.05+i*0.1);
var alpha=0.018+Math.sin(t*0.28+i)*0.01;
var g2=ctx.createLinearGradient(lx,0,lx+50,H*0.7);
g2.addColorStop(0,‘rgba(100,220,180,’+alpha+’)’);
g2.addColorStop(1,‘rgba(100,220,180,0)’);
ctx.fillStyle=g2;
ctx.beginPath();
ctx.moveTo(lx-12,0); ctx.lineTo(lx+55,0);
ctx.lineTo(lx+95,H*0.78); ctx.lineTo(lx+28,H*0.78);
ctx.closePath(); ctx.fill();
}
ctx.restore();

// Particules
for(var i=0;i<particles.length;i++){
var p=particles[i];
p.y+=p.vy;
if(p.y<0){p.y=H; p.x=Math.random()*W;}
ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle=‘rgba(160,230,210,’+p.alpha+’)’; ctx.fill();
}

// Palmiers (derrière tout)
for(var i=0;i<palms.length;i++) drawPalm(palms[i]);

// Algues
for(var i=0;i<seaweeds.length;i++) drawSeaweed(seaweeds[i]);

// Rochers
for(var i=0;i<rocks.length;i++){
var r=rocks[i];
ctx.save();
ctx.shadowColor=‘rgba(0,0,0,0.7)’; ctx.shadowBlur=12; ctx.shadowOffsetY=5;
ctx.beginPath(); ctx.ellipse(r.x,r.y,r.rx,r.ry,r.rot,0,Math.PI*2);
var rg=ctx.createRadialGradient(r.x-r.rx*0.3,r.y-r.ry*0.3,0,r.x,r.y,r.rx);
rg.addColorStop(0,‘hsl(205,16%,’+(r.lightness+14)+’%)’);
rg.addColorStop(1,‘hsl(205,14%,’+r.lightness+’%)’);
ctx.fillStyle=rg; ctx.fill(); ctx.restore();
}

// Pierres
for(var i=0;i<pebbles.length;i++){
var p=pebbles[i];
ctx.save();
ctx.shadowColor=‘rgba(0,0,0,0.5)’; ctx.shadowBlur=4; ctx.shadowOffsetY=2;
ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle=‘hsl(’+p.hue+’,14%,’+p.light+’%)’; ctx.fill(); ctx.restore();
}

// Coraux
for(var i=0;i<corals.length;i++) drawCoral(corals[i].x, H-5, corals[i].type, corals[i].color, corals[i].size);

// Étoiles de mer
for(var i=0;i<starfish.length;i++) drawStar(starfish[i].x,starfish[i].y,starfish[i].size,starfish[i].color,starfish[i].rot);

// Sol sableux — tons bruns naturels, pas de couleurs criardes
var sandGrad=ctx.createLinearGradient(0,H-28,0,H);
sandGrad.addColorStop(0,’#6b5218’);
sandGrad.addColorStop(1,’#3d2d08’);
ctx.fillStyle=sandGrad; ctx.fillRect(0,H-28,W,28);
// texture douce
ctx.save();
ctx.fillStyle=‘rgba(80,58,14,0.3)’;
for(var i=0;i<35;i++){
ctx.beginPath();
ctx.arc(rnd(0,W),H-rnd(3,24),rnd(0.5,2.5),0,Math.PI*2);
ctx.fill();
}
ctx.restore();

// Bulles
for(var i=0;i<bubbles.length;i++){
var b=bubbles[i];
b.t+=0.045; b.y+=b.vy; b.x+=Math.sin(b.t)*0.38;
if(b.y<0){b.y=H; b.x=Math.random()*W;}
ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
ctx.strokeStyle=‘rgba(160,235,255,0.4)’; ctx.lineWidth=1; ctx.stroke();
ctx.fillStyle=‘rgba(190,245,255,0.07)’; ctx.fill();
}

// Poissons
for(var i=0;i<fish.length;i++){
var f=fish[i];
f.t+=0.058; f.x+=f.vx; f.y+=Math.sin(f.t)*0.28;
if(f.x>W+30) f.x=-30;
if(f.x<-30) f.x=W+30;
ctx.save();
ctx.shadowColor=‘rgba(0,0,0,0.4)’; ctx.shadowBlur=7;
ctx.translate(f.x,f.y);
if(f.vx<0) ctx.scale(-1,1);
ctx.beginPath(); ctx.ellipse(0,0,f.size,f.size*0.44,0,0,Math.PI*2);
ctx.fillStyle=f.color; ctx.fill();
var qw=Math.sin(f.t*2)*0.3;
ctx.beginPath();
ctx.moveTo(-f.size,0);
ctx.lineTo(-f.size-f.size*0.7,-f.size*0.4+qw*10);
ctx.lineTo(-f.size-f.size*0.7,f.size*0.4+qw*10);
ctx.closePath(); ctx.fillStyle=f.color; ctx.fill();
ctx.beginPath(); ctx.arc(f.size*0.4,-f.size*0.1,f.size*0.12,0,Math.PI*2);
ctx.fillStyle=’#0a0a0a’; ctx.fill();
ctx.beginPath(); ctx.arc(f.size*0.43,-f.size*0.13,f.size*0.05,0,Math.PI*2);
ctx.fillStyle=‘rgba(255,255,255,0.6)’; ctx.fill();
if(f.size>13){
ctx.strokeStyle=‘rgba(255,255,255,0.3)’; ctx.lineWidth=1.5;
ctx.beginPath(); ctx.moveTo(0,-f.size*0.38); ctx.lineTo(0,f.size*0.38); ctx.stroke();
}
ctx.restore();
}

// Tortues adultes
for(var i=0;i<turtles.length;i++){
var tu=turtles[i];
tu.t+=0.011; tu.ft+=0.048;
tu.x+=tu.vx; tu.y+=Math.sin(tu.t)*0.38+tu.vy;
if(tu.x>W+85) tu.x=-85;
if(tu.x<-85) tu.x=W+85;
if(tu.y<H*0.04) tu.vy=Math.abs(tu.vy);
if(tu.y>H*0.76) tu.vy=-Math.abs(tu.vy);
drawTurtle(tu.x,tu.y,tu.size,tu.ft,tu.vx>=0?1:-1,false);
}

// Bébé tortues
for(var i=0;i<babies.length;i++){
var bt=babies[i];
bt.t+=0.017; bt.ft+=0.076;
bt.x+=bt.vx; bt.y+=Math.sin(bt.t)*0.55+bt.vy;
if(bt.x>W+42) bt.x=-42;
if(bt.x<-42) bt.x=W+42;
if(bt.y<H*0.07) bt.vy=Math.abs(bt.vy);
if(bt.y>H*0.83) bt.vy=-Math.abs(bt.vy);
drawTurtle(bt.x,bt.y,bt.size,bt.ft,bt.vx>=0?1:-1,true);
}

// Hippocampes
for(var i=0;i<seahorses.length;i++){
var sh=seahorses[i];
sh.t+=0.007; sh.phase+=0.055;
sh.x+=sh.vx+Math.sin(sh.t*0.65)*0.28;
sh.y+=sh.vy+Math.cos(sh.t*0.48)*0.22;
if(sh.x>W+55) sh.x=-55;
if(sh.x<-55) sh.x=W+55;
if(sh.y<H*0.09) sh.vy=Math.abs(sh.vy)+0.08;
if(sh.y>H*0.86) sh.vy=-(Math.abs(sh.vy)+0.08);
drawSeahorse(sh.x,sh.y,sh.size,sh.color,sh.phase,sh.vx>=0?1:-1);
}

// Vignette sombre sur les bords
var vig=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.88);
vig.addColorStop(0,‘rgba(0,0,0,0)’);
vig.addColorStop(1,‘rgba(0,0,0,0.6)’);
ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

// Surface ondulante
ctx.save(); ctx.beginPath(); ctx.moveTo(0,0);
for(var x=0;x<=W;x+=4){
ctx.lineTo(x, 10+Math.sin(x*0.022+t*0.75)*5+Math.sin(x*0.052+t*0.48)*2.5);
}
ctx.lineTo(W,0); ctx.closePath();
var surfGrad=ctx.createLinearGradient(0,0,0,18);
surfGrad.addColorStop(0,‘rgba(100,210,195,0.45)’);
surfGrad.addColorStop(1,‘rgba(60,160,175,0)’);
ctx.fillStyle=surfGrad; ctx.fill(); ctx.restore();

requestAnimationFrame(draw);
}

draw();

window.addEventListener(‘resize’,function(){
canvas.width=W=window.innerWidth;
canvas.height=H=window.innerHeight;
});
</script>

</body>
