<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>FantasyWorld</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#001830;font-family:'Barlow Condensed',sans-serif}
#loading{position:fixed;inset:0;background:linear-gradient(180deg,#001830,#003860);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#loading h1{font-family:'Cinzel',serif;font-size:26px;color:#7de8ff;letter-spacing:6px;text-shadow:0 0 30px rgba(125,232,255,.5)}
#loading p{font-size:11px;color:rgba(125,232,255,.4);letter-spacing:3px}
.bar-wrap{width:240px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,#7de8ff,#ff6b9d);border-radius:2px;width:0%;transition:width .4s}
#stepTxt{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:3px}
#charsel{position:fixed;inset:0;background:linear-gradient(180deg,#001020,#002040);z-index:90;display:none;flex-direction:column;overflow:hidden}
.cs-top{flex-shrink:0;padding:14px 0 2px;text-align:center}
.cs-top h2{font-family:'Cinzel',serif;font-size:9px;letter-spacing:8px;color:rgba(125,232,255,.4)}
.cs-top h1{font-family:'Cinzel',serif;font-size:18px;letter-spacing:4px;color:#7de8ff}
#cscv{flex:1;display:block;width:100%;min-height:0;max-height:calc(100vh - 220px);touch-action:none}
.cs-bot{flex-shrink:0;background:rgba(0,10,25,.95);border-top:1px solid rgba(125,232,255,.15);padding:10px 16px 16px;position:relative;z-index:10}
.cs-nav{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cs-arr{width:44px;height:44px;background:rgba(125,232,255,.08);border:1.5px solid rgba(125,232,255,.3);border-radius:3px;color:#7de8ff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;touch-action:manipulation}
.cs-info{flex:1;text-align:center}
.cs-name{font-family:'Cinzel',serif;font-size:17px;letter-spacing:3px;margin-bottom:2px}
.cs-desc{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.8px}
#csDots{display:flex;justify-content:center;gap:8px;margin-bottom:10px}
.csdot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.15);cursor:pointer;transition:all .2s}
.csdot.on{background:#7de8ff;box-shadow:0 0 8px rgba(125,232,255,.6)}
#btnPlay{width:100%;padding:14px;background:linear-gradient(135deg,#7de8ff,#0088bb);border:none;color:#001020;font-family:'Cinzel',serif;font-size:12px;letter-spacing:4px;cursor:pointer;border-radius:3px;touch-action:manipulation}
#cv{position:fixed;inset:0;width:100%;height:100%;display:none;touch-action:none}
#hud{position:fixed;inset:0;pointer-events:none;z-index:20;display:none}
.hpill{display:inline-flex;align-items:center;gap:5px;background:rgba(0,10,25,.85);border-radius:20px;padding:5px 12px;font-family:'Cinzel',serif;font-size:11px;backdrop-filter:blur(4px)}
#minimap{position:absolute;bottom:74px;right:14px;width:100px;height:100px;border-radius:50%;overflow:hidden;border:2px solid rgba(125,232,255,.4)}
/* Joystick GAUCHE — exactement comme Kirby */
#joy{position:fixed;left:16px;bottom:80px;z-index:30;width:110px;height:110px;border-radius:50%;background:rgba(125,232,255,.06);border:2px solid rgba(125,232,255,.2);touch-action:none;pointer-events:all}
#jnub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(125,232,255,.5),rgba(0,80,120,.9));border:2px solid rgba(125,232,255,.5);pointer-events:none}
/* Joystick DROIT — caméra, exactement comme Kirby */
#joyR{position:fixed;right:110px;bottom:80px;z-index:30;width:90px;height:90px;border-radius:50%;background:rgba(255,180,100,.05);border:2px solid rgba(255,180,100,.15);touch-action:none;pointer-events:all}
#jnubR{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,200,100,.35),rgba(120,60,0,.7));border:1.5px solid rgba(255,180,100,.35);pointer-events:none}
#btns{position:fixed;right:14px;bottom:80px;z-index:30;display:flex;flex-direction:column;gap:6px;pointer-events:all}
.btn{width:52px;height:52px;border-radius:50%;background:rgba(0,10,25,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-family:'Cinzel',serif;font-size:8px;cursor:pointer;touch-action:manipulation;backdrop-filter:blur(4px)}
#mbar{position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(0,10,25,.96);border-top:1px solid rgba(125,232,255,.1);z-index:30;display:none;align-items:center;justify-content:center;gap:6px;padding:0 8px;pointer-events:all}
.mbb{padding:7px 12px;border-radius:20px;font-size:8px;border:1.5px solid rgba(255,255,255,.08);color:rgba(255,255,255,.3);cursor:pointer;letter-spacing:.8px;font-family:'Cinzel',serif;background:transparent;touch-action:manipulation}
.mbb.on{background:rgba(125,232,255,.15);border-color:#7de8ff;color:#7de8ff}
#toast{position:fixed;top:56px;left:50%;transform:translateX(-50%) scale(.9);opacity:0;z-index:80;background:rgba(0,10,25,.95);border:1.5px solid #7de8ff;border-radius:20px;padding:6px 18px;color:#7de8ff;font-size:11px;letter-spacing:.5px;white-space:nowrap;pointer-events:none;transition:all .15s;backdrop-filter:blur(8px)}
#toast.show{transform:translateX(-50%) scale(1);opacity:1}
</style>
</head>
<body>

<div id="loading">
  <h1>FANTASYWORLD</h1>
  <p>LILO &amp; STITCH ISLAND</p>
  <div class="bar-wrap"><div class="bar-fill" id="barFill"></div></div>
  <div id="stepTxt">CHARGEMENT...</div>
</div>

<div id="charsel">
  <div class="cs-top"><h2>FANTASYWORLD</h2><h1>CHOIX DU PERSONNAGE</h1></div>
  <canvas id="cscv"></canvas>
  <div class="cs-bot">
    <div class="cs-nav">
      <div class="cs-arr" onclick="csNav(-1)">&#8249;</div>
      <div class="cs-info">
        <div class="cs-name" id="csName" style="color:#7de8ff">STITCH</div>
        <div class="cs-desc" id="csDesc">Creature from outer space</div>
      </div>
      <div class="cs-arr" onclick="csNav(1)">&#8250;</div>
    </div>
    <div id="csDots"></div>
    <button id="btnPlay" onclick="startGame()">&#9654; &nbsp; JOUER</button>
  </div>
</div>

<canvas id="cv"></canvas>

<div id="hud">
  <div style="position:absolute;top:12px;left:12px;display:flex;flex-direction:column;gap:4px">
    <div class="hpill" style="border-left:3px solid #ffd700;color:#ffd700">&#128176; <span id="goldVal">5 000</span> $</div>
    <div class="hpill" style="border-left:3px solid #7de8ff;color:#7de8ff">&#127968; <span id="propVal">0</span>/5</div>
  </div>
  <div style="position:absolute;top:12px;right:12px">
    <div class="hpill" style="border-left:3px solid rgba(125,232,255,.4);color:#7de8ff;letter-spacing:2px">FANTASYWORLD</div>
  </div>
  <div style="position:absolute;top:12px;left:50%;transform:translateX(-50%)">
    <div class="hpill" id="charBadge" style="border-left:3px solid #ff6b9d;color:#ff6b9d">&#128100; STITCH</div>
  </div>
  <div style="position:absolute;bottom:80px;left:14px">
    <div class="hpill" id="zoneTxt" style="border-left:3px solid rgba(255,255,255,.4);color:#fff;font-size:9px">&#127944; PLAGE</div>
  </div>
  <div id="minimap"><canvas id="mmcv" width="100" height="100"></canvas></div>
</div>

<!-- Joystick gauche (mouvement) -->

<div id="joy"><div id="jnub"></div></div>
<!-- Joystick droit (caméra) — exactement comme Kirby jRX/jRY -->
<div id="joyR"><div id="jnubR"></div></div>

<div id="btns">
  <div class="btn" style="border:2px solid #7de8ff;color:#7de8ff" ontouchstart="doJump(event)" onclick="doJump()">&#8679;<br>JUMP</div>
  <div class="btn" style="border:2px solid #ffd700;color:#ffd700" ontouchstart="setSprint(1,event)" ontouchend="setSprint(0)" onmousedown="setSprint(1)" onmouseup="setSprint(0)">&#9889;<br>RUN</div>
  <div class="btn" id="dnBtn" style="border:2px solid #ff9955;color:#ff9955" onclick="toggleDN()">&#9728;<br>JOUR</div>
</div>
<div id="mbar">
  <div class="mbb on" onclick="setMode('explore',this)">&#9672; EXPLORER</div>
  <div class="mbb" onclick="setMode('buy',this)">$ ACHETER</div>
  <div class="mbb" onclick="toggleDN()">&#9728; JOUR/NUIT</div>
</div>
<div id="toast"></div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>

<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

<script>
'use strict';
var B=BABYLON;
var BASE='https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/';

var CHARS=[
  {file:'stitch2.glb',name:'STITCH',desc:'Creature from outer space',color:'#7de8ff',scale:1.8},
  {file:'Ely%20By%20K.Atienza.glb',name:'ELY',desc:'Style cinematique',color:'#ff88cc',scale:1.0},
  {file:'joe__realistic_human_3d_model.glb',name:'JOE',desc:'Homme realiste',color:'#ffd700',scale:1.8},
  {file:'rumi_lobby.glb',name:'RUMI',desc:'Personnage elegant',color:'#aaffaa',scale:1.0}
];
var selChar=0;

// ═══════════════════════════════════════════════════
// SYSTÈME PHYSIQUE — copie exacte Kirby
// P = état du joueur (coordonnées monde 3D)
// ═══════════════════════════════════════════════════
var P={
  x:0, y:3, z:0,   // position (y = hauteur)
  vx:0, vy:0, vz:0, // vélocités
  yaw:0,            // rotation horizontale
  onGround:true,
  flying:false,
  walk:0            // compteur animation marche
};

// Joysticks — exactement comme Kirby jLX/jLY/jRX/jRY
var jLX=0, jLY=0;   // joystick gauche (mouvement)
var jRX=0, jRY=0;   // joystick droit (caméra)

// Caméra — état exact Kirby CAM
var CAM={yaw:0, pitch:0.28, dist:14};
var camTX=0, camTY=3, camTZ=0;

// Clavier
var KY={};

// Autres
var sprint=false, stamina=100;
var night=false;
var gold=5000, props=0, mode='explore';
var toastT=null;
var pRoot=null, pYOff=0, pAnims={}, curAnim=null;
var npcs=[], plotMeshes=[];
var eng, sc, cam;
var sun, amb, shadows, fillLight;
var mmT=0;
var lastT=performance.now();

var PLOTS=[
  {x:15,z:10,price:2500,name:'PLAGE NORD',desc:'Vue sur lagon'},
  {x:-20,z:5,price:3000,name:'JUNGLE',desc:'Sous les palmiers'},
  {x:5,z:-20,price:2000,name:'CRIQUE',desc:'Eau cristalline'},
  {x:-10,z:20,price:3500,name:'VOLCAN',desc:'Vue panoramique'},
  {x:25,z:-5,price:4000,name:'FALAISE',desc:'Bord de mer'}
];

// ═══════════════════════════════════════════════════
// CHARGEMENT
// ═══════════════════════════════════════════════════
function setStep(pct,txt){
  document.getElementById('barFill').style.width=pct+'%';
  if(txt)document.getElementById('stepTxt').textContent=txt;
}

var csEng=null,csScene=null,csModels=[],csIdx=0,csLock=false;

function initCharSelect(){
  document.getElementById('loading').style.display='none';
  document.getElementById('charsel').style.display='flex';
  var cv=document.getElementById('cscv');
  cv.width=cv.clientWidth*devicePixelRatio;cv.height=cv.clientHeight*devicePixelRatio;
  csEng=new B.Engine(cv,true,{antialias:true});csScene=new B.Scene(csEng);
  csScene.clearColor=new B.Color4(.01,.05,.12,1);
  var hl=new B.HemisphericLight('h',new B.Vector3(0,1,0),csScene);hl.intensity=1.4;hl.groundColor=new B.Color3(.05,.1,.15);
  var dl=new B.DirectionalLight('d',new B.Vector3(-1,-2,-1),csScene);dl.intensity=1.5;
  var rim=new B.PointLight('r',new B.Vector3(2,3,-1),csScene);rim.diffuse=new B.Color3(.3,.9,1);rim.intensity=1.5;rim.range=8;
  var arc=new B.ArcRotateCamera('c',.1,1.2,3.2,new B.Vector3(0,.9,0),csScene);arc.lowerRadiusLimit=1.5;arc.upperRadiusLimit=7;arc.attachControl(cv,true);
  var gnd=B.MeshBuilder.CreateGround('g',{width:6,height:6},csScene);
  var gm=new B.StandardMaterial('gm',csScene);gm.diffuseColor=new B.Color3(.02,.08,.15);gm.specularColor=new B.Color3(.4,.8,1);gm.specularPower=20;gnd.material=gm;
  var ring=B.MeshBuilder.CreateTorus('ring',{diameter:1.1,thickness:.03,tessellation:48},csScene);ring.position.y=.015;
  var rm=new B.StandardMaterial('rm',csScene);rm.emissiveColor=new B.Color3(.3,.9,1);ring.material=rm;
  buildCsDots();csLoad(0);
  csEng.runRenderLoop(function(){if(csModels[csIdx])csModels[csIdx].rotation.y+=.006;csScene.render();});
  window.addEventListener('resize',function(){if(csEng)csEng.resize();});
}
function buildCsDots(){
  var el=document.getElementById('csDots');el.innerHTML='';
  CHARS.forEach(function(c,i){var d=document.createElement('div');d.className='csdot'+(i===csIdx?' on':'');d.onclick=function(){csGoTo(i);};el.appendChild(d);});
}
function csUpdateUI(){
  var c=CHARS[csIdx];var nm=document.getElementById('csName');nm.textContent=c.name;nm.style.color=c.color;
  document.getElementById('csDesc').textContent=c.desc;buildCsDots();
}
async function csLoad(idx){
  if(csModels[idx]){csModels.forEach(function(m,i){if(m)m.setEnabled(i===idx);});return;}
  if(csLock)return;csLock=true;csModels.forEach(function(m){if(m)m.setEnabled(false);});
  var c=CHARS[idx];
  try{
    var r=await B.SceneLoader.ImportMeshAsync('','',BASE+c.file,csScene);if(!r.meshes.length)throw 0;
    var root=r.meshes[0];root.scaling.setAll(1);root.computeWorldMatrix(true);
    var bb=root.getHierarchyBoundingVectors();var ch=bb.max.y-bb.min.y;var cs=ch>0.05?1.8/ch:1.0;root.scaling.setAll(cs);root.computeWorldMatrix(true);
    var bb2=root.getHierarchyBoundingVectors();root.position.y=-bb2.min.y;
    if(r.animationGroups.length){r.animationGroups.forEach(function(ag){ag.stop();});var idle=r.animationGroups.find(function(a){return /idle/i.test(a.name);})||r.animationGroups[0];if(idle)idle.start(true);}
    csModels[idx]=root;
  }catch(e){
    var g=new B.TransformNode('fb'+idx,csScene);var col=B.Color3.FromHexString(CHARS[idx].color);var mat=new B.StandardMaterial('fm',csScene);mat.diffuseColor=col;mat.emissiveColor=col.scale(.2);
    var body=B.MeshBuilder.CreateSphere('bd',{diameter:.6,segments:16},csScene);body.position.y=.7;body.material=mat;body.parent=g;
    var head=B.MeshBuilder.CreateSphere('hd',{diameter:.45,segments:14},csScene);head.position.y=1.3;head.material=mat;head.parent=g;
    csModels[idx]=g;
  }
  csLock=false;if(csModels[idx])csModels[idx].setEnabled(true);
}
function csNav(dir){if(csModels[csIdx])csModels[csIdx].setEnabled(false);csIdx=(csIdx+dir+CHARS.length)%CHARS.length;csUpdateUI();csLoad(csIdx);}
function csGoTo(idx){if(csModels[csIdx])csModels[csIdx].setEnabled(false);csIdx=idx;csUpdateUI();csLoad(idx);}

async function startGame(){
  selChar=csIdx;
  document.getElementById('charsel').style.display='none';
  if(csEng){csEng.stopRenderLoop();try{csEng.dispose();}catch(e){}csEng=null;csScene=null;}
  await new Promise(function(r){requestAnimationFrame(function(){requestAnimationFrame(r);});});
  document.getElementById('loading').style.display='flex';
  setStep(5,'INITIALISATION...');
  await initWorld();
}

// ═══════════════════════════════════════════════════
// MONDE
// ═══════════════════════════════════════════════════
async function initWorld(){
  var cv=document.getElementById('cv');cv.style.display='block';
  eng=new B.Engine(cv,true,{antialias:true,stencil:true},true);
  sc=new B.Scene(eng);
  sc.clearColor=new B.Color4(.45,.75,.95,1);
  sc.fogMode=B.Scene.FOGMODE_EXP2;sc.fogDensity=.006;sc.fogColor=new B.Color3(.6,.85,1);

  // Caméra BabylonJS — on la contrôle MANUELLEMENT (updateCam)
  cam=new B.FreeCamera('c',new B.Vector3(0,8,14),sc);
  cam.minZ=.1;cam.maxZ=600;cam.fov=.95;
  cam.setTarget(new B.Vector3(0,1,0));
  // Empêcher BabylonJS de capturer les inputs — on gère tout manuellement
  // cam.inputs.clear(); // pas besoin, on écrase position directement

  setStep(15,'LUMIERES...');initLights();
  setStep(25,'OCEAN...');buildOcean();buildIslands();buildPlots();

  // Input systèmes — AVANT le render loop
  setupJoystickLeft();
  setupJoystickRight();
  setupCamDrag(cv);
  setupKeys();

  eng.runRenderLoop(gameLoop);
  window.addEventListener('resize',function(){if(eng)eng.resize();});

  document.getElementById('loading').style.display='none';
  cv.style.display='block';
  document.getElementById('hud').style.display='block';
  document.getElementById('mbar').style.display='flex';
  document.getElementById('charBadge').innerHTML='&#128100; '+CHARS[selChar].name;

  // Position initiale P
  P.x=0;P.y=3;P.z=0;P.vx=0;P.vy=0;P.vz=0;
  camTX=0;camTY=3;camTZ=0;

  setStep(35,'PERSONNAGE...');await loadPlayer();
  toast('Bienvenue sur l\'ile ! - '+CHARS[selChar].name);
  setStep(50,'PALMIERS...');await loadNature();
  setStep(75,'ROCHERS...');await loadRocks();
  setStep(90,'AMIS...');await spawnNPCs();
  setStep(100,'');
}

function initLights(){
  amb=new B.HemisphericLight('a',new B.Vector3(0,1,0),sc);
  amb.intensity=.9;amb.diffuse=new B.Color3(.85,.92,.98);amb.groundColor=new B.Color3(.4,.6,.3);amb.specular=new B.Color3(0,0,0);
  sun=new B.DirectionalLight('s',new B.Vector3(-.5,-1,-.3),sc);
  sun.position=new B.Vector3(80,150,80);sun.intensity=1.8;sun.diffuse=new B.Color3(1,.95,.8);sun.specular=new B.Color3(.2,.2,.1);
  try{shadows=new B.ShadowGenerator(512,sun);shadows.useBlurExponentialShadowMap=true;shadows.blurKernel=8;}catch(e){shadows=null;}
  fillLight=new B.PointLight('fl',new B.Vector3(0,4,0),sc);
  fillLight.diffuse=new B.Color3(.8,.95,1);fillLight.intensity=.6;fillLight.range=10;
}

function buildOcean(){
  var ocean=B.MeshBuilder.CreateGround('ocean',{width:400,height:400,subdivisions:4},sc);
  var om=new B.StandardMaterial('om',sc);om.diffuseColor=new B.Color3(.05,.4,.7);om.specularColor=new B.Color3(.8,.9,1);om.specularPower=30;om.emissiveColor=new B.Color3(.01,.12,.25);
  ocean.material=om;ocean.position.y=-.5;
}
function buildIslands(){
  buildIslandMesh(0,0,28,22,'main');buildIslandMesh(55,0,12,9,'ile2');
  buildIslandMesh(-50,0,10,8,'ile3');buildIslandMesh(20,-50,14,10,'ile4');buildIslandMesh(-30,55,8,7,'ile5');
}
function buildIslandMesh(cx,cz,rx,rz,name){
  var sand=B.MeshBuilder.CreateGround(name+'_sand',{width:rx*2,height:rz*2,subdivisions:8},sc);sand.position.set(cx,.01,cz);
  var sm=new B.StandardMaterial(name+'sm',sc);sm.diffuseColor=new B.Color3(.95,.88,.6);sm.specularColor=new B.Color3(.1,.1,.05);sand.material=sm;sand.receiveShadows=true;
  var grass=B.MeshBuilder.CreateGround(name+'_grass',{width:rx*.8,height:rz*.8,subdivisions:4},sc);grass.position.set(cx,.02,cz);
  var gm=new B.StandardMaterial(name+'gm',sc);gm.diffuseColor=new B.Color3(.25,.65,.2);gm.emissiveColor=new B.Color3(.05,.15,.03);grass.material=gm;grass.receiveShadows=true;
  var shore=B.MeshBuilder.CreateGround(name+'_shore',{width:rx*2.2,height:rz*2.2,subdivisions:4},sc);shore.position.set(cx,-.02,cz);
  var shm=new B.StandardMaterial(name+'shm',sc);shm.diffuseColor=new B.Color3(.4,.7,.9);shm.alpha=.45;shore.material=shm;
}
function buildPlots(){
  var mat=new B.StandardMaterial('pm',sc);mat.diffuseColor=new B.Color3(.1,.9,.1);mat.emissiveColor=new B.Color3(.02,.2,.02);mat.alpha=.35;
  PLOTS.forEach(function(p,i){
    var g=B.MeshBuilder.CreateGround('pl'+i,{width:8,height:8},sc);g.position.set(p.x,.05,p.z);var m=mat.clone('pm'+i);g.material=m;
    [[-4,-4],[-4,4],[4,-4],[4,4]].forEach(function(c){
      var b=B.MeshBuilder.CreateSphere('bk',{diameter:.3,segments:8},sc);b.position.set(p.x+c[0],.5,p.z+c[1]);
      var bm=new B.StandardMaterial('bkm',sc);bm.diffuseColor=new B.Color3(.9,.7,.1);bm.emissiveColor=new B.Color3(.3,.2,0);b.material=bm;
    });
    plotMeshes.push(g);
  });
}

async function placeGLB(file,x,y,z,ry,s){
  try{
    var r=await B.SceneLoader.ImportMeshAsync('','',BASE+file,sc);if(!r||!r.meshes.length)return null;
    var root=r.meshes[0];root.position.set(x,y||0,z);if(ry!=null)root.rotation.y=ry;if(s)root.scaling.setAll(s);

// ═══════════════════════════════════════════════════
// PHYSIQUE — copie exacte Kirby physicsStep
// ═══════════════════════════════════════════════════
function physicsStep(dt){
  // ── Sol de l'île (y=0 partout pour l'instant)
  var groundY=0;
  var footY=groundY+pYOff;  // Kirby : footY = fy + 13 (hauteur des pieds)

  // ── Inputs — copie exacte Kirby
  // fwd = avant/arrière (jLY négatif = avant comme Kirby jLY)
  var fwd=0, lat=0;
  if(KY['KeyW']||KY['KeyZ'])fwd+=1;
  if(KY['KeyS'])fwd-=1;
  if(KY['ArrowRight']||KY['KeyD'])lat+=1;
  if(KY['ArrowLeft']||KY['KeyA']||KY['KeyQ'])lat-=1;
  // Joystick : jLY vers le bas = avant dans Kirby
  fwd-=jLY;   // -jLY car joystick bas = y négatif = avancer
  lat+=jLX;   // jLX droit = lat positif

  // ── Calcul direction (exactement Kirby)
  // moveX = -sin(yaw)*fwd + cos(yaw)*lat
  // moveZ = -cos(yaw)*fwd - sin(yaw)*lat
  var moveX=-Math.sin(CAM.yaw)*fwd+Math.cos(CAM.yaw)*lat;
  var moveZ=-Math.cos(CAM.yaw)*fwd-Math.sin(CAM.yaw)*lat;
  var moveMag=Math.sqrt(moveX*moveX+moveZ*moveZ);

  // ── Vitesse (Kirby : spd = 5.5 normal, 7.0 sprint)
  var spd=sprint&&stamina>2?7.0:5.5;
  spd*=dt*60; // normaliser pour dt (Kirby tourne à ~60fps)

  if(moveMag>.05){
    var nx=moveX/moveMag, nz=moveZ/moveMag;
    // Kirby : P.vx += (nx*spd - P.vx) * .15
    P.vx+=(nx*spd-P.vx)*.15;
    P.vz+=(nz*spd-P.vz)*.15;
    // Rotation du personnage — copie Kirby
    var targ=Math.atan2(-nx,-nz);
    var dya=targ-P.yaw;
    while(dya>Math.PI)dya-=Math.PI*2;
    while(dya<-Math.PI)dya+=Math.PI*2;
    P.yaw+=dya*.15;
    // Stamina
    if(sprint)stamina=Math.max(0,stamina-dt*22);
    else stamina=Math.min(100,stamina+dt*10);
    P.walk+=.11;
  } else {
    // Friction — copie Kirby
    P.vx*=.72;P.vz*=.72;
    if(Math.abs(P.vx)<.05)P.vx=0;
    if(Math.abs(P.vz)<.05)P.vz=0;
    stamina=Math.min(100,stamina+dt*16);
  }

  // ── Gravité — copie Kirby (hors eau)
  if(P.flying){
    P.vy-=0.06;if(P.vy<-3.5)P.vy=-3.5;
  } else {
    P.vy-=0.45;if(P.vy<-18)P.vy=-18;
  }
  P.vx*=.88;P.vz*=.88;

  // ── Appliquer mouvement D'ABORD (ordre exact Kirby)
  P.y+=P.vy;
  P.x+=P.vx;
  P.z+=P.vz;

  // ── PUIS vérifier le sol (après déplacement, seulement si on descend)
  if(P.y<=footY&&P.vy<=0){
    P.y=footY;P.vy=0;P.onGround=true;P.flying=false;
  } else {
    P.onGround=false;
  }

  // ── Limites de la carte
  P.x=Math.max(-120,Math.min(120,P.x));
  P.z=Math.max(-120,Math.min(120,P.z));

  // ── Chute dans le vide → respawn
  if(P.y<-30){P.x=0;P.y=3;P.z=0;P.vx=0;P.vy=0;P.vz=0;P.onGround=true;}

  // ── Animation
  playAnim(moveMag>.05?(sprint&&pAnims.run?pAnims.run:pAnims.walk||pAnims.idle):pAnims.idle);

  // ── Light follow
  if(fillLight)fillLight.position.set(P.x,P.y+4,P.z);
  updateZone();
}

// ═══════════════════════════════════════════════════
// CAMÉRA — copie exacte Kirby
// ═══════════════════════════════════════════════════
function updateCam(){
  // ── Lerp cible — copie Kirby
  camTX+=(P.x-camTX)*.12;
  camTY+=(P.y-camTY)*.10;
  camTZ+=(P.z-camTZ)*.12;

  // ── Contrôle caméra joystick droit — copie Kirby jRX/jRY
  var moveMag2=Math.sqrt(
    (jLX*jLX+jLY*jLY)
  );
  if(Math.abs(jRX)>.12||Math.abs(jRY)>.12){
    // Contrôle manuel caméra (joystick droit)
    CAM.yaw-=jRX*.018;
    CAM.pitch=Math.max(.08,Math.min(.92,CAM.pitch+jRY*.012));
  } else if(moveMag2>.05){
    // Suivi automatique derrière le personnage — copie Kirby
    var tcy=P.yaw;
    var cdiff=tcy-CAM.yaw;
    while(cdiff>Math.PI)cdiff-=Math.PI*2;
    while(cdiff<-Math.PI)cdiff+=Math.PI*2;
    CAM.yaw+=cdiff*.032;
  }

  // ── Zoom souris/pinch
  // (géré dans setupCamDrag)

  // ── Position caméra — copie exacte Kirby
  // cr = dist * cos(pitch)
  // camera.position = (camTX + sin(yaw)*cr, camTY + dist*sin(pitch), camTZ + cos(yaw)*cr)
  var cr=CAM.dist*Math.cos(CAM.pitch);
  cam.position.x=camTX+Math.sin(CAM.yaw)*cr;
  cam.position.y=camTY+CAM.dist*Math.sin(CAM.pitch);
  cam.position.z=camTZ+Math.cos(CAM.yaw)*cr;

  // ── LookAt — copie exacte Kirby
  // camera.lookAt(camTX, camTY+9, camTZ)
  cam.setTarget(new B.Vector3(camTX,camTY+2,camTZ));
}

// ═══════════════════════════════════════════════════
// APPLIQUE POSITION/ROTATION AU MESH BABYLONJS
// ═══════════════════════════════════════════════════
function applyPlayerMesh(){
  if(!pRoot)return;
  pRoot.position.x=P.x;
  pRoot.position.y=P.y+pYOff;
  pRoot.position.z=P.z;
  // Rotation smooth — copie Kirby
  var diff=(P.yaw+Math.PI)-pRoot.rotation.y;
  while(diff>Math.PI)diff-=Math.PI*2;
  while(diff<-Math.PI)diff+=Math.PI*2;
  pRoot.rotation.y+=diff*Math.min(1,0.016*15);
}

// ═══════════════════════════════════════════════════
// JOYSTICK GAUCHE — copie exacte Kirby
// ═══════════════════════════════════════════════════
function setupJoystickLeft(){
  var base=document.getElementById('joy');
  var nub=document.getElementById('jnub');
  var jid=-1;
  var MAX=38;
  function updateJoy(cx,cy){
    var r=base.getBoundingClientRect();
    var dx=cx-(r.left+r.width/2),dy=cy-(r.top+r.height/2);
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>MAX){dx=dx/dist*MAX;dy=dy/dist*MAX;}
    nub.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';
    // jLX = horizontal, jLY = vertical (bas = positif)
    // Kirby : jLX = dx/max, jLY = -dy/max (haut = positif)
    jLX=Math.abs(dist)>6?dx/MAX:0;
    jLY=Math.abs(dist)>6?-dy/MAX:0;
  }
  function reset(){nub.style.transform='translate(-50%,-50%)';jLX=0;jLY=0;jid=-1;}
  base.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();jid=e.touches[0].identifier;updateJoy(e.touches[0].clientX,e.touches[0].clientY);},{passive:false,capture:true});
  base.addEventListener('touchmove',function(e){e.preventDefault();e.stopPropagation();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===jid)updateJoy(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false,capture:true});
  base.addEventListener('touchend',function(e){e.stopPropagation();reset();},{passive:true,capture:true});
  base.addEventListener('mousedown',function(e){updateJoy(e.clientX,e.clientY);});
  window.addEventListener('mouseup',reset);
}

// ═══════════════════════════════════════════════════
// JOYSTICK DROIT — caméra, copie exacte Kirby jRX/jRY

  base.addEventListener('touchmove',function(e){e.preventDefault();e.stopPropagation();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===jid)updateJoy(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false,capture:true});

// ═══════════════════════════════════════════════════
// DRAG CAMÉRA SOURIS + ZOOM MOLETTE
// ═══════════════════════════════════════════════════
function setupCamDrag(cv){
  var mDn=false,mLx=0,mLy=0;
  cv.addEventListener('mousedown',function(e){
    if(e.button===2||e.button===0){mDn=true;mLx=e.clientX;mLy=e.clientY;}
  });
  window.addEventListener('mousemove',function(e){
    if(!mDn)return;
    CAM.yaw-=(e.clientX-mLx)*.004;
    CAM.pitch=Math.max(.08,Math.min(.88,CAM.pitch+(e.clientY-mLy)*.003));
    mLx=e.clientX;mLy=e.clientY;
  });
  window.addEventListener('mouseup',function(){mDn=false;});
  cv.addEventListener('contextmenu',function(e){e.preventDefault();});
  window.addEventListener('wheel',function(e){
    CAM.dist=Math.max(4,Math.min(22,CAM.dist+e.deltaY*.01));
  },{passive:true});
  // Pinch zoom mobile
  var pt0=null,pt1=null,initDist=0,initCamDist=0;
  cv.addEventListener('touchstart',function(e){
    if(e.touches.length===2){pt0=e.touches[0];pt1=e.touches[1];initDist=Math.hypot(pt1.clientX-pt0.clientX,pt1.clientY-pt0.clientY);initCamDist=CAM.dist;}
  },{passive:true});
  cv.addEventListener('touchmove',function(e){
    if(e.touches.length===2){var d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);CAM.dist=Math.max(4,Math.min(22,initCamDist*(initDist/d)));}
  },{passive:true});
}

function setupKeys(){

    if(e.code==='ShiftLeft'||e.code==='ShiftRight')sprint=false;

// ═══════════════════════════════════════════════════
// SAUT — copie exacte Kirby
// ═══════════════════════════════════════════════════
function doJump(e){
  if(e&&e.preventDefault)e.preventDefault();
  if(P.onGround){
    P.vy=8;   // Kirby : pVY=8
    P.onGround=false;
    if(pAnims.jump)playAnim(pAnims.jump);
  }
}

// ═══════════════════════════════════════════════════
// NPCs
// ═══════════════════════════════════════════════════
function moveNPCs(dt){
  npcs.forEach(function(npc){
    if(!npc.root)return;
    var tgt=npc.route[npc.ptIdx];var dx=tgt.x-npc.root.position.x,dz=tgt.z-npc.root.position.z;
    var dist=Math.sqrt(dx*dx+dz*dz);if(dist<.6){npc.ptIdx=(npc.ptIdx+1)%npc.route.length;return;}
    npc.root.position.x+=dx/dist*npc.speed*dt;npc.root.position.z+=dz/dist*npc.speed*dt;
    var ta=Math.atan2(dx,dz),da=ta-npc.root.rotation.y;
    while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;
    npc.root.rotation.y+=da*Math.min(1,dt*8);
    if(npc.lbl){npc.lbl.position.x=npc.root.position.x;npc.lbl.position.z=npc.root.position.z;}
  });
}

function updateZone(){
  var d=Math.sqrt(P.x*P.x+P.z*P.z);
  var z=d<8?'&#127956; VILLAGE':d<18?'&#127944; PLAGE':d<35?'&#127807; JUNGLE':'&#127754; OCEAN';
  document.getElementById('zoneTxt').innerHTML=z;
}

// JOUR / NUIT

function toggleDN(){
  night=!night;
  if(night){sc.clearColor=new B.Color4(.01,.03,.1,1);sc.fogColor=new B.Color3(.02,.05,.15);sc.fogDensity=.008;if(amb){amb.intensity=.2;amb.diffuse=new B.Color3(.15,.2,.4);}if(sun){sun.intensity=.3;sun.diffuse=new B.Color3(.3,.35,.7);}document.getElementById('dnBtn').innerHTML='&#9728;<br>JOUR';toast('Nuit tropicale...');}
  else{sc.clearColor=new B.Color4(.45,.75,.95,1);sc.fogColor=new B.Color3(.6,.85,1);sc.fogDensity=.006;if(amb){amb.intensity=.9;amb.diffuse=new B.Color3(.85,.92,.98);}if(sun){sun.intensity=1.8;sun.diffuse=new B.Color3(1,.95,.8);}document.getElementById('dnBtn').innerHTML='&#9790;<br>NUIT';toast('Belle journee sur l\'ile !');}
}

function setMode(m,el){
  mode=m;document.querySelectorAll('.mbb').forEach(function(b){b.classList.remove('on');});if(el)el.classList.add('on');
  if(m==='buy'){toast('Approche un terrain vert');plotMeshes.forEach(function(mesh,i){if(!mesh.actionManager)mesh.actionManager=new B.ActionManager(sc);mesh.actionManager.registerAction(new B.ExecuteCodeAction(B.ActionManager.OnPickTrigger,function(){buyPlot(i);}));});}
  else toast('Mode exploration');
}
function buyPlot(i){
  var p=PLOTS[i];if(gold<p.price){toast('Fonds insuffisants !');return;}
  gold-=p.price;props++;
  if(plotMeshes[i]&&plotMeshes[i].material){plotMeshes[i].material.diffuseColor=new B.Color3(.1,.1,.9);plotMeshes[i].material.emissiveColor=new B.Color3(.01,.01,.2);}
  document.getElementById('goldVal').textContent=gold.toLocaleString('fr-FR');document.getElementById('propVal').textContent=props;toast(p.name+' achete !');
}
setInterval(function(){if(eng){gold+=60+props*35;document.getElementById('goldVal').textContent=gold.toLocaleString('fr-FR');}},30000);

// MINIMAP

var mmCtx=null;
function drawMinimap(){
  if(!mmCtx){var c=document.getElementById('mmcv');if(!c)return;mmCtx=c.getContext('2d');}
  var W=100,H=100;mmCtx.clearRect(0,0,W,H);
  mmCtx.save();mmCtx.beginPath();mmCtx.arc(50,50,49,0,Math.PI*2);mmCtx.clip();
  mmCtx.fillStyle='#023060';mmCtx.fillRect(0,0,W,H);
  mmCtx.fillStyle='#c8b860';
  [[0,0,14,11],[55,0,6,5],[-50,0,5,4],[20,-50,7,5],[-30,55,4,4]].forEach(function(isle){var mx=(isle[0]/150+.5)*W,mz=(isle[1]/150+.5)*H;mmCtx.beginPath();mmCtx.ellipse(mx,mz,isle[2]/6,isle[3]/6,0,0,Math.PI*2);mmCtx.fill();});
  PLOTS.forEach(function(p,i){mmCtx.fillStyle=i<props?'#2244ff':'#22cc44';mmCtx.beginPath();mmCtx.arc((p.x/150+.5)*W,(p.z/150+.5)*H,2.5,0,Math.PI*2);mmCtx.fill();});
  npcs.forEach(function(npc){if(!npc.root)return;mmCtx.fillStyle=CHARS[npc.ci].color;mmCtx.beginPath();mmCtx.arc((npc.root.position.x/150+.5)*W,(npc.root.position.z/150+.5)*H,2,0,Math.PI*2);mmCtx.fill();});
  var ax=(P.x/150+.5)*W,az=(P.z/150+.5)*H;
  mmCtx.save();mmCtx.translate(ax,az);mmCtx.rotate(P.yaw);
  mmCtx.fillStyle='#ff4444';mmCtx.beginPath();mmCtx.moveTo(0,-5);mmCtx.lineTo(3,4);mmCtx.lineTo(0,2);mmCtx.lineTo(-3,4);mmCtx.closePath();mmCtx.fill();
  mmCtx.restore();mmCtx.restore();
}

function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.className='show';if(toastT)clearTimeout(toastT);toastT=setTimeout(function(){t.className='';},3000);}

window.addEventListener('load',function(){
  var pct=0;var anim=setInterval(function(){pct=Math.min(pct+3,90);document.getElementById('barFill').style.width=pct+'%';},60);
  window.onerror=function(msg){var el=document.getElementById('stepTxt');if(el)el.textContent='ERREUR: '+msg.substring(0,60);};
  function tryInit(){clearInterval(anim);document.getElementById('barFill').style.width='100%';setTimeout(initCharSelect,200);}
  if(typeof BABYLON!=='undefined')setTimeout(tryInit,300);
  else{var check=setInterval(function(){if(typeof BABYLON!=='undefined'){clearInterval(check);tryInit();}},100);setTimeout(function(){clearInterval(check);tryInit();},12000);}
});
