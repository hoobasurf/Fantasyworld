<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Stitch Island</title>

<script src="https://cdn.babylonjs.com/babylon.js"></script>

<style>
html,body{
width:100%;
height:100%;
margin:0;
overflow:hidden;
}

#renderCanvas{
width:100%;
height:100%;
touch-action:none;
}
</style>
</head>

<body>

<canvas id="renderCanvas"></canvas>

<script>

var canvas = document.getElementById("renderCanvas");
var engine = new BABYLON.Engine(canvas,true);

var createScene = function(){

var scene = new BABYLON.Scene(engine);

scene.clearColor = new BABYLON.Color4(0.45,0.78,0.95,1);

var light = new BABYLON.HemisphericLight(
"light",
new BABYLON.Vector3(0,1,0),
scene
);

light.intensity = 0.9;

var ground = BABYLON.MeshBuilder.CreateGround(
"ground",
{width:200,height:200},
scene
);

var sandMat = new BABYLON.StandardMaterial("sand",scene);
sandMat.diffuseColor = new BABYLON.Color3(0.96,0.82,0.55);

ground.material = sandMat;

var water = BABYLON.MeshBuilder.CreateGround(
"water",
{width:400,height:400},
scene
);

water.position.y = -0.2;

var waterMat = new BABYLON.StandardMaterial("water",scene);
waterMat.diffuseColor = new BABYLON.Color3(0.05,0.85,0.8);
waterMat.alpha = 0.9;

water.material = waterMat;

var player = BABYLON.MeshBuilder.CreateCapsule(
"player",
{height:2},
scene
);

player.position.y = 1;

var cam = new BABYLON.FreeCamera(
"cam",
new BABYLON.Vector3(0,4,-6),
scene
);

cam.setTarget(player);

var inputMap = {};

scene.actionManager = new BABYLON.ActionManager(scene);

scene.actionManager.registerAction(
new BABYLON.ExecuteCodeAction(
BABYLON.ActionManager.OnKeyDownTrigger,
function(evt){
inputMap[evt.sourceEvent.key] = true;
}
)
);

scene.actionManager.registerAction(
new BABYLON.ExecuteCodeAction(
BABYLON.ActionManager.OnKeyUpTrigger,
function(evt){
inputMap[evt.sourceEvent.key] = false;
}
)
);

var speed = 0.12;

scene.onBeforeRenderObservable.add(function(){

var moveX = 0;
var moveZ = 0;

if(inputMap["z"] || inputMap["w"]) moveZ += 1;
if(inputMap["s"]) moveZ -= 1;
if(inputMap["q"] || inputMap["a"]) moveX -= 1;
if(inputMap["d"]) moveX += 1;

var mag = Math.sqrt(moveX*moveX + moveZ*moveZ);

if(mag > 0){

var angle = Math.atan2(moveX,moveZ);

player.rotation.y = angle;

player.position.x += Math.sin(angle) * speed;
player.position.z += Math.cos(angle) * speed;

}

var dist = 6;

var camX = player.position.x + Math.sin(player.rotation.y) * dist;
var camZ = player.position.z + Math.cos(player.rotation.y) * dist;

cam.position.x += (camX - cam.position.x)*0.1;
cam.position.z += (camZ - cam.position.z)*0.1;
cam.position.y = player.position.y + 3;

cam.setTarget(player);

});

return scene;

};

var scene = createScene();

engine.runRenderLoop(function(){
scene.render();
});

window.addEventListener("resize",function(){
engine.resize();
});

</script>

</body>
</html>
