<!DOCTYPE html><html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Lilo & Stitch Island</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0830}
#cv{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
#loading{position:fixed;inset:0;background:linear-gradient(180deg,#1a0830,#3a1860);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#loading h1{font-family:Georgia,serif;font-size:22px;color:#ffb8d8;letter-spacing:5px;text-shadow:0 0 30px rgba(255,184,216,.5)}
#loading p{font-size:10px;color:rgba(255,184,216,.45);letter-spacing:3px}
.bw{width:220px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.bf{height:100%;background:linear-gradient(90deg,#ffb8d8,#ffd06a);border-radius:2px;transition:width .25s}
#stepTxt{font-size:9px;color:rgba(255,255,255,.28);letter-spacing:2px}
#hud{position:fixed;top:12px;left:0;right:0;display:none;justify-content:space-between;padding:0 14px;pointer-events:none;z-index:20}
.pill{background:rgba(0,0,10,.7);border-radius:20px;padding:5px 13px;font-family:Georgia,serif;font-size:10px;backdrop-filter:blur(8px);color:#ffd06a;border:1px solid rgba(255,208,106,.25)}
#zone{position:fixed;bottom:80px;left:130px;pointer-events:none;z-index:20;display:none}
#joy{position:fixed;left:16px;bottom:80px;z-index:30;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.05);border:2px solid rgba(255,208,106,.3);touch-action:none}
#jnub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 38% 32%,rgba(255,208,106,.7),rgba(80,20,10,.95));border:2px solid rgba(255,208,106,.6)}
#btns{position:fixed;right:14px;bottom:80px;z-index:30;display:flex;flex-direction:column;gap:8px}
.btn{width:54px;height:54px;border-radius:50%;background:rgba(0,0,15,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-family:Georgia,serif;font-size:8px;cursor:pointer;touch-action:manipulation;backdrop-filter:blur(6px);border:2px solid rgba(255,255,255,.15)}
#toast{position:fixed;top:54px;left:50%;transform:translateX(-50%) scale(.9);opacity:0;z-index:80;background:rgba(0,0,15,.92);border:1.5px solid #ffd06a;border-radius:20px;padding:7px 18px;color:#ffd06a;font-size:11px;font-family:Georgia,serif;white-space:nowrap;pointer-events:none;transition:all .2s;backdrop-filter:blur(10px)}
#toast.show{transform:translateX(-50%) scale(1);opacity:1}
#camHint{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.4);font-size:9px;font-family:Georgia,serif;pointer-events:none;z-index:20;display:none}
</style>
</head>
<body>
<div id="loading">
  <h1>LILO &amp; STITCH ISLAND</h1>
  <p>HAWAII — ALOHA</p>
  <div class="bw"><div class="bf" id="bf" style="width:2%"></div></div>
  <div id="stepTxt">CHARGEMENT...</div>
</div>
<canvas id="cv"></canvas>
<div id="hud">
  <div class="pill">&#127796; HAWAII</div>
  <div class="pill">&#128100; STITCH</div>
  <div class="pill" id="dnBtn" onclick="toggleDN()" style="pointer-events:all;cursor:pointer">&#9790; NUIT</div>
</div>
<div id="zone"><div class="pill" id="zoneTxt">&#127944; PLAGE</div></div>
<div id="joy"><div id="jnub"></div></div>
<div id="btns">
  <div class="btn" style="border-color:#7de8ff;color:#7de8ff" ontouchstart="doJump(event)" onclick="doJump()">&#8679;<br>JUMP</div>
  <div class="btn" style="border-color:#ffd700;color:#ffd700" ontouchstart="setSprint(1,event)" ontouchend="setSprint(0)" onmousedown="setSprint(1)" onmouseup="setSprint(0)">&#9889;<br>RUN</div>
</div>
<div id="camHint">&#8635; Glisser pour tourner la caméra</div>
<div id="toast"></div>

<script>
(function(){
  var stEl=document.getElementById('stepTxt');
  var cdns=[
    {b:'https://cdn.babylonjs.com/babylon.js',l:'https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js'},
    {b:'https://unpkg.com/babylonjs@6.26.0/babylon.js',l:'https://unpkg.com/babylonjs-loaders@6.26.0/babylonjs.loaders.min.js'},
    {b:'https://cdnjs.cloudflare.com/ajax/libs/babylonjs/6.26.0/babylon.js',l:'https://cdnjs.cloudflare.com/ajax/libs/babylonjs-loaders/6.26.0/babylonjs.loaders.min.js'}
  ];
  var idx=0;
  function tryNext(){
    if(idx>=cdns.length){stEl.textContent='ERREUR CDN';return;}
    var p=cdns[idx++];stEl.textContent='CDN '+idx+'/'+cdns.length+'...';
    load(p.b,function(){load(p.l,function(){if(window.startGame)window.startGame();},tryNext);},tryNext);
  }
  function load(url,ok,fail){
    var s=document.createElement('script');s.src=url;s.onload=ok;
    s.onerror=function(){document.head.removeChild(s);fail();};
    document.head.appendChild(s);
  }
  tryNext();
})();
</script>

<script>
window.startGame=function(){
'use strict';
var B=BABYLON;
var BASE='https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/';

var bfEl=document.getElementById('bf');
var stEl=document.getElementById('stepTxt');
function step(p,t){bfEl.style.width=p+'%';if(t)stEl.textContent=t;}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.className='show';clearTimeout(toast._t);toast._t=setTimeout(function(){t.className='';},3000);}
function showGame(){
  document.getElementById('loading').style.display='none';
  document.getElementById('hud').style.display='flex';
  document.getElementById('zone').style.display='block';
  document.getElementById('camHint').style.display='block';
  setTimeout(function(){document.getElementById('camHint').style.opacity='0';document.getElementById('camHint').style.transition='opacity 1s';},3000);
}

// ── ETAT ──
var P={x:0,y:0,z:0,vx:0,vy:0,vz:0,yaw:0,onGround:true};
var pRoot=null,pYOff=0,pAnims={},curAnim=null;
var jLX=0,jLY=0,KY={};
// Caméra libre — joystick=déplace, glisser=tourne caméra
var CAM={yaw:Math.PI,pitch:.30,dist:11};
var night=false,sprint=false;
var waveT=0,lastT=performance.now();
var waveRings=[],colCircles=[];
var ISLAND_R=52;

// ── ENGINE ──
var cv=document.getElementById('cv');
var eng=new B.Engine(cv,true,{antialias:true,stencil:true,adaptToDeviceRatio:true},true);
var sc=new B.Scene(eng);
// Ciel coucher de soleil rose/violet Lilo & Stitch
sc.clearColor=new B.Color4(.88,.62,.80,1);
sc.fogMode=B.Scene.FOGMODE_LINEAR;
sc.fogStart=60;sc.fogEnd=160;
sc.fogColor=new B.Color3(.78,.60,.82);

var cam=new B.FreeCamera('cam',new B.Vector3(0,8,12),sc);
cam.minZ=.1;cam.maxZ=500;cam.fov=1.02;
cam.inputs.clear();

step(6,'LUMIERES...');

// Soleil coucher style Lilo & Stitch — chaud et orangé
var sun=new B.DirectionalLight('sun',new B.Vector3(-.3,-1,.2),sc);
sun.position=new B.Vector3(-60,120,40);
sun.intensity=2.4;
sun.diffuse=new B.Color3(1.0,.82,.55);
sun.specular=new B.Color3(.2,.12,.06);

var shadows=null;
try{
  shadows=new B.ShadowGenerator(2048,sun);
  shadows.useBlurExponentialShadowMap=true;
  shadows.blurKernel=24;shadows.darkness=.35;
  shadows.transparencyShadow=true;
}catch(e){}

// Lumière ambiante rose/mauve du ciel
var sky=new B.HemisphericLight('sky',new B.Vector3(0,1,0),sc);
sky.intensity=.80;
sky.diffuse=new B.Color3(.92,.72,.88);
sky.groundColor=new B.Color3(.72,.52,.32);
sky.specular=new B.Color3(0,0,0);

var fill=new B.PointLight('fill',new B.Vector3(0,4,0),sc);
fill.intensity=.30;fill.range=10;
fill.diffuse=new B.Color3(1.0,.85,.55);

step(14,'TEXTURES...');

var grassTex=new B.Texture(BASE+'grass.jpg',sc);
grassTex.uScale=10;grassTex.vScale=10;
var sandTex=new B.Texture(BASE+'sand.jpg',sc);
sandTex.uScale=12;sandTex.vScale=12;
var rockTex=new B.Texture(BASE+'rock.jpg',sc);
rockTex.uScale=3;rockTex.vScale=3;
var barkTex=new B.Texture(BASE+'bark.jpg',sc);
barkTex.uScale=1;barkTex.vScale=3;
var leafTex=new B.Texture(BASE+'leaf.jpg',sc);
leafTex.uScale=1;leafTex.vScale=1;

step(22,'CIEL HAWAII...');

// Dôme ciel coucher de soleil Lilo & Stitch
var skyDome=B.MeshBuilder.CreateSphere('skyD',{diameter:800,segments:8},sc);
skyDome.flipFaces(true);
var skyMat=new B.StandardMaterial('skyMat',sc);
skyMat.backFaceCulling=false;skyMat.disableLighting=true;
var skyDyn=new B.DynamicTexture('sdt',{width:4,height:256},sc,false);
(function(){
  var ctx=skyDyn.getContext();
  var c=document.createElement('canvas');c.width=4;c.height=256;
  var cx=c.getContext('2d');
  var g=cx.createLinearGradient(0,0,0,256);
  // Coucher de soleil style Lilo & Stitch
  g.addColorStop(0,'#4428a8');    // violet haut
  g.addColorStop(.25,'#8844c8');  // mauve
  g.addColorStop(.5,'#e880a8');   // rose
  g.addColorStop(.72,'#f0b060');  // orange
  g.addColorStop(.88,'#f8d888');  // jaune horizon
  g.addColorStop(1,'#e8c8d0');    // blanc rosé bas
  cx.fillStyle=g;cx.fillRect(0,0,4,256);
  ctx.drawImage(c,0,0);skyDyn.update(false);
})();
skyMat.emissiveTexture=skyDyn;skyMat.emissiveTexture.uScale=1;skyMat.emissiveTexture.vScale=1;
skyDome.material=skyMat;

// Nuages cartoon style Lilo & Stitch
function makeCloud(x,y,z,s){
  var group=new B.TransformNode('cloud',sc);
  var cMat=new B.StandardMaterial('cM',sc);
  cMat.diffuseColor=new B.Color3(1,.96,.98);
  cMat.emissiveColor=new B.Color3(.88,.78,.86);
  cMat.specularColor=new B.Color3(0,0,0);
  [[0,0,0,1],[.5,.2,0,.75],[-.5,.15,0,.7],[.25,.45,0,.6],[-.2,.4,0,.55],[.75,.0,0,.55],[-.75,.05,0,.5]].forEach(function(b){
    var cb=B.MeshBuilder.CreateSphere('cb',{diameter:s*b[3]*2,segments:7},sc);
    cb.material=cMat;cb.parent=group;
    cb.position.set(b[0]*s,b[1]*s,b[2]*s);
  });
  group.position.set(x,y,z);
  return group;
}
// Nuages arrière plan
[[-40,35,-120,14],[20,38,-110,12],[80,32,-100,10],[-80,30,-90,11],
 [0,42,-130,16],[-50,28,-80,9],[50,30,-95,11],[120,25,-85,8]
].forEach(function(c){makeCloud(c[0],c[1],c[2],c[3]);});

// Montagnes lointaines style Lilo & Stitch (silhouettes bleues)
function makeMountain(x,z,h,w){
  var mt=B.MeshBuilder.CreateCylinder('mt',{height:h,diameterTop:.5,diameterBottom:w,tessellation:6},sc);
  var mtMat=new B.StandardMaterial('mtM',sc);
  mtMat.diffuseColor=new B.Color3(.32,.40,.58);
  mtMat.emissiveColor=new B.Color3(.18,.24,.40);
  mtMat.specularColor=new B.Color3(0,0,0);
  mt.material=mtMat;mt.position.set(x,-h*.2,z);
  mt.rotation.y=Math.random()*Math.PI;
}
[[-80,12],[80,-120],[120,-100],[-100,-80],[40,-130],[60,-115],[-60,-110]].forEach(function(m){
  makeMountain(m[0],-130,25+Math.random()*15,20+Math.random()*12);
});
// Iles lointaines dans la mer
[[-60,-150],[50,-160],[100,-140]].forEach(function(m){
  makeMountain(m[0],-150,18+Math.random()*10,14+Math.random()*8);
});

step(30,'TERRAIN...');

// Terrain simple mais propre — sol orangé sable comme Lilo & Stitch
var TSIZE=110,TSUB=55;
var terrain=B.MeshBuilder.CreateGround('terrain',{width:TSIZE,height:TSIZE,subdivisions:TSUB,updatable:true},sc);

function noise2(x,z,f){
  var xi=Math.floor(x*f),zi=Math.floor(z*f),xf=x*f-xi,zf=z*f-zi;
  function h(a,b){return Math.sin(a*127.1+b*311.7)*.5+.5;}
  var a=h(xi,zi),b=h(xi+1,zi),c=h(xi,zi+1),d=h(xi+1,zi+1);
  var ux=xf*xf*(3-2*xf),uz=zf*zf*(3-2*zf);
  return (a*(1-ux)+b*ux)*(1-uz)+(c*(1-ux)+d*ux)*uz;
}
function getH(wx,wz){
  var dx=wx/TSIZE,dz=wz/TSIZE;
  var dist=Math.sqrt(dx*dx+dz*dz)*2.0;
  var island=Math.max(0,Math.pow(Math.max(0,1-dist),1.3));
  var h=island*(noise2(wx,wz,.03)*5+noise2(wx,wz,.08)*2.5+noise2(wx,wz,.18)*1);
  // Colline au fond
  var mx=wx+10,mz=wz+15;h+=Math.max(0,(1-Math.sqrt(mx*mx+mz*mz)/20))*10;
  h=Math.max(0,h);
  if(dist>0.78)h=Math.min(h,.2);
  return h;
}
var hCache={};
var pos=terrain.getVerticesData(B.VertexBuffer.PositionKind);
for(var i=0;i<pos.length;i+=3){
  var hv=getH(pos[i],pos[i+2]);pos[i+1]=hv;
  hCache[Math.round(pos[i]*4)+'_'+Math.round(pos[i+2]*4)]=hv;
}
terrain.updateVerticesData(B.VertexBuffer.PositionKind,pos);
terrain.bakeCurrentTransformIntoVertices();

function terrH(wx,wz){
  var k=Math.round(wx*4)+'_'+Math.round(wz*4);
  return hCache[k]!==undefined?hCache[k]:getH(wx,wz);
}

// Sol herbe/terre verte
var terrMat=new B.StandardMaterial('terrMat',sc);
terrMat.diffuseTexture=grassTex;
terrMat.specularColor=new B.Color3(.02,.03,.01);
terrain.material=terrMat;terrain.receiveShadows=true;

// Sable orangé Lilo & Stitch sur la plage
var beach=B.MeshBuilder.CreateGround('beach',{width:230,height:230,subdivisions:2},sc);
var beachMat=new B.StandardMaterial('beachMat',sc);
beachMat.diffuseTexture=sandTex;
// Teinte orangée comme Lilo & Stitch
beachMat.diffuseColor=new B.Color3(1.2,.85,.55);
beachMat.specularColor=new B.Color3(.04,.03,.02);
beach.material=beachMat;beach.position.y=-.03;beach.receiveShadows=true;

step(40,'OCEAN...');

var ocean=B.MeshBuilder.CreateGround('ocean',{width:1200,height:1200,subdivisions:3},sc);
var oceanMat=new B.StandardMaterial('oceanMat',sc);
var wDyn=new B.DynamicTexture('wdt',{width:512,height:512},sc,true);
(function(){
  var ctx=wDyn.getContext();
  var c=document.createElement('canvas');c.width=512;c.height=512;
  var cx=c.getContext('2d');
  var g=cx.createLinearGradient(0,0,512,512);
  g.addColorStop(0,'#1888b8');g.addColorStop(.4,'#0e70a0');g.addColorStop(1,'#0a5080');
  cx.fillStyle=g;cx.fillRect(0,0,512,512);
  for(var i=0;i<180;i++){
    var x=Math.random()*512,y=Math.random()*512;
    cx.globalAlpha=Math.random()*.2+.05;
    cx.strokeStyle='rgba(255,255,255,1)';cx.lineWidth=.5+Math.random()*2;
    cx.beginPath();cx.moveTo(x,y);cx.lineTo(x+10+Math.random()*28,y+Math.random()*4-2);cx.stroke();
  }
  ctx.drawImage(c,0,0);wDyn.update(false);
})();
oceanMat.diffuseTexture=wDyn;oceanMat.diffuseTexture.uScale=50;oceanMat.diffuseTexture.vScale=50;
oceanMat.diffuseColor=new B.Color3(.82,.92,.98);
oceanMat.specularColor=new B.Color3(1,1,1);oceanMat.specularPower=90;
oceanMat.emissiveColor=new B.Color3(.02,.10,.22);
ocean.material=oceanMat;ocean.position.y=-.48;

var lagon=B.MeshBuilder.CreateCylinder('lagon',{height:.2,diameter:140,tessellation:60},sc);
var lagonMat=new B.StandardMaterial('lagonMat',sc);
lagonMat.diffuseColor=new B.Color3(.25,.72,.88);lagonMat.alpha=.45;
lagonMat.specularColor=new B.Color3(.9,1,1);lagonMat.specularPower=40;
lagon.material=lagonMat;lagon.position.y=-.28;

// Vagues
for(var wi=0;wi<8;wi++){
  var wr=B.MeshBuilder.CreateTorus('wv'+wi,{diameter:(55+wi*8)*2,thickness:.28,tessellation:72},sc);
  var wm=new B.StandardMaterial('wm'+wi,sc);
  wm.diffuseColor=new B.Color3(.95,.98,1.0);wm.emissiveColor=new B.Color3(.06,.24,.38);
  wm.alpha=.55-wi*.055;wm.backFaceCulling=false;
  wr.material=wm;wr.position.y=-.2;wr.rotation.x=Math.PI/2;
  waveRings.push({m:wr,ph:wi/8*Math.PI*2,spd:.8+Math.random()*.4});
}

step(50,'PALMIERS LILO & STITCH...');

// Palmiers style Lilo & Stitch — grands, courbés, troncs fins comme dans le film
function makePalm(x,z,h,leanX,leanZ,thick){
  thick=thick||1;
  var gh=terrH(x,z);
  // Tronc courbé en 12 segments
  var NS=12;
  var pts=[new B.Vector3(x,gh,z)];
  var cx2=x,cy=gh,cz2=z;
  for(var i=1;i<=NS;i++){
    var t=i/NS;
    var bend=t*t*1.6; // courbe progressive vers le bas puis vers le haut
    cx2+=leanX/NS*bend+(Math.random()-.5)*.03;
    cy+=h/NS*(1+Math.sin(t*Math.PI)*.08);
    cz2+=leanZ/NS*bend+(Math.random()-.5)*.03;
    pts.push(new B.Vector3(cx2,cy,cz2));
  }
  for(var i=0;i<NS;i++){
    var p0=pts[i],p1=pts[i+1];
    var seg=B.MeshBuilder.CreateCylinder('ts',{
      height:p0.subtract(p1).length()*1.02,
      diameterTop:(.10-.006*i)*thick,
      diameterBottom:(.16-.005*i)*thick,
      tessellation:7
    },sc);
    var tMat=new B.StandardMaterial('tM'+Math.random(),sc);
    tMat.diffuseTexture=new B.Texture(BASE+'bark.jpg',sc);
    tMat.diffuseTexture.uScale=1;tMat.diffuseTexture.vScale=2;
    // Teinte mauve/grise comme Lilo & Stitch
    tMat.diffuseColor=new B.Color3(.85,.78,.88);
    tMat.specularColor=new B.Color3(.04,.03,.05);
    seg.material=tMat;
    var mid=B.Vector3.Lerp(p0,p1,.5);seg.position=mid.clone();
    var dir=p1.subtract(p0).normalize();
    var up=new B.Vector3(0,1,0);
    var axis=B.Vector3.Cross(up,dir);
    if(axis.length()>.001){axis.normalize();var angle=Math.acos(Math.min(1,B.Vector3.Dot(up,dir)));seg.rotate(axis,angle,B.Space.WORLD);}
    seg.receiveShadows=true;if(shadows)shadows.addShadowCaster(seg);
  }
  // Couronne feuilles style film — larges et retombantes
  var top=pts[NS];
  var NL=9+Math.floor(Math.random()*4);
  for(var i=0;i<NL;i++){
    var angle=i/NL*Math.PI*2+(Math.random()-.5)*.3;
    var ll=3.2+Math.random()*2.8;
    var lf=B.MeshBuilder.CreatePlane('lf',{width:ll,height:.7+Math.random()*.5},sc);
    var lfMat=new B.StandardMaterial('lfM'+Math.random(),sc);
    lfMat.diffuseTexture=new B.Texture(BASE+'leaf.jpg',sc);
    lfMat.diffuseTexture.uScale=1;lfMat.diffuseTexture.vScale=1;
    lfMat.backFaceCulling=false;
    // Vert vif style Lilo & Stitch
    lfMat.diffuseColor=new B.Color3(.75+Math.random()*.25,1.0,.45+Math.random()*.2);
    lfMat.specularColor=new B.Color3(.03,.05,.02);
    lf.material=lfMat;
    var droop=.7+Math.random()*.5;
    lf.position.set(top.x+Math.sin(angle)*ll*.46,top.y-droop,top.z+Math.cos(angle)*ll*.46);
    lf.rotation.set(-droop*.8+(Math.random()-.5)*.15,angle+Math.PI/2,(Math.random()-.5)*.12);
    if(shadows)shadows.addShadowCaster(lf);
  }
  // Noix de coco
  if(Math.random()>.45){
    for(var c=0;c<1+Math.floor(Math.random()*3);c++){
      var co=B.MeshBuilder.CreateSphere('co',{diameter:.22+Math.random()*.1,segments:6},sc);
      var coMat=new B.StandardMaterial('coM',sc);
      coMat.diffuseColor=new B.Color3(.3,.18,.06);
      co.material=coMat;co.position.set(top.x+(Math.random()-.5)*.4,top.y-.3,top.z+(Math.random()-.5)*.4);
    }
  }
  colCircles.push({x:x,z:z,r:.35*thick});
}

// Palmiers — très nombreux, style Lilo & Stitch, bien courbés
var palms=[
  // Plage autour — palmiers penchés vers la mer
  [10,8,6,.8,.5],[12,-5,5.5,.7,-.6],[8,14,6,-.4,.7],[-11,12,6,-.7,.5],
  [-12,6,5.5,.5,-.6],[-10,-8,6,-.5,-.5],[10,-12,5.5,.4,.7],[14,2,6,.8,.2],
  [16,-9,5.5,.7,-.3],[-14,-12,5.5,.4,.4],[8,18,5.5,-.3,.6],[-9,20,6,-.5,.4],
  [18,6,5.8,.7,.3],[-17,5,5.8,-.6,.2],[14,-16,5.5,.5,-.6],[-15,16,5.5,-.5,.5],
  [20,-4,5.5,.8,.1],[-20,-1,5.8,-.8,.1],[6,22,5,-.2,.7],[-7,23,5.5,-.4,.6],

// Buissons tropicaux colorés (feuillage vert vif + fleurs)
function makeBush(x,z,s,col){
  var gh=terrH(x,z);if(gh<.08)return;
  var b=B.MeshBuilder.CreateSphere('bu',{diameter:s*2,segments:6},sc);
  var bMat=new B.StandardMaterial('bM',sc);
  if(col){bMat.diffuseColor=col;bMat.emissiveColor=col.scale(.12);}
  else{
    bMat.diffuseTexture=new B.Texture(BASE+'leaf.jpg',sc);
    bMat.diffuseTexture.uScale=1;bMat.diffuseTexture.vScale=1;
    var gv=.7+Math.random()*.3;
    bMat.diffuseColor=new B.Color3(.55*gv,gv,.28*gv);
  }
  bMat.specularColor=new B.Color3(.02,.04,.01);
  b.material=bMat;b.position.set(x,gh+s*.55,z);
  b.scaling.set(.9+Math.random()*.5,.55+Math.random()*.3,.9+Math.random()*.5);
  if(shadows)shadows.addShadowCaster(b);
}

// Stitch
function buildStitch(){
  var g=new B.TransformNode('stitch',sc);
  var mat=new B.StandardMaterial('sm',sc);
  mat.diffuseColor=new B.Color3(.12,.50,.85);mat.specularColor=new B.Color3(.3,.4,.6);mat.specularPower=30;
  var body=B.MeshBuilder.CreateSphere('bd',{diameter:.8,segments:14},sc);
  body.scaling.set(1,.85,1);body.material=mat;body.parent=g;
  var head=B.MeshBuilder.CreateSphere('hd',{diameter:.62,segments:14},sc);
  head.position.y=.78;head.material=mat;head.parent=g;
  var snMat=new B.StandardMaterial('snM',sc);snMat.diffuseColor=new B.Color3(.55,.75,.92);
  var snout=B.MeshBuilder.CreateSphere('sn',{diameter:.34,segments:10},sc);
  snout.scaling.set(1.1,.7,.85);snout.position.set(0,.72,.28);snout.material=snMat;snout.parent=g;
  var nsMat=new B.StandardMaterial('nsM',sc);nsMat.diffuseColor=new B.Color3(.05,.05,.05);
  var nose=B.MeshBuilder.CreateSphere('ns',{diameter:.1,segments:6},sc);
  nose.position.set(0,.76,.36);nose.material=nsMat;nose.parent=g;
  [-1,1].forEach(function(e){
    var ear=B.MeshBuilder.CreateCylinder('ear',{height:.58,diameterTop:.07,diameterBottom:.18,tessellation:7},sc);
    ear.position.set(e*.26,1.15,.04);ear.rotation.set(-.1,0,e*.38);ear.material=mat;ear.parent=g;
  });
  var ewM=new B.StandardMaterial('ewM',sc);ewM.diffuseColor=new B.Color3(.92,.92,1);ewM.emissiveColor=new B.Color3(.2,.2,.3);
  var epM=new B.StandardMaterial('epM',sc);epM.diffuseColor=new B.Color3(.04,.04,.04);
  [-1,1].forEach(function(e){
    var ew=B.MeshBuilder.CreateSphere('ew',{diameter:.14,segments:8},sc);ew.position.set(e*.16,.80,.28);ew.material=ewM;ew.parent=g;
    var ep=B.MeshBuilder.CreateSphere('ep',{diameter:.08,segments:7},sc);ep.position.set(e*.16,.80,.33);ep.material=epM;ep.parent=g;
  });
  [-1,1].forEach(function(e){
    var leg=B.MeshBuilder.CreateCylinder('lg',{height:.42,diameterTop:.14,diameterBottom:.12,tessellation:7},sc);
    leg.position.set(e*.22,-.22,0);leg.material=mat;leg.parent=g;
    var foot=B.MeshBuilder.CreateSphere('ft',{diameter:.2,segments:7},sc);
    foot.scaling.set(1.4,.7,1.8);foot.position.set(e*.22,-.46,.07);foot.material=mat;foot.parent=g;
    var arm=B.MeshBuilder.CreateCylinder('arm',{height:.38,diameterTop:.08,diameterBottom:.12,tessellation:6},sc);
    arm.position.set(e*.42,.12,0);arm.rotation.set(.3,0,e*.8);arm.material=mat;arm.parent=g;
  });
  var tail=B.MeshBuilder.CreateSphere('tl',{diameter:.22,segments:7},sc);
  tail.scaling.set(.7,1.4,.7);tail.position.set(0,.1,-.42);tail.material=mat;tail.parent=g;
  g.getChildMeshes().forEach(function(m){m.receiveShadows=true;if(shadows)shadows.addShadowCaster(m);});
  return g;
}

function setupPlayer(root,anims,isGLB){
  pRoot=root;pAnims={};curAnim=null;
  if(isGLB){
    root.scaling.setAll(1);root.computeWorldMatrix(true);
    var bb=root.getHierarchyBoundingVectors(),h=bb.max.y-bb.min.y;
    if(h>.05)root.scaling.setAll(1.9/h);
    root.computeWorldMatrix(true);
    var bb2=root.getHierarchyBoundingVectors();pYOff=-bb2.min.y+.05;
    root.getChildMeshes().forEach(function(m){m.receiveShadows=true;if(shadows)shadows.addShadowCaster(m,true);});
    if(anims&&anims.length){
      anims.forEach(function(ag){ag.stop();var n=ag.name.toLowerCase();
        if(/idle/.test(n))pAnims.idle=ag;else if(/run/.test(n))pAnims.run=ag;
        else if(/walk/.test(n))pAnims.walk=ag;else if(/jump/.test(n))pAnims.jump=ag;
      });
      if(!pAnims.idle&&anims[0])pAnims.idle=anims[0];
      if(!pAnims.walk&&anims[1])pAnims.walk=anims[1];
      playAnim(pAnims.idle);
    }
  } else {
    pYOff=.58;
  }
  root.position.set(P.x,P.y+pYOff,P.z);
  CAM.yaw=P.yaw+Math.PI;
}

// ── BOUCLE ──
eng.runRenderLoop(function(){
  var now=performance.now(),dt=Math.min((now-lastT)/1000,.05);lastT=now;

  var fwd=0,lat=0;
  if(KY['KeyW']||KY['KeyZ']||KY['ArrowUp'])fwd=1;
  if(KY['KeyS']||KY['ArrowDown'])fwd=-1;
  if(KY['KeyD']||KY['ArrowRight'])lat=1;
  if(KY['KeyA']||KY['KeyQ']||KY['ArrowLeft'])lat=-1;
  fwd+=jLY;lat+=jLX;
  var il=Math.sqrt(fwd*fwd+lat*lat);if(il>1){fwd/=il;lat/=il;}

  var moveX=fwd*(-Math.sin(CAM.yaw))+lat*Math.cos(CAM.yaw);
  var moveZ=fwd*(-Math.cos(CAM.yaw))+lat*(-Math.sin(CAM.yaw));
  var moveMag=Math.sqrt(moveX*moveX+moveZ*moveZ);
  var spd=sprint?9:5.2;

  if(moveMag>.05){
    var nx=moveX/moveMag,nz=moveZ/moveMag;
    P.vx+=(nx*spd-P.vx)*Math.min(1,dt*12);P.vz+=(nz*spd-P.vz)*Math.min(1,dt*12);
    var tYaw=Math.atan2(nx,nz),dy=tYaw-P.yaw;
    while(dy>Math.PI)dy-=Math.PI*2;while(dy<-Math.PI)dy+=Math.PI*2;
    P.yaw+=dy*Math.min(1,dt*16);
    playAnim(sprint&&pAnims.run?pAnims.run:(pAnims.walk||pAnims.idle));
  } else {
    P.vx*=Math.pow(.01,dt);P.vz*=Math.pow(.01,dt);
    if(Math.abs(P.vx)<.02)P.vx=0;if(Math.abs(P.vz)<.02)P.vz=0;
    if(pAnims.idle)playAnim(pAnims.idle);
  }

  if(!P.onGround){P.vy-=28*dt;if(P.vy<-26)P.vy=-26;}
  P.x+=P.vx*dt;P.z+=P.vz*dt;
  var gh=terrH(P.x,P.z);
  P.y+=P.vy*dt;
  if(P.y<=gh&&P.vy<=0){P.y=gh;P.vy=0;P.onGround=true;}else P.onGround=false;

  for(var ci=0;ci<colCircles.length;ci++){
    var ob=colCircles[ci],ddx=P.x-ob.x,ddz=P.z-ob.z;
    var d2=ddx*ddx+ddz*ddz,mn=.55+ob.r;
    if(d2<mn*mn&&d2>.001){
      var dd=Math.sqrt(d2),nnx=ddx/dd,nnz=ddz/dd;
      P.x=ob.x+nnx*mn;P.z=ob.z+nnz*mn;
      var dot=P.vx*nnx+P.vz*nnz;if(dot<0){P.vx-=dot*nnx;P.vz-=dot*nnz;}
    }
  }
  var pd=Math.sqrt(P.x*P.x+P.z*P.z);
  if(pd>ISLAND_R-3){var pa=Math.atan2(P.x,P.z);P.x=Math.sin(pa)*(ISLAND_R-3);P.z=Math.cos(pa)*(ISLAND_R-3);P.vx*=.04;P.vz*=.04;}
  if(P.y<-20){P.x=0;P.y=terrH(0,0);P.z=0;P.vx=0;P.vy=0;P.vz=0;P.onGround=true;}

  if(pRoot){
    pRoot.position.x=P.x;pRoot.position.y=P.y+pYOff;pRoot.position.z=P.z;
    var rd=P.yaw-pRoot.rotation.y;
    while(rd>Math.PI)rd-=Math.PI*2;while(rd<-Math.PI)rd+=Math.PI*2;
    pRoot.rotation.y+=rd*Math.min(1,dt*18);
  }
  if(fill)fill.position.set(P.x,P.y+4,P.z);

  // CAMERA TPS derriere Stitch
  var tCamYaw=P.yaw+Math.PI;
  var cyDiff=tCamYaw-CAM.yaw;
  while(cyDiff>Math.PI)cyDiff-=Math.PI*2;while(cyDiff<-Math.PI)cyDiff+=Math.PI*2;
  // Suit seulement si on se déplace — sinon reste libre
  if(moveMag>.08) CAM.yaw+=cyDiff*Math.min(1,dt*5);

  var cr=CAM.dist*Math.cos(CAM.pitch);
  var tX=P.x,tY=P.y+pYOff+1.4,tZ=P.z;
  var dX=tX+Math.sin(CAM.yaw)*cr,dY=tY+CAM.dist*Math.sin(CAM.pitch),dZ=tZ+Math.cos(CAM.yaw)*cr;
  var cGH=terrH(dX,dZ);if(dY<cGH+1.5)dY=cGH+1.5;
  cam.position.x+=(dX-cam.position.x)*Math.min(1,dt*14);
  cam.position.y+=(dY-cam.position.y)*Math.min(1,dt*10);
  cam.position.z+=(dZ-cam.position.z)*Math.min(1,dt*14);
  cam.setTarget(new B.Vector3(tX,tY,tZ));

  // Animations monde
  waveT+=dt;
  waveRings.forEach(function(w){
    w.m.scaling.x=1+Math.sin(waveT*w.spd+w.ph)*.05;w.m.scaling.z=1+Math.sin(waveT*w.spd+w.ph)*.05;
    w.m.position.y=-.2+Math.sin(waveT*2+w.ph)*.04;w.m.material.alpha=.44+Math.sin(waveT*2.3+w.ph)*.12;
  });
  ocean.material.diffuseTexture.uOffset+=.00012;ocean.material.diffuseTexture.vOffset+=.00005;
  lagon.position.y=-.28+Math.sin(waveT*.7)*.012;

  var dz2=Math.sqrt(P.x*P.x+P.z*P.z);
  document.getElementById('zoneTxt').innerHTML=dz2<10?'&#127807; JUNGLE':dz2<28?'&#127944; PLAGE':'&#127754; OCEAN';
  sc.render();
});

// Joystick GAUCHE = déplacement
var jBase=document.getElementById('joy'),jNub=document.getElementById('jnub'),jid=-1,JMAX=38;
function jUp(cx,cy){
  var r=jBase.getBoundingClientRect(),dx=cx-(r.left+r.width/2),dy=cy-(r.top+r.height/2),d=Math.sqrt(dx*dx+dy*dy);
  if(d>JMAX){dx=dx/d*JMAX;dy=dy/d*JMAX;}
  jNub.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';
  jLX=d>5?dx/JMAX:0;jLY=d>5?-dy/JMAX:0;
}
function jRst(){jNub.style.transform='translate(-50%,-50%)';jLX=0;jLY=0;jid=-1;}
jBase.addEventListener('touchstart',function(e){e.preventDefault();jid=e.touches[0].identifier;jUp(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
jBase.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===jid)jUp(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false});
jBase.addEventListener('touchend',jRst,{passive:true});

// Clavier
window.addEventListener('keydown',function(e){KY[e.code]=1;if(e.code==='Space'){e.preventDefault();doJump();}if(e.code==='ShiftLeft'||e.code==='ShiftRight')sprint=true;});
window.addEventListener('keyup',function(e){KY[e.code]=0;if(e.code==='ShiftLeft'||e.code==='ShiftRight')sprint=false;});
window.addEventListener('wheel',function(e){CAM.dist=Math.max(4,Math.min(22,CAM.dist+e.deltaY*.01));},{passive:true});

// GLISSER SUR L'ECRAN = tourner la caméra (séparé du joystick)
var camDrag={active:false,lx:0,ly:0,tid:-1};
cv.addEventListener('touchstart',function(e){
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i];
    if(t.identifier!==jid){
      camDrag.active=true;camDrag.lx=t.clientX;camDrag.ly=t.clientY;camDrag.tid=t.identifier;
      break;
    }
  }
},{passive:true});
cv.addEventListener('touchmove',function(e){
  if(!camDrag.active)return;
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i];
    if(t.identifier===camDrag.tid){
      CAM.yaw-=(t.clientX-camDrag.lx)*.006;
      CAM.pitch=Math.max(.08,Math.min(.72,CAM.pitch+(t.clientY-camDrag.ly)*.004));
      camDrag.lx=t.clientX;camDrag.ly=t.clientY;
    }
  }
},{passive:true});
cv.addEventListener('touchend',function(e){
  for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===camDrag.tid){camDrag.active=false;camDrag.tid=-1;}
},{passive:true});

// Souris — glisser partout = caméra
var mDn=false,mLx=0,mLy=0;
cv.addEventListener('mousedown',function(e){mDn=true;mLx=e.clientX;mLy=e.clientY;});
window.addEventListener('mousemove',function(e){
  if(!mDn)return;
  CAM.yaw-=(e.clientX-mLx)*.005;
  CAM.pitch=Math.max(.08,Math.min(.72,CAM.pitch+(e.clientY-mLy)*.003));
  mLx=e.clientX;mLy=e.clientY;
});
window.addEventListener('mouseup',function(){mDn=false;});
cv.addEventListener('contextmenu',function(e){e.preventDefault();});
// Pinch zoom
var p0t=null,iDt=0,iCDt=0;
cv.addEventListener('touchstart',function(e){if(e.touches.length===2){p0t=e.touches[0];var p1=e.touches[1];iDt=Math.hypot(p1.clientX-p0t.clientX,p1.clientY-p0t.clientY);iCDt=CAM.dist;}},{passive:true});
cv.addEventListener('touchmove',function(e){if(e.touches.length===2&&iDt>0){var d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);CAM.dist=Math.max(4,Math.min(22,iCDt*(iDt/d)));}},{passive:true});
};
