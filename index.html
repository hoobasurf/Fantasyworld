<!DOCTYPE html><html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Stitch Island</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
#joy{position:fixed;left:14px;bottom:14px;z-index:30;width:110px;height:110px;border-radius:50%;background:rgba(0,0,0,.22);border:2.5px solid rgba(255,220,80,.4);touch-action:none;pointer-events:all}
#jnub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:50%;background:radial-gradient(circle,rgba(255,220,80,.8),rgba(160,70,0,.9));border:2.5px solid rgba(255,220,80,.7)}
#rjoy{position:fixed;right:14px;bottom:14px;z-index:30;width:90px;height:90px;border-radius:50%;background:rgba(0,10,30,.22);border:2px solid rgba(100,200,255,.35);touch-action:none;pointer-events:all}
#rjnub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;background:radial-gradient(circle,rgba(100,200,255,.7),rgba(0,40,90,.9));border:2px solid rgba(100,200,255,.55)}
#btns{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:30;display:flex;gap:12px;pointer-events:none}
.btn{width:54px;height:54px;border-radius:50%;background:rgba(0,8,22,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:8px;font-family:Georgia,serif;cursor:pointer;touch-action:manipulation;border:2px solid rgba(255,255,255,.18);color:#fff;pointer-events:all}
#hud{position:fixed;top:10px;left:0;right:0;display:flex;justify-content:space-between;padding:0 12px;pointer-events:none;z-index:30}
.pill{background:rgba(0,10,25,.78);border-radius:18px;padding:5px 12px;font-family:Georgia,serif;font-size:9px;color:#7de8ff;border:1px solid rgba(125,232,255,.25)}
#toast{position:fixed;top:52px;left:50%;transform:translateX(-50%) scale(.9);opacity:0;z-index:80;background:rgba(0,8,22,.94);border:1.5px solid #7de8ff;border-radius:18px;padding:7px 16px;color:#7de8ff;font-size:10px;font-family:Georgia,serif;white-space:nowrap;pointer-events:none;transition:all .18s}
#toast.show{transform:translateX(-50%) scale(1);opacity:1}
#breath-bar{position:fixed;top:48px;left:50%;transform:translateX(-50%);z-index:40;display:none;flex-direction:column;align-items:center;gap:3px;pointer-events:none}
#breath-label{font-family:Georgia,serif;font-size:9px;color:#88ffee;text-shadow:0 0 6px #00ffcc}
#breath-bg{width:140px;height:12px;border-radius:6px;background:rgba(0,20,40,.7);border:1.5px solid rgba(0,255,200,.4);overflow:hidden}
#breath-fill{height:100%;width:100%;border-radius:6px;background:linear-gradient(90deg,#00ffcc,#0088ff);transition:background .3s}
#underwater-overlay{position:fixed;inset:0;pointer-events:none;z-index:20;background:radial-gradient(ellipse at center,rgba(0,80,160,0) 40%,rgba(0,40,100,.55) 100%);opacity:0;transition:opacity .8s}
</style>
</head>
<body>
<a-scene renderer="antialias:true;colorManagement:true" shadow="type:pcfsoft" fog="type:exponential;color:#5ac8f0;density:0.007" vr-mode-ui="enabled:false" loading-screen="enabled:false">
<a-assets timeout="30000">
  <a-asset-item id="stitchGLB" src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/stitch2.glb"></a-asset-item>
  <img id="tGrass" src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/grass.jpg" crossorigin="anonymous">
  <img id="tSand"  src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/sand.jpg"  crossorigin="anonymous">
  <img id="tBark"  src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/bark.jpg"  crossorigin="anonymous">
  <img id="tLeaf"  src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/leaf.jpg"  crossorigin="anonymous">
  <img id="tRock"  src="https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/rock.jpg"  crossorigin="anonymous">
</a-assets>

<a-sky id="skyEl" color="#4ab8f0"></a-sky>
<a-light type="directional" position="-40 80 30" color="#fff4dd" intensity="2.6" cast-shadow="true" shadow-camera-left="-200" shadow-camera-right="200" shadow-camera-top="200" shadow-camera-bottom="-200" shadow-map-width="2048" shadow-map-height="2048"></a-light>
<a-light type="hemisphere" color="#88ccff" ground-color="#446622" intensity=".8"></a-light>
<a-light type="ambient" id="ambientLight" color="#ffeedd" intensity=".3"></a-light>

<!-- NUAGES -->

<a-sphere position="-60 55 -180" radius="18" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="-45 58 -178" radius="13" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="30 60 -190" radius="20" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="48 57 -188" radius="14" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="120 50 -200" radius="16" color="#fff" material="roughness:0.9"></a-sphere>
<a-sphere position="-120 52 -195" radius="15" color="#fff" material="roughness:0.9"></a-sphere>

<!-- SURFACE EAU -->

<a-plane id="waterSurf" width="3000" height="3000" rotation="-90 0 0" position="0 -0.5 0" color="#14b8d4" material="transparent:true;opacity:0.82;roughness:0.04;metalness:0.2" shadow="receive:false"></a-plane>
<a-cylinder id="lagon" radius="180" height=".3" position="0 -0.38 0" color="#22eedd" material="transparent:true;opacity:0.5;roughness:0.04" shadow="receive:false"></a-cylinder>

<!-- FOND OCEAN -->

<a-plane width="3000" height="3000" rotation="-90 0 0" position="0 -22 0" color="#0a4a30" material="roughness:0.95"></a-plane>

<!-- Vagues -->

<a-torus id="w0" radius="72"  radius-tubular=".2" segments-tubular="64" rotation="90 0 0" position="0 -.42 0" color="#fff" material="transparent:true;opacity:0.5"></a-torus>
<a-torus id="w1" radius="92"  radius-tubular=".2" segments-tubular="64" rotation="90 0 0" position="0 -.42 0" color="#fff" material="transparent:true;opacity:0.42"></a-torus>
<a-torus id="w2" radius="112" radius-tubular=".2" segments-tubular="64" rotation="90 0 0" position="0 -.42 0" color="#fff" material="transparent:true;opacity:0.35"></a-torus>

<a-entity id="world"></a-entity>
<a-entity id="underwater-world"></a-entity>

<!-- STITCH -->

<a-entity id="stitch-root" position="0 2 3">
  <a-gltf-model id="stitch-model" src="#stitchGLB" shadow="cast:true;receive:false"></a-gltf-model>
</a-entity>

<!-- CAMERA -->

<a-entity id="cam-rig" position="0 6 10">
  <a-camera id="mainCam" look-controls="enabled:false" wasd-controls="enabled:false" fov="62" near=".05" far="700"></a-camera>
</a-entity>
</a-scene>

<div id="hud">
  <div class="pill" id="zL">🏝 ILE PRINCIPALE</div>
  <div class="pill">🏝 STITCH ISLAND</div>
</div>
<div id="breath-bar">
  <div id="breath-label">🤿 RESPIRATION</div>
  <div id="breath-bg"><div id="breath-fill"></div></div>
</div>
<div id="underwater-overlay"></div>
<div id="joy"><div id="jnub"></div></div>
<div id="rjoy"><div id="rjnub"></div></div>
<div id="btns">
  <div class="btn" style="border-color:#7de8ff;color:#7de8ff" onclick="doJump()" ontouchstart="doJump(event)">⬆<br>JUMP</div>
  <div class="btn" style="border-color:#00ffcc;color:#00ffcc" id="diveBtn" onclick="doDive()" ontouchstart="doDive(event)">🤿<br>DIVE</div>
  <div class="btn" style="border-color:#ffd700;color:#ffd700" ontouchstart="setSprint(1,event)" ontouchend="setSprint(0)" onmousedown="setSprint(1)" onmouseup="setSprint(0)">⚡<br>RUN</div>
</div>
<div id="toast"></div>

<script>
function toast(m,d){var t=document.getElementById('toast');t.textContent=m;t.className='show';clearTimeout(toast._t);toast._t=setTimeout(function(){t.className='';},d||3000);}
document.querySelector('a-scene').addEventListener('loaded',initGame);

function initGame(){
  var THREE=AFRAME.THREE;
  var W=document.getElementById('world');
  var UW=document.getElementById('underwater-world');

  var platforms=[];
  var walls=[];
  var islandDefs=[];

  function addPlatform(cx,cz,y,rx,rz){platforms.push({cx:cx,cz:cz,y:y,rx:rx,rz:rz});}
  function addWall(x,z,r,h,y0){walls.push({x1:x-r,z1:z-r,x2:x+r,z2:z+r,h:h||5,y0:y0||0});}

  function mk(tag,attrs,par){
    var e=document.createElement('a-'+tag);
    for(var k in attrs)e.setAttribute(k,attrs[k]);
    (par||W).appendChild(e);return e;
  }

  function segRot(dx,dy,dz){
    var up=new THREE.Vector3(0,1,0);
    var dir=new THREE.Vector3(dx,dy,dz).normalize();
    var q=new THREE.Quaternion().setFromUnitVectors(up,dir);
    var e=new THREE.Euler().setFromQuaternion(q,'YXZ');
    return (e.x*180/Math.PI).toFixed(1)+' '+(e.y*180/Math.PI).toFixed(1)+' '+(e.z*180/Math.PI).toFixed(1);
  }

  function getGroundY(px,pz){
    var best=null;
    for(var i=0;i<platforms.length;i++){
      var pl=platforms[i];
      if(Math.abs(px-pl.cx)<=pl.rx+.5&&Math.abs(pz-pl.cz)<=pl.rz+.5){
        if(best===null||pl.y>best)best=pl.y;
      }
    }
    return best;
  }

  var SAND_COL='#f5e8b0';
  var SAND_WET='#ddd090';

  // ══ PALMIER 3x plus fin ══
  function makePalm(x,gy,z,h,lx,lz,par){
    par=par||W;
    // Tronc 3x plus fin : rayon /3
    var NS=12,pts=[];
    for(var i=0;i<=NS;i++){var t=i/NS;pts.push({x:x+lx*h*t*t*.85,y:gy+h*t,z:z+lz*h*t*t*.85});}
    for(var i=0;i<NS;i++){
      var p0=pts[i],p1=pts[i+1];
      var dx=p1.x-p0.x,dy=p1.y-p0.y,dz=p1.z-p0.z,len=Math.sqrt(dx*dx+dy*dy+dz*dz);
      var tr=i/NS,rB=Math.max(.012,.035-tr*.02),rT=Math.max(.008,.027-tr*.016);
      mk('cylinder',{'radius-bottom':rB.toFixed(3),'radius-top':rT.toFixed(3),height:len.toFixed(3),'segments-radial':'6',
        position:((p0.x+p1.x)/2).toFixed(2)+' '+((p0.y+p1.y)/2).toFixed(2)+' '+((p0.z+p1.z)/2).toFixed(2),
        rotation:segRot(dx,dy,dz),material:'roughness:.93;color:'+(i%2===0?'#c8a86a':'#b09050'),shadow:'cast:true'},par);
      if(i%2===0&&i>0)mk('torus',{radius:(rB*1.2).toFixed(3),'radius-tubular':(rB*.22).toFixed(3),'segments-radial':'6',
        position:p0.x.toFixed(2)+' '+p0.y.toFixed(2)+' '+p0.z.toFixed(2),rotation:segRot(dx,dy,dz),material:'color:#7a5020;roughness:.95'},par);
    }
    var top=pts[NS];
    // Feuilles plus fines aussi
    for(var i=0;i<9+Math.floor(Math.random()*4);i++){
      var ang=i/(9+3)*Math.PI*2+(Math.random()-.5)*.3;
      var ll=3+Math.random()*2.5,lw=.22+Math.random()*.15,droop=.5+Math.random()*.5;
      var fx=top.x+Math.sin(ang)*.4,fy=top.y+.1,fz=top.z+Math.cos(ang)*.4;
      var brx=(-droop*56).toFixed(1),bry=((ang+Math.PI/2)*180/Math.PI).toFixed(1);
      var gv=.7+Math.random()*.25;
      var lf=mk('plane',{width:ll.toFixed(2),height:lw.toFixed(2),
        position:fx.toFixed(2)+' '+fy.toFixed(2)+' '+fz.toFixed(2),rotation:brx+' '+bry+' 0',
        material:'roughness:.7;side:double;color:#'+Math.floor(gv*.5*255).toString(16).padStart(2,'0')+Math.floor(gv*255).toString(16).padStart(2,'0')+Math.floor(gv*.28*255).toString(16).padStart(2,'0'),
        shadow:'cast:true'},par);
      lf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);
      lf.dataset.brx=brx;lf.dataset.bry=bry;lf.classList.add('wind-leaf');
    }
  }

  // ══ FOUGERE ══
  function makeFern(x,gy,z,par){
    par=par||W;
    var nc=5+Math.floor(Math.random()*4);
    for(var i=0;i<nc;i++){
      var ang=i/nc*Math.PI*2, r=.15+Math.random()*.25;
      var sh=.5+Math.random()*.7;
      var lf=mk('plane',{width:(.12+Math.random()*.1).toFixed(3),height:sh.toFixed(2),
        position:(x+Math.sin(ang)*r).toFixed(2)+' '+(gy+sh*.55).toFixed(2)+' '+(z+Math.cos(ang)*r).toFixed(2),
        rotation:(-25-Math.random()*20).toFixed(1)+' '+(ang*180/Math.PI+90).toFixed(1)+' 0',
        material:'roughness:.8;side:double;color:#'+Math.floor((20+Math.random()*30)).toString(16).padStart(2,'0')+(Math.floor(110+Math.random()*80)).toString(16).padStart(2,'0')+'14'},par);
      lf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);
      lf.dataset.brx=(-30).toFixed(1);lf.dataset.bry=(ang*180/Math.PI+90).toFixed(1);
      lf.classList.add('wind-leaf');
    }
  }

  // ══ HIBISCUS ══
  function makeHibiscus(x,gy,z,par){
    par=par||W;
    var cols=['#ff1155','#ff3300','#ff0088','#ff6600','#cc0044','#ff8800'];
    var c=cols[Math.floor(Math.random()*cols.length)];
    var sh=.5+Math.random()*.55;
    mk('cylinder',{radius:'.022',height:sh.toFixed(2),position:x+' '+(gy+sh/2)+' '+z,material:'color:#1a7010'},par);
    for(var i=0;i<5;i++){
      var ang=i/5*Math.PI*2,pr=.16+Math.random()*.08;
      mk('plane',{width:(pr*1.0).toFixed(3),height:(pr*1.7).toFixed(3),
        position:(x+Math.sin(ang)*pr*.55).toFixed(2)+' '+(gy+sh+pr*.38).toFixed(2)+' '+(z+Math.cos(ang)*pr*.55).toFixed(2),
        rotation:'-64 '+(ang*180/Math.PI).toFixed(1)+' 0',material:'roughness:.55;side:double;color:'+c},par);
    }
    mk('sphere',{radius:'.042',position:x+' '+(gy+sh+.04)+' '+z,material:'color:#ffee00;emissive:#ffcc00;emissiveIntensity:.5'},par);
  }

  // ══ MONSTERA ══
  function makeMonstera(x,gy,z,par){
    par=par||W;
    var sh=.9+Math.random()*.5;
    mk('cylinder',{radius:'.025',height:sh.toFixed(2),position:x+' '+(gy+sh/2)+' '+z,material:'color:#1a6010;roughness:.9'},par);
    for(var i=0;i<3;i++){
      var ang=i/3*Math.PI*2+.3,r=.7+Math.random()*.25;
      var lsize=.55+Math.random()*.3;
      var lf=mk('plane',{width:lsize.toFixed(2),height:(lsize*.8).toFixed(2),
        position:(x+Math.sin(ang)*r*.6).toFixed(2)+' '+(gy+sh+.15+i*.05).toFixed(2)+' '+(z+Math.cos(ang)*r*.6).toFixed(2),
        rotation:(-35-i*8).toFixed(1)+' '+(ang*180/Math.PI).toFixed(1)+' '+(i*12).toFixed(1),
        material:'roughness:.7;side:double;color:#1e9918'},par);
      lf.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);
      lf.dataset.brx=(-35-i*8).toFixed(1);lf.dataset.bry=(ang*180/Math.PI).toFixed(1);
      lf.classList.add('wind-leaf');
    }
  }

  // ══ STRELITZIA ══
  function makeStrelitzia(x,gy,z,par){
    par=par||W;
    var sh=1.1+Math.random()*.5;
    for(var i=0;i<3;i++){var ang=i/3*Math.PI*2;mk('cylinder',{radius:'.016',height:(sh+i*.12).toFixed(2),position:(x+Math.sin(ang)*.28)+' '+(gy+(sh+i*.12)/2)+' '+(z+Math.cos(ang)*.28),material:'color:#228810'},par);}
    mk('plane',{width:'.14',height:'.4',position:x+' '+(gy+sh+.2)+' '+z,rotation:'0 0 0',material:'side:double;color:#ff6600'},par);
    mk('plane',{width:'.09',height:'.3',position:(x+.09)+' '+(gy+sh+.24)+' '+z,rotation:'0 30 20',material:'side:double;color:#3300ff'},par);
  }

  // ══ LIANE ══
  function makeLiane(x1,y1,z1,x2,y2,z2,par){
    par=par||W;
    var NS=8;
    for(var i=0;i<NS;i++){
      var t0=i/NS,t1=(i+1)/NS;
      var s0=Math.sin(t0*Math.PI)*1.6,s1=Math.sin(t1*Math.PI)*1.6;
      var ax=x1+(x2-x1)*t0,ay=y1+(y2-y1)*t0-s0,az=z1+(z2-z1)*t0;
      var bx=x1+(x2-x1)*t1,by=y1+(y2-y1)*t1-s1,bz=z1+(z2-z1)*t1;
      var dx=bx-ax,dy=by-ay,dz=bz-az,len=Math.sqrt(dx*dx+dy*dy+dz*dz);
      mk('cylinder',{radius:'.022',height:len.toFixed(2),position:((ax+bx)/2).toFixed(2)+' '+((ay+by)/2).toFixed(2)+' '+((az+bz)/2).toFixed(2),rotation:segRot(dx,dy,dz),material:'color:#5a3508;roughness:.95'},par);
    }
  }

  // ══ CHEMIN PIETONNIER entre deux points ══
  function makePath(x1,z1,x2,z2,gy,par){
    par=par||W;
    var dx=x2-x1,dz=z2-z1,len=Math.sqrt(dx*dx+dz*dz);
    var ang=Math.atan2(dx,dz)*180/Math.PI;
    var mx=(x1+x2)/2,mz=(z1+z2)/2;
    mk('plane',{width:'.9',height:len.toFixed(2),rotation:'-90 '+ang.toFixed(1)+' 0',
      position:mx.toFixed(2)+' '+(gy+.015).toFixed(3)+' '+mz.toFixed(2),
      material:'color:#d4b88a;roughness:.95'},par);
    // Petits cailloux bords
    var steps=Math.floor(len/1.2);
    for(var i=0;i<steps;i++){
      var t=(i+.5)/steps;
      var px=x1+dx*t,pz=z1+dz*t;
      var perp=[-dz/len,dx/len];
      for(var side=-1;side<=1;side+=2){
        mk('sphere',{radius:'.07',position:(px+perp[0]*side*.55).toFixed(2)+' '+(gy+.04).toFixed(2)+' '+(pz+perp[1]*side*.55).toFixed(2),
          material:'color:#c8b890;roughness:.97'},par);
      }
    }
  }

  // ══ PONT EN BOIS — planches d'une corde à l'autre ══
  function makeBridge(x1,y1,z1,x2,y2,z2){
    var bdx=x2-x1,bdz=z2-z1;
    var len=Math.sqrt(bdx*bdx+bdz*bdz);
    var ang=Math.atan2(bdx,bdz)*180/Math.PI;
    var perp=new THREE.Vector3(-bdz,0,bdx).normalize();

    var ROPE_OFFSET=1.5;
    // CORRECTION : la profondeur de la planche = distance exacte entre les deux cordes
    var PLANK_DEPTH=ROPE_OFFSET*2; // 3.0 unités, de corde gauche à corde droite
    var PLANK_H=0.12;
    var PLANK_W=0.44;
    var GAP=0.10;
    var nPlanks=Math.floor(len/(PLANK_W+GAP));

    var WATER_SURFACE_Y=-0.48;
    var MIN_H=WATER_SURFACE_Y+1.8;

    function bY(t){return Math.max(MIN_H, y1+(y2-y1)*t);}

    // ── Planches (largeur = de corde à corde, orientées perpendiculairement au pont)
    for(var i=0;i<nPlanks;i++){
      var t=(i+.5)/nPlanks;
      var px=x1+bdx*t, pz=z1+bdz*t, py=bY(t);
      // width = sens de marche (PLANK_W), depth = perpendiculaire = PLANK_DEPTH (corde à corde)
      mk('box',{
        width:PLANK_W, height:PLANK_H, depth:PLANK_DEPTH,
        position:px.toFixed(2)+' '+py.toFixed(2)+' '+pz.toFixed(2),
        rotation:'0 '+ang.toFixed(1)+' 0',
        material:'color:'+(i%2===0?'#a0622a':'#8a5020')+';roughness:.95',
        shadow:'cast:true;receive:true'
      });
      addPlatform(px,pz,py,PLANK_W*.6,PLANK_DEPTH*.5);
    }

    // ── Cordes (2 hauteurs × 2 côtés)
    for(var side=-1;side<=1;side+=2){
      var pOff=perp.clone().multiplyScalar(ROPE_OFFSET*side);
      var ROPE_H=[0.65, 1.25];
      for(var ri=0;ri<ROPE_H.length;ri++){
        var rh=ROPE_H[ri];
        for(var i=0;i<nPlanks;i++){
          var t0=i/nPlanks, t1=(i+1)/nPlanks;
          var ax=x1+bdx*t0+pOff.x, ay=bY(t0)+rh, az=z1+bdz*t0+pOff.z;
          var bx2=x1+bdx*t1+pOff.x, by2=bY(t1)+rh, bz2=z1+bdz*t1+pOff.z;
          var dx=bx2-ax,dy=by2-ay,dz2=bz2-az,rl=Math.sqrt(dx*dx+dy*dy+dz2*dz2);
          mk('cylinder',{radius:'.032',height:rl.toFixed(2),
            position:((ax+bx2)/2).toFixed(2)+' '+((ay+by2)/2).toFixed(2)+' '+((az+bz2)/2).toFixed(2),
            rotation:segRot(dx,dy,dz2),
            material:'color:#6a3a10;roughness:.95'});
        }
      }
      for(var i=1;i<nPlanks-1;i+=3){
        var t=i/nPlanks;
        var px2=x1+bdx*t+pOff.x, pz2=z1+bdz*t+pOff.z, py2=bY(t);
        mk('cylinder',{radius:'.04',height:'1.3',
          position:px2.toFixed(2)+' '+(py2+.65).toFixed(2)+' '+pz2.toFixed(2),

  // ══ ETAL DE MARCHE ══
  function makeMarketStall(x,gy,z,type,rot,par){
    par=par||W;
    rot=rot||0;
    var rad=rot*Math.PI/180,cs=Math.cos(rad),sn=Math.sin(rad);
    function lp(ox,oz){return{x:x+ox*cs-oz*sn,z:z+ox*sn+oz*cs};}
    function lpos(ox,oy,oz){var p=lp(ox,oz);return p.x.toFixed(2)+' '+(gy+oy).toFixed(2)+' '+p.z.toFixed(2);}

    // Poteaux
    var cols2=['#9a5510','#8a4a08'];
    [[-0.9,-.8],[0.9,-.8],[-0.9,.8],[0.9,.8]].forEach(function(off){
      var pp=lp(off[0],off[1]);
      mk('cylinder',{radius:'.04',height:'1.8',position:pp.x.toFixed(2)+' '+(gy+.9)+' '+pp.z.toFixed(2),
        material:'color:#8a5010;roughness:.9'},par);
    });
    // Toit en paille

        material:'color:#aa7700;roughness:.9'},par);
      mk('cylinder',{radius:'.012',height:'.22',position:lpos(fi*.24,1.68,-.92),rotation:'0 '+rot+' 0',

    // Table/étal

    if(type==='fruits'){
      var fruitCols=['#ff4400','#ff8800','#ffcc00','#ee2200','#22cc00','#cc44ff','#ff66aa'];

          scale:'1 1.1 1',material:'color:#6a3a10;roughness:.9'},par);

  // ══ CASE HAWAIIENNE (paille + bois) ══
  function makeHawaiianHut(cx,gy,cz,rot,par){
    par=par||W;
    rot=rot||0;
    var rad=rot*Math.PI/180,cs=Math.cos(rad),sn=Math.sin(rad);
    function lp(ox,oz){return{x:cx+ox*cs-oz*sn,z:cz+ox*sn+oz*cs};}
    function lpos(ox,oy,oz){var p=lp(ox,oz);return p.x.toFixed(2)+' '+(gy+oy).toFixed(2)+' '+p.z.toFixed(2);}

    var BW=3.8,BD=3.2,BH=2.2;

    // Fondation en bois
    mk('box',{width:BW+.4,height:'.25',depth:BD+.4,position:lpos(0,.12,0),rotation:'0 '+rot+' 0',
      material:'color:#a07030;roughness:.92'},par);
    // Pilotis
    [[-BW/2+.3,-BD/2+.3],[BW/2-.3,-BD/2+.3],[-BW/2+.3,BD/2-.3],[BW/2-.3,BD/2-.3]].forEach(function(off){
      var pp=lp(off[0],off[1]);
      mk('cylinder',{radius:'.1',height:'1.0',position:pp.x.toFixed(2)+' '+(gy+.5)+' '+pp.z.toFixed(2),
        material:'color:#7a4a18;roughness:.92'},par);
    });
    // Murs en bambou / planches
    var wallCol='#c8a050';
    // Façade
    mk('box',{width:BW,height:BH,depth:'.18',position:lpos(0,BH/2+.25,BD/2),rotation:'0 '+rot+' 0',
      material:'color:'+wallCol+';roughness:.88'},par);
    // Arrière
    mk('box',{width:BW,height:BH,depth:'.18',position:lpos(0,BH/2+.25,-BD/2),rotation:'0 '+rot+' 0',
      material:'color:'+wallCol+';roughness:.88'},par);
    // Côtés
    mk('box',{width:'.18',height:BH,depth:BD,position:lpos(-BW/2,BH/2+.25,0),rotation:'0 '+rot+' 0',
      material:'color:'+wallCol+';roughness:.88'},par);
    mk('box',{width:'.18',height:BH,depth:BD,position:lpos(BW/2,BH/2+.25,0),rotation:'0 '+rot+' 0',
      material:'color:'+wallCol+';roughness:.88'},par);
    // Lignes de bambou verticaux (déco)
    for(var bi=-3;bi<=3;bi++){
      var bp=lp(bi*.55,BD/2+.18);
      mk('cylinder',{radius:'.038',height:BH,position:bp.x.toFixed(2)+' '+(gy+BH/2+.25)+' '+bp.z.toFixed(2),
        material:'color:#7a5018;roughness:.9'},par);
      var bp2=lp(bi*.55,-BD/2-.18);
      mk('cylinder',{radius:'.038',height:BH,position:bp2.x.toFixed(2)+' '+(gy+BH/2+.25)+' '+bp2.z.toFixed(2),
        material:'color:#7a5018;roughness:.9'},par);
    }
    // Porte
    mk('box',{width:'.9',height:1.5,depth:'.12',position:lpos(0,BH*.35+.25,BD/2+.1),rotation:'0 '+rot+' 0',
      material:'color:#5a3008;roughness:.9'},par);
    // Fenêtre avec volet
    mk('plane',{width:'.7',height:'.5',position:lpos(1.1,BH*.6+.25,BD/2+.12),rotation:'0 '+rot+' 0',
      material:'color:#aaddff;transparent:true;opacity:.6;roughness:.1'},par);
    mk('plane',{width:'.7',height:'.5',position:lpos(-1.1,BH*.6+.25,BD/2+.12),rotation:'0 '+rot+' 0',
      material:'color:#aaddff;transparent:true;opacity:.6;roughness:.1'},par);

    // Toit en chaume épais (3 couches)
    var roofH=2.0;
    for(var rl=0;rl<3;rl++){
      var scale=1.0+rl*.12,yOff=rl*.18;
      mk('cone',{'radius-bottom':((Math.max(BW,BD)/2+.8+rl*.2)).toFixed(2),'radius-top':'.08',
        height:(roofH-yOff*.5).toFixed(2),'segments-radial':'4',
        position:lpos(0,BH+.25+roofH/2+yOff*.5,0),rotation:'0 '+(rot+45)+' 0',
        material:'color:'+(rl===0?'#7a5c1a':rl===1?'#8a6c28':'#9a7c38')+';roughness:.98'},par);
    }
    // Franges de chaume
    for(var fi=0;fi<16;fi++){
      var fang=fi/16*Math.PI*2;
      var fr=Math.max(BW,BD)/2+.7;
      var fp=lp(Math.sin(fang)*fr,Math.cos(fang)*fr);
      mk('cylinder',{radius:'.025',height:'.4',position:fp.x.toFixed(2)+' '+(gy+BH+.15+.25)+' '+fp.z.toFixed(2),
        material:'color:#aa8822;roughness:.97'},par);
    }
    // Véranda mini
    mk('box',{width:BW+.2,height:'.1',depth:'.9',position:lpos(0,.28,BD/2+.45),rotation:'0 '+rot+' 0',
      material:'color:#b08828;roughness:.9'},par);

    addWall(cx,cz,BW/2+.3,BH+roofH,gy);
  }

  // ══ EGLISE HAWAIIENNE ══
  function makeChurch(cx,gy,cz,rot,par){
    par=par||W;
    rot=rot||0;
    var rad=rot*Math.PI/180,cs=Math.cos(rad),sn=Math.sin(rad);
    function lp(ox,oz){return{x:cx+ox*cs-oz*sn,z:cz+ox*sn+oz*cs};}
    function lpos(ox,oy,oz){var p=lp(ox,oz);return p.x.toFixed(2)+' '+(gy+oy).toFixed(2)+' '+p.z.toFixed(2);}

    var BW=5.5,BD=9,BH=3.5;
    // Corps
    mk('box',{width:BW,height:BH,depth:BD,position:lpos(0,BH/2+.15,0),rotation:'0 '+rot+' 0',
      material:'color:#e8e0cc;roughness:.88'},par);
    // Fondation
    mk('box',{width:BW+.4,height:'.25',depth:BD+.4,position:lpos(0,.12,0),rotation:'0 '+rot+' 0',
      material:'color:#c0b890;roughness:.9'},par);
    // Piliers façade
    [-1.8,0,1.8].forEach(function(ox){
      var pp=lp(ox,BD/2+.1);
      mk('cylinder',{radius:'.15',height:BH,position:pp.x.toFixed(2)+' '+(gy+BH/2+.15)+' '+pp.z.toFixed(2),
        material:'color:#d8d0b8;roughness:.88'},par);
    });
    // Toit triangulaire façade + arrière
    mk('cone',{'radius-bottom':(BW/2+.5).toFixed(1),'radius-top':'.12',height:'2.2','segments-radial':'4',
      position:lpos(0,BH+1.25,0),rotation:'0 '+(rot+45)+' 0',

  // ══ COLLINE + VILLAGE HAWAIIEN ══
  function buildHill(par){
    par=par||W;
    var HILL_CX=0, HILL_CZ=-22; // Centre colline
    var HILL_BASE_Y=0.0;
    var HILL_TOP_Y=14.0;
    var HILL_R=24;

    // ── COLLINE (empilement de sphères aplaties + cylindres)
    // Base large
    mk('sphere',{radius:HILL_R.toFixed(0),position:HILL_CX+' '+(HILL_BASE_Y-18)+' '+HILL_CZ,
      scale:'1 .85 1',material:'color:#3a7a20;roughness:.95',shadow:'cast:true;receive:true'},par);
    // Couche herbe
    mk('sphere',{radius:(HILL_R*.78).toFixed(0),position:HILL_CX+' '+(HILL_BASE_Y-12)+' '+HILL_CZ,
      scale:'1 .82 1',material:'color:#2a7018;roughness:.95'},par);
    // Couche roche milieu
    mk('sphere',{radius:(HILL_R*.55).toFixed(0),position:HILL_CX+' '+(HILL_BASE_Y-4)+' '+HILL_CZ,
      scale:'1 .8 1',material:'color:#5a4a30;roughness:.97'},par);
    // Couche herbe haute
    mk('sphere',{radius:(HILL_R*.38).toFixed(0),position:HILL_CX+' '+(HILL_BASE_Y+3)+' '+HILL_CZ,
      scale:'1 .75 1',material:'color:#3a8a22;roughness:.95'},par);
    // Sommet arrondi
    mk('sphere',{radius:(HILL_R*.22).toFixed(0),position:HILL_CX+' '+(HILL_BASE_Y+9)+' '+HILL_CZ,
      scale:'1 .7 1',material:'color:#2a7a18;roughness:.94'},par);
    // Plateau sommet
    mk('cylinder',{radius:'10',height:'.4',position:HILL_CX+' '+HILL_TOP_Y+' '+HILL_CZ,
      material:'color:#2a8018;roughness:.94'},par);

    addPlatform(HILL_CX,HILL_CZ,HILL_TOP_Y,10,10);

    // ── ROCHERS sur la colline
    var hillRocks=[
      [HILL_CX-8,4,HILL_CZ-5,1.4,.52],[HILL_CX+7,5,HILL_CZ+4,1.2,.5],
      [HILL_CX-5,7,HILL_CZ+8,1.8,.48],[HILL_CX+9,8,HILL_CZ-6,1.1,.55],
      [HILL_CX-10,6,HILL_CZ-2,1.6,.5],[HILL_CX+3,9,HILL_CZ-9,2.0,.46],
      [HILL_CX-3,3,HILL_CZ+12,1.4,.52],[HILL_CX+11,3,HILL_CZ+7,1.3,.5],
      [HILL_CX-12,2,HILL_CZ+5,1.8,.48],[HILL_CX+6,11,HILL_CZ+3,0.9,.55],
      [HILL_CX-2,12,HILL_CZ-4,1.2,.5],[HILL_CX+4,11,HILL_CZ-5,1.0,.52]
    ];
    hillRocks.forEach(function(r){makeRock(r[0],r[1],r[2],r[3],r[4],par);});

    // ── CHEMINS piétons en spirale sur la colline
    // Chemin bas → mi-colline
    var pathPts=[];
    for(var pi=0;pi<=20;pi++){
      var t=pi/20;
      var ang=-Math.PI/2+t*Math.PI*1.8;
      var r2=HILL_R*(1.0-t*.65);
      var py=HILL_BASE_Y+t*t*HILL_TOP_Y*.85;
      pathPts.push({x:HILL_CX+Math.cos(ang)*r2,y:py,z:HILL_CZ+Math.sin(ang)*r2});
    }
    for(var pi=0;pi<pathPts.length-1;pi++){
      var p0=pathPts[pi],p1=pathPts[pi+1];
      var dx=p1.x-p0.x,dz=p1.z-p0.z,len=Math.sqrt(dx*dx+dz*dz);
      if(len<.1)continue;
      var ang2=Math.atan2(dx,dz)*180/Math.PI;
      mk('plane',{width:'.7',height:len.toFixed(2),rotation:'-90 '+ang2.toFixed(1)+' 0',
        position:((p0.x+p1.x)/2).toFixed(2)+' '+(p0.y+.05).toFixed(2)+' '+((p0.z+p1.z)/2).toFixed(2),
        material:'color:#c4a878;roughness:.95'},par);
    }
    // Chemin direct plage → colline
    makePath(0,0, HILL_CX,HILL_CZ+HILL_R+2, HILL_BASE_Y, par);
    // Chemins entre palmiers autour
    for(var ci=0;ci<4;ci++){
      var ang3=ci/4*Math.PI*2;
      var r3=12;
      makePath(HILL_CX+Math.sin(ang3)*r3, HILL_CZ+Math.cos(ang3)*r3,
               HILL_CX+Math.sin(ang3+.8)*r3, HILL_CZ+Math.cos(ang3+.8)*r3,
               HILL_BASE_Y, par);
    }

    // ── PLACE DU VILLAGE au sommet
    var VX=HILL_CX, VZ=HILL_CZ, VY=HILL_TOP_Y+.2;

    // Sol place (terre battue)
    mk('cylinder',{radius:'8',height:'.08',position:VX+' '+VY+' '+VZ,
      material:'color:#d4b070;roughness:.96'},par);
    // Pavés stylisés
    for(var pi=0;pi<3;pi++){
      mk('torus',{radius:(2+pi*1.8).toFixed(1),'radius-tubular':'.06','segments-radial':'16',
        rotation:'90 0 0',position:VX+' '+(VY+.04)+' '+VZ,
        material:'color:#c4a060;roughness:.96'},par);
    }

    // FONTAINE centrale
    makeFountain(VX, VY, VZ, par);

    // EGLISE au nord
    makeChurch(VX, VY, VZ-6.5, 0, par);

    // CASES autour de la place
    var hutPositions=[
      [VX+6.5, VZ+2, 35],
      [VX-6.5, VZ+2, -35],
      [VX+5.5, VZ-4.5, 80],
      [VX-5.5, VZ-4.5, -80],
      [VX+3, VZ+6, 15],
      [VX-3, VZ+6, -15],
    ];
    hutPositions.forEach(function(h){
      makeHawaiianHut(h[0], VY, h[1], h[2], par);
    });

    // MARCHE (étals)
    var stallPositions=[
      [VX+3.5, VZ+3.0, 'fruits', 20],
      [VX-3.5, VZ+3.0, 'artisanat', -20],
      [VX+4.0, VZ-1.5, 'poisson', 55],
      [VX-4.0, VZ-1.5, 'artisanat', -55],
    ];
    stallPositions.forEach(function(s){
      makeMarketStall(s[0], VY, s[1], s[2], s[3], par);
    });

    // GENS au marché
    makePerson(VX+3.5,VY,VZ+4.5,'#f4c08a','market',200,par);
    makePerson(VX-3.2,VY,VZ+4.8,'#d4906a','market',160,par);
    makePerson(VX+4.2,VY,VZ-0.5,'#e8b07a','market',90,par);
    makePerson(VX-4.2,VY,VZ-0.5,'#c07858','market',-90,par);
    // Visiteurs qui se promènent sur la place
    makePerson(VX+1.8,VY,VZ+2.5,'#f0c8a0','walk',45,par);
    makePerson(VX-2.0,VY,VZ+2.0,'#e0b090','walk',-30,par);
    makePerson(VX+1.0,VY,VZ-2.8,'#d8a880','walk',180,par);
    makePerson(VX-1.5,VY,VZ-3.0,'#f8d8b0','walk',160,par);
    makePerson(VX+3.0,VY,VZ-3.2,'#e0c0a0','walk',120,par);

    // PALMIERS fin (3x plus fins) autour du village
    var hillPalmAngles=[0,.5,1.1,1.7,2.3,2.9,3.5,4.1,4.7,5.3,5.9];
    hillPalmAngles.forEach(function(ang){
      var r4=7+Math.random()*2;
      var px=VX+Math.cos(ang)*r4, pz=VZ+Math.sin(ang)*r4;
      makePalm(px,VY,pz,4+Math.random()*2,Math.cos(ang)*.3,Math.sin(ang)*.3,par);
    });
    // Végétation du sommet
    for(var vi=0;vi<8;vi++){
      var vang=vi/8*Math.PI*2,vr=8+Math.random()*2;
      var vx=VX+Math.cos(vang)*vr,vz=VZ+Math.sin(vang)*vr;
      makeFern(vx,VY,vz,par);
      if(vi%2===0)makeHibiscus(vx+.5,VY,vz+.3,par);
    }

    // ── PALMIERS FINS sur les pentes de la colline
    var slopePalms=[[HILL_CX-9,3,HILL_CZ+4],[HILL_CX+8,4,HILL_CZ+6],[HILL_CX-6,5,HILL_CZ-8],
                    [HILL_CX+10,4,HILL_CZ-4],[HILL_CX-11,3,HILL_CZ-6],[HILL_CX+5,6,HILL_CZ-10],
                    [HILL_CX-4,5,HILL_CZ+10],[HILL_CX+12,3,HILL_CZ+2],[HILL_CX-2,8,HILL_CZ-12]];
    slopePalms.forEach(function(p){
      makePalm(p[0],p[1],p[2],4.5+Math.random()*2.5,(Math.random()-.5)*.4,(Math.random()-.5)*.4,par);
    });
  }

  // ══ MONDE SOUS-MARIN ══
  function buildUnderwaterWorld(){
    var U=UW;
    var DEPTH=-18;
    mk('plane',{width:'800',height:'800',rotation:'-90 0 0',position:'0 '+DEPTH+' 0',
      material:'color:#c8d890;roughness:.92'},U);
    var coralData=[
      [10,-15,15,'#ff4488'],[18,-15,8,'#ff6600'],[5,-15,22,'#ff1155'],[25,-15,18,'#ee2200'],
      [-12,-15,10,'#ff44aa'],[-8,-15,20,'#ff7700'],[20,-15,-10,'#cc0088'],[-20,-15,15,'#ff3300'],
      [15,-15,-18,'#ff5500'],[-15,-15,-12,'#ee1155'],[30,-15,5,'#ff6622'],[-28,-15,8,'#ff2244'],
      [0,-15,28,'#ff4400'],[22,-15,25,'#dd1166'],[-22,-15,22,'#ff5533'],
      [40,-17,20,'#ff2288'],[45,-17,-5,'#ff6600'],[-40,-17,15,'#ee0044'],[-38,-17,-10,'#ff8800'],
      [8,-16,-20,'#ff88aa'],[14,-16,30,'#ee4400'],[-14,-16,-25,'#ff6655'],[32,-16,-18,'#cc2288'],
      [-30,-16,25,'#ff3366'],[25,-16,-30,'#ee8800'],[50,-17,10,'#ff4422'],[-50,-17,-12,'#ee0066'],
    ];
    coralData.forEach(function(c){makeCoral(c[0],c[1],c[2],c[3],U);});
    // Algues
    for(var i=0;i<40;i++){
      var ax=(Math.random()-.5)*100, az=(Math.random()-.5)*100;
      var ah=1.2+Math.random()*2.5;
      var alg=mk('plane',{width:'.18',height:ah.toFixed(2),
        position:ax.toFixed(1)+' '+(DEPTH+ah/2)+' '+az.toFixed(1),
        rotation:'0 '+(Math.random()*360)+' 0',
        material:'side:double;color:#1a8a30;roughness:.7;transparent:true;opacity:.85'},U);
      alg.dataset.windPhase=(Math.random()*Math.PI*2).toFixed(4);
      alg.dataset.brx='0';alg.dataset.bry=(Math.random()*360).toFixed(1);
      alg.classList.add('wind-leaf');
    }
    // Starfish
    for(var i=0;i<8;i++){
      var sx=(Math.random()-.5)*60, sz=(Math.random()-.5)*60;
      mk('cylinder',{radius:'.3',height:'.06',position:sx.toFixed(1)+' '+(DEPTH+.03)+' '+sz.toFixed(1),
        material:'color:#ff6633;roughness:.7'},U);
    }
    // Coquillages
    for(var i=0;i<12;i++){
      var shx=(Math.random()-.5)*70,shz=(Math.random()-.5)*70;
      mk('sphere',{radius:'.12',position:shx.toFixed(1)+' '+(DEPTH+.06)+' '+shz.toFixed(1),
        scale:'1 .4 1',material:'color:#f0d080;roughness:.6'},U);
    }
    // Rochers sous-marins
    for(var i=0;i<10;i++){
      var rrx=(Math.random()-.5)*80,rrz=(Math.random()-.5)*80;
      mk('sphere',{radius:(1+Math.random()*2).toFixed(1),position:rrx.toFixed(1)+' '+(DEPTH+1)+' '+rrz.toFixed(1),
        scale:'1 .6 1',material:'color:#4a3a28;roughness:.97'},U);
    }
    // Poissons
    for(var i=0;i<18;i++){
      var fish=mk('entity',{},U);
      var fr=.1+Math.random()*.15,fc=randomFishColor();
      // Corps
      var fBody=mk('sphere',{radius:fr.toFixed(3),material:'color:#'+fc+';roughness:.5;emissive:#'+fc+';emissiveIntensity:.3'},fish);
      // Queue
      mk('cone',{'radius-bottom':(fr*.5).toFixed(3),'radius-top':'.01',height:(fr*1.2).toFixed(3),
        position:(-fr*1.0).toFixed(3)+' 0 0',rotation:'0 0 90',material:'color:#'+fc+';roughness:.5'},fish);
      // Oeil
      mk('sphere',{radius:(fr*.22).toFixed(3),position:(fr*.5).toFixed(3)+' '+(fr*.2).toFixed(3)+' '+(fr*.55).toFixed(3),
        material:'color:#111;roughness:.4'},fish);
      fish.classList.add('fish-anim');
      fish.dataset.fishPhase=(Math.random()*Math.PI*2).toFixed(3);
      fish.dataset.fishR=(8+Math.random()*25).toFixed(1);
      fish.dataset.fishDepth=(-5-Math.random()*12).toFixed(1);
      fish.dataset.fishSpeed=(.3+Math.random()*.4).toFixed(3);
    }
    mk('point',{position:'0 -10 0',color:'#0088cc',intensity:'1.2',distance:'60'},U);
    mk('point',{position:'20 -14 20',color:'#00aaff',intensity:'0.8',distance:'40'},U);
    mk('point',{position:'-20 -14 -20',color:'#00ccaa',intensity:'0.6',distance:'35'},U);
  }
  function randomFishColor(){var cols=['ff8800','ff0044','00ccff','ffff00','ff44aa','88ffcc','ff6622','22ffcc','ff2266'];return cols[Math.floor(Math.random()*cols.length)];}
  function makeCoral(x,y,z,col,par){
    par=par||UW;
    var h=1.5+Math.random()*2.5,nb=4+Math.floor(Math.random()*5);
    mk('cylinder',{'radius-bottom':'.18','radius-top':'.12',height:h.toFixed(2),
      position:x+' '+(y+h/2)+' '+z,material:'color:'+col+';roughness:.6;emissive:'+col+';emissiveIntensity:.2'},par);
    for(var b=0;b<nb;b++){
      var ang=b/nb*Math.PI*2,br=.3+Math.random()*.5,bh=.8+Math.random()*1.4;
      var bx=x+Math.sin(ang)*br,bz=z+Math.cos(ang)*br;
      mk('cylinder',{'radius-bottom':'.1','radius-top':'.06',height:bh.toFixed(2),
        position:bx.toFixed(2)+' '+(y+h+bh/2).toFixed(2)+' '+bz.toFixed(2),
        rotation:(Math.random()*30-15).toFixed(1)+' '+(ang*180/Math.PI).toFixed(1)+' 0',
        material:'color:'+col+';roughness:.5;emissive:'+col+';emissiveIntensity:.3'},par);
    }
    // Bulles de corail
    for(var bb=0;bb<3;bb++){
      var bang=Math.random()*Math.PI*2,br2=.1+Math.random()*.2;
      mk('sphere',{radius:'.08',position:(x+Math.sin(bang)*br2).toFixed(2)+' '+(y+h+.5+Math.random()*.5).toFixed(2)+' '+(z+Math.cos(bang)*br2).toFixed(2),
        material:'color:'+col+';roughness:.4;emissive:'+col+';emissiveIntensity:.4'},par);
    }
  }

  var stitchModel=document.getElementById('stitch-model');
  stitchModel.addEventListener('model-loaded',function(){

  // ══════════════════════════════════════
  // JOUEUR
  // ══════════════════════════════════════
  var WATER_SURFACE=-0.48;
  var MAX_BREATH=100;
  var BREATH_LOSE=7;
  var BREATH_GAIN=25;

  var P={x:0,y:1.5,z:3,vx:0,vy:0,vz:0,yaw:Math.PI,onGround:false,yOff:.7,
         swimming:false,diving:false,breath:MAX_BREATH,swimBob:0};
  var CAM={yaw:Math.PI,pitch:.18,dist:6.5};
  var jLX=0,jLY=0,jid=-1,rjLX=0,rjLY=0,rjid=-1,KY={},sprint=false;
  var waveT=0,lastT=performance.now();
  var windLeaves=null,fishEls=null;

  function getGroundY2(px,pz){
    var best=null;
    for(var i=0;i<platforms.length;i++){
      var pl=platforms[i];
      if(Math.abs(px-pl.cx)<=pl.rx+.5&&Math.abs(pz-pl.cz)<=pl.rz+.5){
        if(best===null||pl.y>best)best=pl.y;
      }
    }
    return best;
  }
  // override global
  getGroundY=getGroundY2;

  function loop(){
    requestAnimationFrame(loop);
    var now=performance.now(),dt=Math.min((now-lastT)/1000,.05);lastT=now;
    waveT+=dt;

    // Feuilles vent
    if(!windLeaves)windLeaves=document.querySelectorAll('.wind-leaf');
    windLeaves.forEach(function(lf){
      var ph=parseFloat(lf.dataset.windPhase||0);
      var brx=parseFloat(lf.dataset.brx||0),bry=lf.dataset.bry||'0';
      var s=Math.sin(waveT*1.15+ph)*3.2;
      lf.setAttribute('rotation',(brx+s).toFixed(1)+' '+bry+' '+Math.cos(waveT*.75+ph).toFixed(1));
    });

    // Poissons avec rotation
    if(!fishEls)fishEls=document.querySelectorAll('.fish-anim');
    fishEls.forEach(function(fish){
      var ph=parseFloat(fish.dataset.fishPhase||0);
      var r=parseFloat(fish.dataset.fishR||10);
      var dep=parseFloat(fish.dataset.fishDepth||-10);
      var spd=parseFloat(fish.dataset.fishSpeed||.35);
      var t=waveT*spd;
      var fx=Math.sin(t+ph)*r, fz=Math.cos(t+ph)*r;
      var fy=dep+Math.sin(waveT*.8+ph)*.8;
      var ang=Math.atan2(Math.cos(t+ph),-Math.sin(t+ph));
      fish.setAttribute('position',fx.toFixed(2)+' '+fy.toFixed(2)+' '+fz.toFixed(2));
      fish.setAttribute('rotation','0 '+(ang*180/Math.PI).toFixed(1)+' 0');
    });

    // INPUT
    var fwd=0,lat=0;
    if(KY['KeyW']||KY['KeyZ']||KY['ArrowUp'])fwd=1;
    if(KY['KeyS']||KY['ArrowDown'])fwd=-1;
    if(KY['KeyD']||KY['ArrowRight'])lat=1;
    if(KY['KeyA']||KY['KeyQ']||KY['ArrowLeft'])lat=-1;
    fwd-=jLY;lat+=jLX;
    var moveMag=Math.sqrt(fwd*fwd+lat*lat);

    var gy=getGroundY2(P.x,P.z);
    var onIsland=(gy!==null);

    // ── PLONGÉE LIBRE ──
    // On peut plonger dès qu'on est dans l'eau (même si on marche sur une île basse)
    // Transition nage : hors île ET à hauteur eau
    if(!P.diving){
      if(!onIsland && P.y<=WATER_SURFACE+.2){
        P.swimming=true;
      } else if(onIsland && P.y>WATER_SURFACE+.3){
        P.swimming=false;
      }
    }

    var spd=sprint?9.5:5.2;
    if(P.swimming||P.diving)spd*=.65;

    if(moveMag>.05){
      var mx=fwd*(-Math.sin(CAM.yaw))+lat*Math.cos(CAM.yaw);
      var mz=fwd*(-Math.cos(CAM.yaw))+lat*(-Math.sin(CAM.yaw));
      var mn=Math.sqrt(mx*mx+mz*mz);
      P.vx=mx/mn*spd;P.vz=mz/mn*spd;
      var ty=Math.atan2(mx/mn,mz/mn),dyw=ty-P.yaw;
      while(dyw>Math.PI)dyw-=Math.PI*2;while(dyw<-Math.PI)dyw+=Math.PI*2;
      P.yaw+=dyw*Math.min(1,dt*14);
    } else {P.vx=0;P.vz=0;}

    // ── PHYSIQUE ──
    if(P.diving){
      // Nage sous-marine libre : déplacement 3D complet
      P.vy*=.85;

      // Descendre/monter avec joystick gauche (jLY) ou caméra pitch
      // Montée avec joystick gauche vers le haut (jLY<0)
      if(jLY<-.08) P.vy=Math.min(P.vy+6*dt*(-jLY)*2,4.5);
      else if(jLY>.08) P.vy=Math.max(P.vy-6*dt*jLY*2,-4.5);

      // Légère remontée naturelle (flottabilité)
      P.vy+=0.3*dt;

      // Le joueur peut aussi monter/descendre avec la caméra (pitch)
      // Si on regarde vers le bas, on descend ; vers le haut, on monte
      if(moveMag>.05){
        var pitchDive=(CAM.pitch-.18)*3; // pitch normal = neutre
        P.vy+=pitchDive*spd*dt*0.4;
      }

      P.y+=P.vy*dt;

      // Remontée à la surface
      if(P.y>=WATER_SURFACE-.05){
        P.y=WATER_SURFACE-.05;
        P.diving=false;
        P.swimming=true;
        P.vy=0;
      }
      // Fond de l'océan
      if(P.y<-21.5){P.y=-21.5;P.vy=Math.max(0,P.vy);}
      P.onGround=false;

      // Respiration sous l'eau
      P.breath=Math.max(0,P.breath-BREATH_LOSE*dt);
    } else if(P.swimming){
      P.swimBob+=dt;
      // Nage de surface — peut aller vers la plongée si DIVE pressé
      P.y=WATER_SURFACE+Math.sin(P.swimBob*2.4)*.08;
      P.vy=0;P.onGround=true;
      P.breath=Math.min(MAX_BREATH,P.breath+BREATH_GAIN*dt);
    } else {
      // Gravité terrestre
      P.vy-=22*dt;if(P.vy<-20)P.vy=-20;
      P.y+=P.vy*dt;
      if(gy!==null&&P.y<=gy+P.yOff){P.y=gy+P.yOff;P.vy=0;P.onGround=true;}
      else P.onGround=false;
      // Tombe dans l'eau
      if(P.y<=WATER_SURFACE+.15&&gy===null){P.swimming=true;}
      P.breath=Math.min(MAX_BREATH,P.breath+BREATH_GAIN*dt);
    }

    // Collisions murs
    var PRAD=.48,nx=P.x+P.vx*dt,nz=P.z+P.vz*dt;
    for(var wi=0;wi<walls.length;wi++){
      var w=walls[wi];if(P.y-P.yOff>w.y0+w.h)continue;
      var inX=(nx+PRAD>w.x1&&nx-PRAD<w.x2),inZ=(nz+PRAD>w.z1&&nz-PRAD<w.z2);
      var curX=(P.x+PRAD>w.x1&&P.x-PRAD<w.x2),curZ=(P.z+PRAD>w.z1&&P.z-PRAD<w.z2);
      if(inX&&inZ){if(!curX){P.vx=0;nx=P.x;}if(!curZ){P.vz=0;nz=P.z;}}
    }
    P.x=nx;P.z=nz;

    // Stitch
    var stEl=document.getElementById('stitch-root');
    var tiltF=P.diving&&moveMag>.05?-28:(P.swimming&&moveMag>.05?-14:0);
    stEl.setAttribute('position',P.x.toFixed(2)+' '+P.y.toFixed(2)+' '+P.z.toFixed(2));
    stEl.setAttribute('rotation',tiltF+' '+(P.yaw*180/Math.PI).toFixed(1)+' 0');

    // Camera
    if(Math.abs(rjLX)>.04)CAM.yaw+=rjLX*dt*2.5;
    else if(moveMag>.1){
      var tc=P.yaw+Math.PI,cd=tc-CAM.yaw;
      while(cd>Math.PI)cd-=Math.PI*2;while(cd<-Math.PI)cd+=Math.PI*2;
      CAM.yaw+=cd*dt*2.2;
    }
    if(Math.abs(rjLY)>.04)CAM.pitch=Math.max(.04,Math.min(.7,CAM.pitch+rjLY*dt*1.5));

    // En plongée, la caméra suit mieux verticalement
    var camDistActual=P.diving?5.5:CAM.dist;
    var cr=camDistActual*Math.cos(CAM.pitch);
    var cX=P.x+Math.sin(CAM.yaw)*cr,cZ=P.z+Math.cos(CAM.yaw)*cr;
    var cY=P.y+camDistActual*Math.sin(CAM.pitch)+(P.diving?1.2:1.8);
    var camRig=document.getElementById('cam-rig');
    var cp=camRig.getAttribute('position');
    var lf2=Math.min(1,dt*18);
    camRig.setAttribute('position',(cp.x+(cX-cp.x)*lf2).toFixed(2)+' '+(cp.y+(cY-cp.y)*lf2*.8).toFixed(2)+' '+(cp.z+(cZ-cp.z)*lf2).toFixed(2));
    document.getElementById('mainCam').components.camera.camera.lookAt(P.x,P.y+(P.diving?.5:.9),P.z);

    // Vagues
    ['w0','w1','w2'].forEach(function(id,i){
      var wEl=document.getElementById(id);if(!wEl)return;
      wEl.setAttribute('scale',(1+Math.sin(waveT*.8+i*1.4)*.05)+' 1 '+(1+Math.sin(waveT*.8+i*1.4)*.05));
      wEl.setAttribute('position','0 '+(-.42+Math.sin(waveT*1.6+i*1.4)*.04).toFixed(3)+' 0');
    });
    var lg=document.getElementById('lagon');
    if(lg)lg.setAttribute('position','0 '+(-.35+Math.sin(waveT*.45)*.012).toFixed(3)+' 0');

    // UI respiration
    var breathBar=document.getElementById('breath-bar');
    var breathFill=document.getElementById('breath-fill');
    var uwOverlay=document.getElementById('underwater-overlay');
    if(P.diving||P.swimming){
      breathBar.style.display='flex';
      var pct=P.breath/MAX_BREATH;
      breathFill.style.width=(pct*100).toFixed(0)+'%';
      breathFill.style.background=pct>.5?'linear-gradient(90deg,#00ffcc,#0088ff)':pct>.2?'linear-gradient(90deg,#ffcc00,#ff6600)':'linear-gradient(90deg,#ff2200,#ff6600)';
    } else {
      breathBar.style.display='none';
    }
    // Overlay sous-marin
    uwOverlay.style.opacity=P.diving?.72:(P.swimming?.18:0);
    // Fog
    var scene=document.querySelector('a-scene');
    if(P.diving){
      scene.setAttribute('fog','type:exponential;color:#004466;density:0.035');
      document.getElementById('skyEl').setAttribute('color','#003355');
    } else {
      scene.setAttribute('fog','type:exponential;color:#5ac8f0;density:0.007');
      document.getElementById('skyEl').setAttribute('color','#4ab8f0');
    }

    // HUD zone
    var zone='🌊 OCEAN';
    if(P.diving)zone='🤿 SOUS L EAU';
    else if(!P.swimming){
      zone='🏖 PLAGE';
      for(var i=0;i<islandDefs.length;i++){
        var id=islandDefs[i];
        if(Math.sqrt((P.x-id.cx)*(P.x-id.cx)+(P.z-id.cz)*(P.z-id.cz))<60){zone='🏝 '+id.label;break;}
      }
      if(P.y>3)zone='🏔 COLLINE';
    }
    document.getElementById('zL').textContent=zone;

    if(P.breath<15&&P.diving&&Math.floor(waveT*2)%2===0){
      document.getElementById('zL').style.color='#ff2200';
    } else {
      document.getElementById('zL').style.color='#7de8ff';
    }
    if(P.breath<=0){P.y=WATER_SURFACE+1;P.vy=2;P.diving=false;P.swimming=true;P.breath=35;toast('Stitch refait surface !',2000);}
  }
  loop();

  window.doJump=function(e){
    if(e&&e.preventDefault)e.preventDefault();
    if(P.onGround&&!P.diving&&!P.swimming){P.vy=8.5;P.onGround=false;}
  };
  window.doDive=function(e){
    if(e&&e.preventDefault)e.preventDefault();
    if(P.diving){
      // REMONTER
      P.vy=5.5;
    } else if(P.swimming){
      // PLONGER depuis la surface
      P.diving=true;
      P.swimming=false;
      P.vy=-4.0;
      P.onGround=false;
      P.y=WATER_SURFACE-.2;
    } else {
      // Si dans l'eau mais pas encore swimming, forcer
      var gy3=getGroundY2(P.x,P.z);
      if(gy3===null && P.y<=WATER_SURFACE+1.0){
        P.swimming=true;
        P.diving=true;
        P.vy=-4.0;
        P.onGround=false;
      }
    }
  };
  window.setSprint=function(v,e){if(e&&e.preventDefault)e.preventDefault();sprint=!!v;};

  // Joystick G
  var jB=document.getElementById('joy'),jN=document.getElementById('jnub'),JMAX=38;
  function jUp(cx,cy){var r=jB.getBoundingClientRect(),dx=cx-(r.left+r.width/2),dy=cy-(r.top+r.height/2),d=Math.sqrt(dx*dx+dy*dy);if(d>JMAX){dx=dx/d*JMAX;dy=dy/d*JMAX;}jN.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';jLX=d>4?dx/JMAX:0;jLY=d>4?dy/JMAX:0;}
  function jRst(){jN.style.transform='translate(-50%,-50%)';jLX=0;jLY=0;}
  jB.addEventListener('touchstart',function(e){e.preventDefault();jid=e.changedTouches[0].identifier;jUp(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
  jB.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===jid)jUp(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false});
  jB.addEventListener('touchend',jRst,{passive:true});
  jB.addEventListener('mousedown',function(e){jUp(e.clientX,e.clientY);});
  window.addEventListener('mouseup',jRst);
  // Joystick D
  var rjB=document.getElementById('rjoy'),rjN=document.getElementById('rjnub'),RJMAX=32;
  function rjUp(cx,cy){var r=rjB.getBoundingClientRect(),dx=cx-(r.left+r.width/2),dy=cy-(r.top+r.height/2),d=Math.sqrt(dx*dx+dy*dy);if(d>RJMAX){dx=dx/d*RJMAX;dy=dy/d*RJMAX;}rjN.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';rjLX=d>4?dx/RJMAX:0;rjLY=d>4?dy/RJMAX:0;}
  function rjRst(){rjN.style.transform='translate(-50%,-50%)';rjLX=0;rjLY=0;}
  rjB.addEventListener('touchstart',function(e){e.preventDefault();rjid=e.changedTouches[0].identifier;rjUp(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
  rjB.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===rjid)rjUp(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false});
  rjB.addEventListener('touchend',rjRst,{passive:true});
  window.addEventListener('keydown',function(e){KY[e.code]=1;if(e.code==='Space'){e.preventDefault();window.doJump();}if(e.code==='KeyF'){e.preventDefault();window.doDive();}if(e.code==='ShiftLeft')sprint=true;});
  window.addEventListener('keyup',function(e){KY[e.code]=0;if(e.code==='ShiftLeft')sprint=false;});
}
</script>
