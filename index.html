<!DOCTYPE html><html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Stitch Island Adventure</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0518}
#cv{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
#loading{position:fixed;inset:0;background:linear-gradient(180deg,#0a0518,#1a0830);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#loading h1{font-family:Georgia,serif;font-size:20px;color:#ffb8d8;letter-spacing:4px}
#loading p{font-size:9px;color:rgba(255,184,216,.45);letter-spacing:3px}
.bw{width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.bf{height:100%;background:linear-gradient(90deg,#ffb8d8,#ffd06a);border-radius:2px;transition:width .2s}
#stepTxt{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:2px}
/* HUD */
#hud{position:fixed;top:10px;left:0;right:0;display:none;justify-content:space-between;padding:0 12px;pointer-events:none;z-index:20}
.pill{background:rgba(0,0,15,.78);border-radius:18px;padding:5px 12px;font-family:Georgia,serif;font-size:9px;color:#ffd06a;border:1.5px solid rgba(255,208,106,.3)}
/* Joystick */
#joy{position:fixed;left:14px;bottom:78px;z-index:30;width:108px;height:108px;border-radius:50%;background:rgba(0,0,0,.28);border:3px solid rgba(255,208,106,.45);touch-action:none}
#jnub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:50%;background:radial-gradient(circle,rgba(255,220,80,.85),rgba(180,80,0,.92));border:3px solid #ffd06a}
/* Boutons */
#btns{position:fixed;right:14px;bottom:78px;z-index:30;display:flex;flex-direction:column;gap:7px}
.btn{width:54px;height:54px;border-radius:50%;background:rgba(0,0,20,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:8px;cursor:pointer;touch-action:manipulation;border:2.5px solid rgba(255,255,255,.2)}
/* Panneau énigme */
#puzzle{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:50;background:rgba(0,0,0,.65)}
#puzzleBox{background:linear-gradient(180deg,#3a2010,#1e1008);border:3px solid #8b5a2b;border-radius:12px;padding:22px;max-width:320px;width:90%;text-align:center;font-family:Georgia,serif;color:#ffd06a;box-shadow:0 0 40px rgba(0,0,0,.8)}
#puzzleBox h2{font-size:14px;margin-bottom:12px;color:#ffb870;letter-spacing:2px}
#puzzleBox p{font-size:11px;color:rgba(255,208,106,.8);margin-bottom:14px;line-height:1.6}
.pzBtns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.pzBtn{padding:8px 14px;background:rgba(139,90,43,.4);border:1.5px solid #8b5a2b;border-radius:8px;color:#ffd06a;font-family:Georgia,serif;font-size:11px;cursor:pointer;transition:background .15s}
.pzBtn:hover,.pzBtn:active{background:rgba(139,90,43,.8)}
.pzBtn.correct{border-color:#4aff7a;color:#4aff7a}
.pzBtn.wrong{border-color:#ff4a4a;color:#ff4a4a}
#dirBtns{display:flex;gap:10px;justify-content:center;margin-top:10px}
.dirBtn{padding:9px 18px;background:rgba(40,100,40,.4);border:1.5px solid #4a9a4a;border-radius:8px;color:#7aff7a;font-family:Georgia,serif;font-size:12px;cursor:pointer}
.dirBtn:active{background:rgba(40,100,40,.8)}
/* Toast */
#toast{position:fixed;top:52px;left:50%;transform:translateX(-50%) scale(.9);opacity:0;z-index:80;background:rgba(0,0,20,.94);border:2px solid #ffd06a;border-radius:18px;padding:7px 16px;color:#ffd06a;font-size:10px;font-family:Georgia,serif;white-space:nowrap;pointer-events:none;transition:all .18s}
#toast.show{transform:translateX(-50%) scale(1);opacity:1}
/* Victoire */
#victory{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:90;background:rgba(0,100,200,.4)}
#victoryBox{background:linear-gradient(180deg,#0a3060,#051830);border:3px solid #7de8ff;border-radius:16px;padding:28px;text-align:center;font-family:Georgia,serif;color:#7de8ff;max-width:300px}
#victoryBox h1{font-size:22px;letter-spacing:3px;margin-bottom:12px;color:#ffd06a}
#victoryBox p{font-size:12px;line-height:1.7;color:rgba(125,232,255,.85)}
</style>
</head>
<body>
<div id="loading">
  <h1>STITCH ISLAND</h1>
  <p>HAWAII ADVENTURE</p>
  <div class="bw"><div class="bf" id="bf" style="width:2%"></div></div>
  <div id="stepTxt">CHARGEMENT...</div>
</div>
<canvas id="cv"></canvas>

<div id="hud">
  <div class="pill" id="zoneLbl">&#127807; JUNGLE</div>
  <div class="pill" id="cluesLbl">&#128270; Indices: 0/6</div>
</div>

<div id="joy"><div id="jnub"></div></div>
<div id="btns">
  <div class="btn" style="border-color:#7de8ff;color:#7de8ff" ontouchstart="doJump(event)" onclick="doJump()">&#8679;<br>JUMP</div>
  <div class="btn" style="border-color:#ff9944;color:#ff9944" id="interactBtn" onclick="tryInteract()" ontouchstart="tryInteract()">&#10003;<br>OK</div>
</div>

<!-- Panneau énigme -->

<div id="puzzle">
  <div id="puzzleBox">
    <h2 id="pzTitle">&#127795; PANNEAU MYSTERIEUX</h2>
    <p id="pzText"></p>
    <div id="pzContent"></div>
    <div id="dirBtns" style="display:none">
      <div class="dirBtn" onclick="choosePath('left')">&#8592; GAUCHE</div>
      <div class="dirBtn" onclick="choosePath('forward')">&#8593; TOUT DROIT</div>
      <div class="dirBtn" onclick="choosePath('right')">&#8594; DROITE</div>
    </div>
  </div>
</div>

<!-- Victoire -->

<div id="victory">
  <div id="victoryBox">
    <h1>&#127754; OHANA!</h1>
    <p>Tu as trouvé la plage !<br><br>Stitch retrouve l'océan d'Hawaii.<br>Ohana means family &#128153;</p>
    <br>
    <div class="dirBtn" onclick="restartGame()" style="display:inline-block;margin:0 auto">&#8635; REJOUER</div>
  </div>
</div>

<div id="toast"></div>

<script>
(function(){
  var s=document.getElementById('stepTxt');
  var cdns=[
    {b:'https://cdn.babylonjs.com/babylon.js',l:'https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js'},
    {b:'https://unpkg.com/babylonjs@6.26.0/babylon.js',l:'https://unpkg.com/babylonjs-loaders@6.26.0/babylonjs.loaders.min.js'},
    {b:'https://cdnjs.cloudflare.com/ajax/libs/babylonjs/6.26.0/babylon.js',l:'https://cdnjs.cloudflare.com/ajax/libs/babylonjs-loaders/6.26.0/babylonjs.loaders.min.js'}
  ];
  var i=0;
  function next(){
    if(i>=cdns.length){s.textContent='ERREUR CDN';return;}
    var p=cdns[i++];s.textContent='CDN '+i+'/'+cdns.length+'...';
    ld(p.b,function(){ld(p.l,function(){window.startGame&&window.startGame();},next);},next);
  }
  function ld(url,ok,fail){var sc=document.createElement('script');sc.src=url;sc.onload=ok;sc.onerror=function(){document.head.removeChild(sc);fail();};document.head.appendChild(sc);}
  next();
})();
</script>

<script>
// ── DONNÉES DU JEU ──
// Labyrinthe : chemin principal avec 6 carrefours
// Chaque carrefour a une position, une énigme, et 3 sorties (gauche, tout_droit, droite)
// Une seule direction est correcte (mène vers la sortie)

var MAZE_DATA = {
  start: {x:0, z:0, nextCarrefour: 0},
  carrefours: [
    {
      id:0, x:0, z:-18, yaw:0,
      enigme: {
        type:'symboles', // Mémoriser séquence
        titre:'PANNEAU BOIS #1',
        texte:'Les symboles hawaiiens indiquent le chemin.\nMémorise la séquence : 🌺 🐚 🌴\nQuelle est la 2ème figure ?',
        choix:['🌺 Hibiscus','🐚 Coquillage','🌴 Palmier'],
        bonne:1, // index 1 = coquillage
        message:'La mer appelle... Continue tout droit !'
      },
      correct:'forward', left:{x:-12,z:-18}, forward:{x:0,z:-36}, right:{x:12,z:-18},
      nextCorrect:1, nextWrong_desc:'Impasse végétation!'
    },
    {
      id:1, x:0, z:-36, yaw:0,
      enigme: {
        type:'couleurs',
        titre:'PANNEAU BOIS #2',
        texte:'Les fleurs hawaiiennes ont des couleurs.\nL\'hibiscus jaune indique le SOLEIL.\nL\'hibiscus rouge indique le DANGER.\nQuelle couleur choisir pour aller vers l\'océan ?',
        choix:['🌺 Rouge - Danger','🌻 Jaune - Soleil','💜 Violet - Mystère'],
        bonne:1,
        message:'Le soleil guide vers la mer !'
      },
      correct:'right', left:{x:-14,z:-36}, forward:{x:0,z:-52}, right:{x:14,z:-36},
      nextCorrect:2, nextWrong_desc:'Impasse!'
    },
    {
      id:2, x:14, z:-36, yaw:-Math.PI/2,
      enigme: {
        type:'rotation',
        titre:'PANNEAU BOIS #3',
        texte:'Tourne les blocs pour former une flèche !\nLa flèche doit pointer vers L\'OCEAN.\nQuelle direction pointe vers la mer bleue ?',
        choix:['⬆ Nord - Montagne','⬇ Sud - Jungle','➡ Est - Mer bleue'],
        bonne:2,
        message:'La mer est à l\'Est ! En avant !'
      },
      correct:'forward', left:{x:14,z:-20}, forward:{x:28,z:-36}, right:{x:14,z:-52},
      nextCorrect:3, nextWrong_desc:'Impasse!'
    },
    {
      id:3, x:28, z:-36, yaw:-Math.PI/2,
      enigme: {
        type:'symboles',
        titre:'PANNEAU BOIS #4',
        texte:'Stitch cherche l\'océan...\nLe signe de l\'eau ressemble à des vagues ~\nLequel de ces symboles représente l\'eau ?',
        choix:['∧∧∧ Montagnes','≈≈≈ Vagues d\'eau','▲▲▲ Arbres'],
        bonne:1,
        message:'Les vagues ! L\'océan est proche !'
      },
      correct:'right', left:{x:28,z:-22}, forward:{x:44,z:-36}, right:{x:28,z:-50},
      nextCorrect:4, nextWrong_desc:'Impasse!'
    },
    {
      id:4, x:28, z:-50, yaw:Math.PI,
      enigme: {
        type:'couleurs',
        titre:'PANNEAU BOIS #5',
        texte:'Presque arrivé !\nLe ciel à l\'horizon est :\nBLEU = océan devant\nROSE = retour arrière\nVERT = jungle\nVers où aller ?',
        choix:['🔵 Bleu - Océan','🌸 Rose - Arrière','🟢 Vert - Jungle'],
        bonne:0,
        message:'Oui ! L\'océan bleu est devant !'
      },
      correct:'forward', left:{x:14,z:-50}, forward:{x:28,z:-64}, right:{x:42,z:-50},
      nextCorrect:5, nextWrong_desc:'Impasse!'
    },
    {
      id:5, x:28, z:-64, yaw:Math.PI,
      enigme: {
        type:'rotation',
        titre:'PANNEAU BOIS #6 - DERNIER !',
        texte:'Dernier carrefour !\nLa boussole magique tourne...\nNord=Montagne, Sud=Fusée, Est=Jungle, OUEST=PLAGE\nVers quelle direction ?',
        choix:['⬆ Nord - Montagne','⬅ Ouest - Plage','⬇ Sud - Fusée'],
        bonne:1,
        message:'LA PLAGE ! OHANA !'
      },
      correct:'left', left:{x:14,z:-64}, forward:{x:28,z:-80}, right:{x:42,z:-64},
      nextCorrect:'VICTORY', nextWrong_desc:'Impasse!'
    }
  ]
};

// État du jeu
var gameState = {
  currentCarrefour: -1,  // -1 = pas encore arrivé au premier
  cluesSolved: 0,
  nearCarrefour: null,
  atVictory: false,
  wrongPaths: {} // chemins bloqués
};

var BASE='https://raw.githubusercontent.com/hoobasurf/Fantasyworld/main/assets/';

// ── BABYLON ──
window.startGame=function(){
'use strict';
var B=BABYLON;

var bfEl=document.getElementById('bf');
function step(p,t){bfEl.style.width=p+'%';if(t)document.getElementById('stepTxt').textContent=t;}
function toast(m,dur){var t=document.getElementById('toast');t.textContent=m;t.className='show';clearTimeout(toast._t);toast._t=setTimeout(function(){t.className='';},dur||3000);}
function showGame(){document.getElementById('loading').style.display='none';document.getElementById('hud').style.display='flex';}

// ── JOUEUR ──
var P={x:0,y:0,z:2,vx:0,vy:0,vz:0,yaw:Math.PI,onGround:true};
var pRoot=null,pYOff=0,pAnims={},curAnim=null;
var jLX=0,jLY=0,KY={},jid=-1;
var sprint=false,waveT=0,lastT=performance.now();
// Murs de collision (boîtes AABB)
var walls=[]; // {x1,z1,x2,z2} boîtes infranchissables
var interactZones=[]; // {x,z,r,id} zones interaction

var cv=document.getElementById('cv');
var eng=new B.Engine(cv,true,{antialias:true,stencil:true,adaptToDeviceRatio:true},true);
var sc=new B.Scene(eng);
sc.clearColor=new B.Color4(.82,.55,.75,1);
sc.fogMode=B.Scene.FOGMODE_LINEAR;
sc.fogStart=22;sc.fogEnd=55;
sc.fogColor=new B.Color3(.68,.52,.68);

var cam=new B.FreeCamera('cam',new B.Vector3(0,4,10),sc);
cam.minZ=.1;cam.maxZ=300;cam.fov=.95;
cam.inputs.clear();

step(6,'LUMIERES...');

var sun=new B.DirectionalLight('sun',new B.Vector3(-.3,-1,.15),sc);
sun.intensity=2.6;sun.diffuse=new B.Color3(1,.82,.5);sun.specular=new B.Color3(0,0,0);
var shadows=null;
try{
  shadows=new B.ShadowGenerator(1024,sun);
  shadows.usePoissonSampling=true;shadows.darkness=.5;
}catch(e){}
var sky=new B.HemisphericLight('sky',new B.Vector3(0,1,0),sc);
sky.intensity=.72;sky.diffuse=new B.Color3(.88,.68,.82);sky.groundColor=new B.Color3(.55,.42,.22);sky.specular=new B.Color3(0,0,0);
var fill=new B.PointLight('fill',new B.Vector3(0,3,0),sc);
fill.intensity=.2;fill.range=8;fill.diffuse=new B.Color3(1,.82,.5);

step(12,'CIEL...');

// Dôme ciel coucher de soleil
var skyDome=B.MeshBuilder.CreateSphere('skyD',{diameter:600,segments:7},sc);
skyDome.flipFaces(true);
var skyMat=new B.StandardMaterial('skyMat',sc);
skyMat.backFaceCulling=false;skyMat.disableLighting=true;
var skyDyn=new B.DynamicTexture('sdt',{width:4,height:256},sc,false);
(function(){
  var ctx=skyDyn.getContext(),c=document.createElement('canvas');c.width=4;c.height=256;
  var cx=c.getContext('2d'),g=cx.createLinearGradient(0,0,0,256);
  g.addColorStop(0,'#2a1a88');g.addColorStop(.22,'#6a38b8');g.addColorStop(.48,'#d870a0');
  g.addColorStop(.68,'#f08030');g.addColorStop(.84,'#f8d055');g.addColorStop(1,'#ffe0b0');
  cx.fillStyle=g;cx.fillRect(0,0,4,256);ctx.drawImage(c,0,0);skyDyn.update(false);
})();
skyMat.emissiveTexture=skyDyn;skyMat.emissiveTexture.uScale=1;skyMat.emissiveTexture.vScale=1;
skyDome.material=skyMat;

// Nuages cartoon
function makeCloud(x,y,z,s){
  var cm=new B.StandardMaterial('cm',sc);cm.diffuseColor=new B.Color3(1,.96,.98);cm.emissiveColor=new B.Color3(.82,.75,.84);cm.specularColor=new B.Color3(0,0,0);
  [[0,0,0,1],[.5,.18,0,.75],[-.5,.12,0,.7],[.25,.42,0,.6],[-.2,.38,0,.55],[.75,0,0,.55],[-.75,.04,0,.5]].forEach(function(b){
    var cb=B.MeshBuilder.CreateSphere('cb',{diameter:s*b[3]*2,segments:5},sc);
    cb.material=cm;cb.position.set(x+b[0]*s,y+b[1]*s,z+b[2]*s);
    cb.outlineColor=new B.Color3(.5,.44,.55);cb.outlineWidth=.012;cb.renderOutline=true;
  });
}
[[-40,32,-120,13],[20,36,-110,11],[80,29,-100,10],[-80,28,-90,10],[0,40,-130,15],[50,30,-95,10]].forEach(function(c){makeCloud(c[0],c[1],c[2],c[3]);});

// Montagnes lointaines
function makeMtn(x,z,h,w){
  var mt=B.MeshBuilder.CreateCylinder('mt',{height:h,diameterTop:.5,diameterBottom:w,tessellation:5},sc);
  var mm=new B.StandardMaterial('mm',sc);mm.diffuseColor=new B.Color3(.28,.34,.52);mm.emissiveColor=new B.Color3(.16,.22,.38);mm.specularColor=new B.Color3(0,0,0);
  mt.material=mm;mt.position.set(x,h*.3,z);
}
[[-80,-160,28,20],[70,-155,24,17],[120,-140,20,15],[-100,-130,22,17],[40,-170,26,18]].forEach(function(m){makeMtn(m[0],m[1],m[2],m[3]);});

step(22,'SOL & CHEMINS...');

// ── SOL ──
// Grande étendue herbe verte cartoon
var ground=B.MeshBuilder.CreateGround('gnd',{width:300,height:300,subdivisions:2},sc);
var gMat=new B.StandardMaterial('gMat',sc);
gMat.diffuseColor=new B.Color3(.22,.68,.18);gMat.ambientColor=new B.Color3(.08,.25,.06);gMat.specularColor=new B.Color3(0,0,0);
ground.material=gMat;ground.position.y=-.02;ground.receiveShadows=true;

// Sable plage au loin
var beachGnd=B.MeshBuilder.CreateGround('beach',{width:300,height:300,subdivisions:2},sc);
var bMat=new B.StandardMaterial('bMat',sc);
bMat.diffuseColor=new B.Color3(.96,.74,.32);bMat.ambientColor=new B.Color3(.4,.28,.1);bMat.specularColor=new B.Color3(0,0,0);
beachGnd.material=bMat;beachGnd.position.set(0,-.03,-200);beachGnd.receiveShadows=true;

// ── CHEMINS DE SABLE ──
// Chemin principal et branches du labyrinthe
var pathMat=new B.StandardMaterial('pMat',sc);
pathMat.diffuseColor=new B.Color3(.94,.70,.28);pathMat.ambientColor=new B.Color3(.40,.26,.08);pathMat.specularColor=new B.Color3(0,0,0);

function makeSandPath(x0,z0,x1,z1,w){
  w=w||3.5;
  var dx=x1-x0,dz=z1-z0,len=Math.sqrt(dx*dx+dz*dz);
  var steps=Math.max(3,Math.floor(len/2.5));
  for(var si=0;si<=steps;si++){
    var t=si/steps;
    var px=x0+dx*t,pz=z0+dz*t;
    var disc=B.MeshBuilder.CreateCylinder('path',{height:.06,diameter:w*1.8,tessellation:8},sc);
    disc.material=pathMat;disc.position.set(px,.04,pz);disc.receiveShadows=true;
  }
}

// Chemin principal: départ → carrefours → sortie
makeSandPath(0,4, 0,-16, 3.5);        // départ → C1
makeSandPath(0,-16, 0,-20, 3.5);
makeSandPath(0,-20, 0,-34, 3.5);      // C1 → C2
makeSandPath(0,-34, 0,-38, 3.5);
makeSandPath(0,-38, 12,-38, 3.5);     // C2 → droite → C3
makeSandPath(12,-38, 16,-38, 3.5);
makeSandPath(16,-38, 26,-38, 3.5);    // C3 → C4
makeSandPath(26,-38, 30,-38, 3.5);
makeSandPath(30,-38, 30,-48, 3.5);    // C4 → C5
makeSandPath(30,-48, 30,-52, 3.5);
makeSandPath(30,-52, 30,-62, 3.5);    // C5 → C6
makeSandPath(30,-62, 30,-66, 3.5);
makeSandPath(30,-66, 16,-66, 3.5);    // C6 → sortie (gauche)
makeSandPath(16,-66, 0,-72, 3.5);     // vers plage
makeSandPath(0,-72, 0,-90, 4);        // ouverture plage

// Petites pierres sur le chemin (décoratif, pas de collision)
var stoneMat=new B.StandardMaterial('stMat',sc);
stoneMat.diffuseColor=new B.Color3(.58,.55,.52);stoneMat.specularColor=new B.Color3(.1,.1,.1);
function makeStone(x,z,s){
  var st=B.MeshBuilder.CreateSphere('stone',{diameter:s,segments:5},sc);
  st.material=stoneMat;st.position.set(x,.08+s*.3,z);st.scaling.set(1,.45,1);
  st.rotation.y=Math.random()*Math.PI;
  if(shadows)shadows.addShadowCaster(st);
}
// Petites pierres le long des chemins
[[0,-8,.4],[.8,-12,.3],[-.5,-25,.35],[.3,-28,.28],[14,-38,.38],[20,-38,.3],
 [30,-43,.35],[30,-57,.4],[22,-66,.32],[8,-70,.38],[0,-80,.4],[-5,-78,.3]
].forEach(function(s){makeStone(s[0],s[1],s[2]);});

step(34,'FUSEE ECRASEE...');

// ── FUSÉE ÉCRASÉE QUI FUME ──
var rocketMat=new B.StandardMaterial('rMat',sc);
rocketMat.diffuseColor=new B.Color3(.72,.72,.78);rocketMat.specularColor=new B.Color3(.3,.3,.35);rocketMat.specularPower=20;

// Corps fusée
var rBody=B.MeshBuilder.CreateCylinder('rBody',{height:3,diameterTop:.5,diameterBottom:1.2,tessellation:9},sc);
rBody.material=rocketMat;rBody.position.set(-4,.5,8);rBody.rotation.set(.6,0,.35);
if(shadows)shadows.addShadowCaster(rBody);
walls.push({x1:-6.5,z1:6,x2:-1.5,z2:10.5});

// Nez
var rNose=B.MeshBuilder.CreateCylinder('rNose',{height:1.2,diameterTop:.05,diameterBottom:.5,tessellation:9},sc);
rNose.material=rocketMat;rNose.position.set(-4.8,2.1,6.8);rNose.rotation.set(.6,0,.35);

// Ailerons cassés
var finMat=new B.StandardMaterial('fMat',sc);
finMat.diffuseColor=new B.Color3(.85,.3,.18);finMat.specularColor=new B.Color3(0,0,0);

// Palmier avec collision
function makePalm(x,z,h,lx,lz){
  walls.push({x1:x-.45,z1:z-.45,x2:x+.45,z2:z+.45});
  var NS=8,pts=[new B.Vector3(x,0,z)],cx2=x,cy=0,cz2=z;
  for(var i=1;i<=NS;i++){var t=i/NS,bend=Math.pow(t,1.6)*1.5;cx2+=lx/NS*bend;cy+=h/NS;cz2+=lz/NS*bend;pts.push(new B.Vector3(cx2,cy,cz2));}
  for(var i=0;i<NS;i++){
    var p0=pts[i],p1=pts[i+1],d=(.28-.022*i);
    var seg=B.MeshBuilder.CreateCylinder('ts',{height:p0.subtract(p1).length()*1.05,diameterTop:Math.max(.04,d-.03),diameterBottom:d,tessellation:7},sc);
    seg.material=trunkMat;var mid=B.Vector3.Lerp(p0,p1,.5);seg.position=mid.clone();
    var dir=p1.subtract(p0).normalize(),up=new B.Vector3(0,1,0),axis=B.Vector3.Cross(up,dir);
    if(axis.length()>.001){axis.normalize();seg.rotate(axis,Math.acos(Math.min(1,B.Vector3.Dot(up,dir))),B.Space.WORLD);}
    seg.outlineColor=new B.Color3(.15,.1,.05);seg.outlineWidth=.03;seg.renderOutline=true;
    if(shadows)shadows.addShadowCaster(seg);
  }
  var top=pts[NS];
  for(var i=0;i<9+Math.floor(Math.random()*4);i++){
    var ang=i/9*Math.PI*2+(Math.random()-.5)*.3,ll=3+Math.random()*2;
    var lf=B.MeshBuilder.CreateCylinder('lf',{height:ll,diameterTop:.03,diameterBottom:.24,tessellation:5},sc);
    var lm=new B.StandardMaterial('lm',sc);lm.diffuseColor=new B.Color3(.18+Math.random()*.12,.70+Math.random()*.2,.12);lm.specularColor=new B.Color3(0,0,0);
    lf.material=lm;var droop=.62+Math.random()*.4;
    lf.position.set(top.x+Math.sin(ang)*ll*.44,top.y-droop,top.z+Math.cos(ang)*ll*.44);
    lf.rotation.set(-droop*.8,ang,(Math.random()-.5)*.1);
    lf.outlineColor=new B.Color3(0,.12,0);lf.outlineWidth=.02;lf.renderOutline=true;
    if(shadows)shadows.addShadowCaster(lf);
  }
}

function buildStitch(){
  var g=new B.TransformNode('stitch',sc);
  function cM(col){var m=new B.StandardMaterial('sm'+Math.random(),sc);m.diffuseColor=col;m.specularColor=new B.Color3(0,0,0);return m;}
  var blue=cM(new B.Color3(.14,.50,.88));
  var light=cM(new B.Color3(.52,.76,.96));
  var dark=cM(new B.Color3(.04,.03,.04));
  var eyeW=cM(new B.Color3(.92,.92,1));eyeW.emissiveColor=new B.Color3(.28,.28,.38);

  function add(mesh,mat,oc){mesh.material=mat;mesh.parent=g;mesh.outlineColor=oc||new B.Color3(0,0,0);mesh.outlineWidth=.04;mesh.renderOutline=true;if(shadows)shadows.addShadowCaster(mesh);}

  var body=B.MeshBuilder.CreateSphere('bd',{diameter:.92,segments:14},sc);body.scaling.set(1,.88,1);add(body,blue);
  var head=B.MeshBuilder.CreateSphere('hd',{diameter:.72,segments:14},sc);head.position.y=.9;add(head,blue);
  var snout=B.MeshBuilder.CreateSphere('sn',{diameter:.40,segments:10},sc);snout.scaling.set(1.1,.7,.88);snout.position.set(0,.84,.32);add(snout,light);
  var nose=B.MeshBuilder.CreateSphere('ns',{diameter:.12,segments:6},sc);nose.position.set(0,.88,.42);add(nose,dark);
  [-1,1].forEach(function(e){
    var ear=B.MeshBuilder.CreateCylinder('ear',{height:.65,diameterTop:.08,diameterBottom:.22,tessellation:6},sc);
    ear.position.set(e*.30,1.32,.04);ear.rotation.set(-.1,0,e*.42);add(ear,blue);
    var ew=B.MeshBuilder.CreateSphere('ew',{diameter:.17,segments:7},sc);ew.position.set(e*.19,.94,.32);ew.material=eyeW;ew.parent=g;ew.outlineColor=new B.Color3(0,0,0);ew.outlineWidth=.03;ew.renderOutline=true;
    var ep=B.MeshBuilder.CreateSphere('ep',{diameter:.10,segments:6},sc);ep.position.set(e*.19,.94,.38);add(ep,dark);
    var leg=B.MeshBuilder.CreateCylinder('lg',{height:.48,diameterTop:.16,diameterBottom:.14,tessellation:7},sc);leg.position.set(e*.26,-.28,0);add(leg,blue);
    var foot=B.MeshBuilder.CreateSphere('ft',{diameter:.25,segments:7},sc);foot.scaling.set(1.5,.7,1.9);foot.position.set(e*.26,-.55,.09);add(foot,blue);
    var arm=B.MeshBuilder.CreateCylinder('arm',{height:.44,diameterTop:.10,diameterBottom:.15,tessellation:6},sc);arm.position.set(e*.50,.16,0);arm.rotation.set(.35,0,e*.85);add(arm,blue);
  });
  var tail=B.MeshBuilder.CreateSphere('tl',{diameter:.26,segments:7},sc);tail.scaling.set(.7,1.5,.7);tail.position.set(0,.14,-.50);add(tail,blue);
  g.getChildMeshes().forEach(function(m){m.receiveShadows=true;});
  return g;
}

function setupPlayer(root,anims,isGLB){
  pRoot=root;pAnims={};curAnim=null;
  if(isGLB){
    root.scaling.setAll(1);root.computeWorldMatrix(true);
    var bb=root.getHierarchyBoundingVectors(),h=bb.max.y-bb.min.y;
    if(h>.05)root.scaling.setAll(1.9/h);
    root.computeWorldMatrix(true);
    var bb2=root.getHierarchyBoundingVectors();pYOff=-bb2.min.y+.05;
    root.getChildMeshes().forEach(function(m){m.receiveShadows=true;if(shadows)shadows.addShadowCaster(m,true);});
    if(anims&&anims.length){
      anims.forEach(function(ag){ag.stop();var n=ag.name.toLowerCase();
        if(/idle/.test(n))pAnims.idle=ag;else if(/run/.test(n))pAnims.run=ag;
        else if(/walk/.test(n))pAnims.walk=ag;else if(/jump/.test(n))pAnims.jump=ag;
      });
      if(!pAnims.idle&&anims[0])pAnims.idle=anims[0];
      if(!pAnims.walk&&anims[1])pAnims.walk=anims[1];
      playAnim(pAnims.idle);
    }
  } else {pYOff=.62;}
  root.position.set(P.x,P.y+pYOff,P.z);
  P.yaw=Math.PI;
}

// ── BOUCLE ──
eng.runRenderLoop(function(){
  var now=performance.now(),dt=Math.min((now-lastT)/1000,.05);lastT=now;
  waveT+=dt;

  // ── INPUT ──
  var fwd=0,turn=0;
  if(KY['KeyW']||KY['KeyZ']||KY['ArrowUp'])fwd=1;
  if(KY['KeyS']||KY['ArrowDown'])fwd=-1;
  if(KY['KeyD']||KY['ArrowRight'])turn=1;
  if(KY['KeyA']||KY['KeyQ']||KY['ArrowLeft'])turn=-1;
  fwd+=jLY; turn-=jLX;
  if(Math.abs(fwd)>1)fwd=fwd>0?1:-1;
  if(Math.abs(turn)>1)turn=turn>0?1:-1;
  var spd=sprint?7.5:4.5;

  P.yaw+=turn*dt*2.5;

  var moveMag=Math.abs(fwd);
  if(moveMag>.05){
    P.vx+=(-Math.sin(P.yaw)*fwd*spd-P.vx)*Math.min(1,dt*12);
    P.vz+=(-Math.cos(P.yaw)*fwd*spd-P.vz)*Math.min(1,dt*12);
    playAnim(pAnims.walk||pAnims.idle);
  } else {
    P.vx*=Math.pow(.01,dt);P.vz*=Math.pow(.01,dt);
    if(Math.abs(P.vx)<.02)P.vx=0;if(Math.abs(P.vz)<.02)P.vz=0;
    if(pAnims.idle)playAnim(pAnims.idle);
  }

  if(!P.onGround){P.vy-=26*dt;if(P.vy<-24)P.vy=-24;}
  var nx=P.x+P.vx*dt,nz=P.z+P.vz*dt;

  // ── COLLISIONS MURS (AABB strict) ──
  var PRAD=.55;
  var canX=true,canZ=true;
  for(var wi=0;wi<walls.length;wi++){
    var w=walls[wi];
    var inX=(nx+PRAD>w.x1&&nx-PRAD<w.x2);
    var inZ=(nz+PRAD>w.z1&&nz-PRAD<w.z2);
    var curInX=(P.x+PRAD>w.x1&&P.x-PRAD<w.x2);
    var curInZ=(P.z+PRAD>w.z1&&P.z-PRAD<w.z2);
    if(inX&&inZ){
      if(!curInX)canX=false;
      if(!curInZ)canZ=false;
    }
  }
  if(canX)P.x=nx; else P.vx=0;
  if(canZ)P.z=nz; else P.vz=0;

  P.y+=P.vy*dt;
  if(P.y<=0&&P.vy<=0){P.y=0;P.vy=0;P.onGround=true;}else if(P.y>0)P.onGround=false;

  // ── MESH JOUEUR ──
  if(pRoot){
    pRoot.position.x=P.x;pRoot.position.y=P.y+pYOff;pRoot.position.z=P.z;
    pRoot.rotation.y=P.yaw;
  }
  if(fill)fill.position.set(P.x,P.y+3,P.z);

  // ── CAMERA strictement derrière Stitch ──
  var camYaw=P.yaw+Math.PI;
  var cX=P.x+Math.sin(camYaw)*5.5;
  var cZ=P.z+Math.cos(camYaw)*5.5;
  var cY=P.y+pYOff+2.1;
  cam.position.x+=(cX-cam.position.x)*Math.min(1,dt*20);
  cam.position.y+=(cY-cam.position.y)*Math.min(1,dt*14);
  cam.position.z+=(cZ-cam.position.z)*Math.min(1,dt*20);
  cam.setTarget(new B.Vector3(P.x,P.y+pYOff+.85,P.z));

  // ── ZONES INTERACTION ──
  gameState.nearCarrefour=null;
  for(var zi=0;zi<interactZones.length;zi++){
    var iz=interactZones[zi];
    var dist=Math.sqrt((P.x-iz.x)*(P.x-iz.x)+(P.z-iz.z)*(P.z-iz.z));
    if(dist<iz.r){
      if(iz.id==='VICTORY'&&!gameState.atVictory){
        triggerVictory();
      } else if(iz.id!=='VICTORY'){
        gameState.nearCarrefour=iz.id;
      }
    }
  }

  // HUD
  document.getElementById('cluesLbl').textContent='🔍 Indices: '+gameState.cluesSolved+'/6';
  var dz2=Math.abs(P.z);
  document.getElementById('zoneLbl').textContent=dz2<15?'🚀 FUSEE':dz2<75?'🌿 JUNGLE':'🏖 PLAGE';

  // Fumée fusée
  smokeMeshes.forEach(function(s,i){
    s.m.position.set(s.ox+Math.sin(waveT*s.spd+s.phase)*.25,-3.5+Math.sin(waveT*s.spd+s.phase+1)*1.5+i*.35,8.5+Math.cos(waveT*s.spd*.7+s.phase)*.2);
    s.m.material.alpha=.5+Math.sin(waveT*1.2+s.phase)*.2;
    s.m.scaling.setAll(.8+Math.sin(waveT*s.spd+s.phase)*.3);
    s.m.position.y+=waveT*.0005; // monte lentement
  });

  // Vague
  waveRing.scaling.x=1+Math.sin(waveT*1.2)*.03;waveRing.scaling.z=1+Math.sin(waveT*1.2)*.03;
  waveRing.position.y=-.08+Math.sin(waveT*1.5)*.03;waveRing.material.alpha=.45+Math.sin(waveT*1.8)*.1;

  sc.render();
});

window.addEventListener('resize',function(){if(eng)eng.resize();});

// ── ENIGMES ──
window.tryInteract=function(){
  if(gameState.nearCarrefour===null){toast('Approche d\'un panneau !');return;}
  var cf=MAZE_DATA.carrefours[gameState.nearCarrefour];
  if(!cf)return;
  openPuzzle(cf);
};

function openPuzzle(cf){
  var pz=cf.enigme;
  document.getElementById('pzTitle').textContent=pz.titre;
  document.getElementById('pzText').textContent=pz.texte;
  var content=document.getElementById('pzContent');
  content.innerHTML='';
  document.getElementById('dirBtns').style.display='none';

  var btns=document.createElement('div');btns.className='pzBtns';
  pz.choix.forEach(function(c,i){
    var b=document.createElement('div');b.className='pzBtn';b.textContent=c;
    b.onclick=function(){
      if(i===pz.bonne){
        b.classList.add('correct');
        setTimeout(function(){
          document.getElementById('puzzle').style.display='none';
          toast(pz.message,3500);
          gameState.cluesSolved++;
          // Montrer directions
          setTimeout(function(){showDirections(cf);},1200);
        },800);
      } else {
        b.classList.add('wrong');
        setTimeout(function(){b.classList.remove('wrong');},800);
        toast('Ce n\'est pas ça... Réfléchis !');
      }
    };
    btns.appendChild(b);
  });
  content.appendChild(btns);
  document.getElementById('puzzle').style.display='flex';
}

function showDirections(cf){
  document.getElementById('pzTitle').textContent='↗ QUELLE DIRECTION ?';
  document.getElementById('pzText').textContent='Tu as déchiffré le panneau !\nMaintenant, choisis ton chemin.';
  document.getElementById('pzContent').innerHTML='';
  document.getElementById('dirBtns').style.display='flex';
  document.getElementById('puzzle').style.display='flex';
  window._currentCf=cf;
}

window.choosePath=function(dir){
  var cf=window._currentCf;if(!cf)return;
  document.getElementById('puzzle').style.display='none';
  if(dir===cf.correct){
    // Bon chemin — téléporte vers le prochain carrefour ou victoire
    toast('Bonne direction !',2000);
    var dest=cf[dir];
    P.x=dest.x;P.z=dest.z;P.vx=0;P.vz=0;
    if(cf.nextCorrect==='VICTORY'){
      setTimeout(triggerVictory,1500);
    }
  } else {
    // Mauvais chemin — impasse, retour
    var dest=cf[dir];
    P.x=dest.x;P.z=dest.z;P.vx=0;P.vz=0;
    toast('Impasse ! La végétation bloque... Demi-tour !',3000);
    setTimeout(function(){
      // Retour au carrefour
      P.x=cf.x;P.z=cf.z;P.vx=0;P.vz=0;
    },2500);
  }
};

function triggerVictory(){
  if(gameState.atVictory)return;
  gameState.atVictory=true;
  P.x=0;P.z=-88;P.vx=0;P.vz=0;P.yaw=Math.PI;
  document.getElementById('victory').style.display='flex';
}
window.restartGame=function(){
  document.getElementById('victory').style.display='none';
  P.x=0;P.z=2;P.vx=0;P.vz=0;P.yaw=Math.PI;P.y=0;
  gameState.cluesSolved=0;gameState.atVictory=false;gameState.nearCarrefour=null;
  toast('Nouvelle partie ! Trouve la plage !',3000);
};

function playAnim(a){if(!a||a===curAnim)return;if(curAnim)curAnim.stop();a.start(true);curAnim=a;}
function doJump(e){if(e&&e.preventDefault)e.preventDefault();if(P.onGround){P.vy=7;P.onGround=false;}}
window.doJump=doJump;
function setSprint(v,e){if(e&&e.preventDefault)e.preventDefault();sprint=!!v;}
window.setSprint=setSprint;

// Joystick
var jBase=document.getElementById('joy'),jNub=document.getElementById('jnub'),JMAX=38;
function jUp(cx,cy){
  var r=jBase.getBoundingClientRect(),dx=cx-(r.left+r.width/2),dy=cy-(r.top+r.height/2),d=Math.sqrt(dx*dx+dy*dy);
  if(d>JMAX){dx=dx/d*JMAX;dy=dy/d*JMAX;}
  jNub.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';
  jLX=d>5?dx/JMAX:0;jLY=d>5?-dy/JMAX:0;
}
function jRst(){jNub.style.transform='translate(-50%,-50%)';jLX=0;jLY=0;jid=-1;}
jBase.addEventListener('touchstart',function(e){e.preventDefault();jid=e.changedTouches[0].identifier;jUp(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
jBase.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===jid)jUp(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false});
jBase.addEventListener('touchend',jRst,{passive:true});
jBase.addEventListener('mousedown',function(e){jUp(e.clientX,e.clientY);});
window.addEventListener('mouseup',jRst);
window.addEventListener('keydown',function(e){KY[e.code]=1;if(e.code==='Space'){e.preventDefault();doJump();}if(e.code==='ShiftLeft')sprint=true;if(e.code==='KeyE')tryInteract();});
window.addEventListener('keyup',function(e){KY[e.code]=0;if(e.code==='ShiftLeft')sprint=false;});
window.addEventListener('wheel',function(){},{passive:true});

step(100,'');
};
if(window.BABYLON&&window.startGame)window.startGame();
</script>
